ressources: [
{ cat:"methodo", type:"page", titre:"Bienvenue en Découverte STMG !", desc:"À quoi sert ce parcours et comment il te prépare à la 1ʳᵉ STMG.", url:"",
  html:"<h2>Bienvenue !</h2><p>Ce parcours est une <b>introduction</b> à la filière STMG (Sciences et Technologies du Management et de la Gestion). Il s'appuie sur le programme de l'option <b>Management et gestion</b> de seconde.</p><h2>Pourquoi ce parcours ?</h2><ul><li>Découvrir, en douceur, les notions que tu approfondiras en 1ʳᵉ.</li><li>Te constituer un <b>socle commun</b> de connaissances utiles.</li><li>Aborder l'année de première avec confiance.</li></ul><h2>Comment ça marche ?</h2><p>Tu avances par <b>étapes</b> : entreprendre, organiser et décider, évaluer et évoluer, puis un premier pas vers les quatre disciplines de la 1ʳᵉ STMG. Pour chaque étape, des petits jeux te font manipuler les notions avec des exemples concrets, souvent réunionnais.</p><h2>Un conseil</h2><p>Prends ton temps, lis les explications après chaque réponse, et n'aie pas peur de te tromper : c'est comme ça qu'on apprend !</p>" },
{ cat:"methodo", type:"page", titre:"Les mots-clés à connaître pour la 1ʳᵉ", desc:"Un mini-lexique des notions de base, expliquées simplement.", url:"",
  html:"<h2>Mini-lexique de départ</h2><table><tr><th>Mot</th><th>En une phrase simple</th></tr><tr><td>Organisation</td><td>Un groupe de personnes unies vers un même but.</td></tr><tr><td>Entrepreneuriat</td><td>Se lancer pour transformer une idée en activité.</td></tr><tr><td>Innovation</td><td>Mettre une idée nouvelle sur le marché.</td></tr><tr><td>Partie prenante</td><td>Toute personne qui a un intérêt dans l'organisation.</td></tr><tr><td>Décision stratégique</td><td>Un grand choix qui engage l'avenir.</td></tr><tr><td>Performance</td><td>Atteindre ses buts (efficace) sans gaspiller (efficient).</td></tr><tr><td>Droit</td><td>Les règles de la vie en société.</td></tr><tr><td>Économie</td><td>Produire, échanger et consommer.</td></tr><tr><td>Management</td><td>Gouverner l'organisation et fixer les buts.</td></tr><tr><td>Gestion</td><td>Suivre le concret : argent, ventes, stocks.</td></tr></table><p>Pas besoin de tout retenir d'un coup : tu reverras chacun de ces mots en 1ʳᵉ STMG.</p>" },
{ cat:"methodo", type:"page", titre:"Les 4 disciplines de la 1ʳᵉ STMG", desc:"Droit, économie, management, gestion : à quoi ça sert ?", url:"",
  html:"<h2>Quatre disciplines complémentaires</h2><p>En 1ʳᵉ STMG, tu étudieras quatre matières qui s'éclairent les unes les autres.</p><h2>⚖️ Le droit</h2><p>Les règles de la vie en société : les contrats, le travail, la responsabilité. Il te protège et règle les conflits.</p><h2>📈 L'économie</h2><p>Comment on produit, échange et consomme. Elle explique, par exemple, pourquoi les prix montent ou baissent.</p><h2>🧭 Le management</h2><p>Le « gouvernement » des organisations : fixer des buts et animer l'action collective.</p><h2>📊 Les sciences de gestion</h2><p>Le concret du quotidien : suivre l'argent, les ventes, les stocks et les équipes pour aider à décider.</p><p>Ensemble, ces disciplines t'aident à comprendre comment fonctionnent les organisations qui nous entourent.</p>" },

{ cat:"methodo", type:"page", titre:"Méthode — Aborder un sujet de devoir, pas à pas", desc:"Le rituel des 15 premières minutes : contexte, questions, titres des documents, surlignage, verbes directeurs.", url:"",
  html:"<h2>Le principe : on n'écrit RIEN avant d'avoir tout compris</h2><p>Les points perdus en devoir viennent rarement d'un manque de connaissances : ils viennent d'une lecture trop rapide. Voici le rituel à appliquer à CHAQUE sujet, dans cet ordre.</p><h2>Étape 1 — Lire le contexte (2 min)</h2><ul><li>Qui est l'organisation ? (type, taille, activité, lieu — réflexe « caractériser »)</li><li>Quel est son problème ou son projet ? C'est le fil rouge du sujet : toutes les questions tournent autour.</li><li>Note au brouillon une phrase : <i>« [Organisation] cherche à [problème/projet] ».</i></li></ul><h2>Étape 2 — Lire TOUTES les questions AVANT les documents (3 min)</h2><ul><li>Lire les questions d'abord te dit <b>quoi chercher</b> dans les documents : tu liras ensuite avec un objectif.</li><li><b>Lis chaque question JUSQU'AU BOUT.</b> Beaucoup de questions ont <b>plusieurs parties</b> : <i>« Identifiez le style de direction <u>et</u> montrez ses conséquences sur la motivation »</i> = 2 tâches = 2 paquets de points. Numérote-les au brouillon (1a, 1b…).</li><li>Repère les mots qui doublent la tâche : <b>et</b>, <b>puis</b>, <b>ainsi que</b>, <b>en justifiant</b>, <b>à l'aide de…</b></li><li>Entoure le <b>verbe directeur</b> de chaque question (voir tableau plus bas) : il définit ce qu'on attend de toi.</li></ul><h2>Étape 3 — Lire les TITRES des documents (1 min)</h2><p>Le titre d'un document est un indice offert : il annonce ce qu'on y trouvera. Associe au brouillon chaque question à son ou ses documents : <i>Q2 → doc 1 (interview du dirigeant) ; Q4 → doc 3 (tableau des effectifs)</i>. Un document fourni sert toujours quelque part.</p><h2>Étape 4 — Première lecture AVEC le surligneur (8-10 min)</h2><ul><li>Lis chaque document en gardant les questions en tête, et surligne <b>uniquement</b> ce qui peut servir à répondre : chiffres clés, citations du dirigeant, mots du programme reconnus (finalité, parties prenantes, stratégie…).</li><li>Astuce des couleurs : une couleur par question (ou par dossier), pour retrouver instantanément tes indices au moment de rédiger.</li><li>Note en marge la notion de cours que le passage illustre : <i>« = avantage concurrentiel », « = style participatif »</i>.</li></ul><h2>Étape 5 — Les verbes directeurs : ce qu'on attend VRAIMENT</h2><table><tr><th>Verbe</th><th>Signification</th><th>Ce qui est attendu</th></tr><tr><td><b>Identifier / Repérer</b></td><td>Trouver et nommer</td><td>Donner l'élément avec le mot du cours + une courte justification tirée du document</td></tr><tr><td><b>Citer / Relever</b></td><td>Extraire du document</td><td>Recopier l'élément précis demandé (avec guillemets si citation)</td></tr><tr><td><b>Définir</b></td><td>Donner le sens du mot</td><td>La définition du cours, précise, éventuellement avec un exemple</td></tr><tr><td><b>Caractériser</b></td><td>Décrire selon des critères</td><td>Passer en revue les critères du cours (type, finalité, taille, ressources…) en justifiant</td></tr><tr><td><b>Distinguer</b></td><td>Montrer la différence</td><td>Définir les deux notions ET expliquer ce qui les sépare</td></tr><tr><td><b>Expliquer</b></td><td>Faire comprendre</td><td>Le mécanisme, les causes et conséquences, avec le vocabulaire du cours</td></tr><tr><td><b>Analyser / Commenter</b></td><td>Décomposer et interpréter</td><td>Constater (avec le document) + expliquer + conclure sur ce que cela signifie pour l'organisation</td></tr><tr><td><b>Montrer que / Démontrer</b></td><td>Prouver une affirmation</td><td>Arguments AEI appuyés sur les documents : la conclusion est imposée, c'est le chemin qui est noté</td></tr><tr><td><b>Justifier</b></td><td>Donner les raisons</td><td>Apporter les preuves (document + cours) qui fondent une affirmation ou un choix</td></tr><tr><td><b>Comparer</b></td><td>Points communs et différences</td><td>Mettre en regard, critère par critère — jamais deux descriptions séparées</td></tr><tr><td><b>Apprécier / Évaluer</b></td><td>Porter un jugement</td><td>Un avis NUANCÉ et argumenté : points forts ET limites</td></tr><tr><td><b>Proposer / Conseiller</b></td><td>Suggérer des solutions</td><td>Des solutions réalistes, adaptées au contexte, et justifiées</td></tr><tr><td><b>Dans quelle mesure…</b></td><td>Discuter</td><td>Réponse en deux temps : « oui, dans une certaine mesure… » PUIS « mais avec des limites… »</td></tr></table><blockquote><b>⚠️ Les 3 erreurs fatales</b> : répondre à la question qu'on aurait aimé avoir (et pas celle posée) · traiter la moitié d'une question double · « expliquer » quand on demandait seulement d'« identifier » (perte de temps) ou l'inverse (perte de points).</blockquote><h2>Check-list avant de rendre</h2><ul><li>Chaque question a une réponse, chaque partie de question aussi ?</li><li>Chaque réponse cite un document ET nomme une notion ?</li><li>Le verbe directeur a-t-il été respecté ?</li></ul>" },

{ cat:"methodo", type:"page", titre:"Méthode — Caractériser une organisation", desc:"La compétence n°1 du programme : identifier une organisation en 7 critères, sans rien oublier.", url:"",
  html:"<h2>Pourquoi cette méthode ?</h2><p>« Caractériser l'organisation » est souvent la <b>première question</b> d'un sujet. Bien traitée, elle rapporte des points faciles et t'oblige à lire attentivement le contexte. La règle d'or : <b>chaque caractéristique doit être justifiée par un élément du texte</b>.</p><h2>Les 7 critères à passer en revue</h2><table><tr><th>Critère</th><th>Questions à se poser</th><th>Exemples de réponses</th></tr><tr><td><b>Type d'organisation</b></td><td>Entreprise privée ? Organisation publique ? Organisation de la société civile ?</td><td>Entreprise privée (Edena) ; commune de Saint-Pierre ; association sportive</td></tr><tr><td><b>Finalité / but</b></td><td>Lucrative ? Non lucrative ? Mission de service public ?</td><td>Réaliser un profit et pérenniser l'activité ; satisfaire l'intérêt général</td></tr><tr><td><b>Statut juridique</b></td><td>SARL, SA, SAS, association loi 1901, collectivité…</td><td>SARL au capital de 50 000 €</td></tr><tr><td><b>Taille</b></td><td>Effectif ? Chiffre d'affaires ? TPE, PME, ETI, grande entreprise ?</td><td>PME de 80 salariés, CA de 12 M€</td></tr><tr><td><b>Nature de l'activité</b></td><td>Production de biens ? De services ? Marchande ou non marchande ?</td><td>Production et vente de boissons (activité marchande)</td></tr><tr><td><b>Champ d'action</b></td><td>Local, régional, national, international ?</td><td>Régional : La Réunion ; export vers l'océan Indien</td></tr><tr><td><b>Ressources</b></td><td>Humaines, financières, matérielles, immatérielles ?</td><td>80 salariés, une usine au Port, une marque réputée</td></tr></table><h2>Comment rédiger ?</h2><p>Deux présentations acceptées : le <b>tableau</b> (critère / réponse justifiée) ou le <b>paragraphe rédigé</b> qui enchaîne les critères. Dans les deux cas, appuie-toi sur le document : <i>« Edena est une entreprise privée (type) dont la finalité est lucrative ; cette PME d'environ 80 salariés (taille) produit et commercialise des eaux et boissons (activité marchande) à La Réunion (champ d'action régional)… »</i></p><blockquote><b>⚠️ Pièges classiques</b> : confondre <i>finalité</i> (la raison d'être) et <i>objectif</i> (un résultat chiffré à atteindre) · oublier de justifier avec le texte · inventer une information absente du document.</blockquote><h2>Auto-vérification</h2><ul><li>Ai-je traité les 7 critères (ou signalé ceux que le document ne permet pas de déterminer) ?</li><li>Chaque caractéristique cite-t-elle un indice du document ?</li><li>Mon vocabulaire est-il celui du programme (finalité, but, ressources…) ?</li></ul>" },
{ cat:"methodo", type:"page", titre:"Méthode — Analyser un document en management", desc:"Lire vite et bien : identifier, comprendre, relier au cours, exploiter dans la réponse.", url:"",
  html:"<h2>Étape 1 — Identifier le document (30 secondes)</h2><ul><li><b>Nature</b> : article de presse, interview, site web de l'entreprise, tableau de chiffres, organigramme, témoignage…</li><li><b>Source et date</b> : qui parle ? La source est-elle interne (l'entreprise parle d'elle-même) ou externe (journaliste, étude) ? Récente ?</li><li><b>Thème</b> : de quoi parle-t-il en une phrase ?</li></ul><blockquote>Une source <b>interne</b> valorise toujours l'organisation : garde un œil critique. Un article de presse externe est souvent plus neutre.</blockquote><h2>Étape 2 — Comprendre (lecture active)</h2><ul><li>Surligne les <b>mots du programme</b> que tu reconnais (finalité, parties prenantes, diagnostic, stratégie, avantage concurrentiel…).</li><li>Note en marge la <b>notion de cours</b> que chaque passage illustre : c'est le réflexe qui fait la différence.</li><li>Pour un tableau de chiffres : lis le titre, les unités, puis compare (dans le temps, entre lignes) avant de conclure.</li></ul><h2>Étape 3 — Relier au cours</h2><p>Pose-toi systématiquement : <i>« Quelle question de gestion ce document illustre-t-il ? Quelles notions du programme ? »</i> Un document de sujet ne tombe jamais par hasard : il a été choisi pour te faire mobiliser des notions précises.</p><h2>Étape 4 — Exploiter dans la réponse</h2><p>La formule gagnante combine toujours <b>document + cours</b> :</p><blockquote><i>« D'après le document 2, Air Austral a ouvert deux nouvelles lignes régionales (fait du document) : il s'agit d'une stratégie de développement de marché (notion de cours), qui consiste à proposer l'offre existante sur de nouveaux territoires (définition). »</i></blockquote><ul><li>❌ Recopier des phrases entières du document sans les analyser.</li><li>❌ Réciter le cours sans citer le document.</li><li>✅ Citer un élément précis (« d'après le document… ») PUIS le nommer avec le vocabulaire du cours PUIS expliquer.</li></ul>" },
{ cat:"methodo", type:"page", titre:"Méthode — Rédiger une réponse argumentée (AEI)", desc:"Affirmation, Explication, Illustration : la structure qui transforme tes idées en points.", url:"",
  html:"<h2>Le principe AEI</h2><p>Chaque argument se construit en trois temps :</p><table><tr><th>Temps</th><th>Rôle</th><th>Exemple</th></tr><tr><td><b>A — Affirmation</b></td><td>L'idée, en une phrase claire</td><td>« Améliorer les conditions de travail renforce la motivation des salariés. »</td></tr><tr><td><b>E — Explication</b></td><td>Le pourquoi, avec les notions du cours</td><td>« En effet, les conditions de travail influencent les comportements : un salarié qui travaille dans un environnement sain s'implique davantage et l'absentéisme recule. »</td></tr><tr><td><b>I — Illustration</b></td><td>Un exemple du document ou de l'actualité</td><td>« Ainsi, d'après le document 1, l'absentéisme de l'atelier a baissé de 8 % à 5 % après la rénovation des locaux. »</td></tr></table><h2>Construire la réponse complète</h2><ul><li><b>1. Analyse la consigne</b> : repère le verbe (montrer, justifier, expliquer, apprécier…) et souligne les mots-clés. « Montrez que… » = prouver avec arguments ; « Dans quelle mesure… » = nuancer (oui… mais…).</li><li><b>2. Brouillon express (3 min)</b> : liste 2 à 3 arguments AEI, choisis l'ordre.</li><li><b>3. Rédige</b> : une phrase d'introduction qui reformule la question, un paragraphe par argument (saute des lignes !), une phrase de conclusion qui répond directement.</li></ul><h2>Les connecteurs qui structurent</h2><p>Tout d'abord · Ensuite · De plus · En effet · Ainsi · Par exemple · Cependant · C'est pourquoi · En conclusion.</p><blockquote><b>⚠️ À bannir</b> : « je pense que » sans justification · les généralités (« de tout temps les entreprises… ») · le recopiage du document · les réponses en une ligne à une question en 4 points.</blockquote><h2>Grille de relecture</h2><ul><li>Ai-je répondu À LA question posée (et pas à côté) ?</li><li>Chaque paragraphe contient-il une notion du cours nommée explicitement ?</li><li>Ai-je cité au moins un élément précis des documents ?</li><li>Orthographe des mots du programme : <i>stratégie, concurrentiel, pérennité, hiérarchie</i>…</li></ul>" },

intrusExtra: {
  1:[ {liste:["Salariés","Bénévoles","Dirigeants","Bâtiments"], intrus:3, why:"Les bâtiments sont une ressource matérielle ; les trois autres sont des ressources humaines."},
      {liste:["Profit","Pérennité","Intérêt général","Chiffre d'affaires"], intrus:2, why:"L'intérêt général est la finalité d'une organisation publique ; les autres renvoient à la finalité lucrative d'une entreprise privée."},
      {liste:["Subvention","Emprunt","Trésorerie","Brevet"], intrus:3, why:"Le brevet est une ressource immatérielle ; les trois autres sont des ressources financières."},
      {liste:["École publique","Hôpital public","Police","Supermarché"], intrus:3, why:"Le supermarché est une entreprise privée (service marchand) ; les autres sont des organisations publiques."},
      {liste:["Marque","Réputation","Savoir-faire","Camion de livraison"], intrus:3, why:"Le camion est une ressource matérielle ; les trois autres sont immatérielles."},
      {liste:["Association","Fondation","ONG","Mairie"], intrus:3, why:"La mairie est une organisation publique ; les trois autres sont des OSC."},
      {liste:["Pilier économique","Pilier social","Pilier environnemental","Pilier financier"], intrus:3, why:"La RSE repose sur trois piliers : économique, social et environnemental. Le « pilier financier » n'en fait pas partie."} ],
  2:[ {liste:["Marque connue","Savoir-faire rare","Coûts maîtrisés","Marché en croissance"], intrus:3, why:"Le marché en croissance est une opportunité (externe) ; les trois autres sont des forces internes."},
      {liste:["Politique","Écologique","Technologique","Concurrentiel"], intrus:3, why:"« Concurrentiel » n'est pas une lettre du PESTEL (Politique, Économique, Socioculturel, Technologique, Écologique, Légal)."},
      {liste:["Nouveau concurrent","Hausse du carburant","Loi plus stricte","Machines vieillissantes"], intrus:3, why:"Les machines vieillissantes sont une faiblesse interne ; les trois autres sont des menaces externes."},
      {liste:["Chiffre d'affaires","Part de marché","Taux de satisfaction","Finalité"], intrus:3, why:"La finalité est la raison d'être ; les trois autres sont des indicateurs mesurables."},
      {liste:["Salariés","Clients","Fournisseurs","SWOT"], intrus:3, why:"Le SWOT est un outil de diagnostic ; les trois autres sont des parties prenantes."},
      {liste:["Diagnostic interne","Forces","Faiblesses","Menaces"], intrus:3, why:"Les menaces relèvent du diagnostic externe ; forces et faiblesses sont internes."},
      {liste:["Augmenter les ventes de 10 % en 2 ans","Ouvrir 3 magasins d'ici 2027","Réduire les déchets de 20 % cette année","Être une bonne entreprise"], intrus:3, why:"Un objectif stratégique doit être précis et daté ; « être une bonne entreprise » est trop vague."} ],
  3:[ {liste:["Croissance interne","Croissance externe","Partenariat","Différenciation"], intrus:3, why:"La différenciation est une stratégie de domaine ; les trois autres sont des modalités de développement."},
      {liste:["Diversification horizontale","Diversification verticale","Diversification conglomérale","Diversification financière"], intrus:3, why:"La « diversification financière » n'existe pas dans le programme : les trois formes sont horizontale, verticale et conglomérale."},
      {liste:["Intérêt général","Service public","Redistribution","Profit"], intrus:3, why:"Le profit est la finalité d'une entreprise privée ; les trois autres relèvent des organisations publiques."},
      {liste:["Dons","Bénévolat","Subventions","Dividendes"], intrus:3, why:"Les dividendes rémunèrent les actionnaires d'une entreprise ; les trois autres sont des ressources typiques des OSC."},
      {liste:["Un seul métier","Savoir-faire distinctif","Concentration des ressources","Plusieurs activités sans lien"], intrus:3, why:"Plusieurs activités sans lien = diversification conglomérale ; les trois autres caractérisent la spécialisation."},
      {liste:["Sophistication","Épuration","Offre perçue comme unique","Prix le plus bas du marché"], intrus:3, why:"Le prix le plus bas relève de la domination par les coûts ; les trois autres caractérisent la différenciation."},
      {liste:["Racheter un concurrent","Fusionner","Acquérir une entreprise","Ouvrir un site avec ses bénéfices"], intrus:3, why:"Ouvrir un site avec ses propres moyens = croissance interne ; les trois autres sont de la croissance externe."} ],

casExtra: {
  1:[ {cas:"La mairie organise un transport scolaire quasi gratuit, financé par les impôts locaux.", q:"Comment qualifier ce service ?", o:["Service marchand","Service non marchand","Bien matériel"], c:1, why:"Gratuit ou quasi gratuit et financé par l'impôt : c'est un service non marchand, typique d'une organisation publique."},
      {cas:"Une association réunionnaise recrute dix nouveaux bénévoles pour ses maraudes.", q:"Quelle catégorie de ressources renforce-t-elle ?", o:["Financières","Humaines","Technologiques"], c:1, why:"Les bénévoles, comme les salariés, sont des ressources humaines — essentielles pour une OSC."},
      {cas:"Brasseries de Bourbon investit pour réduire la consommation d'eau de son usine.", q:"De quoi s'agit-il ?", o:["D'une démarche RSE (pilier environnemental)","D'un bien non marchand","D'une finalité publique"], c:0, why:"Réduire son impact environnemental au-delà des obligations relève de la RSE, pilier environnemental."},
      {cas:"Le Groupe Caillé : plus de 1 000 salariés, activités automobile et distribution, vend des biens à un prix couvrant les coûts.", q:"Comment caractériser cette organisation ?", o:["Organisation publique","Entreprise privée","OSC"], c:1, why:"Production marchande + finalité lucrative + capitaux privés : c'est une entreprise privée (de grande taille)."},
      {cas:"Un syndicat défend les intérêts des salariés d'un secteur, sans chercher de profit.", q:"De quel type d'organisation s'agit-il ?", o:["Entreprise privée","Organisation publique","OSC"], c:2, why:"But non lucratif et défense d'intérêts collectifs : le syndicat est une organisation de la société civile."},
      {cas:"Une entreprise de livraison achète trois nouveaux camions.", q:"Quelle catégorie de ressources augmente ?", o:["Matérielles","Immatérielles","Humaines"], c:0, why:"Les camions sont des biens physiques : ce sont des ressources matérielles."},
      {cas:"L'hôpital public de Saint-Pierre soigne tous les patients, quels que soient leurs revenus.", q:"Quelle est sa finalité ?", o:["Lucrative","L'intérêt général","Conquérir un marché"], c:1, why:"Une organisation publique a pour finalité la satisfaction de l'intérêt général, pas le profit."} ],
  2:[ {cas:"Une nouvelle machine d'embouteillage ultra-rapide révolutionne le secteur des boissons.", q:"À quel facteur PESTEL ce changement correspond-il ?", o:["Politique","Technologique","Socioculturel"], c:1, why:"Une évolution des équipements et procédés relève du facteur Technologique du PESTEL."},
      {cas:"Sur le marché des boissons à La Réunion, impossible de réussir sans être présent dans les grandes surfaces.", q:"Comment appelle-t-on cet élément à maîtriser absolument ?", o:["Une faiblesse","Un facteur clé de succès (FCS)","Un indicateur"], c:1, why:"Ce que toute organisation doit maîtriser sur un marché pour réussir est un facteur clé de succès."},
      {cas:"Les clients d'Isautier acceptent de payer plus cher car ils perçoivent ses rhums comme uniques.", q:"Quel type d'avantage concurrentiel est-ce ?", o:["Interne (coûts)","Externe (valeur perçue)","Aucun"], c:1, why:"Quand l'avantage repose sur la valeur perçue par le client, il est externe."},
      {cas:"Des riverains se plaignent du bruit de l'usine et demandent des aménagements.", q:"Que représentent les riverains pour l'entreprise ?", o:["Des concurrents","Des parties prenantes","Des indicateurs"], c:1, why:"Les riverains sont concernés par l'activité : ce sont des parties prenantes externes, ici en situation de conflit."},
      {cas:"L'objectif fixé : « +10 % de ventes en 2 ans ». Le manager veut vérifier régulièrement l'avancée.", q:"Que doit-il choisir pour mesurer l'atteinte de l'objectif ?", o:["Une finalité","Un indicateur (ex. chiffre d'affaires)","Une menace"], c:1, why:"L'atteinte d'un objectif se mesure avec des indicateurs : chiffre d'affaires, part de marché…"},
      {cas:"Une distillerie détient une recette transmise depuis des générations, que personne ne sait imiter.", q:"Comment qualifier cet atout dans le diagnostic interne ?", o:["Compétence distinctive","Menace","Opportunité"], c:0, why:"Un savoir-faire rare et difficilement imitable est une compétence distinctive, source d'avantage concurrentiel."},
      {cas:"Une nouvelle ligne aérienne directe relie La Réunion à un grand marché étranger.", q:"Pour une entreprise exportatrice locale, c'est…", o:["Une opportunité (externe)","Une force (interne)","Une faiblesse"], c:0, why:"Un événement favorable venant de l'environnement est une opportunité, repérée par le diagnostic externe."} ],
  3:[ {cas:"Cilaos choisit de rester concentrée sur l'eau de source, son unique métier.", q:"Quelle stratégie globale reconnaît-on ?", o:["Diversification","Spécialisation","Intégration"], c:1, why:"Concentrer ses ressources sur un seul domaine d'activité, c'est la spécialisation."},
      {cas:"Une brasserie réunionnaise lance une gamme de jus de fruits locaux, métier proche de ses boissons actuelles.", q:"De quelle diversification s'agit-il ?", o:["Horizontale","Verticale","Conglomérale"], c:0, why:"Nouvelle activité proche du métier d'origine : c'est une diversification horizontale."},
      {cas:"Une sucrerie achète des champs de canne pour maîtriser son approvisionnement.", q:"Quelle stratégie reconnaît-on ?", o:["Externalisation","Intégration (vers l'amont)","Différenciation"], c:1, why:"Internaliser un maillon situé avant son activité dans la filière, c'est l'intégration vers l'amont (diversification verticale)."},
      {cas:"Isautier lance une édition très limitée, vieillie en fût rare, vendue bien plus cher.", q:"Quelle stratégie de domaine est menée ?", o:["Domination par les coûts","Différenciation par sophistication","Épuration"], c:1, why:"Offre perçue comme supérieure justifiant un prix élevé : différenciation par le haut (sophistication)."},
      {cas:"La Région finance un réseau de bus à tarif réduit, accessible à tous les habitants.", q:"Quelle logique stratégique guide ce choix ?", o:["Le profit","L'intérêt général (organisation publique)","La part de marché"], c:1, why:"Les options stratégiques des organisations publiques sont guidées par l'intérêt général."},
      {cas:"Une ONG environnementale lance une campagne pour alerter sur l'état du lagon et appelle aux dons et au bénévolat.", q:"Cela illustre les options stratégiques…", o:["d'une entreprise privée","d'une organisation publique","d'une OSC"], c:2, why:"Plaidoyer pour une cause + mobilisation de dons et bénévoles : choix stratégiques typiques d'une OSC."} ],
},

ressources: [
{ cat:"methodo", type:"page", titre:"Méthode — Aborder un sujet de devoir, pas à pas", desc:"Le rituel des 15 premières minutes en SDGN : contexte, questions, documents chiffrés, surlignage, verbes directeurs.", url:"",
  html:"<h2>Le principe : on n'écrit RIEN avant d'avoir tout compris</h2><p>En SDGN, les sujets mêlent textes ET documents chiffrés. La méthode de lecture est donc encore plus décisive : un chiffre mal repéré, et toute la réponse déraille.</p><h2>Étape 1 — Lire le contexte (2 min)</h2><ul><li>Qui est l'organisation ? Quelle est sa situation de gestion (lancement, difficulté de trésorerie, conflit, projet numérique…) ?</li><li>Réflexe QQOQCP rapide : qui, quoi, où, quand, comment, pourquoi.</li><li>Demande-toi : <i>« Dans quel(s) thème(s) du programme suis-je ? »</i> — cela t'indique les notions à mobiliser.</li></ul><h2>Étape 2 — Lire TOUTES les questions AVANT les documents (3 min)</h2><ul><li>Tu sauras ainsi <b>quoi chercher</b> : un taux ? une évolution ? une notion à reconnaître ?</li><li><b>Lis chaque question JUSQU'AU BOUT</b> : beaucoup contiennent <b>plusieurs tâches</b>. <i>« Calculez la valeur ajoutée <u>et</u> présentez sa répartition »</i> = un calcul + une analyse. Numérote les sous-tâches au brouillon.</li><li>Repère les indices de double travail : <b>et</b>, <b>puis</b>, <b>en déduire</b> (= un 2ᵉ calcul s'appuie sur le 1ᵉʳ !), <b>en justifiant</b>, <b>commentez vos résultats</b>.</li><li>Entoure le <b>verbe directeur</b> (tableau ci-dessous) : « calculez » et « analysez » ne rapportent pas les mêmes points.</li></ul><h2>Étape 3 — Lire les TITRES des documents (1 min)</h2><p>Le titre dit tout : <i>« Annexe 2 — Budget de trésorerie de janvier à mars »</i> annonce où tu trouveras le mois critique. Associe chaque question à ses documents (<i>Q3 → annexe 2</i>), et repère immédiatement pour chaque document chiffré : la <b>période</b> et l'<b>unité</b> (€, k€, %, heures…). L'erreur d'unité est l'erreur n°1 du devoir de SDGN !</p><h2>Étape 4 — Première lecture AVEC le surligneur (8-10 min)</h2><ul><li>Surligne les <b>données qui répondent aux questions</b> : totaux, soldes négatifs, écarts avec un objectif, pourcentages d'évolution.</li><li>Une couleur par question (ou par document) pour retrouver tes indices en rédigeant.</li><li>Note en marge la notion reconnue : <i>« = donnée → information », « = rétention d'information », « = performance sociale »</i>.</li></ul><h2>Étape 5 — Les verbes directeurs en SDGN</h2><table><tr><th>Verbe</th><th>Signification</th><th>Ce qui est attendu</th></tr><tr><td><b>Identifier / Repérer</b></td><td>Trouver et nommer</td><td>L'élément + le mot du cours + une justification tirée du document</td></tr><tr><td><b>Citer / Relever</b></td><td>Extraire du document</td><td>L'élément précis demandé, sans commentaire inutile</td></tr><tr><td><b>Définir</b></td><td>Donner le sens</td><td>La définition du cours, exacte et complète</td></tr><tr><td><b>Caractériser / Qualifier</b></td><td>Décrire selon les critères du cours</td><td>Ex. : qualifier une donnée / une information / une connaissance, en justifiant</td></tr><tr><td><b>Calculer</b></td><td>Trouver un résultat chiffré</td><td>Les 4 temps : formule + application + résultat AVEC unité + interprétation</td></tr><tr><td><b>En déduire</b></td><td>Utiliser le résultat précédent</td><td>Un nouveau calcul ou une conclusion qui s'appuie EXPLICITEMENT sur ce qui précède</td></tr><tr><td><b>Comparer</b></td><td>Mettre en regard</td><td>Écarts chiffrés (valeur et %), dans le temps ou par rapport à un objectif/secteur</td></tr><tr><td><b>Analyser / Commenter</b></td><td>Faire parler les chiffres</td><td>Constat chiffré + explication (causes) + conséquence pour l'organisation</td></tr><tr><td><b>Montrer que / Justifier</b></td><td>Prouver</td><td>Arguments appuyés sur les données ET les notions (AEI)</td></tr><tr><td><b>Apprécier / Évaluer</b></td><td>Juger avec nuance</td><td>Points forts ET points faibles, appuyés sur les indicateurs</td></tr><tr><td><b>Proposer / Conseiller</b></td><td>Suggérer des solutions</td><td>Des actions concrètes, réalistes, justifiées par le contexte et les chiffres</td></tr><tr><td><b>Schématiser / Représenter</b></td><td>Traduire en schéma</td><td>Ex. : les étapes d'un processus, avec un formalisme clair (étapes, flèches, acteurs)</td></tr></table><blockquote><b>⚠️ Les pièges spécifiques SDGN</b> : commencer un calcul sans avoir vérifié l'unité · oublier la 2ᵉ partie d'une question (« et commentez ») · donner un résultat sans phrase d'interprétation · « en déduire » traité comme une question indépendante.</blockquote><h2>Check-list avant de rendre</h2><ul><li>Toutes les questions ET toutes leurs parties sont traitées ?</li><li>Chaque calcul a sa formule, son unité et son interprétation ?</li><li>Chaque analyse cite le document et nomme une notion ?</li></ul>" },

{ cat:"methodo", type:"page", titre:"Méthode — Réussir les calculs de gestion", desc:"Toutes les formules de 1ère + la façon de rédiger un calcul pour avoir tous les points.", url:"",
  html:"<h2>Le formulaire de 1ʳᵉ SDGN</h2><table><tr><th>Indicateur</th><th>Formule</th><th>Ce que ça mesure</th></tr><tr><td><b>Valeur ajoutée</b></td><td>Production − consommations intermédiaires</td><td>La richesse créée par l'organisation</td></tr><tr><td><b>Productivité</b></td><td>Production ÷ moyens utilisés (ex. heures travaillées)</td><td>L'efficacité du travail</td></tr><tr><td><b>Coût du travail</b></td><td>Salaires bruts + cotisations patronales</td><td>Ce que le travail coûte vraiment à l'employeur</td></tr><tr><td><b>Marge</b></td><td>Prix de vente − coût de revient</td><td>Le gain par produit vendu</td></tr><tr><td><b>Résultat</b></td><td>Produits − charges</td><td>Bénéfice (＋) ou perte (−) de l'exercice</td></tr><tr><td><b>Taux de marge sur coûts variables</b></td><td>(CA − charges variables) ÷ CA</td><td>La part du CA qui couvre les charges fixes</td></tr><tr><td><b>Seuil de rentabilité</b></td><td>Charges fixes ÷ taux de marge sur coûts variables</td><td>Le CA minimal pour ne pas perdre d'argent</td></tr><tr><td><b>Solde de trésorerie</b></td><td>Encaissements − décaissements (du mois) ; solde cumulé = cumul mois après mois</td><td>L'argent réellement disponible</td></tr></table><h2>Rédiger un calcul : la règle des 4 temps</h2><p>Un calcul juste mais mal rédigé perd des points. Présente TOUJOURS :</p><ul><li><b>1. La formule</b> : « Seuil de rentabilité = charges fixes ÷ taux de marge sur coûts variables »</li><li><b>2. L'application</b> : « = 30 000 ÷ 0,5 »</li><li><b>3. Le résultat AVEC l'unité</b> : « = 60 000 € »</li><li><b>4. L'interprétation</b> : « Le restaurant doit réaliser au moins 60 000 € de chiffre d'affaires pour couvrir toutes ses charges ; au-delà, il dégage un bénéfice. »</li></ul><blockquote><b>⚠️ Pièges fréquents</b> : oublier l'unité (€, %, unités/heure) · confondre taux de marge en % et en décimal (50 % = 0,5) · confondre production et chiffre d'affaires · additionner des données qui n'ont pas la même unité · donner un résultat sans phrase d'interprétation.</blockquote><h2>L'interprétation, c'est la moitié des points</h2><p>Après chaque calcul, demande-toi : <i>« Et alors ? Bonne ou mauvaise nouvelle pour l'organisation ? Comparé à quoi (l'an dernier, le secteur, l'objectif) ? »</i> Un chiffre seul ne dit rien : c'est la comparaison qui crée l'information.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Lire un document de gestion chiffré", desc:"Compte de résultat, tableau de bord, budget : la lecture en 4 temps qui évite les contresens.", url:"",
  html:"<h2>Temps 1 — Le tour du document (avant les chiffres !)</h2><ul><li><b>Titre</b> : de quoi s'agit-il ? (compte de résultat, budget de trésorerie, tableau de bord…)</li><li><b>Période</b> : un mois ? un trimestre ? un exercice ? Deux années à comparer ?</li><li><b>Unité</b> : €, k€ (milliers), M€ (millions), %, unités physiques ? <i>L'erreur d'unité est l'erreur n°1 !</i></li><li><b>Source</b> : qui a produit ce document, pour quoi faire ?</li></ul><h2>Temps 2 — Repérer la structure</h2><table><tr><th>Document</th><th>Sa logique</th><th>La ligne à repérer d'abord</th></tr><tr><td><b>Compte de résultat</b></td><td>Produits d'un côté, charges de l'autre</td><td>Le résultat (bénéfice ou perte)</td></tr><tr><td><b>Budget de trésorerie</b></td><td>Encaissements / décaissements, mois par mois</td><td>Le solde cumulé (le mois où il devient négatif !)</td></tr><tr><td><b>Tableau de bord</b></td><td>Des indicateurs variés avec parfois des objectifs</td><td>Les écarts entre réalisé et objectif</td></tr><tr><td><b>Tableau de répartition de la VA</b></td><td>Qui reçoit quoi</td><td>La part de chaque acteur (salariés, État, prêteurs, actionnaires, entreprise)</td></tr></table><h2>Temps 3 — Faire parler les chiffres</h2><ul><li><b>Comparer dans le temps</b> : ça monte, ça baisse, de combien (en valeur ET en %) ?</li><li><b>Comparer dans l'espace</b> : par rapport au secteur, à un concurrent, à l'objectif.</li><li><b>Repérer les contradictions</b> : le CA monte mais l'absentéisme explose → performances contradictoires.</li></ul><h2>Temps 4 — Conclure avec le vocabulaire du cours</h2><blockquote><i>« Le taux d'occupation (78 %) dépasse l'objectif (75 %) : l'hôtel est <b>efficace</b> sur le plan commercial. Mais l'absentéisme en hausse révèle une <b>performance sociale</b> dégradée : la <b>performance globale</b> n'est pas atteinte. »</i></blockquote><p>Chaque constat chiffré doit être <b>nommé</b> avec une notion : efficacité, efficience, performance commerciale / financière / sociale / environnementale, risque, seuil…</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Analyser une situation de gestion", desc:"Le réflexe QQOQCP + rattacher chaque situation à une question de gestion du programme.", url:"",
  html:"<h2>Étape 1 — Débroussailler avec QQOQCP</h2><table><tr><th>Question</th><th>À chercher dans le contexte</th></tr><tr><td><b>Qui ?</b></td><td>L'organisation (type, taille) et les acteurs concernés (salariés, clients, dirigeant…)</td></tr><tr><td><b>Quoi ?</b></td><td>Le problème ou la décision en jeu (lancer un produit, conflit, trésorerie…)</td></tr><tr><td><b>Où ?</b></td><td>Le contexte géographique et concurrentiel (un marché insulaire change tout !)</td></tr><tr><td><b>Quand ?</b></td><td>L'horizon (urgence ? long terme ?), la saison, la période</td></tr><tr><td><b>Comment ?</b></td><td>Les moyens, ressources et outils disponibles</td></tr><tr><td><b>Pourquoi ?</b></td><td>Les causes du problème et les objectifs poursuivis</td></tr></table><h2>Étape 2 — Rattacher au programme</h2><p>Demande-toi : <i>« Dans quel thème suis-je ? Quelle question de gestion ? »</i></p><ul><li>On parle d'un salarié, d'un groupe, de compétences, de conflit → <b>Thème 1 : De l'individu à l'acteur</b>.</li><li>On parle de données, de SI, de PGI, de RGPD, d'IA → <b>Thème 2 : Numérique et intelligence collective</b>.</li><li>On parle de valeur, de coûts, de performance, d'indicateurs → <b>Thème 3 : Création de valeur et performance</b>.</li><li>On parle de prévision, de budget, de saison, de risque → <b>Thème 4 : Temps et risque</b>.</li></ul><h2>Étape 3 — Mobiliser les bonnes notions</h2><p>Une fois le thème identifié, liste au brouillon 3 à 5 notions du glossaire qui s'appliquent. Ta réponse devra les <b>nommer explicitement</b> : c'est ce que le correcteur cherche.</p><blockquote><b>Exemple express</b> : « Un commercial garde pour lui le mécontentement d'un gros client. » → Thème 4 → notions : <i>asymétrie d'information, rétention, veille</i> → réponse : nommer la rétention d'information, expliquer ses dangers, proposer un reporting régulier.</blockquote><h2>Étape 4 — Conclure en répondant à la question de gestion</h2><p>Termine toujours en revenant à la décision : que devrait faire l'organisation, et pourquoi ? Une analyse sans recommandation est une analyse inachevée.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Rédiger une réponse argumentée en SDGN", desc:"La structure AEI version SDGN : chaque argument s'appuie sur une donnée chiffrée.", url:"",
  html:"<h2>La spécificité SDGN : argumenter AVEC les chiffres</h2><p>En sciences de gestion, un argument sans donnée est une opinion. La structure reste <b>AEI</b> (Affirmation – Explication – Illustration), mais l'illustration est presque toujours <b>chiffrée</b> :</p><blockquote><b>A</b> : « La situation financière de l'entreprise se fragilise. »<br/><b>E</b> : « En effet, le budget de trésorerie anticipe les encaissements et décaissements : un solde cumulé négatif annonce une incapacité à payer. »<br/><b>I</b> : « Or, d'après l'annexe 2, le solde cumulé devient négatif en février (−7 k€) : sans financement, l'entreprise ne pourra pas régler ses fournisseurs. »</blockquote><h2>Les verbes de consigne et ce qu'ils exigent</h2><table><tr><th>Consigne</th><th>Ce qu'on attend</th></tr><tr><td><b>Identifier / Repérer</b></td><td>Nommer, avec le vocabulaire du cours, en justifiant brièvement</td></tr><tr><td><b>Caractériser</b></td><td>Décrire selon les critères du cours (type, nature…)</td></tr><tr><td><b>Calculer</b></td><td>Formule + application + résultat avec unité + interprétation</td></tr><tr><td><b>Analyser / Commenter</b></td><td>Constater (chiffres) + expliquer (causes) + conclure (conséquences)</td></tr><tr><td><b>Montrer que / Justifier</b></td><td>Prouver avec arguments AEI appuyés sur les documents</td></tr><tr><td><b>Proposer / Conseiller</b></td><td>Des solutions réalistes ET justifiées par le contexte</td></tr></table><h2>Le plan en 3 mouvements</h2><ul><li><b>Introduction (2 lignes)</b> : reformule la question et annonce ta position.</li><li><b>Développement</b> : 2 ou 3 paragraphes AEI, chacun avec sa notion ET sa donnée. Saute une ligne entre chaque.</li><li><b>Conclusion (2 lignes)</b> : réponds clairement, éventuellement avec une nuance ou une recommandation.</li></ul><blockquote><b>⚠️ Les erreurs qui coûtent cher</b> : paraphraser les annexes · empiler des calculs sans interprétation · répondre « oui » ou « non » sans démonstration · oublier de conclure · négliger l'orthographe du vocabulaire (efficience, trésorerie, rentabilité…).</blockquote>" },

    ex:"Après une grève sur les plannings, la direction d'un transporteur réunionnais négocie un accord avec les salariés." },
  { id:"sdg-donnee-info", theme:2, terme:"Donnée, information, connaissance",
    aca:"La donnée est un élément brut, sans contexte ; l'information est une donnée mise en contexte qui prend du sens ; la connaissance résulte de l'interprétation et de l'expérience permettant d'agir.",
    simple:"Donnée = chiffre brut. Information = chiffre qui veut dire quelque chose. Connaissance = savoir s'en servir.",
    ex:"« 350 » est une donnée ; « 350 bouteilles Cilaos vendues samedi » est une information ; savoir réapprovisionner avant le week-end est une connaissance." },
  { id:"sdg-donnees-perso", theme:2, terme:"Données à caractère personnel",
    aca:"Toute information se rapportant à une personne identifiable. Leur utilisation est encadrée par le RGPD, sous le contrôle de la CNIL : consentement, sécurité, durée de conservation, droits d'accès et de suppression.",
    simple:"Les informations qui permettent de t'identifier. La loi (RGPD) oblige à demander ton accord et à les protéger.",
    ex:"Un magasin du Port doit obtenir ton consentement avant de t'envoyer des SMS publicitaires." },
  { id:"sdg-bigdata", theme:2, terme:"Big data et open data",
    aca:"Le big data désigne des volumes massifs de données, variés et produits à grande vitesse. L'open data désigne des données publiques librement accessibles et réutilisables.",
    simple:"Big data = des montagnes de données à analyser. Open data = des données publiques que tout le monde peut réutiliser.",
    ex:"Une start-up péi peut créer une appli d'horaires de bus à partir des données ouvertes de la Région Réunion." },
  { id:"sdg-valeur-info", theme:2, terme:"Valeur de l'information",
    aca:"L'information est une ressource stratégique : sa valeur dépend de sa fiabilité, de son actualité, de sa pertinence et de son accessibilité pour les bons acteurs au bon moment.",
    simple:"Une information a de la valeur si elle est juste, fraîche, utile et disponible quand on en a besoin.",
    ex:"Connaître avant ses concurrents la hausse du tourisme à La Réunion permet d'adapter son offre en premier." },
  { id:"sdg-si", theme:2, terme:"Système d'information (SI)",
    aca:"Ensemble organisé de ressources (humains, matériels, logiciels, données, procédures) qui collecte, stocke, traite et diffuse l'information nécessaire au fonctionnement de l'organisation.",
    simple:"Tout ce qui permet à l'organisation de récolter, ranger, traiter et faire circuler l'information.",
    ex:"Chez Royal Bourbon, le SI relie les commandes, les stocks, la production et la comptabilité." },
  { id:"sdg-ecommunication", theme:2, terme:"E-communication et collaboration",
    aca:"Usages numériques qui facilitent la communication et la collaboration : messageries, visioconférences, documents partagés, communautés en ligne et réseaux sociaux d'entreprise.",
    simple:"Tous les outils en ligne qui permettent de communiquer et de travailler ensemble, même à distance.",
    ex:"Les équipes de Saint-Denis et de Saint-Pierre co-rédigent le même document partagé au lieu de s'envoyer dix versions par e-mail." },
  { id:"sdg-intelligence-collective", theme:2, terme:"Intelligence collective",
    aca:"Capacité d'un groupe à produire, grâce au partage de l'information et à la collaboration, des connaissances et des solutions supérieures à la somme des contributions individuelles.",
    simple:"À plusieurs, en partageant ce qu'on sait, on devient plus intelligents qu'une seule personne.",
    ex:"Un wiki interne où chaque technicien note ses astuces de réparation fait progresser toute l'entreprise." },
  { id:"sdg-ia", theme:2, terme:"Intelligence artificielle et automatisation",
    aca:"Technologies capables d'automatiser des tâches organisationnelles (réponses aux clients, tri de données, prévisions), transformant la répartition du travail entre humains et machines.",
    simple:"Des programmes qui font automatiquement certaines tâches à la place des humains.",
    ex:"Un chatbot répond aux questions simples des clients d'une enseigne réunionnaise ; les conseillers gardent les cas compliqués." },
  { id:"sdg-processus", theme:2, terme:"Processus de gestion",
    aca:"Enchaînement d'activités coordonnées qui transforme des éléments d'entrée en résultat pour un bénéficiaire. Il peut être représenté par un schéma.",
    simple:"La suite d'étapes qu'on suit toujours pour faire quelque chose, du début à la fin.",
    ex:"Commande sur le site → paiement → préparation en entrepôt → livraison : c'est le processus de vente en ligne." },
  { id:"sdg-pgi", theme:2, terme:"Progiciel de gestion intégré (PGI)",
    aca:"Logiciel unique reposant sur une base de données commune qui intègre les processus de l'organisation (ventes, stocks, comptabilité, RH) : une information saisie une fois est partagée par tous.",
    simple:"Un grand logiciel unique où tous les services travaillent sur les mêmes informations.",
    ex:"Avec un PGI, quand un commercial enregistre une vente, le stock et la comptabilité sont mis à jour automatiquement." },
  { id:"sdg-cloud", theme:2, terme:"Cloud et travail à distance",
    aca:"Stockage et applications accessibles via Internet, qui favorisent la mobilité et le télétravail, sources d'agilité organisationnelle mais aussi de dépendance et d'enjeux de sécurité.",
    simple:"Tes fichiers et logiciels sont sur Internet : tu peux travailler de n'importe où.",
    ex:"Pendant une alerte cyclonique, les équipes administratives continuent de travailler depuis chez elles grâce au cloud." },
  { id:"sdg-agilite", theme:2, terme:"Agilité ou rigidité organisationnelle",
    aca:"Le numérique peut rendre l'organisation plus agile (réactivité, travail à distance, automatisation) ou plus rigide (procédures imposées par les logiciels, dépendance technique).",
    simple:"Le numérique peut rendre l'organisation plus souple… ou l'enfermer dans des procédures trop strictes.",
    ex:"Un logiciel de caisse qui impose dix étapes pour un simple échange d'article ralentit les vendeurs : c'est de la rigidité." },
  { id:"sdg-va", theme:3, terme:"Valeur ajoutée : création et répartition",
    aca:"Richesse créée par l'organisation : production − consommations intermédiaires. Elle est répartie entre les salariés (salaires), l'État (impôts), les prêteurs (intérêts), les actionnaires (dividendes) et l'organisation elle-même (autofinancement).",
    simple:"La richesse vraiment créée par l'entreprise, qu'on partage ensuite entre tous ceux qui y ont contribué.",
    ex:"Edena vend pour 100, achète pour 40 de matières et services : la valeur ajoutée est de 60, à répartir." },
  { id:"sdg-valeur-financiere", theme:3, terme:"Valeur financière et actionnariale",
    aca:"Valeur mesurée par les documents comptables : le compte de résultat (produits − charges = résultat) et le bilan (patrimoine). La valeur actionnariale et boursière reflète l'enrichissement des actionnaires.",
    simple:"La valeur en argent : le bénéfice réalisé et ce que vaut l'entreprise pour ses propriétaires.",
    ex:"Un bénéfice de 110 k€ au compte de résultat d'une PME de Saint-Pierre mesure sa valeur financière de l'année." },
  { id:"sdg-valeur-percue", theme:3, terme:"Valeur perçue",
    aca:"Valeur attribuée par les clients : image de marque, notoriété, satisfaction, qualité perçue, e-réputation (avis, notes, recommandations sur les médias sociaux).",
    simple:"Ce que le produit ou la marque « vaut » dans la tête des clients.",
    ex:"Les rhums Isautier, notés 4,8/5 et réputés dans toute l'île, bénéficient d'une forte valeur perçue." },
  { id:"sdg-valeur-partenariale", theme:3, terme:"Valeur partenariale",
    aca:"Valeur créée par et pour l'ensemble des partenaires de l'organisation (salariés, fournisseurs, clients, collectivités…), au-delà des seuls actionnaires.",
    simple:"La valeur créée pour tous ceux qui travaillent avec l'organisation, pas seulement pour ses propriétaires.",
    ex:"Une enseigne qui donne ses invendus alimentaires à une association réunionnaise crée de la valeur partenariale." },
  { id:"sdg-prix-cout-marge", theme:3, terme:"Prix, coût, marge, charges",
    aca:"Le coût regroupe les charges consommées pour produire ; la marge est la différence entre le prix de vente et le coût ; la relation prix / coût / qualité guide les décisions de gestion.",
    simple:"Coût = ce que ça coûte à faire. Prix = ce que paie le client. Marge = la différence entre les deux.",
    ex:"Un sorbet péi vendu 4 € avec un coût de revient de 2,50 € dégage une marge de 1,50 €." },
  { id:"sdg-efficacite-efficience", theme:3, terme:"Efficacité et efficience",
    aca:"L'efficacité est l'atteinte des objectifs fixés ; l'efficience est l'atteinte des objectifs en minimisant les ressources consommées (performance des processus).",
    simple:"Efficace = atteindre son but. Efficient = atteindre son but sans gaspiller de moyens.",
    ex:"Deux boutiques atteignent 100 ventes ; celle qui a dépensé deux fois moins de publicité est la plus efficiente." },
  { id:"sdg-perf-commerciale", theme:3, terme:"Performance commerciale",
    aca:"Capacité à conquérir et fidéliser les clients, mesurée par le chiffre d'affaires, la part de marché et la fidélité de la clientèle.",
    simple:"Est-ce que l'organisation vend bien et garde ses clients ?",
    ex:"La part de marché des Brasseries de Bourbon sur les boissons à La Réunion mesure sa performance commerciale." },
  { id:"sdg-perf-financiere", theme:3, terme:"Performance financière",
    aca:"Capacité à créer de la valeur financière : profitabilité (résultat/CA), rentabilité (résultat/moyens engagés), dividendes versés et autofinancement dégagé.",
    simple:"Est-ce que l'organisation gagne de l'argent par rapport à ce qu'elle a investi ?",
    ex:"Une rentabilité en hausse permet à une PME du Port d'autofinancer une nouvelle machine sans emprunter." },
  { id:"sdg-perf-sociale-env", theme:3, terme:"Performance sociale et environnementale",
    aca:"La performance sociale s'apprécie via le bilan social (absentéisme, accidents, formation, climat) ; la performance environnementale via l'impact écologique (énergie, déchets, émissions).",
    simple:"Est-ce que l'organisation traite bien ses salariés et respecte l'environnement ?",
    ex:"Réduire de 20 % la consommation d'eau d'une usine d'embouteillage améliore sa performance environnementale." },
  { id:"sdg-perf-globale", theme:3, terme:"Performance globale",
    aca:"Équilibre entre les dimensions organisationnelle, commerciale, financière, sociale et environnementale de la performance. Améliorer l'une peut dégrader une autre : elles peuvent être contradictoires.",
    simple:"La vraie performance, c'est d'être bon partout à la fois : ventes, finances, salariés, environnement.",
    ex:"Baisser les coûts en dégradant les conditions de travail améliore le financier mais détruit le social." },
  { id:"sdg-tdb", theme:3, terme:"Tableau de bord et indicateurs",
    aca:"Document regroupant des indicateurs quantitatifs et qualitatifs pertinents, permettant de mesurer et comparer les performances dans le temps et dans l'espace pour piloter l'organisation.",
    simple:"Le « tableau de bord » de l'organisation : des chiffres clés pour savoir où elle en est et corriger le cap.",
    ex:"Un hôtel de Saint-Gilles suit chaque mois : taux d'occupation, satisfaction client, consommation d'eau, absentéisme." },
  { id:"sdg-horizon", theme:4, terme:"Horizon et période",
    aca:"L'horizon ordonne les décisions en court, moyen et long terme ; la période découpe le temps de gestion selon des contraintes institutionnelles, sectorielles ou technologiques.",
    simple:"L'horizon, c'est jusqu'où on regarde (court ou long terme) ; la période, c'est comment on découpe le temps.",
    ex:"Recruter un saisonnier pour décembre (court terme) ou construire une usine (long terme) ; la haute saison touristique rythme l'année d'un hôtel de l'Ouest." },
  { id:"sdg-veille", theme:4, terme:"Veille informationnelle",
    aca:"Surveillance continue et organisée de l'environnement (marchés, concurrents, technologies, réglementation) pour disposer d'une information actualisée et anticiper les évolutions.",
    simple:"Garder un œil en permanence sur ce qui se passe autour, pour ne pas être pris par surprise.",
    ex:"Un gérant de vidéoclub qui aurait surveillé l'essor du streaming aurait pu transformer son activité à temps." },
  { id:"sdg-asymetrie", theme:4, terme:"Asymétrie et rétention d'information",
    aca:"Situation où certains acteurs détiennent plus d'informations que d'autres ; la rétention consiste à garder une information pour soi, ce qui nuit à la qualité des décisions collectives.",
    simple:"Quand quelqu'un en sait plus que les autres et garde l'info pour lui.",
    ex:"Un commercial qui ne signale pas le mécontentement d'un gros client prive sa direction d'une information cruciale." },
  { id:"sdg-prospective", theme:4, terme:"Prospective : enquête et prévision",
    aca:"Démarches qui réduisent l'incertitude liée au temps : enquêtes (intentions des clients), prévisions d'activité, simulations, calendriers prévisionnels et outils de planification.",
    simple:"Essayer de prévoir l'avenir avec des enquêtes, des calculs et des plannings, pour décider moins à l'aveugle.",
    ex:"Avant de lancer une gamme « zéro plastique », une PME péi sonde ses clients : 64 % se disent prêts à l'acheter." },
  { id:"sdg-budget", theme:4, terme:"Budget et budget de trésorerie",
    aca:"Traduction chiffrée et prévisionnelle de l'activité. Le budget de trésorerie prévoit mois par mois les encaissements et décaissements pour anticiper les soldes et les besoins de financement.",
    simple:"Un tableau qui prévoit l'argent qui va entrer et sortir chaque mois, pour éviter la panne de trésorerie.",
    ex:"Le budget d'une PME de l'Ouest révèle un solde négatif en février : elle négocie un découvert avec sa banque avant le creux." },
  { id:"sdg-seuil", theme:4, terme:"Seuil de rentabilité",
    aca:"Chiffre d'affaires pour lequel l'organisation ne réalise ni bénéfice ni perte (résultat = 0). Il se calcule en divisant les charges fixes par le taux de marge sur coûts variables.",
    simple:"Le chiffre d'affaires minimum à atteindre pour ne pas perdre d'argent.",
    ex:"30 000 € de charges fixes et une marge sur coûts variables de 50 % : il faut vendre pour 60 000 € avant de gagner le premier euro." },
  { id:"sdg-temps-valeur", theme:4, terme:"Lien entre temps et valeur financière",
    aca:"La valeur de l'argent dépend du temps : une somme disponible aujourd'hui vaut plus que la même somme dans le futur (incertitude, possibilité de placement).",
    simple:"100 € tout de suite valent plus que 100 € dans cinq ans.",
    ex:"Entre 1 000 € maintenant et 1 000 € dans trois ans, un gestionnaire préfère maintenant : il peut les placer ou les investir." },
  { id:"sdg-risque", theme:4, terme:"Risques externes",
    aca:"Événements défavorables venant de l'environnement : évolution de la demande, cycle de vie et obsolescence, rupture technologique, dépendance énergétique ou technologique, approvisionnement, empreinte environnementale.",
    simple:"Les dangers qui viennent de l'extérieur de l'organisation : clients, technologies, fournisseurs, climat…",
    ex:"Un cyclone qui bloque le port de la Pointe des Galets perturbe l'approvisionnement de toute l'île." },
  { id:"sdg-risque-interne", theme:4, terme:"Risques internes",
    aca:"Risques générés par les décisions de l'organisation elle-même : investissement hasardeux, lancement sans étude, mauvais recrutement, endettement excessif, négligence des conséquences écologiques.",
    simple:"Les dangers que l'organisation crée elle-même par ses propres choix.",
    ex:"Ouvrir un second magasin sans calculer son seuil de rentabilité est un risque interne." },
  { id:"sdg-obsolescence", theme:4, terme:"Cycle de vie, obsolescence, rupture technologique",
    aca:"Tout produit suit un cycle de vie (lancement, croissance, maturité, déclin) ; une rupture technologique peut rendre une offre obsolète et bouleverser un secteur entier.",
    simple:"Les produits vieillissent ; parfois une nouvelle technologie les rend complètement dépassés.",
    ex:"Le streaming a rendu obsolètes les vidéoclubs de location de DVD, à La Réunion comme ailleurs." },
  { id:"sdg-empreinte", theme:4, terme:"Empreinte environnementale",
    aca:"Impact écologique de l'activité (énergie, eau, déchets, émissions). La recherche de performance peut générer des risques pour l'environnement, qui doivent être mesurés et limités.",
    simple:"La trace que l'activité de l'organisation laisse sur la planète.",
    ex:"Produire plus de barquettes augmente les déchets plastiques : l'usine doit mesurer et réduire cet impact." }
],

cas: {

      {cas:"Une usine agroalimentaire de Saint-Pierre produit 12 000 barquettes en 600 heures de travail.", q:"Quel indicateur peut-elle calculer ?", o:["La productivité : 20 barquettes par heure","Le coût du travail","La part de marché"], c:0, why:"Productivité = production ÷ heures travaillées = 12 000 ÷ 600 = 20 barquettes/heure."} ],

      {cas:"Une enseigne réunionnaise veut envoyer des SMS publicitaires à partir de numéros récupérés sans le consentement des clients.", q:"Que risque-t-elle ?", o:["Rien, les numéros circulent librement","Une sanction : le RGPD protège les données personnelles","Une simple remarque de la mairie"], c:1, why:"Les données personnelles ne s'utilisent qu'avec consentement : le RGPD prévoit des sanctions (contrôle de la CNIL)."},

      {cas:"Pendant une alerte cyclonique, les équipes administratives d'une entreprise dionysienne travaillent depuis chez elles grâce au cloud.", q:"Qu'illustre ce cas ?", o:["L'agilité permise par le numérique (travail à distance)","La rigidité organisationnelle","L'obsolescence"], c:0, why:"Cloud + télétravail = continuité de l'activité malgré l'imprévu : le numérique rend l'organisation agile."} ],
  3:[ {cas:"Edena vend pour 100 de production et a consommé 40 de matières et services achetés à ses fournisseurs.", q:"Quelle est sa valeur ajoutée ?", o:["140","60","40"], c:1, why:"VA = production − consommations intermédiaires = 100 − 40 = 60."},

vraifaux: {
  1:[ {p:"La qualification se prouve par un diplôme, un titre ou une expérience reconnue.", v:true, why:"Vrai : la qualification est la reconnaissance officielle (diplôme, titre, validation des acquis)."},
      {p:"Une compétence ne s'observe que sur le diplôme.", v:false, why:"Faux : la compétence s'observe en situation de travail (savoir agir efficacement)."},
      {p:"Le coût du travail comprend le salaire ET les cotisations sociales.", v:true, why:"Vrai : coût du travail = rémunération brute + cotisations patronales."},
      {p:"Les relations informelles n'existent pas dans les organisations.", v:false, why:"Faux : à côté de l'organigramme officiel, les affinités et discussions de couloir créent des relations informelles bien réelles."},
      {p:"De bonnes conditions de travail peuvent améliorer la motivation et la productivité.", v:true, why:"Vrai : conditions de travail et comportements des salariés sont liés."} ],
  2:[ {p:"Une donnée brute devient une information quand elle prend du sens dans un contexte.", v:true, why:"Vrai : donnée + contexte + sens = information."},
      {p:"On peut collecter et diffuser librement les données personnelles des clients.", v:false, why:"Faux : le RGPD impose consentement, sécurité et durée de conservation limitée."},
      {p:"Le big data désigne des volumes massifs de données, variés et produits à grande vitesse.", v:true, why:"Vrai : volume, variété, vitesse — les « 3 V » des mégadonnées."},
      {p:"Avec un PGI, chaque service doit ressaisir les mêmes données.", v:false, why:"Faux : c'est l'inverse. La base unique du PGI évite les doubles saisies."},
      {p:"Le numérique peut créer de la rigidité si le logiciel impose des procédures trop strictes.", v:true, why:"Vrai : un outil mal adapté enferme les acteurs dans des étapes imposées — c'est la rigidité organisationnelle."} ],
  3:[ {p:"La valeur ajoutée est partagée entre salariés, État, prêteurs, actionnaires et l'entreprise elle-même.", v:true, why:"Vrai : c'est la répartition de la VA (salaires, impôts, intérêts, dividendes, autofinancement)."},
      {p:"Être efficient, c'est atteindre son objectif quel qu'en soit le coût.", v:false, why:"Faux : ça, c'est l'efficacité seule. L'efficience ajoute l'économie de moyens."},
      {p:"Le chiffre d'affaires suffit à mesurer toute la performance d'une organisation.", v:false, why:"Faux : la performance est globale — commerciale, financière, sociale ET environnementale."},
      {p:"La performance environnementale fait partie de la performance globale.", v:true, why:"Vrai : l'impact écologique est une dimension à part entière de la performance."},
      {p:"Améliorer une performance peut en dégrader une autre.", v:true, why:"Vrai : baisser les coûts en dégradant les conditions de travail améliore le financier mais détruit le social."} ],
  4:[ {p:"Plus l'horizon est lointain, plus l'information disponible est incertaine.", v:true, why:"Vrai : le temps est source d'incertitude ; à long terme, l'information perd en fiabilité."},
      {p:"Le seuil de rentabilité indique le bénéfice maximal possible.", v:false, why:"Faux : c'est le CA pour lequel le résultat est NUL — ni perte ni bénéfice."},
      {p:"Le budget de trésorerie permet d'anticiper les difficultés de paiement.", v:true, why:"Vrai : en prévoyant encaissements et décaissements, on repère les creux avant qu'ils n'arrivent."},
      {p:"Tous les risques viennent de l'extérieur de l'organisation.", v:false, why:"Faux : les décisions de l'organisation créent aussi des risques internes (mauvais investissement, lancement sans étude…)."},
      {p:"100 € disponibles aujourd'hui valent plus que 100 € dans cinq ans.", v:true, why:"Vrai : c'est le lien entre temps et valeur financière (incertitude, possibilité de placement)."} ]
},

mission: {
  1:{ titre:"DRH d'une entreprise du Port",

        {txt:"Choisir uniquement sur le diplôme", eff:{treso:0,marche:-5,image:0,emploi:0}, fb:"Risqué : tu confonds qualification et compétence. Un diplômé peut être démuni face à un client mécontent."} ]},

        {txt:"Ne rien faire : c'est leur travail après tout", eff:{treso:5,marche:-5,image:-10,emploi:-5}, fb:"Sans reconnaissance ni rétribution, la motivation s'effrite et les meilleurs partent à la concurrence."} ]} ]},
  2:{ titre:"Responsable numérique chez Royal Bourbon",
    intro:"Tu pilotes la transformation numérique d'une entreprise agroalimentaire réunionnaise. L'information est une ressource stratégique : à toi d'en organiser la collecte, le partage et la protection. Indicateurs : Trésorerie 💰, Part de marché 📈, Image 🌟, Emplois 👥.",
    etapes:[

        {txt:"Acheter un fichier de numéros d'origine douteuse", eff:{treso:5,marche:5,image:-20,emploi:0}, fb:"Sanction de la CNIL et bad buzz garantis : les données personnelles sont protégées par la loi."} ]},

      {scene:"Chaque technicien garde ses astuces de maintenance dans son carnet personnel.", choix:[

        {txt:"Laisser chacun garder son savoir pour soi", eff:{treso:0,marche:-10,image:0,emploi:0}, fb:"Quand un technicien part, son savoir part avec lui : la rétention d'information appauvrit l'organisation."} ]},

  3:{ titre:"À la tête de « Saveurs Péi »",
    intro:"Tu diriges une PME agroalimentaire réunionnaise qui crée de la valeur. À toi de la mesurer, de la répartir et de viser une performance globale : commerciale, financière, sociale et environnementale. Indicateurs : Trésorerie 💰, Part de marché 📈, Image 🌟, Emplois 👥.",
    etapes:[
      {scene:"L'année est excellente : la valeur ajoutée a bondi. Les actionnaires réclament le maximum de dividendes.", choix:[
        {txt:"Répartir : primes aux salariés, dividendes raisonnables, autofinancement pour investir", eff:{treso:5,marche:5,image:10,emploi:5}, fb:"La VA se partage entre tous les acteurs qui l'ont créée — et l'autofinancement prépare l'avenir."},
        {txt:"Tout verser en dividendes", eff:{treso:-15,marche:0,image:-10,emploi:-5}, fb:"Salariés démotivés, aucun investissement : privilégier un seul acteur fragilise la création de valeur future."} ]},
      {scene:"Pour augmenter la marge, ton directeur propose de remplacer la vanille Bourbon par un arôme artificiel.", choix:[
        {txt:"Garder la qualité qui fonde la valeur perçue", eff:{treso:-5,marche:10,image:15,emploi:0}, fb:"Les clients paient pour la qualité péi : rogner dessus détruirait la valeur perçue et la fidélité."},
        {txt:"Passer à l'arôme artificiel", eff:{treso:10,marche:-15,image:-15,emploi:0}, fb:"La marge unitaire monte… mais avis négatifs et clients perdus : la relation prix/coût/qualité est rompue."} ]},
      {scene:"Pour piloter l'entreprise, que mets-tu en place ?", choix:[
        {txt:"Un tableau de bord : CA, marge, satisfaction, absentéisme, déchets", eff:{treso:0,marche:10,image:5,emploi:5}, fb:"Des indicateurs variés mesurent la performance dans toutes ses dimensions et permettent de comparer et corriger."},
        {txt:"Suivre uniquement le chiffre d'affaires", eff:{treso:0,marche:5,image:-5,emploi:-5}, fb:"Le CA monte… mais tu ne vois ni l'absentéisme qui explose ni les coûts qui dérapent : pilotage borgne."} ]},
      {scene:"Le bilan social révèle un absentéisme de 9 %, bien au-dessus du secteur.", choix:[
        {txt:"Analyser les causes et améliorer les conditions de travail", eff:{treso:-10,marche:5,image:10,emploi:10}, fb:"La performance sociale est une dimension de la performance globale : la soigner profite à toutes les autres."},
        {txt:"Sanctionner les absents", eff:{treso:0,marche:-5,image:-10,emploi:-5}, fb:"Tu traites le symptôme, pas la cause : le climat se dégrade encore et la performance sociale s'effondre."} ]},
      {scene:"Ta facture d'électricité explose. Un installateur propose des panneaux solaires sur le toit de l'usine.", choix:[
        {txt:"Investir dans le solaire", eff:{treso:-15,marche:5,image:15,emploi:0}, fb:"Performance environnementale ET économies à long terme : sous le soleil réunionnais, l'investissement a du sens."},
        {txt:"Refuser l'investissement", eff:{treso:5,marche:0,image:-5,emploi:0}, fb:"Choix prudent à court terme, mais la facture continue de grimper et l'image écologique reste terne."} ]} ]},
  4:{ titre:"Dirigeant face au temps et aux risques",
    intro:"Tu diriges une entreprise réunionnaise dans un environnement incertain : saisons, cyclones, technologies, fournisseurs… Gérer, c'est prévoir et prendre des risques calculés. Indicateurs : Trésorerie 💰, Part de marché 📈, Image 🌟, Emplois 👥.",
    etapes:[
      {scene:"Ton équipe veut lancer immédiatement une nouvelle gamme de boissons.", choix:[
        {txt:"Réaliser d'abord une enquête prévisionnelle auprès des clients", eff:{treso:-5,marche:15,image:5,emploi:0}, fb:"La prospective réduit l'incertitude : tu lances la gamme en connaissant les intentions d'achat."},
        {txt:"Lancer sans étude", eff:{treso:-20,marche:-5,image:-5,emploi:0}, fb:"Risque interne typique : la demande n'était pas au rendez-vous et les invendus s'accumulent."} ]},
      {scene:"Ton budget de trésorerie prévoit un solde négatif en février, après les fêtes.", choix:[
        {txt:"Négocier dès maintenant un découvert avec la banque", eff:{treso:10,marche:0,image:5,emploi:0}, fb:"Anticiper grâce à la démarche budgétaire : tu obtiens de meilleures conditions AVANT la difficulté."},
        {txt:"Attendre de voir en février", eff:{treso:-15,marche:0,image:-10,emploi:0}, fb:"Impayés, agios, fournisseurs inquiets : subir coûte toujours plus cher que prévoir."} ]},
      {scene:"Tu hésites à ouvrir un second point de vente à Saint-Benoît. Charges fixes prévues : 18 000 €, marge sur coûts variables : 40 %.", choix:[
        {txt:"Calculer le seuil de rentabilité (45 000 € de CA) avant de décider", eff:{treso:0,marche:10,image:5,emploi:5}, fb:"18 000 ÷ 0,4 = 45 000 € : tu sais quel CA minimal viser et tu décides en connaissance de cause."},
        {txt:"Ouvrir sans calcul, au feeling", eff:{treso:-15,marche:5,image:0,emploi:5}, fb:"Sans seuil de rentabilité, tu découvres trop tard que le point de vente perd de l'argent chaque mois."} ]},
      {scene:"Ton produit phare se vend bien, mais une nouvelle technologie émerge chez les concurrents métropolitains.", choix:[
        {txt:"Organiser une veille et préparer le renouvellement de l'offre", eff:{treso:-5,marche:10,image:5,emploi:0}, fb:"La veille informationnelle permet d'anticiper la rupture technologique avant que ton produit ne devienne obsolète."},
        {txt:"Rester sur tes acquis", eff:{treso:5,marche:-15,image:-5,emploi:0}, fb:"Comme les vidéoclubs face au streaming : ignorer le cycle de vie des produits mène à l'obsolescence."} ]},
      {scene:"Ton unique fournisseur d'emballages est en métropole ; une grève portuaire menace.", choix:[
        {txt:"Diversifier les approvisionnements (second fournisseur, stock de sécurité)", eff:{treso:-10,marche:5,image:5,emploi:0}, fb:"Tu réduis le risque externe de dépendance : une rupture d'approvisionnement ne t'arrêtera plus."},
        {txt:"Garder le fournisseur unique, moins cher", eff:{treso:5,marche:-10,image:-5,emploi:0}, fb:"L'économie se paie cher : à la première grève, la production s'arrête. Île oblige, l'approvisionnement est un risque majeur."} ]} ]}
