notions: [
  { id:"drt-contrat", theme:1, terme:"Le contrat et les parties",
    aca:"Accord de volontés entre deux ou plusieurs personnes destiné à créer, modifier, transmettre ou éteindre des obligations. Les parties sont le débiteur (qui doit) et le créancier (qui peut exiger).",
    simple:"Un contrat, c'est un accord qui crée des obligations entre ceux qui le signent.",
    ex:"Quand un client achète un scooter à un garage péi, l'accord forme un contrat de vente liant les deux parties." },
  { id:"drt-validite", theme:1, terme:"Conditions de validité du contrat",
    aca:"Un contrat valable suppose un consentement libre et éclairé, la capacité des parties et un contenu licite et certain (objet). L'obligation d'information et de conseil garantit un consentement éclairé.",
    simple:"Pour qu'un contrat tienne, il faut un vrai accord, des personnes capables et un objet légal.",
    ex:"Un contrat signé sous la menace n'a pas de consentement libre : il pourra être annulé." },
  { id:"drt-retractation", theme:1, terme:"Droit de rétractation",
    aca:"Dans certains contrats (achats à distance notamment), le consommateur dispose d'un délai légal pour revenir sur son engagement sans avoir à se justifier.",
    simple:"Pour certains achats (en ligne par exemple), tu as quelques jours pour changer d'avis et annuler.",
    ex:"Après un achat sur un site, le cyberconsommateur dispose d'un délai de rétractation pour renvoyer le produit." },
  { id:"drt-nullite", theme:1, terme:"La nullité du contrat",
    aca:"Sanction d'un contrat ne respectant pas une condition de validité : nullité relative (protège un intérêt privé, ex. un consentement vicié) ou nullité absolue (protège l'intérêt général, ex. un objet illicite).",
    simple:"Si une condition manque, le contrat peut être annulé — pour protéger une personne ou la société.",
    ex:"Un contrat portant sur une activité interdite est frappé de nullité absolue." },
  { id:"drt-principes", theme:1, terme:"Principes du contrat",
    aca:"Le contrat repose sur la liberté contractuelle (choisir de contracter et avec qui), la force obligatoire (« le contrat tient lieu de loi aux parties »), l'effet relatif (il ne lie que les parties) et la bonne foi.",
    simple:"On est libre de contracter, mais une fois signé, le contrat s'impose — et on doit l'exécuter loyalement.",
    ex:"Une entreprise ne peut pas modifier seule un prix convenu : la force obligatoire l'en empêche." },
  { id:"drt-obligations", theme:1, terme:"Obligations de moyens et de résultat",
    aca:"L'obligation de moyens impose de mettre en œuvre tous les moyens pour atteindre un but (sans garantir le résultat) ; l'obligation de résultat impose d'atteindre un résultat précis.",
    simple:"Obligation de moyens = tout faire pour réussir ; obligation de résultat = garantir le résultat.",
    ex:"Un médecin a une obligation de moyens ; un transporteur a une obligation de résultat (livrer intact)." },
  { id:"drt-execution", theme:1, terme:"Inexécution du contrat et sanctions",
    aca:"En cas d'inexécution, le créancier peut, après mise en demeure, exiger l'exécution forcée, invoquer l'exception d'inexécution, demander la résolution (anéantissement) ou la résiliation (fin pour l'avenir).",
    simple:"Si l'autre ne respecte pas le contrat, tu peux l'obliger à exécuter, suspendre ta part, ou mettre fin au contrat.",
    ex:"Un fournisseur qui ne livre pas malgré une mise en demeure expose son client à demander la résolution du contrat." },
  { id:"drt-clauses", theme:1, terme:"Les clauses du contrat",
    aca:"Stipulations qui aménagent les obligations : clause pénale (sanction forfaitaire en cas d'inexécution), clause abusive (créant un déséquilibre significatif, réputée non écrite dans les contrats de consommation).",
    simple:"Les clauses sont les « petites lignes » : certaines fixent des pénalités, d'autres, déséquilibrées, sont interdites.",
    ex:"Une clause imposant au seul consommateur de lourdes pénalités peut être jugée abusive et écartée." },
  { id:"drt-responsabilites", theme:2, terme:"Responsabilité civile et responsabilité pénale",
    aca:"La responsabilité civile vise à réparer le dommage subi par une victime ; la responsabilité pénale sanctionne un comportement interdit par la loi, au nom de la société.",
    simple:"Le civil répare le préjudice de la victime ; le pénal punit l'auteur d'une infraction.",
    ex:"Un accident causé par négligence peut entraîner à la fois réparation (civil) et amende (pénal)." },
  { id:"drt-dommage", theme:2, terme:"Le dommage réparable",
    aca:"Atteinte à un droit, qui peut être corporel, matériel ou moral. Il n'est réparable que s'il est certain, personnel, légitime et direct. Le préjudice écologique est désormais reconnu.",
    simple:"Pour être indemnisé, le dommage doit être réel, te concerner directement et être légitime.",
    ex:"La destruction d'un véhicule (dommage matériel) ouvre droit à réparation s'il est certain et direct." },
  { id:"drt-conditions-resp", theme:2, terme:"Conditions de la responsabilité : fait, dommage, lien de causalité",

    ex:"Une chute due à un sol mal entretenu : faute du commerçant + blessure + lien direct = responsabilité." },
  { id:"drt-regimes", theme:2, terme:"Régimes de responsabilité",

    simple:"Selon la situation (contrat ou non, accident de voiture, produit défectueux…), un régime de responsabilité différent s'applique.",

  { id:"drt-exoneration", theme:2, terme:"Moyens d'exonération",

  { id:"drt-pouvoirs", theme:3, terme:"Les pouvoirs de l'employeur",

  { id:"drt-clauses-travail", theme:3, terme:"Les clauses du contrat de travail",

  { id:"drt-rupture", theme:3, terme:"La rupture du contrat de travail",

  { id:"drt-representants", theme:3, terme:"Représentants du personnel et négociation collective",

  { id:"drt-entreprise-individuelle", theme:4, terme:"L'entreprise individuelle",
    aca:"Forme la plus simple d'exercice : pas de personne morale distincte. L'entrepreneur répond en principe des dettes sur son patrimoine, d'où des dispositifs de protection (déclaration d'insaisissabilité, patrimoine d'affectation, EURL).",

  { id:"drt-societe", theme:4, terme:"La société commerciale",

  { id:"drt-scop", theme:4, terme:"La société coopérative (SCOP)",

    aca:"Pour développer son activité, l'entreprise peut conclure des partenariats : le contrat de franchise (mise à disposition d'un concept et d'une marque) et le contrat d'entreprise/sous-traitance, sans créer de lien de subordination.",

      {liste:["Nullité relative","Nullité absolue","Rétractation","Affectio societatis"], intrus:3, why:"L'affectio societatis concerne la société ; les trois autres touchent à la validité/protection du contrat."},

      {liste:["Clause pénale","Clause abusive","Force obligatoire","Lien de subordination"], intrus:3, why:"Le lien de subordination relève du travail ; les trois autres concernent le contrat."} ],

      {liste:["Préjudice écologique","Réparation","Assurance","Affectio societatis"], intrus:3, why:"L'affectio societatis concerne la société ; les trois autres concernent le dommage et son indemnisation."} ],

      {liste:["Clause de mobilité","Clause de non-concurrence","Clause de télétravail","Clause pénale"], intrus:3, why:"La clause pénale relève du contrat commercial ; les trois autres sont des clauses du contrat de travail."},

casExtra: {
  1:[ {cas:"Un consommateur signe un contrat avec un professionnel qui lui a caché une information essentielle sur le produit.", q:"Quel manquement reproche-t-on au professionnel ?", o:["Le non-respect de l'obligation d'information","Une clause de mobilité","Une force majeure"], c:0, why:"Le professionnel doit informer et conseiller pour permettre un consentement éclairé."},
      {cas:"Deux entreprises concluent un contrat ; l'une refuse ensuite de l'exécuter tant que l'autre n'a pas rempli sa propre obligation.", q:"Quel mécanisme est invoqué ?", o:["L'exception d'inexécution","La nullité absolue","La rétractation"], c:0, why:"Dans un contrat synallagmatique, une partie peut suspendre son exécution si l'autre n'exécute pas."},
      {cas:"Un client signe un contrat alors qu'il a été trompé par de fausses informations du vendeur.", q:"Quelle sanction peut être demandée ?", o:["La nullité pour vice du consentement","La résiliation pour faute","Une clause pénale"], c:0, why:"Un consentement obtenu par tromperie est vicié : le contrat peut être annulé."},
      {cas:"Un contrat prévoit qu'en cas de retard, le débiteur paiera une somme forfaitaire fixée à l'avance.", q:"De quelle clause s'agit-il ?", o:["Une clause pénale","Une clause abusive","Une clause de non-concurrence"], c:0, why:"La clause pénale fixe par avance une sanction forfaitaire de l'inexécution."},
      {cas:"Une entreprise veut rompre un contrat pour l'avenir, sans effacer ce qui a déjà été exécuté.", q:"Quelle sanction correspond ?", o:["La résiliation","La résolution rétroactive","La nullité"], c:0, why:"La résiliation met fin au contrat pour l'avenir, sans remettre en cause le passé."},
      {cas:"Un professionnel insère une clause qui crée un déséquilibre significatif au détriment du consommateur.", q:"Quelle est la conséquence ?", o:["La clause est réputée non écrite","Le contrat entier est nul","Le consommateur doit l'accepter"], c:0, why:"La clause abusive est écartée, le reste du contrat demeurant valable."} ],
  2:[ {cas:"Un salarié est victime d'un accident pendant son travail à l'usine.", q:"Quel régime de responsabilité s'applique ?", o:["Le régime spécial de l'accident du travail","La responsabilité pénale uniquement","Aucun régime"], c:0, why:"L'accident du travail relève d'un régime spécial d'indemnisation."},
      {cas:"Un chien échappe à la surveillance de son maître et mord un passant.", q:"Quel fondement de responsabilité ?", o:["Le fait des animaux (responsabilité extracontractuelle)","La responsabilité contractuelle","Une clause pénale"], c:0, why:"Le gardien de l'animal répond des dommages causés par celui-ci."},
      {cas:"Un appareil vendu explose en raison d'un défaut de conception et blesse l'utilisateur.", q:"Quel régime spécial s'applique ?", o:["La responsabilité du fait des produits défectueux","La force majeure","La rétractation"], c:0, why:"Un régime spécial protège les victimes de produits défectueux."},
      {cas:"Une victime a, par sa propre imprudence, contribué à la réalisation de son dommage.", q:"Quel effet sur la responsabilité de l'auteur ?", o:["Une exonération possible (faute de la victime)","Une aggravation automatique","Aucun effet"], c:0, why:"La faute de la victime peut exonérer partiellement ou totalement le responsable."},
      {cas:"Un dommage survient pendant l'exécution d'un contrat de prestation de services.", q:"Quel type de responsabilité est en jeu ?", o:["La responsabilité contractuelle","La responsabilité pénale","Le préjudice écologique uniquement"], c:0, why:"Un dommage né de l'exécution d'un contrat relève de la responsabilité contractuelle."},
      {cas:"Une entreprise indemnise rapidement une victime puis se retourne vers son assureur.", q:"Quel mécanisme intervient ?", o:["La mutualisation par l'assurance","La nullité du contrat","Une clause de mobilité"], c:0, why:"L'assurance prend en charge le risque en mutualisant les cotisations des assurés."} ],
  3:[ {cas:"Une personne effectue une mission de manière totalement autonome, sans recevoir d'ordres ni d'horaires imposés.", q:"De quel contrat s'agit-il probablement ?", o:["Un contrat d'entreprise (prestation)","Un contrat de travail","Un CDI"], c:0, why:"L'absence de lien de subordination écarte le contrat de travail au profit du contrat d'entreprise."},
      {cas:"Une entreprise embauche un salarié pour remplacer une personne absente quelques mois.", q:"Quel contrat est adapté ?", o:["Un CDD de remplacement","Un CDI","Une SCOP"], c:0, why:"Le CDD répond à un besoin temporaire précis, comme un remplacement."},
      {cas:"Un employeur souhaite affecter un salarié sur un autre site prévu par une clause du contrat.", q:"Quelle clause mobilise-t-il ?", o:["La clause de mobilité","La clause de non-concurrence","La clause pénale"], c:0, why:"La clause de mobilité permet, sous conditions, de changer le lieu de travail du salarié."},
      {cas:"Un employeur licencie un salarié en invoquant des difficultés économiques sérieuses de l'entreprise.", q:"De quel licenciement s'agit-il ?", o:["Un licenciement pour motif économique","Un licenciement pour motif personnel","Une démission"], c:0, why:"Un motif lié à l'entreprise (et non au salarié) est un licenciement pour motif économique."},
      {cas:"Des salariés cessent collectivement le travail pour appuyer des revendications professionnelles.", q:"Quel droit exercent-ils ?", o:["Le droit de grève","Le pouvoir disciplinaire","La liberté contractuelle"], c:0, why:"La grève est une liberté collective, sous réserve de ses conditions d'exercice."},
      {cas:"Un employeur veut sanctionner un salarié sans respecter aucune procédure ni motif.", q:"Quel principe est méconnu ?", o:["La nécessité d'une cause réelle et sérieuse et d'une procédure","La liberté du commerce","L'effet relatif du contrat"], c:0, why:"Une sanction ou un licenciement exige un motif valable et une procédure."} ],
  4:[ {cas:"Un entrepreneur veut tester seul une activité simple, sans associé, en acceptant un risque limité.", q:"Quelle forme peut-il choisir ?", o:["L'entreprise individuelle","Une SARL à cinq associés","Une SCOP"], c:0, why:"L'entreprise individuelle est la forme la plus simple pour entreprendre seul."},
      {cas:"Pour protéger sa résidence principale des créanciers de son activité, un entrepreneur individuel agit auprès d'un notaire.", q:"Quel dispositif utilise-t-il ?", o:["La déclaration d'insaisissabilité","La concurrence déloyale","L'affectio societatis"], c:0, why:"La déclaration d'insaisissabilité protège certains biens personnels de l'entrepreneur."},
      {cas:"Plusieurs salariés reprennent leur entreprise et la dirigent ensemble, chacun disposant d'une voix.", q:"De quelle forme s'agit-il ?", o:["Une SCOP","Une entreprise individuelle","Une franchise"], c:0, why:"La société coopérative (SCOP) associe les salariés à la gouvernance selon « une personne, une voix »."},
      {cas:"Une entreprise dominante impose à ses partenaires des conditions abusives en profitant de sa position.", q:"Quelle pratique est en cause ?", o:["L'abus de position dominante","La franchise","La sous-traitance"], c:0, why:"Profiter de sa position dominante pour imposer des conditions abusives est interdit."},
      {cas:"Une entreprise confie la fabrication d'une partie de sa production à une autre entreprise spécialisée.", q:"De quel contrat s'agit-il ?", o:["Un contrat de sous-traitance (contrat d'entreprise)","Un contrat de travail","Une entente"], c:0, why:"La sous-traitance confie une tâche à une autre entreprise, sans lien de subordination."},
      {cas:"Un commerçant copie volontairement l'agencement et l'identité visuelle d'un concurrent pour créer la confusion.", q:"Comment qualifier ce comportement ?", o:["De la concurrence déloyale (imitation)","Une franchise autorisée","Une SCOP"], c:0, why:"L'imitation créant la confusion est une faute de concurrence déloyale."} ]
},

{ cat:"methodo", type:"page", titre:"Méthode — Aborder un sujet de droit, pas à pas", desc:"Le rituel avant d'écrire : faits, parties, problème de droit, règle applicable, verbes directeurs.", url:"",
  html:"<h2>Le principe : pas de droit sans faits bien lus</h2><p>En droit, on ne récite pas le cours : on l'applique à une situation. Avant d'écrire, on prend le temps de comprendre la situation et ce qui est demandé.</p><h2>Étape 1 — Lire les faits et identifier les parties</h2><ul><li>Qui est en présence ? (le demandeur, le défendeur, un salarié, un consommateur, une entreprise…)</li><li>Que s'est-il passé, dans quel ordre ?</li><li>Quel est le problème entre les parties ?</li></ul><h2>Étape 2 — Repérer les verbes directeurs de la consigne</h2><table><tr><th>Verbe</th><th>Ce qu'il attend de toi</th></tr><tr><td>Qualifier</td><td>Donner la catégorie juridique exacte (contrat, faute, personne morale…)</td></tr><tr><td>Identifier</td><td>Repérer un élément (la source, la juridiction, la règle…)</td></tr><tr><td>Distinguer</td><td>Opposer deux notions et dire ce qui les sépare</td></tr><tr><td>Apprécier / Vérifier</td><td>Confronter les faits aux conditions d'une règle</td></tr><tr><td>Justifier / Expliquer</td><td>Donner la raison juridique, en citant la règle</td></tr></table><h2>Étape 3 — Mobiliser la bonne règle puis conclure</h2><p>On identifie la règle de droit applicable, on l'applique aux faits, puis on répond clairement à la question posée. C'est le raisonnement du cas pratique (voir la fiche dédiée).</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Le cas pratique juridique (le syllogisme)", desc:"Majeure, mineure, conclusion : la structure de raisonnement qui rapporte tous les points en droit.", url:"",
  html:"<h2>Le raisonnement en trois temps</h2><p>Le cas pratique se résout par un syllogisme juridique : on part de la règle générale, on la confronte aux faits, on en tire une conclusion.</p><table><tr><th>Temps</th><th>Rôle</th></tr><tr><td>Majeure</td><td>Énoncer la règle de droit applicable (le principe)</td></tr><tr><td>Mineure</td><td>Qualifier les faits de l'espèce au regard de cette règle</td></tr><tr><td>Conclusion</td><td>Appliquer la règle aux faits et répondre à la question</td></tr></table><h2>Exemple rédigé</h2><p><b>Problème :</b> un client a-t-il droit à la rétractation après un achat en ligne ?</p><ul><li><b>Majeure :</b> en principe, pour les contrats conclus à distance, le consommateur dispose d'un droit de rétractation pendant un délai légal, sans avoir à se justifier.</li><li><b>Mineure :</b> en l'espèce, le client est un consommateur qui a acheté sur un site internet (contrat à distance) et agit dans le délai.</li><li><b>Conclusion :</b> il peut donc exercer son droit de rétractation et obtenir le remboursement.</li></ul><h2>Le réflexe</h2><p>On rédige toujours dans cet ordre. La majeure cite la règle, jamais l'inverse : on ne part pas des faits pour inventer une règle.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Qualifier juridiquement les faits", desc:"L'opération clé du juriste : mettre la bonne étiquette juridique sur une situation concrète.", url:"",
  html:"<h2>Qu'est-ce que qualifier ?</h2><p>Qualifier, c'est rattacher une situation de fait à une catégorie juridique pour savoir quelle règle s'applique. C'est la compétence la plus évaluée en droit.</p><h2>La démarche</h2><ul><li>Décrire le fait en langage courant.</li><li>Chercher la catégorie juridique correspondante (acte ou fait juridique ? personne physique ou morale ? contrat de travail ou d'entreprise ? responsabilité civile ou pénale ?).</li><li>Vérifier que les éléments de la définition sont réunis.</li></ul><h2>Exemples</h2><table><tr><th>Situation</th><th>Qualification</th></tr><tr><td>Un livreur reçoit ordres, horaires et sanctions</td><td>Lien de subordination, donc contrat de travail</td></tr><tr><td>Un accident de scooter cause un dommage</td><td>Fait juridique (événement subi)</td></tr><tr><td>Une société possède une usine</td><td>Personne morale, patrimoine propre</td></tr></table><p>Une bonne qualification s'appuie toujours sur un indice tiré des faits.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Analyser une décision de justice", desc:"Lire un arrêt sans se perdre : faits, procédure, prétentions, problème de droit, solution.", url:"",
  html:"<h2>Lire un arrêt en 5 questions</h2><ol><li><b>Les faits :</b> que s'est-il passé concrètement ?</li><li><b>La procédure :</b> qui a saisi quelle juridiction, et avec quel résultat jusqu'ici ?</li><li><b>Les prétentions :</b> que demande chaque partie ?</li><li><b>Le problème de droit :</b> la question juridique que le juge doit trancher.</li><li><b>La solution :</b> ce que décide la juridiction, et pourquoi.</li></ol><h2>Repères utiles</h2><ul><li>Le <b>demandeur</b> réclame ; le <b>défendeur</b> se défend.</li><li>L'<b>appel</b> fait rejuger toute l'affaire ; le <b>pourvoi en cassation</b> ne contrôle que l'application du droit.</li><li>Un arrêt de la Cour de cassation a une portée qui dépasse l'affaire : il unifie l'interprétation du droit.</li></ul><h2>Le piège à éviter</h2><p>Ne pas confondre les faits (ce qui s'est passé) et la solution (ce que décide le juge). On garde les deux bien séparés.</p>" },

notions: [
  { id:"ect-etat", theme:1, terme:"État-gendarme et État-providence",
    aca:"L'État-gendarme se limite aux fonctions régaliennes (sécurité, justice, défense) ; l'État-providence assure en plus des fonctions économiques et sociales (régulation, redistribution, protection sociale).",
    simple:"L'État-gendarme se contente d'assurer l'ordre ; l'État-providence intervient aussi dans l'économie et le social.",
    ex:"Verser des allocations chômage ou financer l'hôpital public relève de l'État-providence." },
  { id:"ect-depenses-prelevements", theme:1, terme:"Dépenses publiques et prélèvements obligatoires",
    aca:"L'État finance ses dépenses publiques essentiellement par des prélèvements obligatoires (impôts et cotisations sociales). Leur poids dans le PIB mesure l'importance de l'intervention publique.",
    simple:"L'État dépense (écoles, hôpitaux, routes) grâce à l'argent qu'il prélève (impôts, cotisations).",
    ex:"Les impôts financent les services publics dont bénéficient les Réunionnais (lycées, routes, santé)." },
  { id:"ect-deficit-dette", theme:1, terme:"Déficit public et dette publique",
    aca:"Le déficit public apparaît quand les dépenses dépassent les recettes sur une année ; la dette publique est l'accumulation des déficits passés, qu'il faut financer par l'emprunt.",
    simple:"Le déficit, c'est dépenser plus que ce qu'on gagne sur une année ; la dette, c'est le total accumulé qu'on doit rembourser.",
    ex:"Un État en déficit chaque année voit sa dette publique gonfler au fil du temps." },
  { id:"ect-defaillances-marche", theme:1, terme:"Défaillances du marché",
    aca:"Situations où le marché n'assure pas une allocation efficace des ressources : asymétries d'information, concurrence imparfaite, externalités, biens publics et biens communs. Elles justifient l'intervention de l'État.",
    simple:"Parfois le marché « rate » : mauvaise information, monopoles, pollution, biens que personne ne veut produire — l'État doit alors intervenir.",
    ex:"La pollution d'une usine (externalité négative) n'est pas réglée par le marché seul : l'État peut la taxer." },
  { id:"ect-defaillances-etat", theme:1, terme:"Défaillances de l'État",
    aca:"L'intervention publique peut elle-même être inefficace : coûts élevés, lenteurs, effets pervers, mauvaise information. On parle de défaillances de l'État.",
    simple:"L'État aussi peut se tromper : interventions trop coûteuses, lentes ou aux effets inattendus.",
    ex:"Une subvention mal ciblée peut coûter cher sans atteindre son objectif." },
  { id:"ect-politiques-conjoncturelles", theme:1, terme:"Politiques budgétaire et monétaire",
    aca:"Pour stabiliser l'économie, l'État mène une politique budgétaire (dépenses, impôts) ; la politique monétaire (taux d'intérêt, masse monétaire) est, dans la zone euro, conduite par la BCE. Elles peuvent être contracycliques.",
    simple:"Pour agir sur l'économie, l'État joue sur le budget ; la BCE joue sur les taux d'intérêt et la monnaie.",
    ex:"En cas de crise, l'État peut augmenter ses dépenses (relance) et la BCE baisser ses taux." },
  { id:"ect-offre-demande-pol", theme:1, terme:"Politiques d'offre et de demande",
    aca:"Les politiques de demande soutiennent la consommation et l'investissement (relance) ; les politiques d'offre améliorent les conditions de production (baisse du coût du travail, innovation, formation).",
    simple:"Soutenir la demande = donner du pouvoir d'achat ; soutenir l'offre = aider les entreprises à mieux produire.",
    ex:"Baisser les charges des entreprises est une politique d'offre ; augmenter les aides sociales est une politique de demande." },
  { id:"ect-cycles", theme:1, terme:"Fluctuations et cycles économiques",
    aca:"L'activité connaît des fluctuations : expansion, récession, dépression, reprise. Les politiques contracycliques visent à amortir ces variations.",
    simple:"L'économie monte et descend par cycles ; l'État tente d'adoucir les hauts et les bas.",
    ex:"En récession, une politique de relance cherche à soutenir l'activité et l'emploi." },
  { id:"ect-politiques-sociales", theme:1, terme:"Politiques sociales et redistribution",
    aca:"La politique sociale protège contre les risques sociaux (redistribution horizontale) et réduit les inégalités (redistribution verticale). La protection sociale repose sur une logique d'assurance et/ou d'assistance, financée par cotisations et impôts ; la progressivité des prélèvements renforce la redistribution verticale.",
    simple:"L'État aide ceux qui en ont besoin : il protège des risques de la vie (maladie, chômage) et réduit les écarts de revenus.",
    ex:"L'assurance maladie (assurance) et le RSA (assistance) illustrent les deux logiques de la protection sociale." },
  { id:"ect-population-active", theme:2, terme:"Population active et inactive",
    aca:"La population active regroupe les personnes qui occupent un emploi (actifs occupés) ou en recherchent (chômeurs). Les inactifs (étudiants, retraités) n'en font pas partie.",
    simple:"Les actifs travaillent ou cherchent du travail ; les inactifs (élèves, retraités) ne sont pas sur le marché du travail.",
    ex:"Un lycéen réunionnais est inactif ; dès qu'il cherche un emploi, il entre dans la population active." },
  { id:"ect-taux", theme:2, terme:"Taux d'activité, d'emploi et de chômage",
    aca:"Le taux d'activité rapporte les actifs à la population en âge de travailler ; le taux d'emploi rapporte les actifs occupés à cette population ; le taux de chômage rapporte les chômeurs à la population active.",
    simple:"Trois mesures : combien sont sur le marché du travail (activité), combien travaillent (emploi), combien cherchent sans trouver (chômage).",
    ex:"Si 2 700 actifs sur 3 000 ont un emploi, le taux de chômage est de 10 %." },
  { id:"ect-formes-chomage", theme:2, terme:"Les formes de chômage",
    aca:"On distingue notamment le chômage conjoncturel (lié au ralentissement de l'activité) et le chômage structurel (lié à des causes durables : inadéquation des qualifications, rigidités du marché).",
    simple:"Le chômage conjoncturel vient des crises passagères ; le chômage structurel vient de problèmes durables.",
    ex:"Une récession crée du chômage conjoncturel ; un décalage entre compétences et emplois crée du chômage structurel." },
  { id:"ect-plein-emploi", theme:2, terme:"Plein emploi et sous-emploi",
    aca:"Le plein emploi correspond à une situation où le chômage est réduit à sa composante incompressible. Le sous-emploi désigne les personnes travaillant moins qu'elles ne le souhaiteraient (temps partiel subi).",
    simple:"Plein emploi = presque tout le monde qui veut travailler travaille ; sous-emploi = on travaille moins qu'on le voudrait.",
    ex:"Un salarié à temps partiel qui souhaiterait un temps plein est en situation de sous-emploi." },
  { id:"ect-offre-demande-travail", theme:2, terme:"Offre et demande de travail",
    aca:"L'offre de travail émane des ménages (c'est la demande d'emploi) ; la demande de travail émane des entreprises (c'est l'offre d'emploi). Leur rencontre détermine l'emploi et le salaire.",
    simple:"Les ménages offrent leur travail (cherchent un emploi) ; les entreprises demandent du travail (proposent des emplois).",
    ex:"Quand les entreprises réunionnaises recrutent davantage, la demande de travail augmente." },
  { id:"ect-determinants-demande", theme:2, terme:"Déterminants de la demande de travail",
    aca:"La demande de travail des entreprises dépend de la demande de produits, de la productivité, de la substituabilité entre travail et capital, et du coût du travail.",
    simple:"Les entreprises embauchent davantage si la demande est forte, si le travail est productif et pas trop coûteux.",
    ex:"Si le coût du travail augmente fortement, une entreprise peut préférer automatiser (substitution capital/travail)." },
  { id:"ect-smic", theme:2, terme:"Salaire minimum et négociations salariales",
    aca:"Le salaire est encadré par des contraintes légales (SMIC) et conventionnelles (négociations collectives). Le salaire minimum protège les salariés mais peut, selon les analyses, influencer l'emploi peu qualifié.",
    simple:"Le SMIC fixe un salaire plancher ; les syndicats et employeurs négocient aussi les salaires.",
    ex:"Aucune entreprise ne peut légalement rémunérer un salarié à temps plein en dessous du SMIC." },
  { id:"ect-politiques-emploi", theme:2, terme:"Politiques actives et passives de l'emploi",
    aca:"Les politiques actives améliorent le fonctionnement du marché du travail (formation, aides à l'embauche, accompagnement) ; les politiques passives atténuent les conséquences du chômage (indemnisation).",
    simple:"Politiques actives = aider à retrouver un emploi ; politiques passives = soutenir financièrement les chômeurs.",
    ex:"Une formation financée pour les demandeurs d'emploi est une politique active ; l'allocation chômage est passive." },
  { id:"ect-mondialisation", theme:3, terme:"Mondialisation et ouverture des échanges",
    aca:"La mondialisation se traduit par une intensification et une diversification des échanges de biens, de services et de capitaux entre des pays de plus en plus interconnectés.",
    simple:"La mondialisation, c'est l'explosion des échanges entre pays, de plus en plus reliés entre eux.",
    ex:"La Réunion importe de nombreux produits et exporte du sucre, du rhum et du tourisme : elle participe aux échanges mondiaux." },
  { id:"ect-balance", theme:3, terme:"Balance commerciale et solde extérieur",
    aca:"La balance commerciale (ou des biens et services) compare les exportations et les importations d'un pays. Le solde est excédentaire si les exportations dépassent les importations, déficitaire dans le cas inverse.",
    simple:"On compare ce qu'un pays vend à l'étranger et ce qu'il achète : s'il vend plus, le solde est positif.",
    ex:"Un territoire qui importe beaucoup plus qu'il n'exporte présente un solde commercial déficitaire." },
  { id:"ect-libre-echange", theme:3, terme:"Libre-échange et protectionnisme",
    aca:"Le libre-échange favorise la circulation des biens et services sans entraves ; le protectionnisme protège la production nationale par des mesures (droits de douane, quotas, normes), affichées ou cachées.",
    simple:"Libre-échange = commerce sans barrières ; protectionnisme = barrières pour protéger les producteurs nationaux.",
    ex:"Instaurer des droits de douane sur des produits importés est une mesure protectionniste." },
  { id:"ect-avantage-comparatif", theme:3, terme:"Avantage comparatif et spécialisation",
    aca:"Selon la théorie de l'avantage comparatif, chaque pays a intérêt à se spécialiser dans les productions où il est relativement le plus efficace, puis à échanger, ce qui accroît la richesse globale.",
    simple:"Chaque pays se spécialise dans ce qu'il fait le mieux (par rapport au reste) et échange : tout le monde y gagne.",
    ex:"Un pays se spécialise dans l'agriculture et importe des produits industriels qu'il fabriquerait moins efficacement." },
  { id:"ect-dit", theme:3, terme:"Division internationale du travail et chaîne de valeur mondiale",
    aca:"La production d'un bien est segmentée entre plusieurs pays (division internationale du travail) : chaque étape de la chaîne de valeur (conception, fabrication des composants, assemblage) est réalisée là où elle est la plus avantageuse.",
    simple:"Un même produit est fabriqué par morceaux dans plusieurs pays, chacun faisant l'étape où il est le plus compétitif.",
    ex:"Un smartphone est conçu dans un pays, ses composants fabriqués dans d'autres, et assemblé ailleurs." },
  { id:"ect-omc", theme:3, terme:"L'Organisation mondiale du commerce (OMC)",
    aca:"L'OMC fixe des règles communes au commerce international et organise le règlement des différends entre États afin de favoriser un commerce plus ouvert et plus prévisible.",
    simple:"L'OMC est l'arbitre du commerce mondial : elle pose des règles et tranche les conflits entre pays.",
    ex:"Quand deux pays s'opposent sur des droits de douane, l'OMC peut intervenir pour régler le différend." },
  { id:"ect-croissance", theme:4, terme:"Croissance économique et ses limites",
    aca:"La croissance est l'augmentation durable de la production (mesurée par le PIB). Elle améliore le niveau de vie mais soulève des limites écologiques et ne reflète pas tout le bien-être.",
    simple:"La croissance, c'est produire toujours plus ; mais elle a un coût écologique et ne mesure pas tout le bien-être.",
    ex:"Une forte croissance peut s'accompagner de pollution et d'épuisement des ressources." },
  { id:"ect-developpement-durable", theme:4, terme:"Développement durable et ses trois piliers",
    aca:"Le développement durable répond aux besoins présents sans compromettre ceux des générations futures. Il articule trois piliers : économique, social et environnemental.",
    simple:"Se développer durablement, c'est concilier économie, justice sociale et protection de l'environnement, sans sacrifier l'avenir.",
    ex:"Construire une filière locale créatrice d'emplois, équitable et respectueuse de l'environnement illustre les trois piliers." },
  { id:"ect-externalites", theme:4, terme:"Externalités négatives",
    aca:"Effets de l'activité d'un agent sur d'autres, non pris en compte par le marché. Une externalité négative (pollution) impose un coût à la société non payé par celui qui la génère.",
    simple:"Quand une activité nuit aux autres sans que son auteur en paie le prix (ex. pollution), c'est une externalité négative.",
    ex:"Une usine qui pollue une rivière fait subir un coût aux riverains sans le payer : externalité négative." },
  { id:"ect-capital-naturel", theme:4, terme:"Capital naturel et ressources",
    aca:"Le capital naturel regroupe les ressources offertes par la nature. On distingue les ressources renouvelables (qui se régénèrent) des ressources non renouvelables (épuisables).",
    simple:"Le capital naturel, c'est les richesses de la nature : certaines se renouvellent (forêts), d'autres s'épuisent (pétrole).",
    ex:"Le soleil et le vent sont renouvelables ; le pétrole et les minerais sont non renouvelables." },
  { id:"ect-soutenabilite", theme:4, terme:"Soutenabilité faible et soutenabilité forte",
    aca:"La soutenabilité faible admet que le capital naturel peut être remplacé par du capital produit (technique) ; la soutenabilité forte considère que certains éléments du capital naturel sont irremplaçables et doivent être préservés.",
    simple:"Soutenabilité faible : la technologie peut compenser la nature détruite. Soutenabilité forte : certaines ressources sont irremplaçables.",
    ex:"Selon la soutenabilité forte, une espèce disparue ou un climat dégradé ne se « remplacent » pas par de la technologie." },
  { id:"ect-instruments", theme:4, terme:"Instruments de la politique environnementale",
    aca:"Pour limiter les atteintes à l'environnement, l'État dispose de la réglementation (normes, interdictions), de la taxation (taxe carbone) et des marchés de quotas d'émission (marchés de droits à polluer).",
    simple:"Pour protéger l'environnement, l'État peut interdire, taxer la pollution ou créer un marché de droits à polluer.",
    ex:"La taxe carbone renchérit les énergies polluantes pour inciter à les réduire." },
  { id:"ect-indicateurs", theme:4, terme:"Indicateurs alternatifs au PIB",
    aca:"Le PIB ne mesure ni les inégalités, ni le bien-être, ni l'état de l'environnement. Des indicateurs complémentaires (IDH, empreinte écologique) offrent une vision plus complète du développement.",
    simple:"Le PIB ne dit pas tout : d'autres indicateurs mesurent le bien-être, les inégalités ou l'impact écologique.",
    ex:"L'empreinte écologique mesure la pression d'une population sur les ressources de la planète." }
],

      {titre:"Défaillances du marché (tableau)", source:"Économie Tle STMG — fiche notionnelle",
       texte:"On distingue quatre défaillances : les asymétries d'information, la concurrence imparfaite, les externalités, les biens publics et communs.\nEn présence d'une défaillance, le marché n'assure pas une allocation efficace des ressources : l'État peut intervenir.",

  2:[ {titre:"Le marché du travail en chiffres", source:"Données pédagogiques — territoire fictif",

  3:[ {titre:"La balance commerciale", source:"Données pédagogiques — territoire fictif (en millions €)",

  4:[ {titre:"Les trois piliers du développement durable", source:"Économie Tle STMG — fiche notionnelle",
       texte:"Le développement durable répond aux besoins présents sans compromettre ceux des générations futures.\nIl articule trois piliers : économique (créer de la richesse), social (équité, emploi) et environnemental (préserver la planète).",

      {titre:"Externalités et instruments", source:"Économie Tle STMG — fiche notionnelle",
       texte:"Une externalité négative (pollution) impose un coût à la société, non payé par celui qui la génère.\nPour la corriger, l'État dispose de la réglementation (normes, interdictions), de la taxation (taxe carbone) et des marchés de quotas d'émission.",

{ cat:"methodo", type:"page", titre:"Méthode — Aborder un sujet d'économie, pas à pas", desc:"Lire le sujet et les documents, repérer les verbes directeurs, mobiliser les bonnes notions.", url:"",
  html:"<h2>Le principe : relier les documents au cours</h2><p>En économie, la plupart des points se gagnent en exploitant les documents (statistiques, graphiques, textes) et en les reliant aux notions du programme.</p><h2>Étape 1 — Lire le sujet et les documents</h2><ul><li>De quel thème relève la question ? (marché, richesse, État, emploi, commerce…)</li><li>Quels documents accompagnent le sujet et que montrent-ils ?</li><li>Quelle est la consigne précise ?</li></ul><h2>Étape 2 — Repérer les verbes directeurs</h2><table><tr><th>Verbe</th><th>Ce qu'il attend</th></tr><tr><td>Identifier / Relever</td><td>Extraire une information d'un document</td></tr><tr><td>Calculer</td><td>Effectuer un calcul (valeur ajoutée, taux, propension, élasticité)</td></tr><tr><td>Interpréter / Analyser</td><td>Donner le sens des données, les expliquer avec une notion</td></tr><tr><td>Distinguer</td><td>Opposer deux notions économiques</td></tr><tr><td>Montrer / Argumenter</td><td>Construire un raisonnement appuyé sur des connaissances</td></tr></table><h2>Étape 3 — Mobiliser les notions et rédiger</h2><p>On relie chaque réponse à une notion du programme et, si possible, à une donnée chiffrée du document. On rédige des phrases complètes.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Lire et interpréter un document statistique", desc:"Graphiques, tableaux, indices : la lecture en 4 temps qui évite les contresens.", url:"",
  html:"<h2>Avant de commenter : identifier le document</h2><ul><li><b>Source et date :</b> qui publie ? (INSEE, Banque de France…) De quand datent les données ?</li><li><b>Unité :</b> des euros ? des pourcentages ? un indice (base 100) ?</li><li><b>Champ :</b> quel pays, quelle population, quelle période ?</li></ul><h2>Lire les chiffres correctement</h2><table><tr><th>Type</th><th>Ce qu'il faut dire</th></tr><tr><td>Une valeur</td><td>Lire avec son unité : « En 2023, le PIB est de… »</td></tr><tr><td>Une évolution</td><td>Calculer un taux de variation : (arrivée − départ) / départ x 100</td></tr><tr><td>Un indice base 100</td><td>Un indice de 110 signifie +10 % par rapport à l'année de base</td></tr></table><h2>Interpréter, pas seulement décrire</h2><p>Après avoir décrit la tendance (hausse, baisse, stabilité), on l'explique avec une notion du cours. Décrire sans expliquer ne rapporte que la moitié des points.</p><h2>Le piège classique</h2><p>Ne pas confondre <b>valeur</b> et <b>variation</b>, ni <b>points</b> et <b>pourcentage</b> : passer de 8 % à 10 %, c'est +2 points, mais +25 %.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Réaliser et rédiger un calcul économique", desc:"Le formulaire essentiel (valeur ajoutée, taux, propension, élasticité) et la façon de rédiger.", url:"",
  html:"<h2>Les formules incontournables</h2><table><tr><th>Notion</th><th>Formule</th></tr><tr><td>Valeur ajoutée</td><td>Production − consommations intermédiaires</td></tr><tr><td>Taux de variation</td><td>(valeur d'arrivée − valeur de départ) / valeur de départ x 100</td></tr><tr><td>Taux de chômage</td><td>nombre de chômeurs / population active x 100</td></tr><tr><td>Taux d'emploi</td><td>actifs occupés / population en âge de travailler x 100</td></tr><tr><td>Propension à consommer</td><td>consommation / revenu disponible</td></tr><tr><td>Taux d'épargne</td><td>épargne / revenu disponible x 100</td></tr><tr><td>Élasticité prix de la demande</td><td>variation en % de la demande / variation en % du prix</td></tr></table><h2>Rédiger un calcul pour avoir tous les points</h2><ol><li>Écrire la formule.</li><li>Remplacer par les valeurs de l'énoncé.</li><li>Donner le résultat avec son unité.</li><li>Interpréter en une phrase.</li></ol><p><b>Exemple :</b> VA = 100 000 − 40 000 = 60 000 €. L'entreprise a créé 60 000 € de richesse.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Construire une argumentation économique (AEI)", desc:"Affirmation, Explication, Illustration : structurer un raisonnement appuyé sur des données.", url:"",
  html:"<h2>Le principe AEI adapté à l'économie</h2><p>Chaque argument se construit en trois temps, en s'appuyant sur une notion et, si possible, sur une donnée chiffrée.</p><table><tr><th>Temps</th><th>Rôle</th></tr><tr><td>A — Affirmation</td><td>L'idée, en une phrase claire</td></tr><tr><td>E — Explication</td><td>Le mécanisme économique, avec la notion du cours</td></tr><tr><td>I — Illustration</td><td>Un exemple ou une donnée du document</td></tr></table><h2>Exemple rédigé</h2><p><b>A :</b> une hausse du pouvoir d'achat soutient la consommation des ménages. <b>E :</b> le pouvoir d'achat mesure ce que le revenu permet d'acheter ; s'il augmente, les ménages peuvent consommer davantage. <b>I :</b> dans le document, la hausse du revenu supérieure à celle des prix se traduit par une progression des dépenses.</p><h2>Pour une réponse complète</h2><p>On enchaîne plusieurs arguments AEI et, sur un sujet qui le demande, on présente aussi des points de vue opposés avant de conclure.</p>" },
  { cat:"syntheses", titre:"Assistance scolaire — Droit & Économie Terminale STMG",
    desc:"Fiches de révision gratuites et exercices interactifs (partenariat MAIF) couvrant l'économie de terminale.",
    url:"https://www.assistancescolaire.com/eleve/TSTMG" },

    aca:"Le candidat prépare deux questions au cours de l'année, adossées à ses enseignements de spécialité. Le jour de l'épreuve, le jury choisit l'une des deux.",
    simple:"Tu prépares deux questions dans l'année ; le jour J, c'est le jury qui choisit celle que tu traiteras.",
    ex:"Tu présentes ta feuille avec tes deux questions signées ; le jury en retient une." },
  { id:"go-orientation", theme:1, terme:"Le lien avec le projet d'orientation",
    aca:"Le Grand oral valorise la cohérence entre la question traitée et le projet d'orientation du candidat. L'échange porte aussi sur ce que cette réflexion apporte au projet post-bac.",
    simple:"Le jury aime comprendre où ton sujet te mène : relie-le à tes études et à ton projet après le bac.",
    ex:"Une question sur la gestion peut être reliée à un projet d'études en école de commerce ou en BUT." },
  { id:"go-problematique", theme:2, terme:"La problématique",
    aca:"Une bonne question de Grand oral est une problématique : une question ouverte, qui se discute, à laquelle on peut répondre par un raisonnement argumenté pendant dix minutes.",
    simple:"Choisis une vraie question à débattre (pas une question fermée « oui/non »), assez riche pour parler 10 minutes.",
    ex:"« Faut-il privilégier la croissance ou le développement durable ? » est une problématique ; « Qu'est-ce que le PIB ? » non." },
  { id:"go-adosser", theme:2, terme:"Adosser la question aux spécialités",
    aca:"La question doit s'appuyer sur une ou deux des spécialités suivies. Elle mobilise des connaissances précises du programme pour construire la réponse.",
    simple:"Ta question doit s'appuyer sur ce que tu as appris dans tes spécialités, pas sortir de nulle part.",
    ex:"Un élève de STMG adosse sa question aux notions de management, de gestion, de droit ou d'économie." },
  { id:"go-defendable", theme:2, terme:"Une question motivante et défendable",
    aca:"La question choisie doit passionner le candidat (pour tenir 10 minutes avec conviction) et être suffisamment cadrée pour être traitée sans se disperser.",
    simple:"Choisis une question qui te plaît vraiment et que tu peux traiter sans partir dans tous les sens.",
    ex:"Mieux vaut une question précise qui te motive qu'un sujet immense que tu ne maîtrises pas." },
  { id:"go-eviter", theme:2, terme:"Les pièges à éviter dans la formulation",
    aca:"On évite les questions trop larges (impossibles à traiter en 10 minutes), trop fermées (réponse en un mot) ou purement descriptives (simple récitation de cours).",
    simple:"Évite les questions trop vastes, celles qui se répondent en un mot, et celles qui ne sont que du cours récité.",
    ex:"« Tout sur le chômage » est trop large ; « Le SMIC existe-t-il ? » est trop fermé." },
  { id:"go-accroche", theme:3, terme:"L'accroche",
    aca:"L'exposé s'ouvre par une accroche : une phrase, un chiffre, un exemple ou une anecdote qui capte l'attention et amène la problématique.",
    simple:"Commence par une phrase qui donne envie d'écouter (un chiffre, un exemple), puis annonce ta question.",
    ex:"Un chiffre marquant sur les inégalités peut introduire une question d'économie." },
  { id:"go-plan", theme:3, terme:"Le plan de l'exposé",
    aca:"L'exposé suit un plan clair et annoncé : une introduction (accroche, problématique, annonce du plan), un développement structuré (deux ou trois parties), une conclusion.",
    simple:"Annonce ton plan dès le début : intro, deux ou trois parties, puis conclusion. Le jury doit toujours savoir où tu en es.",
    ex:"Partie 1 : les arguments pour ; partie 2 : les limites ; conclusion : ta position nuancée." },
  { id:"go-aei", theme:3, terme:"Argumenter (AEI)",
    aca:"Chaque argument se construit en trois temps : l'Affirmation (l'idée), l'Explication (le mécanisme, la notion) et l'Illustration (un exemple concret ou une donnée).",
    simple:"Pour chaque idée : tu l'affirmes, tu l'expliques avec une notion, puis tu l'illustres par un exemple.",
    ex:"« La formation réduit le chômage » (A), parce qu'elle adapte les compétences (E), comme le montre tel dispositif (I)." },
  { id:"go-exemples", theme:3, terme:"Les exemples concrets",
    aca:"Les exemples (chiffres, cas réels, expériences personnelles) ancrent l'argumentation et montrent la maîtrise des connaissances. Ils rendent l'exposé vivant et convaincant.",
    simple:"Illustre toujours par des exemples concrets : c'est ce qui rend ton propos crédible et vivant.",
    ex:"Citer une entreprise connue ou un chiffre officiel renforce un argument." },
  { id:"go-conclusion", theme:3, terme:"La conclusion et l'ouverture",
    aca:"La conclusion répond clairement à la problématique (ta position) et s'achève souvent par une ouverture : une question plus large ou un lien avec ton projet d'orientation.",
    simple:"Termine en répondant nettement à ta question, puis ouvre sur une idée plus large ou sur ton projet.",
    ex:"Après avoir tranché, tu peux relier ta réflexion à tes études futures." },
  { id:"go-continu", theme:4, terme:"La prise de parole en continu",
    aca:"L'exposé se fait debout, sans lire ses notes, en s'adressant au jury. La parole doit être fluide, organisée et continue pendant les dix minutes.",
    simple:"Tu parles debout, sans lire, en regardant le jury, sans t'arrêter pendant 10 minutes.",
    ex:"S'entraîner à voix haute, plusieurs fois, permet de parler sans béquille écrite." },
  { id:"go-voix", theme:4, terme:"La voix, le débit, le regard, la posture",
    aca:"La qualité orale se travaille : articuler, varier l'intonation, ralentir le débit, regarder le jury, adopter une posture stable et ouverte, limiter les tics de langage.",
    simple:"Parle clairement, pas trop vite, regarde le jury, tiens-toi droit, et évite les « euh » et « du coup ».",
    ex:"Filmer une répétition aide à repérer un débit trop rapide ou des tics de langage." },
  { id:"go-stress", theme:4, terme:"Gérer le stress",
    aca:"Le stress se maîtrise par la préparation et des techniques simples : respiration, répétitions, visualisation positive. Une bonne maîtrise du sujet est le meilleur antidote au trac.",
    simple:"Le trac se gère : respire, prépare-toi beaucoup, répète à voix haute. Mieux tu maîtrises, moins tu stresses.",
    ex:"Respirer calmement avant d'entrer et avoir bien répété réduisent fortement le trac." },
  { id:"go-entretien", theme:4, terme:"L'entretien avec le jury",
    aca:"Après l'exposé, l'échange permet d'approfondir. Il faut écouter la question, prendre un instant pour réfléchir, répondre avec précision et accepter le dialogue sans se braquer.",
    simple:"Pendant la discussion, écoute bien, prends une seconde pour réfléchir, réponds précisément et reste ouvert.",
    ex:"Si le jury objecte, tu peux nuancer ta réponse sans te braquer : c'est apprécié." },
  { id:"go-temps", theme:4, terme:"Gérer le temps",
    aca:"L'exposé doit tenir en dix minutes : ni trop court (sous-développé), ni trop long (coupé par le jury). La gestion du temps se travaille lors des répétitions.",
    simple:"Vise pile 10 minutes : entraîne-toi avec un chrono pour ne pas être trop court ni trop long.",
    ex:"Chronométrer ses répétitions permet d'ajuster le contenu au temps imparti." }
],

ressources: [
{ cat:"methodo", type:"page", titre:"Méthode — Comprendre l'épreuve du Grand oral", desc:"Format, déroulé, jury, support, coefficient et critères : tout ce qu'il faut savoir avant de préparer.", url:"",
  html:"<h2>Le format en bref</h2><ul><li><b>Préparation :</b> 20 minutes (avec une feuille de support, non notée).</li><li><b>Passage :</b> 20 minutes — 10 minutes d'exposé puis 10 minutes d'échange avec le jury.</li></ul><h2>Le jury</h2><p>Deux professeurs de disciplines différentes. L'un relève d'un de tes enseignements de spécialité ; l'autre d'une autre discipline (ou professeur-documentaliste).</p><h2>Le coefficient</h2><p>En voie technologique (STMG) : <b>14</b> jusqu'à la session 2026 incluse, <b>12</b> à compter de 2027. Autant dire que l'épreuve peut faire basculer une mention.</p><h2>Les deux questions</h2><p>Tu prépares deux questions dans l'année, adossées à tes spécialités. Le jour J, <b>le jury choisit l'une des deux</b>.</p><h2>Les cinq critères d'évaluation</h2><table><tr><th>Critère</th><th>Ce qu'on observe</th></tr><tr><td>Qualité orale</td><td>Voix, débit, articulation, posture</td></tr><tr><td>Prise de parole en continu</td><td>Parler sans lire, de façon fluide</td></tr><tr><td>Connaissances</td><td>Maîtrise des notions des spécialités</td></tr><tr><td>Interaction</td><td>Écoute et qualité des réponses au jury</td></tr><tr><td>Argumentation</td><td>Construction et solidité du raisonnement</td></tr></table>" },
{ cat:"methodo", type:"page", titre:"Méthode — Choisir et formuler sa question", desc:"Transformer une notion en problématique ouverte, défendable 10 minutes et reliée à son projet.", url:"",
  html:"<h2>Qu'est-ce qu'une bonne question ?</h2><p>Une <b>problématique</b> : une question <b>ouverte</b>, qui se discute, à laquelle on répond par un raisonnement argumenté de dix minutes.</p><h2>Les trois conditions</h2><ul><li><b>Adossée aux spécialités :</b> elle mobilise des notions précises de ton programme.</li><li><b>Motivante :</b> un sujet qui te passionne pour tenir 10 minutes avec conviction.</li><li><b>Cadrée :</b> ni trop large, ni trop fermée, ni purement descriptive.</li></ul><h2>Les pièges à éviter</h2><table><tr><th>Question</th><th>Problème</th></tr><tr><td>« Tout sur la mondialisation »</td><td>Trop large</td></tr><tr><td>« Le SMIC existe-t-il ? »</td><td>Trop fermée</td></tr><tr><td>« Qu'est-ce que le PIB ? »</td><td>Simple définition</td></tr></table><h2>De la notion à la question</h2><p>Pars d'une notion qui t'intéresse, puis transforme-la en question ouverte reliée, si possible, à ton projet d'orientation.</p><p><b>Exemple :</b> notion de motivation au travail → « Peut-on motiver durablement les salariés sans augmenter les salaires ? ».</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Structurer et argumenter l'exposé", desc:"Introduction, plan, méthode AEI, exemples, conclusion et ouverture : le squelette des 10 minutes.", url:"",
  html:"<h2>Le plan-type</h2><ol><li><b>Introduction :</b> accroche, présentation de la question, annonce du plan.</li><li><b>Développement :</b> deux ou trois parties, chacune appuyée sur des arguments et des exemples.</li><li><b>Conclusion :</b> réponse claire à la problématique, puis ouverture.</li></ol><h2>L'accroche</h2><p>Une phrase, un chiffre, un exemple ou une anecdote qui capte l'attention et amène la problématique.</p><h2>Argumenter avec la méthode AEI</h2><table><tr><th>Temps</th><th>Rôle</th></tr><tr><td>A — Affirmation</td><td>L'idée, en une phrase claire</td></tr><tr><td>E — Explication</td><td>Le mécanisme, avec une notion du cours</td></tr><tr><td>I — Illustration</td><td>Un exemple concret ou une donnée</td></tr></table><h2>La conclusion</h2><p>Réponds nettement à ta question, puis ouvre sur une perspective plus large ou sur ton projet d'orientation. Soigne aussi les <b>transitions</b> entre les parties : elles donnent le fil conducteur.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Réussir le jour J (oral et entretien)", desc:"Voix, regard, posture, gestion du stress et du temps, et conduite de l'entretien avec le jury.", url:"",
  html:"<h2>La prise de parole en continu</h2><p>Tu parles <b>debout</b>, <b>sans lire</b>, en t'adressant au jury, de façon fluide pendant dix minutes. Le support n'est qu'un repère.</p><h2>La qualité orale</h2><ul><li>Articuler et varier l'intonation.</li><li>Ralentir le débit (le trac fait accélérer).</li><li>Regarder le jury, adopter une posture stable.</li><li>Limiter les tics de langage (« euh », « du coup », « en fait »).</li></ul><h2>Gérer le stress</h2><p>Le meilleur antidote au trac, c'est la <b>préparation</b> : répète à voix haute, plusieurs fois, chronomètre-toi, et travaille ta respiration. Filmer une répétition aide à repérer ses tics.</p><h2>L'entretien</h2><ol><li>Écoute la question <b>en entier</b>.</li><li>Prends un instant pour <b>réfléchir</b>.</li><li>Réponds avec <b>précision</b>.</li><li>Accepte le dialogue et <b>nuance</b> si besoin, sans te braquer.</li></ol><h2>Gérer le temps</h2><p>Vise pile dix minutes d'exposé : ni trop court, ni trop long. Ça se travaille au chronomètre.</p>" },

/* ====== Mélange aléatoire de l'ordre des réponses (toutes matières) ====== */
function _perm(n){ const a=[]; for(let k=0;k<n;k++) a.push(k);
  for(let k=a.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); const t=a[k]; a[k]=a[j]; a[j]=t; } return a; }
function shufQCM(list){ return (list||[]).map(function(q){
  if(!q||!Array.isArray(q.o)) return q;
  const p=_perm(q.o.length); const o=p.map(function(idx){return q.o[idx];});
  return Object.assign({},q,{o:o, c:p.indexOf(q.c)});
}); }
function shufIntrus(list){ return (list||[]).map(function(q){
  if(!q||!Array.isArray(q.liste)) return q;
  const p=_perm(q.liste.length); const liste=p.map(function(idx){return q.liste[idx];});
  return Object.assign({},q,{liste:liste, intrus:p.indexOf(q.intrus)});
}); }

  const mergeMax=(a,b)=>{ const m={...a}; Object.keys(b||{}).forEach(k=>{ m[k]=Math.max(m[k]||0,+b[k]||0); }); return m; };
  useEffect(()=>{
    try{ const p=JSON.parse(localStorage.getItem(PKEY)||"{}"); if(p&&typeof p==="object") setProgress(prev=>mergeMax(prev,p)); }catch(e){}
    netGet({action:"progress",pseudo:String(student.pseudo||"").trim(),classe:String(student.classe||"").trim(),matiere:subject}).then(r=>{
      if(r&&r.ok&&Array.isArray(r.rows)){
        const p={}; r.rows.forEach(x=>{ const k=x.theme+"-"+x.game; p[k]=Math.max(p[k]||0,+x.pct||0); });
        setProgress(prev=>{ const m=mergeMax(prev,p); try{ localStorage.setItem(PKEY,JSON.stringify(m)); }catch(e){} return m; });

    saveScore({...student,matiere:subject,theme:t,game:g,pct,date:new Date().toISOString()});

  };

/* ====== STAGE : routeur de jeux ====== */

/* ====== JEU GO : CONSTRUIS TA PROBLÉMATIQUE ====== */
function Probleme({theme,head,onDone,D}){
  const pool=(D.probleme&&(D.probleme[theme]||D.probleme[2]))||[];
  const [items]=useState(()=>pool.map(it=>({gestion:it.gestion,result:it.result,
    notion:shufQCM([it.notion])[0],reform:shufQCM([it.reform])[0],critere:shufQCM([it.critere])[0]})));
  const [i,setI]=useState(0); const [step,setStep]=useState(0);
  const [picked,setPicked]=useState(null); const [score,setScore]=useState(0); const [done,setDone]=useState(false);
  if(!items.length) return (<div className="game">{head}<p className="help">Exercice indisponible pour ce thème.</p></div>);
  if(done) return (<div className="game">{head}<Result score={score} total={items.length*3} onDone={onDone}/></div>);
  const it=items[i];
  const labels=["Étape 1 — Repérer la notion de gestion","Étape 2 — Reformuler en question ouverte","Étape 3 — Vérifier les critères du Grand oral"];
  const sub= step===0?it.notion:step===1?it.reform:step===2?it.critere:null;
  const choose=(idx)=>{ if(picked!==null||step>2) return; setPicked(idx); if(idx===sub.c) setScore(s=>s+1); };
  const next=()=>{ setPicked(null);
    if(step<2) setStep(step+1);
    else if(step===2) setStep(3);
    else { if(i+1>=items.length) setDone(true); else { setI(i+1); setStep(0); } } };
  return (<div className="game">{head}
    <div className="case"><div className="ctag">🎯 Question de gestion ({i+1}/{items.length})</div><p className="ctxt">{it.gestion}</p></div>
    {step<3 ? (<div>
      <p className="cq">{labels[step]}</p>
      <p className="help">{sub.q}</p>
      <div className="opts">{sub.o.map((o,idx)=>{ let c="opt"; if(picked!==null){ if(idx===sub.c)c+=" right"; else if(idx===picked)c+=" bad"; }
        return <button key={idx} className={c} onClick={()=>choose(idx)}>{o}</button>; })}</div>
      {picked!==null&&(<div className={"fb "+(picked===sub.c?"good":"no")}><strong>{picked===sub.c?"✅ Exact":"❌ Pas tout à fait"}</strong><p>{sub.why}</p>
        <button className="next" onClick={next}>{step<2?"Étape suivante →":"Voir ma problématique →"}</button></div>)}
    </div>) : (
      <div className="fb good" style={{textAlign:"left"}}><strong>✅ Ta problématique de Grand oral</strong>
        <p style={{fontStyle:"italic",fontSize:"1.05em"}}>« {it.result} »</p>
        <p>Tu es parti(e) d'une question de gestion, tu as repéré la notion, reformulé en question ouverte, puis vérifié qu'elle se discute et peut tenir 10 minutes.</p>
        <button className="next" onClick={next}>{i+1>=items.length?"Voir mon score":"Question suivante →"}</button></div>
    )}
  </div>);
}
/* ====== JEU GO : L'EXPOSÉ DANS L'ORDRE ====== */
function Ordre({theme,head,onDone,D}){
  const pool=(D.ordre&&(D.ordre[theme]||D.ordre[3]))||[];
  const [rounds]=useState(()=>pool.map(sq=>({titre:sq.titre,correct:sq.etapes,shuf:_perm(sq.etapes.length).map(x=>sq.etapes[x])})));
  const [r,setR]=useState(0); const [placed,setPlaced]=useState([]); const [clean,setClean]=useState(true);
  const [score,setScore]=useState(0); const [msg,setMsg]=useState(null); const [roundDone,setRoundDone]=useState(false); const [done,setDone]=useState(false);
  const totalSteps=rounds.reduce((a,b)=>a+b.correct.length,0);
  if(!rounds.length) return (<div className="game">{head}<p className="help">Exercice indisponible pour ce thème.</p></div>);
  if(done) return (<div className="game">{head}<Result score={score} total={totalSteps} onDone={onDone}/></div>);
  const round=rounds[r];
  const click=(label)=>{ if(roundDone) return; const expected=round.correct[placed.length];
    if(label===expected){ if(clean) setScore(s=>s+1); const np=[...placed,label]; setPlaced(np); setClean(true); setMsg(null);
      if(np.length>=round.correct.length) setRoundDone(true);
    } else { setClean(false);
      setMsg("« "+label+" » n'est pas l'étape attendue ici. Pense à ce qui vient "+(placed.length===0?"en tout premier.":"juste après « "+round.correct[placed.length-1]+" ».")); } };
  const nextRound=()=>{ if(r+1>=rounds.length) setDone(true); else { setR(r+1); setPlaced([]); setClean(true); setMsg(null); setRoundDone(false); } };
  const remaining=round.shuf.filter(l=>placed.indexOf(l)<0);
  return (<div className="game">{head}
    <div className="case"><div className="ctag">🔢 {round.titre} ({r+1}/{rounds.length})</div><p className="help">Touche les étapes dans le bon ordre, de la première à la dernière.</p></div>
    {placed.length>0&&(<div className="opts">{placed.map((l,k)=>(<div key={k} className="opt right">{k+1}. {l}</div>))}</div>)}
    {roundDone ? (
      <div className="fb good"><strong>✅ Exposé dans l'ordre !</strong>
        <p>La trame logique : on capte l'attention (accroche), on pose la question, on annonce le plan, on développe, puis on conclut et on ouvre.</p>
        <button className="next" onClick={nextRound}>{r+1>=rounds.length?"Voir mon score":"Exposé suivant →"}</button></div>
    ) : (<div>
      {msg&&(<div className="fb no"><p>{msg}</p></div>)}
      <p className="help">Prochaine étape à placer : la n°{placed.length+1}</p>
      <div className="opts">{remaining.map((l,idx)=>(<button key={idx} className="opt" onClick={()=>click(l)}>{l}</button>))}</div>
    </div>)}
  </div>);
}
function Stage({student,subject,theme,game,onDone,onQuit}){
  const SD=ALL[subject];
  const meta=gamesFor(subject).find(g=>g.id===game)||GAMES_BASE[0];
  const head=<Ghead title={meta.nom+" — Thème "+theme} sub={meta.bloom} onQuit={onQuit}/>;
  const [started,setStarted]=useState(false);
  if(!started) return <Consigne meta={meta} head={head} onStart={()=>setStarted(true)}/>;
  if(game==="trieur")  return <Trieur D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="memory")  return <Memory D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="flash")   return <Flash D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="vraifaux")return <VraiFaux D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="intrus")  return <Intrus D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="cas")     return <Cas D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="mission") return <Mission D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="docs")    return <Docs D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="probleme")return <Probleme D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="ordre")   return <Ordre D={SD} theme={theme} head={head} onDone={onDone}/>;
  return null;
}

function Ghead({title,sub,onQuit}){
  return (<div className="ghead"><button className="back" onClick={onQuit}>← Jeux</button>
    <div className="gh-t">{title}<span className="gh-s">{sub}</span></div></div>);
}
function Result({score,total,onDone,extra,recap}){
  const pct=Math.round(score/total*100); const ok=pct>=PASS;
  return (<div className="res"><div className="medal">{pct>=90?"🏆":ok?"🎉":"💪"}</div>
    <h2>{score} / {total}</h2><div className="rpct" style={{color:ok?"#16a34a":"#dc2626"}}>{pct}%</div>
    {recap}{extra}<p>{ok?"Bravo, jeu validé ! Le suivant est débloqué.":"Presque ! Relis le cours et retente, tu vas y arriver."}</p>
    <button className="cta sm" onClick={()=>onDone(pct)}>Continuer</button></div>);
}

/* ====== JEU 1 : TRIEUR ====== */
function Trieur({theme,head,onDone,D}){
  const cfg=D.trieur[theme];
  const [items]=useState(()=>[...cfg.items].map((it,i)=>({...it,_i:i})).sort(()=>Math.random()-0.5));
  const [sel,setSel]=useState(null);
  const [placed,setPlaced]=useState({}); // _i -> bac
  const [score,setScore]=useState(0); const [err,setErr]=useState(0); const [done,setDone]=useState(false);
  const remaining=items.filter(it=>placed[it._i]===undefined);

  const drop=(bac)=>{ if(sel===null) return; const it=items.find(x=>x._i===sel);
    const good=it.cat===bac;
    setPlaced(p=>({...p,[sel]:bac})); good?setScore(s=>s+1):setErr(e=>e+1); setSel(null);
    if(items.filter(x=>placed[x._i]===undefined && x._i!==sel).length===0) setTimeout(()=>setDone(true),250);
  };
  return (<div className="game">{head}
    <p className="help">{cfg.consigne} <span className="muted">Clique un élément, puis sa catégorie.</span></p>
    <div className="tray">{remaining.map(it=>(
      <button key={it._i} className={"tkn"+(sel===it._i?" sel":"")} onClick={()=>setSel(it._i)}>{it.label}</button>))}
      {remaining.length===0&&<span className="muted">Tous les éléments sont classés ✅</span>}</div>
    <div className="bacs">{cfg.bacs.map((b,bi)=>(
      <div key={bi} className="bac" onClick={()=>drop(bi)}>
        <div className="bac-h">{b}</div>
        <div className="bac-body">{items.filter(it=>placed[it._i]===bi).map(it=>(
          <span key={it._i} className={"chip2 "+(it.cat===bi?"ok":"no")}>{it.cat===bi?"✓":"✗"} {it.label}</span>))}</div>
      </div>))}</div>
    {done&&<Result score={score} total={items.length} onDone={onDone}/>}
  </div>);
}

/* ====== JEU 2 : MEMORY ====== */
function Memory({theme,head,onDone,D}){
  const pairs=D.memory[theme];
  const [cards]=useState(()=>{ let id=0; const arr=[];
    pairs.forEach((p,pi)=>{ arr.push({id:id++,pair:pi,txt:p.a}); arr.push({id:id++,pair:pi,txt:p.b}); });
    return arr.sort(()=>Math.random()-0.5); });
  const [flipped,setFlipped]=useState([]); const [matched,setMatched]=useState([]);
  const [tries,setTries]=useState(0); const [lock,setLock]=useState(false);
  const click=(c)=>{ if(lock||flipped.includes(c.id)||matched.includes(c.pair)) return;
    const nf=[...flipped,c.id]; setFlipped(nf);
    if(nf.length===2){ setLock(true); setTries(t=>t+1);
      const [a,b]=nf.map(id=>cards.find(x=>x.id===id));
      if(a.pair===b.pair){ setTimeout(()=>{setMatched(m=>[...m,a.pair]);setFlipped([]);setLock(false);},450); }
      else setTimeout(()=>{setFlipped([]);setLock(false);},800);
    } };
  const done=matched.length===pairs.length;
  return (<div className="game">{head}
    <p className="help">Retrouve les paires. Essais : <b>{tries}</b> <span className="muted">— pas de note ici, l'important c'est de tout retrouver !</span></p>
    <div className="mem-grid">{cards.map(c=>{ const show=flipped.includes(c.id)||matched.includes(c.pair);
      return <button key={c.id} className={"mcard"+(show?" up":"")+(matched.includes(c.pair)?" done":"")} onClick={()=>click(c)}>
        <span className="mc-front">?</span><span className="mc-back">{c.txt}</span></button>; })}</div>
    {done&&(<div className="res"><div className="medal">🎉</div><h2>Bravo !</h2>
      <p>Toutes les paires sont retrouvées. Le jeu suivant est débloqué.</p>
      <p className="muted">Terminé en {tries} essais — ici, peu importe le nombre d'erreurs : l'essentiel est d'avoir tout associé.</p>
      <button className="cta sm" onClick={()=>onDone(100)}>Continuer</button></div>)}
  </div>);
}

/* ====== JEU 3 : FLASH QUIZ (chrono + combo) ====== */
function Flash({theme,head,onDone,D}){
  const [qs]=useState(()=>shufQCM(D.flash[theme]));
  const [i,setI]=useState(0); const [score,setScore]=useState(0); const [combo,setCombo]=useState(0);
  const [t,setT]=useState(10); const [picked,setPicked]=useState(null); const [done,setDone]=useState(false);
  const q=qs[i];
  useEffect(()=>{ if(done||picked!==null) return; if(t<=0){ choose(-1); return; }
    const id=setTimeout(()=>setT(x=>x-1),1000); return ()=>clearTimeout(id); },[t,picked,done]);
  const choose=(idx)=>{ if(picked!==null) return; setPicked(idx);
    const good=idx===q.c; if(good){ setScore(s=>s+1); setCombo(c=>c+1);} else setCombo(0);
    setTimeout(()=>{ if(i+1>=qs.length){setDone(true);} else {setI(i+1);setPicked(null);setT(10);} },700); };
  if(done) return <div className="game">{head}<Result score={score} total={qs.length} onDone={onDone}/></div>;
  return (<div className="game">{head}
    <div className="flash-bar"><div className="combo">🔥 Combo ×{combo}</div>
      <div className="timer"><div className="tfill" style={{width:(t/10*100)+"%",background:t<=3?"#ef4444":"#f59e0b"}}/></div>
      <div className="qn">{i+1}/{qs.length}</div></div>
    <div className="flash-q">{q.q}</div>
    <Media m={q.media}/>
    <div className="opts">{q.o.map((o,idx)=>{ let c="opt";
      if(picked!==null){ if(idx===q.c)c+=" right"; else if(idx===picked)c+=" bad"; }
      return <button key={idx} className={c} onClick={()=>choose(idx)}>{o}</button>; })}</div>
  </div>);
}

/* ====== JEU 4 : VRAI / FAUX ====== */
function VraiFaux({theme,head,onDone,D}){
  const qs=D.vraifaux[theme];
  const [i,setI]=useState(0); const [score,setScore]=useState(0); const [picked,setPicked]=useState(null); const [done,setDone]=useState(false);
  const q=qs[i];
  const ans=(v)=>{ if(picked!==null) return; setPicked(v); if(v===q.v) setScore(s=>s+1); };
  const next=()=>{ if(i+1>=qs.length) setDone(true); else {setI(i+1);setPicked(null);} };
  if(done) return <div className="game">{head}<Result score={score} total={qs.length} onDone={onDone}/></div>;
  return (<div className="game">{head}
    <div className="qn r">{i+1}/{qs.length}</div>
    <div className="vf-card">« {q.p} »</div>
    <Media m={q.media}/>
    <div className="vf-btns">
      <button className={"vf v"+(picked!==null&&q.v===true?" right":"")+(picked===true&&q.v!==true?" bad":"")} onClick={()=>ans(true)} disabled={picked!==null}>✓ VRAI</button>
      <button className={"vf f"+(picked!==null&&q.v===false?" right":"")+(picked===false&&q.v!==false?" bad":"")} onClick={()=>ans(false)} disabled={picked!==null}>✗ FAUX</button>
    </div>
    {picked!==null&&(<div className={"fb "+(picked===q.v?"good":"no")}><strong>{picked===q.v?"✅ Exact !":"❌ Raté."}</strong><p>{q.why}</p>
      <button className="next" onClick={next}>{i+1>=qs.length?"Voir mon score":"Suivant →"}</button></div>)}
  </div>);
}

/* ====== JEU 5 : L'INTRUS ====== */
function Intrus({theme,head,onDone,D}){
  const [qs,setQs]=useState(()=>shufIntrus(D.intrus[theme]));
  const [i,setI]=useState(0); const [score,setScore]=useState(0); const [picked,setPicked]=useState(null); const [done,setDone]=useState(false);
  const extras=(D.intrusExtra&&D.intrusExtra[theme])||[];
  const [ext,setExt]=useState(false);
  const extend=()=>{ const start=qs.length; setQs(x=>[...x,...shufIntrus(extras)].slice(0,10)); setExt(true); setDone(false); setI(start); setPicked(null); };
  const q=qs[i];
  const pick=(idx)=>{ if(picked!==null) return; setPicked(idx); if(idx===q.intrus) setScore(s=>s+1); };
  const next=()=>{ if(i+1>=qs.length) setDone(true); else {setI(i+1);setPicked(null);} };
  if(done) return <div className="game">{head}<Result score={score} total={qs.length} onDone={onDone}
    extra={(!ext&&extras.length>0)&&(<button className="more" onClick={extend}>➕ Questions supplémentaires (jusqu'à 10)</button>)}/></div>;
  return (<div className="game">{head}
    <div className="qn r">{i+1}/{qs.length}</div>
    <p className="help">Quel élément ne va pas avec les autres ?</p>
    <Media m={q.media}/>
    <div className="intrus-grid">{q.liste.map((el,idx)=>{ let c="iel";
      if(picked!==null){ if(idx===q.intrus)c+=" right"; else if(idx===picked)c+=" bad"; }
      return <button key={idx} className={c} onClick={()=>pick(idx)}>{el}</button>; })}</div>
    {picked!==null&&(<div className={"fb "+(picked===q.intrus?"good":"no")}><strong>{picked===q.intrus?"✅ Bien vu !":"❌ Ce n'était pas lui."}</strong><p>{q.why}</p>
      <button className="next" onClick={next}>{i+1>=qs.length?"Voir mon score":"Suivant →"}</button></div>)}
  </div>);
}

/* ====== JEU 6 : CAS D'ENTREPRISE ====== */
function Cas({theme,head,onDone,D}){
  const [qs,setQs]=useState(()=>shufQCM(D.cas[theme]));
  const [i,setI]=useState(0); const [score,setScore]=useState(0); const [picked,setPicked]=useState(null); const [done,setDone]=useState(false);
  const [log,setLog]=useState([]);
  const extras=(D.casExtra&&D.casExtra[theme])||[];
  const [ext,setExt]=useState(false);
  const tag=D.casTag||"📂 Situation — Réunion 974";
  const extend=()=>{ const start=qs.length; setQs(x=>[...x,...shufQCM(extras)].slice(0,10)); setExt(true); setDone(false); setI(start); setPicked(null); };
  const q=qs[i];
  const choose=(idx)=>{ if(picked!==null) return; setPicked(idx); const ok=idx===q.c; if(ok) setScore(s=>s+1);
    setLog(L=>[...L,{q:q.q,chosen:q.o[idx],correct:q.o[q.c],ok:ok,why:q.why}]); };
  const next=()=>{ if(i+1>=qs.length) setDone(true); else {setI(i+1);setPicked(null);} };
  if(done){
    const good=log.filter(e=>e.ok).length;
    const concl = (good===log.length)
      ? "Sans-faute ! Chacune de tes décisions était la plus pertinente : tu as su relier chaque situation aux bonnes notions et en mesurer les conséquences. C'est exactement ce raisonnement qui est attendu à l'examen."
      : (good>=Math.ceil(log.length/2))
      ? "Bilan correct : la majorité de tes décisions étaient adaptées. Reprends ci-dessus les situations où le choix n'était pas optimal et observe l'impact qu'aurait eu la meilleure décision."
      : "Bilan à retravailler : plusieurs décisions n'étaient pas les plus pertinentes. Chaque choix engage des conséquences ; relis le cours, puis observe ci-dessus, pour chaque situation, la décision attendue et son impact.";
    const recap=(<div className="fb good" style={{textAlign:"left"}}>
      <strong>📋 Bilan de tes décisions</strong>
      {log.map((e,k)=>(<p key={k} style={{margin:"8px 0"}}>
        <b>Situation {k+1} — </b>{e.ok?"✅ ":"❌ "}tu as choisi « {e.chosen} ».{e.ok?"":(" La décision la plus pertinente était « "+e.correct+" ».")}<br/>
        <span style={{opacity:.85}}>Conséquence : {e.why}</span></p>))}
      <p style={{marginTop:10}}><b>En résumé : </b>{concl}</p>
    </div>);
    return <div className="game">{head}<Result score={score} total={qs.length} onDone={onDone} recap={recap}
      extra={(!ext&&extras.length>0)&&(<button className="more" onClick={extend}>➕ Cas supplémentaires (jusqu'à 10)</button>)}/></div>;
  }
  return (<div className="game">{head}
    <div className="case"><div className="ctag">{tag}</div><Media m={q.media}/><p className="ctxt">{q.cas}</p><p className="cq">{q.q}</p></div>
    <div className="opts">{q.o.map((o,idx)=>{ let c="opt";
      if(picked!==null){ if(idx===q.c)c+=" right"; else if(idx===picked)c+=" bad"; }
      return <button key={idx} className={c} onClick={()=>choose(idx)}>{o}</button>; })}</div>
    {picked!==null&&(<div className={"fb "+(picked===q.c?"good":"no")}><strong>{picked===q.c?"✅ Bonne décision !":"❌ Pas le meilleur choix."}</strong>
      {picked!==q.c&&<p style={{margin:"4px 0"}}>La décision la plus pertinente : « {q.o[q.c]} ».</p>}
      <p>Conséquence : {q.why}</p>
      <button className="next" onClick={next}>{i+1>=qs.length?"Voir le bilan":"Cas suivant →"}</button></div>)}
  </div>);
}

/* ====== JEU 7 : MISSION DIRIGEANT (simulation) ====== */
function Mission({theme,head,onDone,D}){
  const sim=D.mission[theme];
  const [etapes,setEtapes]=useState(()=>[...sim.etapes]);
  const [step,setStep]=useState(0);
  const [stats,setStats]=useState({treso:50,marche:50,image:50,emploi:50});
  const [fb,setFb]=useState(null); const [done,setDone]=useState(false);
  const extras=(D.missionExtra&&D.missionExtra[theme])||[];
  const [ext,setExt]=useState(false);
  const extend=()=>{ const start=etapes.length; setEtapes(es=>[...es,...extras].slice(0,10)); setExt(true); setDone(false); setStep(start); setFb(null); };
  const clamp=v=>Math.max(0,Math.min(100,v));
  const decide=(ch)=>{ if(fb) return;
    setStats(s=>({treso:clamp(s.treso+ch.eff.treso),marche:clamp(s.marche+ch.eff.marche),image:clamp(s.image+ch.eff.image),emploi:clamp(s.emploi+ch.eff.emploi)}));
    setFb(ch.fb); };
  const next=()=>{ setFb(null); if(step+1>=etapes.length) setDone(true); else setStep(step+1); };
  const total=Math.round((stats.treso+stats.marche+stats.image+stats.emploi)/4);
  const gauges=(D.gaugeLabels)||[["💰 Trésorerie","treso","#16a34a"],["📈 Part de marché","marche","#2563eb"],["🌟 Image","image","#f59e0b"],["👥 Emplois","emploi","#db2777"]];
  if(done){
    const _vd=(D.verdict)||["Entreprise florissante ! Tes choix stratégiques ont porté leurs fruits 🏆","Entreprise stable. Des décisions correctes, à affiner. 👍","Entreprise fragilisée. Reprends le cours et retente tes choix. 💪"];
    const verdict= total>=70?_vd[0] : total>=50?_vd[1] : _vd[2];
    return (<div className="game">{head}
      <div className="res"><div className="medal">{total>=70?"🏆":total>=50?"📊":"💪"}</div>
        <h2>Bilan : {total}/100</h2>
        <div className="gauges">{gauges.map(([lab,k,c])=>(<div key={k} className="gauge"><span>{lab}</span><div className="gbar"><div className="gfill" style={{width:stats[k]+"%",background:c}}/></div><b>{stats[k]}</b></div>))}</div>
        <p>{verdict}</p>
        {(!ext&&extras.length>0)&&(<button className="more" onClick={extend}>➕ Décisions supplémentaires (jusqu'à 10)</button>)}
        <button className="cta sm" onClick={()=>onDone(total)}>Continuer</button></div>
    </div>);
  }
  const e=etapes[step];
  return (<div className="game">{head}
    <div className="mission-top"><div className="mtitle">👑 {sim.titre}</div>
      <div className="mgauges">{gauges.map(([lab,k,c])=>(<div key={k} className="mg"><span className="mgemo">{lab.split(" ")[0]}</span><span className="mgname">{lab.split(" ").slice(1).join(" ")}</span><div className="mbar"><div className="mfill" style={{width:stats[k]+"%",background:c}}/></div><b className="mgpct" style={{color:c}}>{stats[k]}%</b></div>))}</div></div>
    {step===0&&!fb&&<p className="mintro">{sim.intro}</p>}
    <div className="scene"><div className="stag">Décision {step+1}/{etapes.length}</div><Media m={e.media}/><p>{e.scene}</p></div>
    {!fb?(<div className="opts">{e.choix.map((ch,idx)=>(<button key={idx} className="opt big" onClick={()=>decide(ch)}>{ch.txt}</button>))}</div>)
      :(<div className="fb good"><strong>Conséquences</strong><p>{fb}</p><button className="next" onClick={next}>{step+1>=etapes.length?"Voir le bilan":"Décision suivante →"}</button></div>)}
  </div>);
}

/* ====== JEU 8 : ÉTUDE DE DOCS (documents comme à l'examen) ====== */
function Docs({theme,head,onDone,D}){
  const [flat]=useState(()=>{ const f=[]; ((D.docs&&D.docs[theme])||[]).forEach((d,di)=>shufQCM(d.questions||[]).forEach(q=>f.push({di,q,doc:d}))); return f; });

    {picked!==null&&(<div className={"fb "+(picked===q.c?"good":"no")}><strong>{picked===q.c?"\u2705 Bonne lecture !":"\u274c Relis le document."}</strong><p>{q.why}</p>

}
