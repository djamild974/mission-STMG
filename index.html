docs: {
  1:[ {titre:"Extrait de fiche de poste — Vendeur(se) polyvalent(e)",
       source:"Magasin de bricolage, Saint-Pierre (974)",
       texte:"Intitulé : Vendeur(se) polyvalent(e) — rayon outillage.\nRattachement hiérarchique : responsable de rayon.\nQualification requise : Bac professionnel Commerce ou expérience équivalente validée.\nCompétences attendues : accueillir et conseiller les clients, gérer les réclamations avec calme, travailler en équipe, tenir le rayon (réassort, étiquetage).\nHoraires : du mardi au samedi, 35 h hebdomadaires.",
       questions:[
         {q:"Quelle est la qualification exigée pour ce poste ?", o:["Savoir gérer les réclamations","Le Bac professionnel Commerce (ou expérience validée)","Travailler le samedi"], c:1, why:"La qualification est la reconnaissance officielle : diplôme, titre ou expérience validée. Ici, le Bac pro Commerce."},
         {q:"« Gérer les réclamations avec calme » est…", o:["une qualification","une compétence","un rituel"], c:1, why:"C'est un savoir-agir en situation de travail : une compétence (qui mobilise aussi le contrôle de soi)."},
         {q:"Le rattachement au responsable de rayon traduit…", o:["la relation d'autorité hiérarchique","une relation informelle","l'identité numérique"], c:0, why:"La fiche de poste inscrit le salarié dans la hiérarchie : c'est la relation d'autorité formelle de l'organisation."}]},
      {titre:"Tableau de bord social — Atelier de conditionnement (extrait mensuel)",
       source:"Entreprise agroalimentaire, zone industrielle de Saint-Pierre",
       texte:"Production du mois : 24 000 unités.\nHeures travaillées : 1 200 heures.\nSalaires bruts versés : 36 000 €.\nCotisations sociales patronales : 14 400 €.\nTaux d'absentéisme : 8 % (moyenne du secteur : 4 %).",
       questions:[
         {q:"Quelle est la productivité du travail de l'atelier ?", o:["20 unités par heure","2 unités par heure","1 200 unités par heure"], c:0, why:"Productivité = production ÷ heures = 24 000 ÷ 1 200 = 20 unités/heure."},
         {q:"Quel est le coût du travail total du mois ?", o:["36 000 €","14 400 €","50 400 €"], c:2, why:"Coût du travail = salaires bruts + cotisations patronales = 36 000 + 14 400 = 50 400 €."},
         {q:"Que suggère le taux d'absentéisme de 8 % ?", o:["Tout va bien : c'est la moyenne","Il faut interroger les conditions de travail","Il faut baisser les salaires"], c:1, why:"Deux fois la moyenne du secteur : un signal d'alerte qui invite à examiner les conditions de travail et le climat social."}]} ],
  2:[ {titre:"Charte d'utilisation des données clients (extrait)",
       source:"Enseigne de distribution réunionnaise — document interne",
       texte:"Art. 1 — Les données clients (nom, e-mail, téléphone, historique d'achats) ne sont collectées qu'avec le consentement explicite de la personne.\nArt. 2 — Elles sont conservées au maximum trois ans après le dernier achat, puis supprimées.\nArt. 3 — Tout client peut demander l'accès à ses données, leur rectification ou leur suppression.\nArt. 4 — Le responsable du fichier répond de leur sécurité devant la CNIL.",
       questions:[
         {q:"Quelle réglementation cette charte applique-t-elle ?", o:["Le RGPD (protection des données personnelles)","Le Code de la route","La loi sur l'open data"], c:0, why:"Consentement, durée de conservation, droits d'accès et de suppression, contrôle de la CNIL : c'est le RGPD."},
         {q:"Pourquoi le consentement est-il exigé (art. 1) ?", o:["Pour faire joli dans la charte","Parce que ces données identifient une personne : ce sont des données à caractère personnel","Parce que les données coûtent cher"], c:1, why:"Toute donnée se rapportant à une personne identifiable est protégée : son utilisation exige le consentement."},
         {q:"L'article 3 garantit au client…", o:["un droit d'accès, de rectification et de suppression","une remise de 10 %","l'anonymat sur les réseaux sociaux"], c:0, why:"Le RGPD donne à chacun la maîtrise de ses données : y accéder, les corriger, les faire effacer."}]},
      {titre:"Description du processus de commande en ligne",
       source:"Site e-commerce d'une entreprise du Port",
       texte:"Étape 1 — Le client passe commande sur le site.\nÉtape 2 — Le paiement est validé par la plateforme sécurisée.\nÉtape 3 — Le PGI transmet la commande à l'entrepôt, met à jour le stock et la comptabilité.\nÉtape 4 — Un SMS automatique informe le client de l'expédition.\nÉtape 5 — Le transporteur livre le colis.",
       questions:[
         {q:"Combien d'étapes ce processus enchaîne-t-il ?", o:["Trois","Cinq","Dix"], c:1, why:"Un processus est un enchaînement ordonné d'activités : ici, cinq étapes, de la commande à la livraison."},
         {q:"Quel outil partage la même information entre entrepôt, stock et comptabilité (étape 3) ?", o:["Le PGI, grâce à sa base de données unique","Le SMS","Le transporteur"], c:0, why:"Le progiciel de gestion intégré relie les services autour d'une information saisie une seule fois."},
         {q:"Le SMS envoyé sans intervention humaine (étape 4) illustre…", o:["la rétention d'information","l'automatisation d'une tâche","l'open data"], c:1, why:"Une tâche répétitive prise en charge par le système : c'est l'automatisation permise par le numérique."}]} ],
  3:[ {titre:"Compte de résultat simplifié — « Saveurs Péi » SARL (en k€)",
       source:"Exercice clos au 31 décembre — Saint-Pierre (974)",
       texte:"PRODUITS — Ventes de produits finis : 820.\nCHARGES — Achats de matières consommées : 310 ; Services extérieurs (transport, énergie) : 90 ; Salaires et cotisations : 260 ; Impôts : 40 ; Intérêts versés à la banque : 10.\nRÉSULTAT DE L'EXERCICE (bénéfice) : 110.",
       questions:[
         {q:"Quelle est la valeur ajoutée de l'entreprise ?", o:["820 k€","420 k€","110 k€"], c:1, why:"VA = production − consommations intermédiaires = 820 − (310 + 90) = 420 k€."},
         {q:"Quel acteur reçoit la plus grande part de cette valeur ajoutée ?", o:["L'État (40)","Les salariés (260)","La banque (10)"], c:1, why:"Avec 260 k€ de salaires et cotisations, les salariés sont les premiers bénéficiaires de la répartition de la VA."},
         {q:"Le bénéfice de 110 k€ mesure…", o:["la valeur perçue","la valeur financière créée sur l'exercice","l'identité numérique"], c:1, why:"Le résultat du compte de résultat (produits − charges) mesure la valeur financière produite par l'organisation."}]},
      {titre:"Tableau de bord trimestriel — Hôtel des Lataniers",
       source:"Direction de l'hôtel, Saint-Gilles-les-Bains",
       texte:"Taux d'occupation : 78 % (objectif : 75 %).\nNote de satisfaction client : 4,6 / 5.\nChiffre d'affaires : + 6 % par rapport au même trimestre l'an dernier.\nTaux d'absentéisme du personnel : 9 % (en hausse de 3 points).\nConsommation d'eau : + 12 %.",
       questions:[
         {q:"L'objectif commercial (75 % d'occupation) est dépassé : l'hôtel est…", o:["efficace sur cet objectif","forcément efficient sur tous les plans","en difficulté commerciale"], c:0, why:"L'objectif est atteint et dépassé : il y a efficacité. L'efficience exigerait d'examiner les moyens consommés."},
         {q:"Quels indicateurs signalent un problème ?", o:["Le taux d'occupation et la satisfaction","L'absentéisme et la consommation d'eau","Le chiffre d'affaires"], c:1, why:"Absentéisme en hausse (performance sociale) et eau +12 % (performance environnementale) se dégradent."},
         {q:"Que conclure sur la performance de l'hôtel ?", o:["Elle est globale : tout va bien","Bonne performance commerciale, mais performance globale fragilisée par le social et l'environnemental","Il faut fermer l'hôtel"], c:1, why:"Les dimensions de la performance peuvent être contradictoires : le commercial progresse pendant que le social et l'environnemental se dégradent."}]} ],
  4:[ {titre:"Budget de trésorerie — Janvier à mars (en k€)",
       source:"« Atelier Vanille Bleue », artisan transformateur — Saint-Philippe",
       texte:"JANVIER — Encaissements : 40 ; Décaissements : 38 ; Solde du mois : +2 ; Solde cumulé : +2.\nFÉVRIER — Encaissements : 22 ; Décaissements : 31 ; Solde du mois : −9 ; Solde cumulé : −7.\nMARS — Encaissements : 35 ; Décaissements : 30 ; Solde du mois : +5 ; Solde cumulé : −2.",
       questions:[
         {q:"Quel est le mois critique pour la trésorerie ?", o:["Janvier","Février","Mars"], c:1, why:"En février, le solde du mois est de −9 et le solde cumulé passe à −7 : la caisse est à découvert."},
         {q:"Que permet ce budget de trésorerie ?", o:["D'anticiper la difficulté et de négocier un financement AVANT février","De connaître la valeur perçue","De calculer la productivité"], c:0, why:"La démarche budgétaire sert à prévoir : l'entreprise peut négocier un découvert ou décaler un décaissement à temps."},
         {q:"Fin mars, le solde cumulé est de −2. Qu'en déduire ?", o:["Tout est rentré dans l'ordre","La situation s'améliore mais la trésorerie reste négative","L'entreprise a fait faillite"], c:1, why:"Le solde mensuel redevient positif (+5) mais le cumul reste négatif (−2) : la vigilance s'impose encore."}]},
      {titre:"Note interne — Projet de gamme « zéro plastique »",
       source:"Direction d'une PME de boissons, Saint-Denis",
       texte:"Enquête réalisée auprès de 400 clients : 64 % se déclarent prêts à acheter la nouvelle gamme.\nCharges fixes supplémentaires liées au projet : 18 000 € par an.\nMarge sur coûts variables prévue : 40 % du chiffre d'affaires.\nRisques identifiés : fournisseur unique d'emballages situé en métropole ; hausse possible du prix du fret maritime.",
       questions:[
         {q:"Quel chiffre d'affaires la gamme doit-elle atteindre pour ne pas perdre d'argent ?", o:["18 000 €","45 000 €","7 200 €"], c:1, why:"Seuil de rentabilité = charges fixes ÷ taux de marge = 18 000 ÷ 0,40 = 45 000 €."},
         {q:"L'enquête auprès des 400 clients est…", o:["un outil de prospective qui réduit l'incertitude","une donnée personnelle","un risque interne"], c:0, why:"L'enquête prévisionnelle éclaire la décision en estimant la demande future : c'est de la prospective."},
         {q:"Le fournisseur unique en métropole constitue…", o:["un risque externe de dépendance d'approvisionnement","une opportunité sans danger","un outil de planification"], c:0, why:"Dépendre d'un seul fournisseur lointain expose à la rupture d'approvisionnement : un risque externe majeur sur une île."}]} ]

casExtra: {
  1:[ {cas:"L'annonce de Royal Bourbon exige un BTS ; lors de l'entretien, on demande au candidat de gérer un imprévu simulé.", q:"Quelles approches l'entreprise combine-t-elle ?", o:["Qualification (diplôme) ET compétence (mise en situation)","Deux fois la qualification","Deux fois la compétence"], c:0, why:"Le diplôme atteste la qualification ; la mise en situation révèle la compétence : les deux approches se complètent."},
      {cas:"Chez un transporteur réunionnais, salariés et direction, en désaccord sur les plannings, signent finalement un accord après négociation.", q:"Comment décrire cette évolution ?", o:["Du conflit au consensus grâce à la négociation","Une rétention d'information","Une externalisation"], c:0, why:"Le dialogue social a transformé une relation conflictuelle en accord accepté : c'est le consensus."},
      {cas:"À l'embouteillage d'Edena, un chef d'équipe obtient l'adhésion de tous sans jamais hausser le ton ; on le suit naturellement.", q:"Quelle notion reconnaît-on ?", o:["Le leadership","L'autorité disciplinaire","La rigidité organisationnelle"], c:0, why:"Entraîner les autres par l'influence et la confiance, indépendamment des sanctions : c'est le leadership."},
      {cas:"Sur une fiche de paie : salaire brut 2 000 €, cotisations patronales 800 €.", q:"Quel est le coût du travail pour l'employeur ?", o:["2 000 €","2 800 €","800 €"], c:1, why:"Coût du travail = rémunération brute + cotisations patronales = 2 000 + 800 = 2 800 €."},
      {cas:"Une entreprise de Sainte-Marie installe la climatisation et de nouveaux sièges dans son atelier ; six mois après, l'absentéisme recule.", q:"Quel lien ce cas illustre-t-il ?", o:["Conditions de travail → comportements des salariés","Open data → information","Prix → marge"], c:0, why:"Améliorer les conditions de travail agit sur la motivation, la santé et la présence : le lien est direct."},
      {cas:"Un nouveau salarié observe que tout le monde se tutoie, mange ensemble le vendredi et porte le polo de l'entreprise.", q:"Que découvre-t-il ?", o:["La culture, les codes et les rituels de l'organisation","Le seuil de rentabilité","Le bilan comptable"], c:0, why:"Tutoiement, repas partagé, tenue commune : autant de codes et rituels qui révèlent la culture de l'organisation."} ],
  2:[ {cas:"Une start-up de Saint-Denis croise les données publiques de la Région sur les bus avec la météo pour créer une appli d'horaires intelligente.", q:"Quelle ressource exploite-t-elle ?", o:["L'open data (données ouvertes)","Des données personnelles volées","Le bilan social"], c:0, why:"Les données publiques librement réutilisables (open data) deviennent, retraitées, une information à forte valeur."},
      {cas:"Dans le SI d'une entreprise, le stagiaire ne peut pas consulter les salaires, mais le DRH oui.", q:"Que montre cette différence ?", o:["Chacun a des rôles et des droits définis dans l'environnement numérique","Le SI est en panne","Une rétention d'information illégale"], c:0, why:"Se situer dans un environnement numérique, c'est connaître ses rôles, ses droits et ses responsabilités d'accès."},
      {cas:"Le logiciel de caisse d'une boutique impose dix écrans de validation pour un simple échange d'article ; les files s'allongent.", q:"Qu'illustre ce cas ?", o:["La rigidité organisationnelle créée par l'outil numérique","L'intelligence collective","L'open data"], c:0, why:"Quand le logiciel impose des procédures inadaptées, le numérique contraint au lieu de servir : c'est la rigidité."},
      {cas:"Une marque péi anime une communauté en ligne où les clients partagent recettes et astuces autour de ses produits.", q:"Quel usage du numérique reconnaît-on ?", o:["Les communautés en ligne et réseaux sociaux","Le budget de trésorerie","La pointeuse"], c:0, why:"La marque s'appuie sur l'e-communication et sa communauté : partage d'information et fidélisation."},
      {cas:"Avant transformation : « 17 ; 23 ; 31 ». Après : « les ventes augmentent chaque mois du trimestre ».", q:"Quelle étape s'est produite ?", o:["Des données ont été transformées en information","Une connaissance a été supprimée","Un processus a été externalisé"], c:0, why:"Les nombres bruts (données), mis en contexte et interprétés, prennent du sens : ils deviennent une information."},
      {cas:"Une PME sauvegarde automatiquement chaque soir ses fichiers sur des serveurs distants accessibles par Internet.", q:"Quelle solution utilise-t-elle ?", o:["L'informatique en nuage (cloud)","Le big data","La fiche de poste"], c:0, why:"Stockage distant accessible via Internet : c'est le cloud, qui sécurise l'information et permet la mobilité."} ],
  3:[ {cas:"Compte de résultat d'une PME : produits 500 k€, charges 450 k€.", q:"Quel est son résultat et que mesure-t-il ?", o:["Un bénéfice de 50 k€ : la valeur financière créée","Une perte de 50 k€","Une valeur ajoutée de 950 k€"], c:0, why:"Produits − charges = 500 − 450 = +50 k€ de bénéfice : c'est la valeur financière de l'exercice."},
      {cas:"Aux Brasseries de Bourbon, le chiffre d'affaires progresse, mais le bilan social révèle un absentéisme en forte hausse.", q:"Que montre ce cas ?", o:["Les performances peuvent être contradictoires entre elles","La performance est forcément globale","Le CA mesure le social"], c:0, why:"Performance commerciale en hausse, performance sociale en baisse : les dimensions peuvent s'opposer."},
      {cas:"Pour gagner un marché, une entreprise baisse son prix de 10 % sans réduire ses coûts.", q:"Quelle est la conséquence directe ?", o:["Sa marge unitaire diminue","Sa valeur ajoutée disparaît","Son identité numérique change"], c:0, why:"Marge = prix − coût : si le prix baisse à coût constant, la marge se réduit d'autant."},
      {cas:"Une grande surface réunionnaise donne chaque soir ses invendus alimentaires à une association d'aide.", q:"Quelle forme de valeur crée-t-elle ?", o:["De la valeur partenariale","De la valeur boursière","Aucune valeur"], c:0, why:"La valeur créée bénéficie à des partenaires au-delà des actionnaires : c'est la valeur partenariale."},
      {cas:"Une usine d'embouteillage réduit de 20 % sa consommation d'eau grâce à un circuit de recyclage.", q:"Quelle performance améliore-t-elle ?", o:["Environnementale","Boursière","Commerciale uniquement"], c:0, why:"Réduire l'impact écologique de l'activité améliore la performance environnementale (et souvent l'image)."},
      {cas:"Après une bonne année, le dirigeant hésite : verser plus de dividendes ou conserver le bénéfice pour acheter une machine.", q:"Quel arbitrage réalise-t-il ?", o:["Dividendes (actionnaires) contre autofinancement (investissement)","Prix contre coût","Donnée contre information"], c:0, why:"La part de valeur conservée (autofinancement) finance l'avenir ; la part distribuée rémunère les actionnaires : il faut arbitrer."} ],
  4:[ {cas:"Chaque semaine, la gérante d'une boutique de Saint-Paul lit la presse professionnelle et surveille les nouveautés de ses concurrents.", q:"Quelle pratique adopte-t-elle ?", o:["La veille informationnelle","La rétention d'information","L'externalisation"], c:0, why:"Surveiller en continu son environnement pour disposer d'une information actualisée : c'est la veille."},
      {cas:"Un commercial sait depuis un mois qu'un gros client envisage de partir, mais ne dit rien à sa direction.", q:"Quel phénomène reconnaît-on ?", o:["Une rétention d'information (asymétrie)","Une enquête prévisionnelle","Un consensus"], c:0, why:"Il détient une information cruciale qu'il garde pour lui : l'asymétrie d'information dégrade la décision collective."},
      {cas:"Persuadé de son idée, un gérant achète une machine à 80 000 € sans aucune étude de la demande. Les ventes ne suivent pas.", q:"Comment qualifier ce risque ?", o:["Un risque interne, lié à la décision du dirigeant","Un risque externe (cyclone)","Une obsolescence subie"], c:0, why:"Le danger vient de la décision de l'organisation elle-même : investissement sans prospective = risque interne."},
      {cas:"Une entreprise réunionnaise dépend d'un seul fournisseur métropolitain ; une grève portuaire bloque ses livraisons trois semaines.", q:"Quel risque s'est réalisé ?", o:["Un risque externe d'approvisionnement (dépendance)","Un risque de leadership","Un risque d'efficience"], c:0, why:"Dépendre d'un fournisseur unique et lointain expose à la rupture d'approvisionnement — risque majeur en milieu insulaire."},
      {cas:"Pour produire davantage, une usine augmente ses cadences… et la quantité de déchets plastiques rejetés.", q:"Que doit-elle prendre en compte ?", o:["Les conséquences écologiques de la recherche de performance","La couleur de son logo","Le statut de ses groupes"], c:0, why:"L'amélioration de la performance n'est pas sans risque : l'empreinte environnementale doit être mesurée et limitée."},
      {cas:"Un hôtelier de l'Ouest recrute deux saisonniers pour décembre et lance en parallèle un projet d'extension prévu pour dans quatre ans.", q:"Que distingue-t-il ?", o:["Le court terme et le long terme (horizons)","Le prix et le coût","La donnée et la connaissance"], c:0, why:"Recruter pour la saison relève du court terme ; l'extension engage le long terme : deux horizons de décision."} ],
},
missionExtra: {
  1:[ {scene:"Un manager refuse d'embaucher un candidat « trop jeune pour être fiable », sans même lire son dossier.", choix:[
        {txt:"Rappeler que c'est un stéréotype et évaluer le candidat sur ses compétences", eff:{treso:0,marche:5,image:10,emploi:5}, fb:"Les stéréotypes faussent la perception : évaluer les compétences réelles évite de passer à côté d'un bon profil."},
        {txt:"Suivre l'avis du manager", eff:{treso:0,marche:-5,image:-10,emploi:-5}, fb:"Décider sur un stéréotype, c'est se priver de talents et risquer la discrimination."} ]},
      {scene:"Tu dois mesurer l'activité de l'atelier pour préparer les entretiens annuels.", choix:[

        {txt:"Évaluer « au ressenti »", eff:{treso:0,marche:-5,image:-5,emploi:-5}, fb:"Sans indicateurs, l'évaluation paraît arbitraire : frustrations et sentiment d'injustice garantis."} ]},
      {scene:"Une graphiste demande à passer en télétravail deux jours par semaine.", choix:[
        {txt:"Accepter avec des objectifs clairs et un point hebdomadaire", eff:{treso:5,marche:0,image:10,emploi:5}, fb:"Les nouveaux liens de travail (distance, autonomie) fonctionnent quand le cadre et la confiance sont posés."},
        {txt:"Refuser par principe", eff:{treso:0,marche:0,image:-10,emploi:-5}, fb:"Refus sans motif : démotivation et risque de départ vers une organisation plus souple."} ]} ],
  2:[ {scene:"La Région publie en open data les flux touristiques par commune.", choix:[
        {txt:"Croiser ces données ouvertes avec tes ventes pour adapter l'offre", eff:{treso:0,marche:15,image:0,emploi:0}, fb:"Manipuler l'open data crée une information nouvelle : tu adaptes ton offre aux flux réels de visiteurs."},
        {txt:"Ignorer ces données publiques", eff:{treso:0,marche:-5,image:0,emploi:0}, fb:"Gratuites et fiables, ces données auraient éclairé tes décisions : une ressource gâchée."} ]},
      {scene:"Un stagiaire demande l'accès complet au fichier paie « pour apprendre ».", choix:[
        {txt:"Limiter ses droits d'accès à ce que sa mission exige", eff:{treso:0,marche:0,image:10,emploi:0}, fb:"Dans un environnement numérique, chacun a des rôles, des droits et des responsabilités : l'accès se justifie par la mission."},
        {txt:"Lui donner tous les accès", eff:{treso:0,marche:0,image:-15,emploi:0}, fb:"Données sensibles exposées sans nécessité : une faille de sécurité et une faute de gestion du SI."} ]},
      {scene:"Ton site e-commerce note chaque clic des visiteurs. La direction veut tout conserver « pour toujours, on ne sait jamais ».", choix:[
        {txt:"Définir une durée de conservation et informer les visiteurs", eff:{treso:0,marche:5,image:10,emploi:0}, fb:"Le RGPD impose des durées limitées et la transparence : la confiance des clients est aussi un actif."},
        {txt:"Tout garder indéfiniment en secret", eff:{treso:0,marche:0,image:-15,emploi:0}, fb:"Conservation illimitée et opaque de données personnelles : sanction et perte de confiance à la clé."} ]} ],
  3:[ {scene:"Tes clients fidèles représentent 60 % du chiffre d'affaires.", choix:[
        {txt:"Lancer un programme de fidélité et mesurer le taux de réachat", eff:{treso:-5,marche:15,image:5,emploi:0}, fb:"La fidélité est un pilier de la performance commerciale : la mesurer permet de la renforcer."},
        {txt:"Concentrer tous les efforts sur les nouveaux clients", eff:{treso:-10,marche:5,image:0,emploi:0}, fb:"Conquérir coûte plus cher que fidéliser : tu négliges la base qui fait vivre l'entreprise."} ]},
      {scene:"Sur les réseaux, un avis négatif circulant beaucoup critique ton service de livraison.", choix:[
        {txt:"Répondre publiquement, corriger le problème et le faire savoir", eff:{treso:-5,marche:5,image:15,emploi:0}, fb:"L'e-réputation se gère : une réponse rapide et honnête transforme une critique en preuve de sérieux."},
        {txt:"Supprimer le commentaire et ne rien changer", eff:{treso:0,marche:-5,image:-15,emploi:0}, fb:"Censurer sans corriger aggrave tout : la valeur perçue s'effondre quand la confiance est trahie."} ]},
      {scene:"Deux ateliers produisent la même quantité, mais l'un consomme 30 % d'énergie en plus.", choix:[
        {txt:"Analyser et aligner l'atelier énergivore sur le plus efficient", eff:{treso:10,marche:0,image:5,emploi:0}, fb:"Même résultat, moins de ressources : tu améliores l'efficience des processus (et la performance environnementale)."},
        {txt:"Ne rien changer puisque la production est identique", eff:{treso:-5,marche:0,image:-5,emploi:0}, fb:"Être efficace ne suffit pas : ignorer l'efficience, c'est laisser filer marge et énergie chaque mois."} ]} ],
  4:[ {scene:"La saison cyclonique commence dans deux mois.", choix:[

        {txt:"On verra bien, ça passera à côté", eff:{treso:5,marche:-10,image:-10,emploi:0}, fb:"Sans préparation, le premier coup de vent coûte des semaines d'activité : le risque n'était pas géré."} ]},
      {scene:"Ton produit vedette entre en phase de déclin : les ventes baissent depuis trois trimestres.", choix:[

        {txt:"Soutenir le produit déclinant à coups de promotions", eff:{treso:-15,marche:-5,image:0,emploi:0}, fb:"Tu retardes l'inévitable en sacrifiant ta marge : le temps joue contre les produits en fin de vie."} ]},
      {scene:"On te propose : 10 000 € de subvention versés maintenant, ou 10 500 € dans trois ans.", choix:[

        {txt:"Attendre trois ans pour 500 € de plus", eff:{treso:-5,marche:0,image:0,emploi:0}, fb:"500 € pour trois ans d'attente et d'incertitude : un très mauvais arbitrage temps/valeur."} ]} ]

TLE: {

notions: [
  { id:"tle-demarche-mkg", theme:1, terme:"Démarche et approches marketing",
    aca:"Avant de produire, l'organisation détecte les besoins des clients ou usagers et y répond par une offre cohérente avec sa stratégie. Quatre approches : anticipatrice, créative, réactive, médiatrice.",
    simple:"On ne produit pas au hasard : on observe d'abord ce que veulent les gens, puis on construit l'offre.",
    ex:"Avant de lancer une eau aromatisée, Edena interroge les consommateurs réunionnais et observe les rayons des concurrents." },
  { id:"tle-etude-marche", theme:1, terme:"Étude de marché et veille",
    aca:"Recueil et traitement d'informations sur les consommateurs, usagers et concurrents (enquêtes, données massives), complétés par une veille marketing et commerciale permanente.",
    simple:"Enquêter sur les clients et surveiller les concurrents, en continu, pour décider avec de bonnes informations.",
    ex:"Une enseigne du Port analyse les tickets de caisse et les avis en ligne pour repérer les tendances de consommation péi." },
  { id:"tle-creation-valeur", theme:1, terme:"Création de valeur : compte de résultat et bilan",
    aca:"Un produit n'est lancé que s'il crée de la valeur : rentabilité, couverture des coûts ou équilibre budgétaire selon l'organisation. Les indicateurs s'extraient du compte de résultat (prévisionnel) et du bilan.",
    simple:"Avant de se lancer, on vérifie avec les chiffres que le produit rapportera plus qu'il ne coûte.",
    ex:"Le compte de résultat prévisionnel d'un nouveau jus letchi indique s'il dégagera un bénéfice ou non." },
  { id:"tle-business-model", theme:1, terme:"Modèle économique (business model)",
    aca:"Manière dont l'organisation crée, délivre et capte de la valeur. Les modèles en rupture (plateformes, low cost, gratuité, freemium) bouleversent les secteurs et font émerger des concurrents inattendus.",
    simple:"La « recette » de l'entreprise pour gagner de l'argent : quoi vendre, à qui, comment, à quel prix.",
    ex:"Une appli réunionnaise de livraison gratuite pour l'utilisateur mais payante pour les restaurants suit un modèle de plateforme." },
  { id:"tle-innovation", theme:1, terme:"Innovation de produits et de procédés",
    aca:"L'innovation porte sur le bien ou le service (nouveau produit, amélioration, services associés) ou sur les procédés (méthodes de production ou de distribution plus flexibles et performantes).",
    simple:"Inventer ou améliorer : soit le produit lui-même, soit la façon de le fabriquer ou de le vendre.",
    ex:"Une confiserie péi innove en produit (bonbon piment-chocolat) et en procédé (nouvelle ligne automatisée)." },
  { id:"tle-ressources", theme:1, terme:"Ressources tangibles et intangibles",
    aca:"Produire mobilise des ressources tangibles (bâtiments, machines, stocks) et intangibles (marque, brevets, savoir-faire, réputation), qui fondent souvent l'avantage concurrentiel.",
    simple:"Tangible = ce qu'on peut toucher. Intangible = ce qui a de la valeur sans se toucher (marque, savoir-faire).",
    ex:"Pour Isautier, la distillerie est tangible ; la marque et le savoir-faire rhumier transmis depuis 1845 sont intangibles." },
  { id:"tle-financement", theme:1, terme:"Financement de l'investissement et de l'exploitation",
    aca:"Les investissements se financent par fonds propres (autofinancement, augmentation de capital) ou financement externe (emprunt, crédit-bail, subventions, financement participatif). Le cycle d'exploitation génère aussi des besoins à couvrir.",
    simple:"Trouver l'argent pour acheter les machines (long terme) ET pour faire tourner l'activité au quotidien.",
    ex:"Royal Bourbon finance une nouvelle ligne par un emprunt et de l'autofinancement ; une start-up péi préfère le crowdfunding." },
  { id:"tle-bilan-fonctionnel", theme:1, terme:"Analyse fonctionnelle du bilan : FRNG, BFR, trésorerie nette",
    aca:"Le fonds de roulement net global (ressources stables − emplois stables) doit couvrir le besoin en fonds de roulement (décalage entre achats, stocks et encaissements). Trésorerie nette = FRNG − BFR.",
    simple:"FRNG = la réserve de long terme. BFR = l'argent immobilisé par l'activité. Ce qui reste = la trésorerie.",
    ex:"FRNG 120 k€ − BFR 150 k€ = trésorerie nette de −30 k€ : l'entreprise réunionnaise doit trouver un financement court terme." },
  { id:"tle-gpec", theme:1, terme:"GPEC : gestion prévisionnelle des emplois et des compétences",
    aca:"Démarche qui adapte les ressources humaines aux besoins immédiats et futurs de l'organisation, en quantité et en qualité : anticipation des recrutements et des formations.",
    simple:"Prévoir dès aujourd'hui les métiers et les compétences dont on aura besoin demain.",
    ex:"Air Austral anticipe les départs en retraite de ses mécaniciens en formant des jeunes techniciens réunionnais." },
  { id:"tle-production", theme:1, terme:"Organisation de la production : productivité, flexibilité, qualité",
    aca:"Les choix portent sur les modes de production (à l'unité, en série, en continu) et leurs méthodes. La qualité, élargie aux services (y compris publics), est un enjeu concurrentiel majeur, soutenu par l'amélioration continue.",
    simple:"Comment produire : beaucoup et vite, ou sur mesure ? Et toujours avec la qualité comme arme face aux concurrents.",
    ex:"Une confiturerie péi produit en petites séries flexibles pour les hôtels, avec un contrôle qualité à chaque lot." },
  { id:"tle-logistique", theme:1, terme:"Logistique et chaîne logistique (supply chain)",
    aca:"La logistique gère les flux physiques et d'information ; la gestion de la chaîne logistique en assure le pilotage global, source de création de valeur. Flux tendus (à la demande) ou flux poussés (sur prévision).",
    simple:"Faire arriver la bonne chose, au bon endroit, au bon moment — sans gaspiller de stocks.",
    ex:"À 10 000 km de ses fournisseurs, une entreprise réunionnaise doit arbitrer entre flux tendus risqués et stocks de sécurité coûteux." },
  { id:"tle-couts", theme:1, terme:"Contrôle des coûts : coût complet, coût spécifique",
    aca:"Le coût complet impute aux produits leurs charges directes et une part des charges indirectes. Le coût spécifique impute à chaque produit ses charges variables et ses charges fixes directes propres. Aucune organisation n'échappe au suivi de ses coûts.",
    simple:"Calculer ce que coûte vraiment chaque produit, pour décider de son prix… ou de son abandon.",
    ex:"Crête d'Or calcule le coût complet d'un poulet conditionné : matières + main-d'œuvre + part des frais de l'usine." },
  { id:"tle-numerique-prod", theme:1, terme:"Transformations numériques de la production",
    aca:"Dématérialisation, automatisation des processus (workflow), PGI, informatique en nuage, objets connectés et intelligence artificielle améliorent en continu la production et l'interfaçage avec la gestion.",
    simple:"Capteurs, logiciels et IA rendent la production plus automatique, plus suivie et plus intelligente.",
    ex:"Des capteurs connectés sur la ligne d'embouteillage signalent en temps réel la moindre dérive de remplissage." },
  { id:"tle-acteurs", theme:2, terme:"Intérêts convergents et divergents des acteurs",
    aca:"L'organisation rassemble des acteurs internes (salariés, dirigeants, actionnaires) aux intérêts tantôt convergents (pérennité), tantôt divergents (salaires contre dividendes), générateurs de conflits que le management doit gérer.",
    simple:"Tout le monde veut que l'entreprise marche… mais pas forcément la même part du gâteau.",
    ex:"Dans une PME du Port, les salariés demandent des primes quand les associés veulent augmenter les dividendes." },
  { id:"tle-culture", theme:2, terme:"Culture de l'organisation",
    aca:"Ensemble des valeurs, normes, codes et rituels partagés, qui fédère les acteurs autour d'une identité commune et oriente les comportements.",
    simple:"La personnalité de l'organisation : ce qui s'y fait, s'y dit et s'y partage.",
    ex:"Chez un transporteur familial réunionnais, l'entraide entre chauffeurs et le « kabar » de fin d'année font partie de la culture." },
  { id:"tle-style-direction", theme:2, terme:"Style de direction",
    aca:"Manière dont le dirigeant exerce le pouvoir et associe (ou non) les salariés aux décisions : du style autoritaire au style participatif, en passant par paternaliste et consultatif.",
    simple:"Le chef décide-t-il seul, ou avec son équipe ? C'est ça, le style de direction.",
    ex:"La directrice d'un hôtel de Saint-Gilles consulte son équipe avant de modifier les plannings : style consultatif." },
  { id:"tle-groupe", theme:2, terme:"Dynamique de groupe : leadership, cohésion, décision",
    aca:"Le groupe développe une dynamique propre : leadership (capacité d'entraînement), cohésion (force qui soude), modes de décision collectifs. Une forte cohésion favorise l'engagement.",
    simple:"Un groupe soudé, bien entraîné par un leader, décide mieux et travaille mieux.",
    ex:"Après un séminaire commun, l'équipe de réception et celle du restaurant de l'hôtel coopèrent enfin sans frictions." },
  { id:"tle-cooperation", theme:2, terme:"Coopération et modes d'action coopératifs",
    aca:"Groupes de projet, réunions, techniques de créativité, outils collaboratifs, réseaux sociaux d'entreprise et communautés de pratiques organisent la coopération et font circuler les savoirs.",
    simple:"Tous les moyens de travailler ensemble efficacement, en présentiel comme en ligne.",
    ex:"Un groupe de projet inter-services prépare le lancement d'un produit avec un document partagé et un canal d'équipe." },
  { id:"tle-motivation", theme:2, terme:"Facteurs de motivation et implication",
    aca:"Facteurs internes (plaisir du travail, accomplissement, sens) et externes (rémunération, promotion, reconnaissance, conditions). Les dispositions favorisant motivation et implication nourrissent la qualité de vie au travail.",
    simple:"Ce qui donne envie de bien travailler vient de soi (fierté, intérêt) et de l'organisation (prime, reconnaissance).",
    ex:"Prime liée à la satisfaction client + félicitations en réunion : l'équipe de l'hôtel retrouve l'envie de se dépasser." },
  { id:"tle-qvt", theme:2, terme:"Qualité de vie au travail",
    aca:"Conditions matérielles, organisationnelles et relationnelles qui permettent de bien travailler. Elle soutient la motivation, l'implication et, in fine, la performance.",
    simple:"Travailler dans de bonnes conditions, c'est aussi mieux travailler.",
    ex:"Salle de pause climatisée, plannings prévisibles et écoute du manager améliorent le quotidien de l'équipe." },
  { id:"tle-processus-achat", theme:2, terme:"Consommateur, usager et processus d'achat",
    aca:"Le processus d'achat va de la naissance du besoin à l'évaluation post-achat. Il s'explique par les besoins, motivations, freins et attitudes du consommateur ou de l'usager.",
    simple:"Acheter, c'est un parcours : besoin → recherche → comparaison → achat → avis. Avec des moteurs et des freins.",
    ex:"Avant de choisir son scooter, un jeune Réunionnais compare en ligne, lit les avis, puis essaie en concession." },
  { id:"tle-digital-client", theme:2, terme:"Digitalisation de la relation client",
    aca:"Les traces numériques (navigation, avis, réseaux sociaux grand public) nourrissent la connaissance client et permettent interactivité et personnalisation. L'administration électronique transforme de même la relation à l'usager.",
    simple:"Chaque clic laisse une trace : bien utilisées, ces traces permettent de mieux servir chaque client.",
    ex:"Une enseigne péi analyse avis Google et historiques d'achat pour personnaliser ses offres ; la Région propose ses démarches en ligne." },
  { id:"tle-communication", theme:2, terme:"Stratégie de communication globale",
    aca:"La communication, interne (participation, adhésion du personnel) et externe (image), doit être globale et intégrée : cohérente entre toutes les cibles et tous les canaux.",
    simple:"On ne parle pas pareil à un salarié, un client ou un banquier — mais tous doivent recevoir un message cohérent.",
    ex:"Le même lancement de produit donne une réunion d'équipe en interne, une campagne sur les réseaux et un dossier pour la banque." },
  { id:"tle-identite", theme:2, terme:"Identité de l'organisation : marque employeur, e-réputation",
    aca:"L'identité de l'organisation se construit aussi en ligne : marque employeur (attractivité auprès des candidats), e-réputation et identité numérique. La communication financière (business plan) répond aux besoins d'information des partenaires.",
    simple:"L'image de l'organisation auprès des futurs salariés, des internautes et des financeurs se travaille.",
    ex:"Air Austral soigne sa marque employeur pour attirer des techniciens ; une start-up présente son business plan à la banque." },
  { id:"tle-ethique", theme:3, terme:"Éthique et déontologie",
    aca:"L'éthique est la réflexion sur ce qu'il est juste de faire, au-delà de la loi ; la déontologie regroupe les règles propres à une profession. Les scandales (corruption, fraude) ont imposé l'éthique dans les affaires.",
    simple:"L'éthique : se demander ce qui est bien. La déontologie : les règles écrites d'un métier.",
    ex:"Un expert-comptable réunionnais suit la déontologie de sa profession ; son client refuse un pot-de-vin par éthique." },
  { id:"tle-transparence", theme:3, terme:"Transparence des pratiques et information financière",
    aca:"La normalisation comptable et la transparence de l'information financière garantissent la confiance des partenaires et de la société dans les comptes et les pratiques des organisations.",
    simple:"Des comptes établis selon les mêmes règles pour tous, et lisibles par tous : c'est la base de la confiance.",
    ex:"Les comptes publiés d'une coopérative réunionnaise permettent aux adhérents et aux banques de juger sa gestion." },
  { id:"tle-discriminations", theme:3, terme:"Lutte contre les discriminations, égalité femmes-hommes",
    aca:"Les organisations doivent garantir l'égalité de traitement dans les relations de travail : recrutement, rémunération, promotion. L'égalité professionnelle femmes-hommes est un enjeu majeur, mesuré et publié.",
    simple:"Mêmes chances et même salaire à compétences égales, qui qu'on soit.",
    ex:"Une entreprise dionysienne publie son index d'égalité professionnelle et corrige les écarts de salaires constatés." },
  { id:"tle-organisation-civique", theme:3, terme:"Organisation civique : mécénat, démocratie participative",
    aca:"Les organisations s'engagent dans la société : mécénat (soutien sans contrepartie commerciale directe) et démarches de démocratie participative associant citoyens et usagers aux décisions.",
    simple:"Donner sans rien attendre en retour, et faire participer les citoyens : l'organisation joue un rôle dans la cité.",
    ex:"Une banque réunionnaise finance par mécénat la restauration d'un site naturel ; une commune fait voter les habitants sur un budget participatif." },
  { id:"tle-rapport-travail", theme:3, terme:"Rapport au travail : temps, lieu, mode d'organisation",
    aca:"Les évolutions sociétales transforment le rapport au travail : télétravail, horaires flexibles, tiers-lieux, quête de sens. Les organisations doivent adapter leur management à ces attentes.",
    simple:"On ne travaille plus comme avant : ni au même endroit, ni aux mêmes heures, ni pour les mêmes raisons.",
    ex:"Une agence de Saint-Denis accorde deux jours de télétravail et des horaires aménagés pour éviter les embouteillages." },
  { id:"tle-consommation", theme:3, terme:"Modes de consommation",
    aca:"Consommation responsable, circuits courts, seconde main, économie du partage : les nouveaux modes de consommation s'imposent aux organisations, qui adaptent offres et processus.",
    simple:"Les clients changent leur façon de consommer ; les organisations doivent suivre, sinon elles décrochent.",
    ex:"Face à la demande de produits locaux, une grande surface réunionnaise développe un rayon « péi » en circuit court." },
  { id:"tle-donnees", theme:3, terme:"Protection des données personnelles et stratégiques",
    aca:"L'exploitation des données oblige les organisations à protéger les données personnelles (RGPD) et leurs données stratégiques, sous peine de sanctions et de perte de confiance.",
    simple:"Les données des clients et les secrets de l'entreprise doivent être protégés comme un coffre-fort.",
    ex:"Après une tentative de piratage, une PME du Port chiffre ses données, forme ses équipes et limite les accès." },
  { id:"tle-algorithmes", theme:3, terme:"Transparence des algorithmes",
    aca:"Quand des algorithmes décident (tri de candidatures, recommandations, scores), les organisations doivent pouvoir expliquer leurs critères : la transparence devient une responsabilité.",
    simple:"Si une machine décide, on doit pouvoir expliquer pourquoi elle a décidé ça.",
    ex:"Une plateforme de recrutement doit pouvoir justifier pourquoi son algorithme a écarté une candidature." },
  { id:"tle-blockchain", theme:3, terme:"Chaîne de blocs (blockchain)",
    aca:"Registre numérique distribué, infalsifiable et sans organe central, qui certifie transactions et traçabilité. Elle ouvre de nouvelles responsabilités et opportunités aux organisations.",
    simple:"Un grand cahier numérique partagé que personne ne peut falsifier.",
    ex:"Une filière fruits péi trace ses letchis du verger à l'export grâce à une blockchain, gage d'origine pour le client." },
  { id:"tle-implantation", theme:3, terme:"Stratégie d'implantation",
    aca:"Le choix du territoire d'implantation dépend des ressources offertes : main-d'œuvre, infrastructures de transport et numériques, services publics, fiscalité, aides, pépinières d'entreprises.",
    simple:"S'installer là où le territoire apporte le plus : compétences, routes, réseaux, aides.",
    ex:"Une PME s'installe près du port de la Pointe des Galets pour réduire ses coûts logistiques d'import-export." },
  { id:"tle-ecosysteme", theme:3, terme:"Écosystème d'affaires, cluster et territoires",
    aca:"Les organisations s'intègrent dans des écosystèmes d'affaires et d'innovation : grappes d'entreprises (clusters), pépinières, centres de recherche et institutions qui coopèrent sur un territoire.",
    simple:"Des entreprises, des chercheurs et des institutions qui jouent collectif sur un même territoire.",
    ex:"La filière canne-sucre-rhum réunit planteurs, sucreries, distilleries et recherche : un véritable cluster réunionnais." }
],

      {p:"Le coût spécifique impute à chaque produit ses charges variables et ses charges fixes directes propres.", v:true, why:"Vrai : c'est sa définition, adaptée aux environnements instables."} ],
  2:[ {p:"Les intérêts des acteurs internes d'une organisation sont toujours convergents.", v:false, why:"Faux : ils sont tantôt convergents (pérennité), tantôt divergents (partage de la valeur), sources de conflits."},
      {p:"La cohésion d'un groupe peut améliorer sa performance.", v:true, why:"Vrai : un groupe soudé coopère mieux, décide mieux et s'implique davantage."},
      {p:"Le processus d'achat commence au moment du paiement.", v:false, why:"Faux : il naît du besoin, passe par la recherche d'informations et se prolonge après l'achat (évaluation)."},
      {p:"Les traces numériques laissées par les clients aident à personnaliser la relation.", v:true, why:"Vrai : navigation, avis et historiques nourrissent la connaissance client."},
      {p:"On communique exactement de la même manière avec un salarié, un client et un banquier.", v:false, why:"Faux : les cibles, objectifs et supports diffèrent — mais les messages doivent rester cohérents (communication globale)."} ],
  3:[ {p:"L'éthique se limite au strict respect de la loi.", v:false, why:"Faux : l'éthique interroge ce qu'il est juste de faire, au-delà des obligations légales."},
      {p:"L'égalité professionnelle femmes-hommes est un enjeu de société pour les organisations.", v:true, why:"Vrai : elle est mesurée, publiée, et engage la responsabilité des organisations."},
      {p:"Une organisation peut exploiter librement les données personnelles de ses clients.", v:false, why:"Faux : le RGPD impose consentement, sécurité et limitation de l'usage des données personnelles."},
      {p:"La blockchain permet de certifier des transactions sans organe central.", v:true, why:"Vrai : le registre est partagé, distribué et infalsifiable."},
      {p:"Le territoire fournit des ressources aux organisations : infrastructures, compétences, aides.", v:true, why:"Vrai : c'est tout l'enjeu de la stratégie d'implantation et des écosystèmes territoriaux."} ]
},

mission: {
  1:{ titre:"Directeur de production chez « Tropic'Saveurs » (Le Port)",
    intro:"Tu pilotes la production d'une entreprise réunionnaise de jus de fruits. Marketing, financement, organisation de la production, qualité, numérique : chaque décision engage la compétitivité. Indicateurs : Trésorerie 💰, Part de marché 📈, Image 🌟, Emplois 👥.",
    etapes:[
      {scene:"Le service commercial veut lancer immédiatement un jus letchi-gingembre « parce que c'est tendance ».", choix:[
        {txt:"Mener d'abord une étude de marché et bâtir un compte de résultat prévisionnel", eff:{treso:-5,marche:15,image:5,emploi:0}, fb:"Démarche marketing + indicateurs de création de valeur : tu lances en connaissant les besoins ET la rentabilité attendue."},
        {txt:"Lancer sans étude", eff:{treso:-15,marche:-5,image:-5,emploi:0}, fb:"Sans connaissance du marché ni prévision de valeur, le lancement est un pari : les invendus s'accumulent."} ]},
      {scene:"Il faut financer une nouvelle ligne d'embouteillage à 400 000 €.", choix:[
        {txt:"Combiner autofinancement et emprunt à long terme adapté à l'investissement", eff:{treso:-10,marche:10,image:5,emploi:5}, fb:"Un financement mixte préserve la trésorerie d'exploitation : l'investissement long se finance par des ressources longues."},
        {txt:"Tout payer avec la trésorerie courante", eff:{treso:-25,marche:5,image:0,emploi:0}, fb:"Le BFR n'est plus couvert : la trésorerie nette plonge et les fournisseurs attendent leurs règlements."} ]},
      {scene:"Tes stocks de bouteilles vides débordent, tes fournisseurs sont désormais fiables et réactifs.", choix:[
        {txt:"Passer en flux plus tendus avec un stock de sécurité raisonnable", eff:{treso:10,marche:5,image:0,emploi:0}, fb:"Moins de stocks immobilisés = moins de BFR. Le stock de sécurité protège des aléas du fret — île oblige."},
        {txt:"Garder des stocks massifs « au cas où »", eff:{treso:-10,marche:0,image:0,emploi:0}, fb:"Les stocks dorment et coûtent : argent immobilisé, casse, place perdue. La logistique est aussi source de valeur."} ]},
      {scene:"Un lot présente des bouteilles mal remplies. Le client n'a encore rien remarqué.", choix:[
        {txt:"Bloquer le lot, renforcer le contrôle qualité et corriger le processus", eff:{treso:-10,marche:5,image:15,emploi:0}, fb:"La qualité est un enjeu concurrentiel crucial : l'amélioration continue évite que le défaut se reproduise."},
        {txt:"Livrer quand même pour tenir les délais", eff:{treso:5,marche:-15,image:-15,emploi:0}, fb:"Le défaut finit sur les réseaux sociaux : la confiance, elle, ne se rattrape pas en un lot."} ]},
      {scene:"Un prestataire propose d'équiper la ligne de capteurs connectés reliés à ton PGI.", choix:[
        {txt:"Investir : suivi en temps réel et automatisation des alertes (workflow)", eff:{treso:-10,marche:10,image:5,emploi:0}, fb:"Les objets connectés et l'automatisation améliorent en continu la production : moins de pertes, plus de réactivité."},
        {txt:"Refuser : « on a toujours fait sans »", eff:{treso:5,marche:-10,image:-5,emploi:0}, fb:"Tes concurrents s'équipent : les transformations numériques de la production sont une chance… pour ceux qui les saisissent."} ]} ]},
  2:{ titre:"Manager à l'hôtel « Les Badamiers » (Saint-Gilles)",
    intro:"Tu encadres les équipes d'un hôtel réunionnais. Fédérer les acteurs, motiver, soigner la relation client digitale et communiquer juste : voilà tes missions. Indicateurs : Trésorerie 💰, Part de marché 📈, Image 🌟, Emplois 👥.",
    etapes:[
      {scene:"La saison a été excellente. Les salariés demandent une prime, les propriétaires veulent maximiser leur part.", choix:[
        {txt:"Organiser la concertation et répartir équitablement les fruits de la saison", eff:{treso:-5,marche:5,image:10,emploi:5}, fb:"Les intérêts divergents se gèrent par le dialogue : un compromis équitable fédère les acteurs autour de la réussite."},
        {txt:"Tout attribuer aux propriétaires sans discussion", eff:{treso:5,marche:-5,image:-15,emploi:-5}, fb:"Démotivation immédiate : le conflit larvé s'installera et la qualité de service s'en ressentira."} ]},
      {scene:"Tu dois réorganiser les plannings de la haute saison.", choix:[
        {txt:"Consulter l'équipe, recueillir les contraintes, puis trancher", eff:{treso:0,marche:5,image:10,emploi:5}, fb:"Style consultatif : l'équipe adhère à une décision qu'elle a contribué à éclairer."},
        {txt:"Imposer les plannings par affichage", eff:{treso:0,marche:0,image:-10,emploi:-5}, fb:"Style autoritaire mal vécu : absentéisme et tensions en pleine haute saison."} ]},
      {scene:"L'équipe est compétente mais s'essouffle : routine, aucun signe de reconnaissance.", choix:[
        {txt:"Reconnaissance publique + prime liée à la satisfaction client + perspectives d'évolution", eff:{treso:-10,marche:10,image:10,emploi:5}, fb:"Tu combines facteurs externes (prime, promotion) et internes (fierté du travail) : motivation et implication repartent."},
        {txt:"Ne rien changer : « ils sont payés pour ça »", eff:{treso:5,marche:-10,image:-10,emploi:-5}, fb:"Sans dispositions favorisant la motivation, les meilleurs partent chez le concurrent d'en face."} ]},
      {scene:"La note de l'hôtel glisse à 4,1/5 en ligne et seuls 12 % des avis reçoivent une réponse.", choix:[
        {txt:"Répondre à chaque avis, analyser les traces numériques et personnaliser l'accueil", eff:{treso:-5,marche:15,image:15,emploi:0}, fb:"La digitalisation de la relation client transforme les avis en levier : e-réputation restaurée, clients fidélisés."},
        {txt:"Ignorer : « les avis, ça ne compte pas »", eff:{treso:0,marche:-15,image:-15,emploi:0}, fb:"Pour les voyageurs, la note EST la vitrine : la réservation file vers les hôtels mieux notés."} ]},
      {scene:"L'hôtel lance sa rénovation. Il faut l'annoncer aux salariés, aux clients et au banquier.", choix:[
        {txt:"Adapter le message à chaque cible, en gardant une communication globale cohérente", eff:{treso:0,marche:10,image:10,emploi:0}, fb:"Réunion d'équipe, campagne clients, dossier financier (business plan) : trois cibles, trois formes, un seul discours cohérent."},
        {txt:"Envoyer le même e-mail à tout le monde", eff:{treso:0,marche:-5,image:-10,emploi:0}, fb:"Le banquier n'a pas ses chiffres, les salariés apprennent leur sort comme des clients : on ne communique pas de la même manière avec tous les acteurs."} ]} ]},
  3:{ titre:"PDG de « Péi Cosmétiques » face à la société",
    intro:"Ton entreprise réunionnaise de cosmétiques naturels grandit. Éthique, égalité, données, modes de vie, territoire : la société t'observe et t'offre aussi des ressources. Indicateurs : Trésorerie 💰, Part de marché 📈, Image 🌟, Emplois 👥.",
    etapes:[
      {scene:"Un intermédiaire propose de « faciliter » un gros contrat à l'export contre une commission occulte.", choix:[
        {txt:"Refuser et formaliser une charte éthique interne", eff:{treso:-5,marche:5,image:15,emploi:0}, fb:"L'éthique dans les affaires protège l'organisation : un contrat gagné par corruption se paie toujours plus tard."},
        {txt:"Accepter discrètement", eff:{treso:10,marche:5,image:-25,emploi:0}, fb:"Le scandale éclate : sanctions, clients perdus, réputation détruite. L'éthique n'était pas une option."} ]},
      {scene:"L'index égalité femmes-hommes révèle un écart de salaires injustifié de 8 %.", choix:[
        {txt:"Corriger les écarts et publier un plan d'égalité", eff:{treso:-10,marche:5,image:10,emploi:5}, fb:"Lutter contre les discriminations est une obligation et un atout : fierté interne, attractivité externe."},
        {txt:"Masquer les chiffres", eff:{treso:5,marche:0,image:-15,emploi:-5}, fb:"La dissimulation se découvre toujours : sanction et perte de confiance des équipes."} ]},
      {scene:"Ton fichier clients intéresse un courtier en données prêt à payer cher.", choix:[
        {txt:"Refuser : sécuriser les données et respecter le consentement (RGPD)", eff:{treso:-5,marche:5,image:10,emploi:0}, fb:"La protection des données personnelles et stratégiques est une responsabilité : la confiance des clients vaut plus que la vente du fichier."},
        {txt:"Vendre le fichier", eff:{treso:15,marche:-10,image:-20,emploi:0}, fb:"Sanction CNIL, clients furieux : l'exploitation des données impose des responsabilités nouvelles."} ]},
      {scene:"Tes clients réclament du local, du rechargeable et de la transparence sur l'origine des ingrédients.", choix:[
        {txt:"Lancer une gamme rechargeable tracée par blockchain, en circuit court", eff:{treso:-15,marche:15,image:15,emploi:5}, fb:"Les modes de consommation s'imposent aux organisations : tu en fais un avantage concurrentiel certifié."},
        {txt:"Ne rien changer à l'offre", eff:{treso:5,marche:-15,image:-10,emploi:0}, fb:"Le marché évolue sans toi : les nouvelles attentes de consommation profitent aux concurrents."} ]},
      {scene:"La Technopole de La Réunion te propose d'intégrer son écosystème : pépinière, chercheurs, autres entreprises de la filière.", choix:[
        {txt:"Rejoindre l'écosystème et coopérer avec les acteurs du territoire", eff:{treso:-5,marche:10,image:10,emploi:5}, fb:"Cluster, recherche, accompagnement : le territoire fournit des ressources précieuses à qui joue collectif."},
        {txt:"Rester isolé pour « protéger ses secrets »", eff:{treso:0,marche:-10,image:-5,emploi:0}, fb:"Seul, tu avances moins vite : les écosystèmes d'innovation font émerger les champions de demain."} ]} ]}
},

  1:[ {titre:"Compte de résultat prévisionnel — jus « Letchi Pétillant » (en k€)",
       source:"Tropic'Saveurs, Le Port — dossier de lancement",
       texte:"Chiffre d'affaires prévisionnel : 300.\nCharges variables (matières, emballages, énergie) : 180.\nCharges fixes (ligne dédiée, marketing, personnel) : 90.\nRésultat prévisionnel : 30.",
       questions:[
         {q:"Quel est le taux de marge sur coûts variables du projet ?", o:["40 % du CA","60 % du CA","10 % du CA"], c:0, why:"Marge sur coûts variables = 300 − 180 = 120 ; 120 ÷ 300 = 40 % du chiffre d'affaires."},
         {q:"Quel chiffre d'affaires minimal assure l'équilibre (seuil de rentabilité) ?", o:["90 k€","225 k€","300 k€"], c:1, why:"Seuil = charges fixes ÷ taux de marge = 90 ÷ 0,40 = 225 k€."},
         {q:"À quoi sert ce document avant le lancement ?", o:["À vérifier que le produit créera de la valeur","À mesurer la cohésion du groupe","À choisir le style de direction"], c:0, why:"Le compte de résultat prévisionnel fournit les indicateurs de création de valeur : on ne lance que si le projet en crée."}]},
      {titre:"Analyse fonctionnelle du bilan — Tropic'Saveurs (en k€)",
       source:"Service comptable — clôture de l'exercice",
       texte:"Ressources stables : 520. Emplois stables : 400. Fonds de roulement net global (FRNG) : 120.\nStocks : 95. Créances clients : 130. Dettes fournisseurs : 75. Besoin en fonds de roulement (BFR) : 150.",
       questions:[
         {q:"Quelle est la trésorerie nette de l'entreprise ?", o:["+270 k€","−30 k€","+30 k€"], c:1, why:"Trésorerie nette = FRNG − BFR = 120 − 150 = −30 k€ : la trésorerie est négative."},
         {q:"D'où vient le besoin en fonds de roulement ?", o:["Du décalage entre les dépenses d'exploitation (stocks, clients) et les encaissements","Des dividendes versés","Du style de direction"], c:0, why:"Stocks et créances immobilisent de l'argent avant que les clients ne paient : c'est le BFR."},

       texte:"Art. 2 — Tout cadeau ou invitation d'une valeur supérieure à 50 € doit être refusé et déclaré.\nArt. 4 — Un dispositif d'alerte interne permet de signaler confidentiellement tout manquement.\nArt. 5 — Le groupe garantit l'égalité de traitement dans le recrutement, la rémunération et la promotion.\nArt. 7 — Les données des clients et des salariés sont protégées conformément au RGPD.",

         {q:"L'article 7 relie l'éthique à…", o:["la protection des données personnelles (RGPD)","la logistique en flux tendus","la fabrication en série"], c:0, why:"Le numérique crée de nouvelles responsabilités : la protection des données fait désormais partie de l'éthique des organisations."}]},
      {titre:"Article de presse — « La canne, un écosystème réunionnais »",

       texte:"Autour de la canne à sucre gravitent des milliers de planteurs, deux sucreries, des distilleries renommées, des unités de production d'énergie à partir de la bagasse, des organismes de recherche agronomique et des infrastructures portuaires d'exportation.\nLa filière représente plusieurs milliers d'emplois directs et indirects.\nLes acteurs coopèrent au sein d'interprofessions, partagent la recherche variétale et défendent ensemble une image commune des produits péi.",
       questions:[
         {q:"Quelle notion ce texte illustre-t-il principalement ?", o:["Une grappe d'entreprises (cluster) et son écosystème d'affaires","Un processus d'achat","Une analyse fonctionnelle du bilan"], c:0, why:"Des acteurs interdépendants, coopérant sur un même territoire autour d'une filière : c'est un cluster."},
         {q:"Quelles ressources du territoire la filière mobilise-t-elle ?", o:["Recherche, infrastructures portuaires, main-d'œuvre, énergie","Uniquement des capitaux étrangers","Aucune ressource locale"], c:0, why:"Le territoire fournit recherche agronomique, port d'exportation, compétences : des ressources clés de l'écosystème."},
         {q:"Quel intérêt une distillerie a-t-elle à s'intégrer dans cet écosystème ?", o:["Accéder à des ressources partagées et à une image collective forte","Échapper à toute concurrence","Supprimer son contrôle qualité"], c:0, why:"Coopération, innovation partagée, image commune : l'écosystème renforce chaque acteur qui y contribue."}]} ]

  3:[ {liste:["Télétravail","Horaires flexibles","Tiers-lieux","Coût spécifique"], intrus:3, why:"Le coût spécifique relève du contrôle des coûts ; les trois autres du nouveau rapport au travail."},
      {liste:["Consommation responsable","Circuits courts","Seconde main","Charges indirectes"], intrus:3, why:"Les charges indirectes relèvent du calcul des coûts ; les trois autres des nouveaux modes de consommation."},
      {liste:["Données personnelles","Consentement","RGPD","Supply chain"], intrus:3, why:"La supply chain relève de la logistique ; les trois autres de la protection des données."},
      {liste:["Transparence des algorithmes","Blockchain","Protection des données","Style paternaliste"], intrus:3, why:"Le style paternaliste relève de la direction ; les trois autres des responsabilités numériques."},
      {liste:["Égalité femmes-hommes","Non-discrimination","Diversité","Flux d'information"], intrus:3, why:"Les flux d'information relèvent de la logistique ; les trois autres de l'égalité au travail."},
      {liste:["Pépinière d'entreprises","Infrastructures","Aides régionales","Processus d'achat"], intrus:3, why:"Le processus d'achat concerne le consommateur ; les trois autres sont des ressources du territoire."},
      {liste:["Corruption","Fraude","Pratiques opaques","Mécénat"], intrus:3, why:"Le mécénat est un engagement vertueux ; les trois autres sont les dérives qui ont fait naître l'éthique des affaires."} ]

casExtra: {
  1:[ {cas:"La marque « Isautier », connue de tous les Réunionnais depuis 1845, n'apparaît dans aucun hangar ni aucune machine.", q:"Comment qualifier cette ressource ?", o:["Une ressource intangible","Une ressource tangible","Une ressource financière"], c:0, why:"Marque, réputation, savoir-faire : des ressources intangibles, souvent décisives pour l'avantage concurrentiel."},
      {cas:"Le bilan d'une PME de Saint-Pierre affiche : FRNG 80 k€, BFR 95 k€.", q:"Quelle est sa trésorerie nette et que faut-il en conclure ?", o:["−15 k€ : un financement de court terme est à prévoir","+15 k€ : tout va bien","175 k€ : trésorerie abondante"], c:0, why:"TN = FRNG − BFR = 80 − 95 = −15 k€ : le FRNG ne couvre pas le BFR."},
      {cas:"Un hôtel de l'Ouest dématérialise le check-in : l'enregistrement se fait sur tablette et alimente automatiquement la facturation.", q:"Qu'illustre ce cas ?", o:["La dématérialisation et l'automatisation des processus","Le mécénat","Le coût spécifique"], c:0, why:"Le numérique fluidifie le processus de production du service : dématérialisation + workflow."},
      {cas:"Une start-up réunionnaise propose son appli gratuitement, avec un abonnement « premium » pour les fonctions avancées.", q:"Quel modèle économique reconnaît-on ?", o:["Le freemium","Le coût complet","La GPEC"], c:0, why:"Gratuit pour attirer, payant pour les services avancés : c'est le modèle freemium."},
      {cas:"Air Austral anticipe le départ en retraite de nombreux mécaniciens dans cinq ans et ouvre des parcours de formation pour des jeunes de l'île.", q:"Quelle démarche l'entreprise applique-t-elle ?", o:["La GPEC","L'analyse fonctionnelle du bilan","La veille commerciale"], c:0, why:"Adapter dès aujourd'hui les compétences aux besoins futurs : c'est la gestion prévisionnelle des emplois et des compétences."},
      {cas:"Une biscuiterie péi abandonne un produit après calcul : son coût spécifique dépasse durablement son prix de vente.", q:"Que montre cette décision ?", o:["L'utilité du contrôle des coûts pour décider","Que la qualité est inutile","Que le marketing suffit"], c:0, why:"Le calcul des coûts éclaire les décisions : maintenir, repositionner ou abandonner un produit."} ],
  2:[ {cas:"Pour préparer le lancement d'une nouvelle gamme, une entreprise crée un groupe de projet réunissant production, vente et comptabilité autour d'un espace de travail partagé.", q:"Quel mode d'action reconnaît-on ?", o:["Un mode d'action coopératif","Une communication financière","Un calcul de coût"], c:0, why:"Groupes de projet et outils collaboratifs organisent la coopération entre acteurs et services."},
      {cas:"Après un séminaire de deux jours, les équipes réception et restaurant d'un hôtel coopèrent enfin sans tensions.", q:"Quelle dimension du groupe a été renforcée ?", o:["La cohésion","Le BFR","Le processus d'achat"], c:0, why:"La cohésion soude le groupe : elle favorise coopération, implication et performance collective."},
      {cas:"Avant d'acheter un scooter, un jeune Réunionnais compare les modèles en ligne, lit les avis, puis essaie en concession avant de se décider.", q:"Qu'illustre ce parcours ?", o:["Le processus d'achat, devenu multicanal","La déontologie","La stratégie d'implantation"], c:0, why:"Du besoin à la décision, le consommateur combine canaux numériques et physiques : c'est le processus d'achat moderne."},
      {cas:"Air Austral publie des portrats de ses salariés et ses parcours de carrière pour attirer des candidats techniciens.", q:"Que développe la compagnie ?", o:["Sa marque employeur","Son coût complet","Ses flux tendus"], c:0, why:"La marque employeur construit l'attractivité de l'organisation sur le marché du travail."},
      {cas:"Pour financer son extension, la gérante d'un restaurant présente à sa banque un plan d'affaires chiffré sur trois ans.", q:"De quelle communication relève ce document ?", o:["De la communication financière (business plan)","De la communication interne","De la publicité"], c:0, why:"Le business plan répond aux besoins d'information financière des partenaires : c'est la communication financière."},
      {cas:"Une enseigne lance un jeu-concours sur les réseaux sociaux et répond en direct aux questions des internautes réunionnais.", q:"Qu'exploite-t-elle ?", o:["L'interactivité des réseaux sociaux grand public","Le bilan fonctionnel","La GPEC"], c:0, why:"Les réseaux sociaux permettent une relation interactive et continue avec clients et prospects."} ],
  3:[ {cas:"Une agence de Saint-Denis accorde deux jours de télétravail hebdomadaires : candidatures en hausse, retards liés aux embouteillages en baisse.", q:"À quelle évolution l'organisation s'adapte-t-elle ?", o:["Au nouveau rapport au travail (temps, lieu)","À la normalisation comptable","Au coût complet"], c:0, why:"Temps et lieu de travail évoluent : les organisations qui s'adaptent y gagnent en attractivité."},
      {cas:"Une grande surface réunionnaise développe un rayon « péi » en circuit court face à la demande de produits locaux.", q:"À quoi répond cette décision ?", o:["Aux nouveaux modes de consommation","À la transparence des algorithmes","Au financement participatif"], c:0, why:"Consommation responsable et locale : les modes de consommation s'imposent aux organisations."},
      {cas:"Une PME du Port subit une tentative de piratage : elle chiffre ses données, forme ses équipes et limite les accès.", q:"Quelle responsabilité exerce-t-elle ?", o:["La protection des données personnelles et stratégiques","Le mécénat","La gestion des flux poussés"], c:0, why:"Sécuriser les données des clients ET les données stratégiques de l'entreprise est une responsabilité numérique majeure."},
      {cas:"Une plateforme de recrutement est critiquée : son algorithme écarte des candidatures sans que personne ne sache pourquoi.", q:"Quel principe est en cause ?", o:["La transparence des algorithmes","Le crédit-bail","La saisonnalité"], c:0, why:"Quand un algorithme décide, l'organisation doit pouvoir expliquer ses critères."},
      {cas:"Une banque réunionnaise finance la restauration d'un sentier du littoral, sans aucune contrepartie commerciale.", q:"Comment qualifier cette action ?", o:["Du mécénat (organisation civique)","Du sponsoring commercial","Une étude de marché"], c:0, why:"Soutien à l'intérêt général sans contrepartie directe : c'est le mécénat."},
      {cas:"Une commune de l'île soumet une partie de son budget au vote des habitants, qui choisissent les projets prioritaires.", q:"Quelle pratique reconnaît-on ?", o:["La démocratie participative","La veille commerciale","Le freemium"], c:0, why:"Associer les citoyens aux décisions publiques relève de la démocratie participative."} ]
