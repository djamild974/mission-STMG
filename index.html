<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
/* Données : si l'éditeur prof a enregistré des modifications locales, elles priment (aperçu). */
const OV_KEY="mm_data_overrides_v1";
function loadData(){ try{ const o=localStorage.getItem(OV_KEY); if(o) return JSON.parse(o); }catch(e){} return window.GAME_DATA; }
const D = loadData();

/* ====== Catalogue des 7 jeux (Bloom croissant) ====== */
const GAMES = [
  { id:"trieur",  nom:"Le Trieur",        icon:"🗂️", bloom:"Reconnaître",  diff:"Facile",   desc:"Classe les éléments dans les bonnes catégories.", color:"#0ea5e9" },

  { id:"flash",   nom:"Flash Quiz",       icon:"⚡", bloom:"Comprendre",   diff:"Moyen",    desc:"QCM contre la montre, avec combos.",              color:"#ef4444" },
  { id:"vraifaux",nom:"Vrai ou Faux",     icon:"⚖️", bloom:"Comprendre",   diff:"Facile",   desc:"Tranche vite : vrai ou faux ?",                   color:"#8b5cf6" },
  { id:"intrus",  nom:"L'Intrus",         icon:"🔎", bloom:"Analyser",     diff:"Difficile",desc:"Trouve l'élément qui ne va pas avec les autres.",  color:"#14b8a6" },
  { id:"cas",     nom:"Cas d'entreprise", icon:"📂", bloom:"Appliquer",    diff:"Moyen",    desc:"Étudie un cas réunionnais et décide.",            color:"#2563eb" },
  { id:"mission", nom:"Mission Dirigeant",icon:"👑", bloom:"Décider",      diff:"Difficile",desc:"Dirige une entreprise, vis les conséquences.",    color:"#db2777" }
];
const DIFF_COLOR = { "Facile":"#16a34a", "Moyen":"#f59e0b", "Difficile":"#dc2626" };
const THEMES = [
  { n:1, nom:"À la rencontre des organisations", short:"Les organisations", color:"#0ea5e9" },
  { n:2, nom:"Du diagnostic aux objectifs",      short:"Le diagnostic",     color:"#8b5cf6" },
  { n:3, nom:"Les choix stratégiques",           short:"La stratégie",      color:"#db2777" }
];
const DEFAULT_TEACHER_CODE = "PROF2024";
const PASS = 60; // % de réussite pour valider

/* ====== Mot de passe professeur (modifiable, stocké sur l'appareil) ====== */
const PW_KEY = "pdg_teacher_pw_v1";
function getTeacherPw(){ try{ return localStorage.getItem(PW_KEY) || DEFAULT_TEACHER_CODE; }catch(e){ return DEFAULT_TEACHER_CODE; } }
function setTeacherPw(pw){ try{ localStorage.setItem(PW_KEY, pw); }catch(e){} }

/* ====== Stockage local (localStorage) ====== */
const LS_KEY = "pdg_scores_v1";
function loadScores(){
  try{ const raw = localStorage.getItem(LS_KEY); const arr = raw ? JSON.parse(raw) : [];
    let changed=false;
    arr.forEach((r,i)=>{ if(!r.id){ r.id = "e"+i+"_"+(r.date||"")+"_"+Math.random().toString(36).slice(2,7); changed=true; } });
    if(changed){ try{ localStorage.setItem(LS_KEY, JSON.stringify(arr)); }catch(e){} }
    return arr; }
  catch(e){ return []; }
}
function saveScore(rec){
  try{ const all = loadScores(); rec.id = "e_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
    all.push(rec); localStorage.setItem(LS_KEY, JSON.stringify(all)); }
  catch(e){}
}
function clearScores(){ try{ localStorage.removeItem(LS_KEY); }catch(e){} }
function deleteScores(ids){
  try{ const set=new Set(ids); const all=loadScores().filter(r=>!set.has(r.id));
    localStorage.setItem(LS_KEY, JSON.stringify(all)); }catch(e){}
}
function exportScoresCSV(){
  const all = loadScores();
  if(!all.length){ alert("Aucun résultat à exporter."); return; }
  const head = ["Nom","Prenom","Pseudo","Classe","Theme","Jeu","Score(%)","Date"];
  const lines = all.map(r=>[r.nom,r.prenom,r.pseudo,r.classe,r.theme,r.game,r.pct,r.date].map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(";"));
  const csv = "\uFEFF"+head.join(";")+"\n"+lines.join("\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="resultats_pdg_en_mission.csv"; a.click(); URL.revokeObjectURL(url);
}

/* ====== Média de question (image / audio / vidéo / YouTube) ======
   Ajouter à n'importe quelle question :  media:{type:"image", src:"media/photo.jpg", legende:"..."}
   Types : "image" | "audio" | "video" | "youtube" (avec id:"CODE_VIDEO") */
function Media({m}){
  if(!m) return null;
  return (<div className="qmedia">
    {m.type==="image"&&<img src={m.src} alt={m.legende||"illustration"}/>}
    {m.type==="audio"&&<audio controls src={m.src}></audio>}
    {m.type==="video"&&<video controls src={m.src}></video>}
    {m.type==="youtube"&&<iframe src={"https://www.youtube.com/embed/"+m.id} title="vidéo" allowFullScreen></iframe>}
    {m.legende&&<div className="mleg">{m.legende}</div>}
  </div>);
}

function Magic({n}){

    {o&&(<div className="mbox"><div className="mlab">💡 En version simple</div><p>{n.simple}</p><div className="mex">🟢 Exemple : {n.ex}</div></div>)}
  </div>);
}

/* ====== LOGIN ====== */
function Login({onStudent,onTeacher}){
  const [m,setM]=useState("eleve");
  const [f,setF]=useState({nom:"",prenom:"",pseudo:"",classe:""});

  const up=(k,v)=>setF(s=>({...s,[k]:v}));
  const go=()=>{ if(m==="eleve"){ if(!f.nom||!f.prenom||!f.classe){setErr("Indique nom, prénom et classe.");return;} onStudent({...f,pseudo:f.pseudo||f.prenom}); }
    else { code.trim()===getTeacherPw() ? onTeacher() : setErr("Code professeur incorrect."); } };
  return (<div className="login">
    <div className="hero">
      <div className="kick">JEU SÉRIEUX · MANAGEMENT 1ʳᵉ STMG · 974</div>
      <h1>MISSION <span className="grad">MANAGEMENT</span></h1>
      <p className="sub">7 jeux, 3 thèmes, pour réviser le programme de l'année de 1ère. Deviens stratège, comprends les enjeux, prends les bonnes décisions et mesure l'impact sur ton organisation. Des organisations aux grandes décisions.</p>
    </div>
    <div className="card">
      <div className="tabs">
        <button className={m==="eleve"?"tab on":"tab"} onClick={()=>{setM("eleve");setErr("")}}>👤 Élève</button>
        <button className={m==="prof"?"tab on":"tab"} onClick={()=>{setM("prof");setErr("")}}>👩‍🏫 Professeur</button>
      </div>
      {m==="eleve"?(<div className="form">
        <div className="r2"><input placeholder="Nom" value={f.nom} onChange={e=>up("nom",e.target.value)}/><input placeholder="Prénom" value={f.prenom} onChange={e=>up("prenom",e.target.value)}/></div>
        <input placeholder="Pseudonyme (facultatif)" value={f.pseudo} onChange={e=>up("pseudo",e.target.value)}/>
        <input placeholder="Classe (ex : 1STMG2)" value={f.classe} onChange={e=>up("classe",e.target.value)}/>
      </div>):(<div className="form"><input type="password" placeholder="Code professeur" value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/><div className="hint">Accès réservé à l'enseignant.</div></div>)}
      {err&&<div className="err">{err}</div>}
      <button className="cta" onClick={go}>{m==="eleve"?"C'est parti ! 🚀":"Tableau de bord"}</button>
    </div>
    <div className="fnote">Programme officiel — BO spécial n°1 du 22/01/2019 · Info : des entreprises réunionnaises réelles seront citées à titre d'exemple.<br/>Djamil DINDAR, Lycée Ambroise Vollard, Juin 2026</div>
  </div>);
}

/* ====== HUB ÉLÈVE ====== */
function Hub({student,onLogout}){
  const [tab,setTab]=useState("jouer");
  const [theme,setTheme]=useState(1);
  const [progress,setProgress]=useState({}); // {"theme-game": bestPct}
  const [playing,setPlaying]=useState(null);

  const key=(t,g)=>t+"-"+g;
  const best=(t,g)=>progress[key(t,g)]||0;
  // Accès libre : tous les jeux d'un thème débloqué sont accessibles dans n'importe quel ordre.
  const unlocked=(t,gi)=> true;
  // thème débloqué si thème précédent a au moins 4 jeux validés
  const themeValidated=(t)=>GAMES.filter(g=>best(t,g.id)>=PASS).length;
  const themeUnlocked=(t)=> t===1 ? true : themeValidated(t-1)>=4;

  const finish=(t,g,pct)=>{
    setProgress(p=>({...p,[key(t,g)]:Math.max(p[key(t,g)]||0,pct)}));
    saveScore({...student,theme:t,game:g,pct,date:new Date().toISOString()});
    setPlaying(null);
  };

  if(playing) return <Stage student={student} theme={playing.theme} game={playing.game}
    onDone={(pct)=>finish(playing.theme,playing.game,pct)} onQuit={()=>setPlaying(null)} />;

  return (<div className="app">
    <header className="top">
      <div className="brand">🎯 Mission Management</div>
      <div className="who">{student.pseudo} · <span className="cl">{student.classe}</span></div>
      <button className="lo" onClick={onLogout}>Quitter</button>
    </header>
    <nav className="nav">
      <button className={tab==="jouer"?"nb on":"nb"} onClick={()=>setTab("jouer")}>🎮 Jouer</button>
      <button className={tab==="cours"?"nb on":"nb"} onClick={()=>setTab("cours")}>📘 Cours</button>
      <button className={tab==="prog"?"nb on":"nb"} onClick={()=>setTab("prog")}>📋 Programme</button>
      <button className={tab==="lex"?"nb on":"nb"} onClick={()=>setTab("lex")}>📖 Glossaire</button>
    </nav>
    <main className="main">
      {tab==="jouer"&&(<>
        <div className="theme-pick">
          {THEMES.map(t=>{ const ok=themeUnlocked(t.n);
            return <button key={t.n} disabled={!ok} className={"tpill"+(theme===t.n?" on":"")+(ok?"":" lock")} style={{"--c":t.color}} onClick={()=>ok&&setTheme(t.n)}>
              {ok?"":"🔒 "}<b>Thème {t.n}</b><span>{t.short}</span></button>; })}
        </div>
        {!themeUnlocked(theme) ? <div className="locked-msg">🔒 Valide au moins 4 jeux du thème précédent pour débloquer ce thème.</div> :
        <>
        <div className="contract">📜 <b>Contrat de confiance</b> — Aucun piège : tout est dans le Cours et le Glossaire. Droit à l'erreur, chaque réponse s'explique. Tous les jeux du thème sont accessibles librement, dans l'ordre que tu veux. Valide 4 jeux (≥ {PASS}%) pour ouvrir le thème suivant.</div>
        <div className="games">
          {GAMES.map((g,gi)=>{ const ok=unlocked(theme,gi); const b=best(theme,g.id);
            return (<div key={g.id} className={"gcard"+(ok?"":" lock")} style={{"--c":g.color}}>
              <div className="gicon">{ok?g.icon:"🔒"}</div>
              <div className="gtags">

/* ====== STAGE : routeur de jeux ====== */
function Stage({student,theme,game,onDone,onQuit}){
  const meta=GAMES.find(g=>g.id===game);
  const head=<Ghead title={meta.nom+" — Thème "+theme} sub={meta.bloom} onQuit={onQuit}/>;
  if(game==="trieur")  return <Trieur theme={theme} head={head} onDone={onDone}/>;
  if(game==="memory")  return <Memory theme={theme} head={head} onDone={onDone}/>;
  if(game==="flash")   return <Flash theme={theme} head={head} onDone={onDone}/>;
  if(game==="vraifaux")return <VraiFaux theme={theme} head={head} onDone={onDone}/>;
  if(game==="intrus")  return <Intrus theme={theme} head={head} onDone={onDone}/>;
  if(game==="cas")     return <Cas theme={theme} head={head} onDone={onDone}/>;

function Ghead({title,sub,onQuit}){

function Result({score,total,onDone,extra}){

/* ====== JEU 1 : TRIEUR ====== */
function Trieur({theme,head,onDone}){
  const cfg=D.trieur[theme];
  const [items]=useState(()=>[...cfg.items].map((it,i)=>({...it,_i:i})).sort(()=>Math.random()-0.5));
  const [sel,setSel]=useState(null);
  const [placed,setPlaced]=useState({}); // _i -> bac
  const [score,setScore]=useState(0); const [err,setErr]=useState(0); const [done,setDone]=useState(false);
  const remaining=items.filter(it=>placed[it._i]===undefined);

  const drop=(bac)=>{ if(sel===null) return; const it=items.find(x=>x._i===sel);
    const good=it.cat===bac;
    setPlaced(p=>({...p,[sel]:bac})); good?setScore(s=>s+1):setErr(e=>e+1); setSel(null);
    if(items.filter(x=>placed[x._i]===undefined && x._i!==sel).length===0) setTimeout(()=>setDone(true),250);
  };
  return (<div className="game">{head}
    <p className="help">{cfg.consigne} <span className="muted">Clique un élément, puis sa catégorie.</span></p>
    <div className="tray">{remaining.map(it=>(
      <button key={it._i} className={"tkn"+(sel===it._i?" sel":"")} onClick={()=>setSel(it._i)}>{it.label}</button>))}
      {remaining.length===0&&<span className="muted">Tous les éléments sont classés ✅</span>}</div>
    <div className="bacs">{cfg.bacs.map((b,bi)=>(
      <div key={bi} className="bac" onClick={()=>drop(bi)}>
        <div className="bac-h">{b}</div>
        <div className="bac-body">{items.filter(it=>placed[it._i]===bi).map(it=>(
          <span key={it._i} className={"chip2 "+(it.cat===bi?"ok":"no")}>{it.cat===bi?"✓":"✗"} {it.label}</span>))}</div>
      </div>))}</div>
    {done&&<Result score={score} total={items.length} onDone={onDone}/>}
  </div>);
}

/* ====== JEU 2 : MEMORY ====== */
function Memory({theme,head,onDone}){
  const pairs=D.memory[theme];
  const [cards]=useState(()=>{ let id=0; const arr=[];
    pairs.forEach((p,pi)=>{ arr.push({id:id++,pair:pi,txt:p.a}); arr.push({id:id++,pair:pi,txt:p.b}); });
    return arr.sort(()=>Math.random()-0.5); });
  const [flipped,setFlipped]=useState([]); const [matched,setMatched]=useState([]);
  const [tries,setTries]=useState(0); const [lock,setLock]=useState(false);
  const click=(c)=>{ if(lock||flipped.includes(c.id)||matched.includes(c.pair)) return;
    const nf=[...flipped,c.id]; setFlipped(nf);
    if(nf.length===2){ setLock(true); setTries(t=>t+1);
      const [a,b]=nf.map(id=>cards.find(x=>x.id===id));
      if(a.pair===b.pair){ setTimeout(()=>{setMatched(m=>[...m,a.pair]);setFlipped([]);setLock(false);},450); }
      else setTimeout(()=>{setFlipped([]);setLock(false);},800);
    } };
  const done=matched.length===pairs.length;
  return (<div className="game">{head}
    <p className="help">Retrouve les paires. Essais : <b>{tries}</b> <span className="muted">— pas de note ici, l'important c'est de tout retrouver !</span></p>
    <div className="mem-grid">{cards.map(c=>{ const show=flipped.includes(c.id)||matched.includes(c.pair);
      return <button key={c.id} className={"mcard"+(show?" up":"")+(matched.includes(c.pair)?" done":"")} onClick={()=>click(c)}>
        <span className="mc-front">?</span><span className="mc-back">{c.txt}</span></button>; })}</div>
    {done&&(<div className="res"><div className="medal">🎉</div><h2>Bravo !</h2>
      <p>Toutes les paires sont retrouvées. Le jeu suivant est débloqué.</p>
      <p className="muted">Terminé en {tries} essais — ici, peu importe le nombre d'erreurs : l'essentiel est d'avoir tout associé.</p>
      <button className="cta sm" onClick={()=>onDone(100)}>Continuer</button></div>)}
  </div>);
}

/* ====== JEU 3 : FLASH QUIZ (chrono + combo) ====== */
function Flash({theme,head,onDone}){
  const qs=D.flash[theme];
  const [i,setI]=useState(0); const [score,setScore]=useState(0); const [combo,setCombo]=useState(0);
  const [t,setT]=useState(10); const [picked,setPicked]=useState(null); const [done,setDone]=useState(false);
  const q=qs[i];
  useEffect(()=>{ if(done||picked!==null) return; if(t<=0){ choose(-1); return; }
    const id=setTimeout(()=>setT(x=>x-1),1000); return ()=>clearTimeout(id); },[t,picked,done]);
  const choose=(idx)=>{ if(picked!==null) return; setPicked(idx);
    const good=idx===q.c; if(good){ setScore(s=>s+1); setCombo(c=>c+1);} else setCombo(0);
    setTimeout(()=>{ if(i+1>=qs.length){setDone(true);} else {setI(i+1);setPicked(null);setT(10);} },700); };
  if(done) return <div className="game">{head}<Result score={score} total={qs.length} onDone={onDone}/></div>;
  return (<div className="game">{head}
    <div className="flash-bar"><div className="combo">🔥 Combo ×{combo}</div>
      <div className="timer"><div className="tfill" style={{width:(t/10*100)+"%",background:t<=3?"#ef4444":"#f59e0b"}}/></div>
      <div className="qn">{i+1}/{qs.length}</div></div>
    <div className="flash-q">{q.q}</div>
    <Media m={q.media}/>
    <div className="opts">{q.o.map((o,idx)=>{ let c="opt";
      if(picked!==null){ if(idx===q.c)c+=" right"; else if(idx===picked)c+=" bad"; }
      return <button key={idx} className={c} onClick={()=>choose(idx)}>{o}</button>; })}</div>
  </div>);
}

/* ====== JEU 7 : MISSION DIRIGEANT (simulation) ====== */
function Mission({theme,head,onDone}){
  const sim=D.mission[theme];
  const [etapes,setEtapes]=useState(()=>[...sim.etapes]);
  const [step,setStep]=useState(0);
  const [stats,setStats]=useState({treso:50,marche:50,image:50,emploi:50});
  const [fb,setFb]=useState(null); const [done,setDone]=useState(false);
  const extras=(D.missionExtra&&D.missionExtra[theme])||[];
  const [ext,setExt]=useState(false);
  const extend=()=>{ const start=etapes.length; setEtapes(es=>[...es,...extras].slice(0,10)); setExt(true); setDone(false); setStep(start); setFb(null); };
  const clamp=v=>Math.max(0,Math.min(100,v));
  const decide=(ch)=>{ if(fb) return;
    setStats(s=>({treso:clamp(s.treso+ch.eff.treso),marche:clamp(s.marche+ch.eff.marche),image:clamp(s.image+ch.eff.image),emploi:clamp(s.emploi+ch.eff.emploi)}));
    setFb(ch.fb); };
  const next=()=>{ setFb(null); if(step+1>=etapes.length) setDone(true); else setStep(step+1); };
  const total=Math.round((stats.treso+stats.marche+stats.image+stats.emploi)/4);
  const gauges=[["💰 Trésorerie","treso","#16a34a"],["📈 Part de marché","marche","#2563eb"],["🌟 Image","image","#f59e0b"],["👥 Emplois","emploi","#db2777"]];
  if(done){
    const verdict= total>=70?"Entreprise florissante ! Tes choix stratégiques ont porté leurs fruits 🏆"
      : total>=50?"Entreprise stable. Des décisions correctes, à affiner. 👍" : "Entreprise fragilisée. Reprends le cours et retente tes choix. 💪";
    return (<div className="game">{head}
      <div className="res"><div className="medal">{total>=70?"🏆":total>=50?"📊":"💪"}</div>
        <h2>Bilan : {total}/100</h2>
        <div className="gauges">{gauges.map(([lab,k,c])=>(<div key={k} className="gauge"><span>{lab}</span><div className="gbar"><div className="gfill" style={{width:stats[k]+"%",background:c}}/></div><b>{stats[k]}</b></div>))}</div>
        <p>{verdict}</p>
        {(!ext&&extras.length>0)&&(<button className="more" onClick={extend}>➕ Décisions supplémentaires (jusqu'à 10)</button>)}
        <button className="cta sm" onClick={()=>onDone(total)}>Continuer</button></div>
    </div>);
  }
  const e=etapes[step];
  return (<div className="game">{head}
    <div className="mission-top"><div className="mtitle">👑 {sim.titre}</div>
      <div className="mgauges">{gauges.map(([lab,k,c])=>(<div key={k} className="mg"><span>{lab.split(" ")[0]}</span><div className="mbar"><div className="mfill" style={{width:stats[k]+"%",background:c}}/></div></div>))}</div></div>
    {step===0&&!fb&&<p className="mintro">{sim.intro}</p>}
    <div className="scene"><div className="stag">Décision {step+1}/{etapes.length}</div><Media m={e.media}/><p>{e.scene}</p></div>
    {!fb?(<div className="opts">{e.choix.map((ch,idx)=>(<button key={idx} className="opt big" onClick={()=>decide(ch)}>{ch.txt}</button>))}</div>)
      :(<div className="fb good"><strong>Conséquences</strong><p>{fb}</p><button className="next" onClick={next}>{step+1>=etapes.length?"Voir le bilan":"Décision suivante →"}</button></div>)}
  </div>);
}

async function publishHTML(data){
  let src=null;
  try{ const r=await fetch(window.location.href); src=await r.text(); }catch(e){}
  if(!src||src.indexOf("/*__DATA_START__*/")<0){
    alert("Impossible de générer le fichier depuis cette page. Ouvre la version EN LIGNE du site (lien GitHub Pages), pas un fichier local, puis réessaie."); return;
  }
  const a0=src.indexOf("/*__DATA_START__*/"), a1=src.indexOf("/*__DATA_END__*/");
  const out=src.slice(0,a0)+"/*__DATA_START__*/\nwindow.GAME_DATA = "+JSON.stringify(data,null,1)+";\n/*__DATA_END__*/"+src.slice(a1+16);
  const blob=new Blob([out],{type:"text/html;charset=utf-8"});
  const u=URL.createObjectURL(blob); const el=document.createElement("a");
  el.href=u; el.download="index.html"; el.click(); URL.revokeObjectURL(u);
}

  };
  const list=ensure(JSON.parse(JSON.stringify(data)));
  const type= bank==="trieur"?"trieur": bank==="memory"?"memory": bank==="flash"?"flash": bank==="vraifaux"?"vraifaux": bank.indexOf("intrus")===0?"intrus": bank.indexOf("cas")===0?"cas":"mission";
  const fam= type==="intrus"?"intrus": type==="cas"?"cas": type==="mission"?"mission":null;
  const totalFam=()=>{ if(!fam) return 0;
    const b= fam==="mission"? data.mission[theme].etapes.length : data[fam][theme].length;
    const x= ((data[fam+"Extra"]&&data[fam+"Extra"][theme])||[]).length; return b+x; };
  const canAdd= !fam || totalFam()<10;
  const setItem=(i,patch)=>upd(n=>{ Object.assign(ensure(n)[i],patch); });
  const del=(i)=>{ if(confirm("Supprimer cet élément ?")) upd(n=>{ ensure(n).splice(i,1); }); };
  const newItem=()=>{
    if(bank==="trieur") return {label:"Nouvel élément",cat:0};
    if(bank==="memory") return {a:"Notion",b:"Exemple associé"};
    if(bank==="flash") return {q:"Nouvelle question ?",o:["Réponse A","Réponse B"],c:0};
    if(bank==="vraifaux") return {p:"Nouvelle affirmation.",v:true,why:"Explication."};
    if(type==="intrus") return {liste:["Élément A","Élément B","Élément C","Intrus"],intrus:3,why:"Explication."};
    if(type==="cas") return {cas:"Décris la situation…",q:"Quelle est la bonne réponse ?",o:["Réponse A","Réponse B","Réponse C"],c:0,why:"Explication."};
    return {scene:"Nouvelle situation…",choix:[{txt:"Choix 1",eff:{treso:0,marche:0,image:0,emploi:0},fb:"Conséquence du choix 1."},{txt:"Choix 2",eff:{treso:0,marche:0,image:0,emploi:0},fb:"Conséquence du choix 2."}]};
  };
  const add=()=>upd(n=>{ ensure(n).push(newItem()); });
  const save=()=>{ try{ localStorage.setItem(OV_KEY,JSON.stringify(data)); setMsg("✅ Enregistré sur cet appareil. Recharge la page pour tester en jeu. Pour que les ÉLÈVES voient les changements : clique « Publier » puis dépose le fichier sur GitHub."); }catch(e){ setMsg("Erreur d'enregistrement."); } };
  const reset=()=>{ if(confirm("Abandonner les modifications locales et revenir aux questions publiées ?")){ try{localStorage.removeItem(OV_KEY);}catch(e){} window.location.reload(); } };

  const renderItem=(it,i)=>{
    if(type==="trieur") return (<div className="edopt" key={i}>
      <input value={it.label} onChange={e=>setItem(i,{label:e.target.value})}/>
      <select value={it.cat} onChange={e=>setItem(i,{cat:+e.target.value})}>
        {data.trieur[theme].bacs.map((b,bi)=><option key={bi} value={bi}>{b}</option>)}
      </select>
      <button className="edx" onClick={()=>del(i)}>✕</button>
    </div>);
    if(type==="memory") return (<div className="edopt" key={i}>
      <input value={it.a} onChange={e=>setItem(i,{a:e.target.value})} placeholder="Notion"/>
      <input value={it.b} onChange={e=>setItem(i,{b:e.target.value})} placeholder="Exemple associé"/>
      <button className="edx" onClick={()=>del(i)}>✕</button>
    </div>);
    if(type==="flash"||type==="cas") return (<div className="edcard" key={i}>
      <div className="edhead"><b>{type==="cas"?"Cas":"Question"} {i+1}</b><button className="edx" onClick={()=>del(i)}>🗑 Supprimer</button></div>
      {type==="cas"&&(<><label className="edlab">Situation</label>
      <textarea value={it.cas} onChange={e=>setItem(i,{cas:e.target.value})}/></>)}
      <label className="edlab">Question</label>
      <textarea value={it.q} onChange={e=>setItem(i,{q:e.target.value})}/>
      <label className="edlab">Réponses — coche la bonne</label>
      {it.o.map((o,oi)=>(<div className="edopt" key={oi}>
        <input type="radio" checked={it.c===oi} onChange={()=>setItem(i,{c:oi})}/>
        <input value={o} onChange={e=>upd(n=>{ensure(n)[i].o[oi]=e.target.value;})}/>
        {it.o.length>2&&<button className="edx" onClick={()=>upd(n=>{const q=ensure(n)[i]; q.o.splice(oi,1); if(q.c>=q.o.length)q.c=0;})}>✕</button>}
      </div>))}
      <button className="edadd2" onClick={()=>upd(n=>{ensure(n)[i].o.push("Nouvelle réponse");})}>+ ajouter une réponse</button>
      {type==="cas"&&(<><label className="edlab">Explication (feedback)</label>
      <textarea value={it.why} onChange={e=>setItem(i,{why:e.target.value})}/></>)}
      <MediaEd m={it.media} on={m=>setItem(i,{media:m})}/>
    </div>);
    if(type==="vraifaux") return (<div className="edcard" key={i}>
      <div className="edhead"><b>Affirmation {i+1}</b><button className="edx" onClick={()=>del(i)}>🗑 Supprimer</button></div>
      <textarea value={it.p} onChange={e=>setItem(i,{p:e.target.value})}/>
      <div className="edvf">
        <label><input type="radio" checked={it.v===true} onChange={()=>setItem(i,{v:true})}/> VRAI</label>
        <label><input type="radio" checked={it.v===false} onChange={()=>setItem(i,{v:false})}/> FAUX</label>
      </div>
      <label className="edlab">Explication</label>
      <textarea value={it.why} onChange={e=>setItem(i,{why:e.target.value})}/>
      <MediaEd m={it.media} on={m=>setItem(i,{media:m})}/>
    </div>);
    if(type==="intrus") return (<div className="edcard" key={i}>
      <div className="edhead"><b>Série {i+1}</b><button className="edx" onClick={()=>del(i)}>🗑 Supprimer</button></div>
      <label className="edlab">Éléments — coche l'intrus</label>
      {it.liste.map((el,li)=>(<div className="edopt" key={li}>
        <input type="radio" checked={it.intrus===li} onChange={()=>setItem(i,{intrus:li})}/>
        <input value={el} onChange={e=>upd(n=>{ensure(n)[i].liste[li]=e.target.value;})}/>
      </div>))}
      <label className="edlab">Explication</label>
      <textarea value={it.why} onChange={e=>setItem(i,{why:e.target.value})}/>
      <MediaEd m={it.media} on={m=>setItem(i,{media:m})}/>
    </div>);
    return (<div className="edcard" key={i}>
      <div className="edhead"><b>Décision {i+1}</b><button className="edx" onClick={()=>del(i)}>🗑 Supprimer</button></div>
      <label className="edlab">Situation</label>
      <textarea value={it.scene} onChange={e=>setItem(i,{scene:e.target.value})}/>
      {it.choix.map((ch,ci)=>(<div className="edchoice" key={ci}>
        <label className="edlab">Choix {ci+1}</label>
        <input value={ch.txt} onChange={e=>upd(n=>{ensure(n)[i].choix[ci].txt=e.target.value;})}/>
        <label className="edlab">Conséquence affichée</label>
        <textarea value={ch.fb} onChange={e=>upd(n=>{ensure(n)[i].choix[ci].fb=e.target.value;})}/>
        <label className="edlab">Effets sur les jauges (de -30 à +30)</label>
        <div className="edeff">
          {[["treso","💰 Trésorerie"],["marche","📈 Marché"],["image","🌟 Image"],["emploi","👥 Emplois"]].map(([k,lab])=>(<div key={k}><label>{lab}</label>
            <input type="number" min="-30" max="30" value={ch.eff[k]} onChange={e=>upd(n=>{ensure(n)[i].choix[ci].eff[k]=+e.target.value||0;})}/></div>))}
        </div>
      </div>))}
      <MediaEd m={it.media} on={m=>setItem(i,{media:m})}/>
    </div>);
  };

  return (<div className="ed">
    <div className="edbar">
      <select value={theme} onChange={e=>setTheme(+e.target.value)}>
        <option value={1}>Thème 1 — Organisations</option><option value={2}>Thème 2 — Diagnostic</option><option value={3}>Thème 3 — Stratégie</option>
      </select>
      <select value={bank} onChange={e=>setBank(e.target.value)}>
        <option value="trieur">🗂️ Le Trieur</option><option value="memory">🃏 Memory</option>
        <option value="flash">⚡ Flash Quiz</option><option value="vraifaux">⚖️ Vrai ou Faux</option>
        <option value="intrus">🔎 L'Intrus — base</option><option value="intrusExtra">🔎 L'Intrus — supplémentaires</option>
        <option value="cas">📂 Cas — base</option><option value="casExtra">📂 Cas — supplémentaires</option>
        <option value="mission">👑 Mission — base</option><option value="missionExtra">👑 Mission — supplémentaires</option>
      </select>
      <button className="rf alt nb-l" onClick={save}>💾 Enregistrer (aperçu)</button>
      <button className="rf nb-l" onClick={()=>publishHTML(data)}>⬇ Publier : télécharger index.html</button>
      <button className="rf danger nb-l" onClick={reset}>↩ Revenir aux questions publiées</button>
    </div>
    <p className="edhint">1️⃣ Modifie les questions ci-dessous · 2️⃣ « Enregistrer » pour tester sur CET appareil (recharge la page) · 3️⃣ « Publier » télécharge un <b>index.html</b> à déposer sur GitHub (Add file → Upload → Commit) pour que les élèves voient tes changements.{hasOv&&<b> ⚠️ Des modifications locales non publiées sont actives sur cet appareil.</b>}</p>
    {msg&&<div className="edmsg">{msg}</div>}
    {fam&&<div className="edcount">Limite : {totalFam()}/10 (base + supplémentaires confondues, thème {theme})</div>}
    {bank==="trieur"&&(<div className="edcard">
      <label className="edlab">Consigne</label>
      <textarea value={data.trieur[theme].consigne} onChange={e=>upd(n=>{n.trieur[theme].consigne=e.target.value;})}/>
      <label className="edlab">Catégories (bacs)</label>
      {data.trieur[theme].bacs.map((b,bi)=>(<div className="edopt" key={bi}>
        <input value={b} onChange={e=>upd(n=>{n.trieur[theme].bacs[bi]=e.target.value;})}/>
      </div>))}
    </div>)}
    {bank==="mission"&&(<div className="edcard">
      <label className="edlab">Titre de la mission</label>
      <input value={data.mission[theme].titre} onChange={e=>upd(n=>{n.mission[theme].titre=e.target.value;})}/>
      <label className="edlab">Introduction</label>
      <textarea value={data.mission[theme].intro} onChange={e=>upd(n=>{n.mission[theme].intro=e.target.value;})}/>
    </div>)}
    {list.map((it,i)=>renderItem(it,i))}
    <button className="edadd" disabled={!canAdd} onClick={add}>{canAdd?"➕ Ajouter un élément":"Limite de 10 atteinte (base + supplémentaires)"}</button>
  </div>);
}

/* ====== TABLEAU DE BORD PROF ====== */
function Teacher({onLogout}){
  const [scores,setScores]=useState(null);
  const [fc,setFc]=useState("Toutes"); const [view,setView]=useState("eleves");
  const [sel,setSel]=useState({}); // id -> true
  const [pwOpen,setPwOpen]=useState(false);
  const [pw1,setPw1]=useState(""); const [pw2,setPw2]=useState(""); const [pwMsg,setPwMsg]=useState("");
  const refresh=()=>{ setScores(loadScores()); setSel({}); };
  useEffect(()=>{refresh();},[]);
  if(scores===null) return <div className="loading">Chargement des résultats…</div>;
  const classes=["Toutes",...Array.from(new Set(scores.map(s=>s.classe)))];
  const fl= fc==="Toutes"?scores:scores.filter(s=>s.classe===fc);

  const selIds=Object.keys(sel).filter(id=>sel[id]);
  const toggle=(id)=>setSel(s=>({...s,[id]:!s[id]}));
  const toggleAll=(rows)=>{ const allSel=rows.every(r=>sel[r.id]); const n={...sel}; rows.forEach(r=>n[r.id]=!allSel); setSel(n); };
  const delSel=()=>{ if(!selIds.length) return; if(confirm("Supprimer "+selIds.length+" entrée(s) sélectionnée(s) ?")){ deleteScores(selIds); refresh(); } };
  const changePw=()=>{ if(pw1.length<4){setPwMsg("4 caractères minimum.");return;} if(pw1!==pw2){setPwMsg("Les deux saisies diffèrent.");return;}
    setTeacherPw(pw1); setPwMsg("✅ Mot de passe modifié sur cet appareil."); setPw1("");setPw2(""); setTimeout(()=>{setPwOpen(false);setPwMsg("");},1400); };

  // par élève : meilleur pct par (theme,game)
  const byS={};
  fl.forEach(s=>{ const k=s.classe+"|"+s.pseudo;
    if(!byS[k]) byS[k]={nom:s.nom,prenom:s.prenom,pseudo:s.pseudo,classe:s.classe,cells:{},parties:0};
    const ck=s.theme+"-"+s.game; byS[k].cells[ck]=Math.max(byS[k].cells[ck]||0,s.pct); byS[k].parties++; });
  const students=Object.values(byS).map(st=>{
    const valid=Object.values(st.cells).filter(v=>v>=PASS).length;
    const vals=Object.values(st.cells); const moy=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
    const themeProg=[1,2,3].map(t=>GAMES.filter(g=>(st.cells[t+"-"+g.id]||0)>=PASS).length);
    return {...st,valid,moy,themeProg};
  }).sort((a,b)=>b.valid-a.valid||b.moy-a.moy);

  // par classe
  const byC={};
  scores.forEach(s=>{ if(!byC[s.classe]) byC[s.classe]={classe:s.classe,pcts:[],el:new Set()}; byC[s.classe].pcts.push(s.pct); byC[s.classe].el.add(s.pseudo); });
  const cstats=Object.values(byC).map(c=>({classe:c.classe,moy:Math.round(c.pcts.reduce((a,b)=>a+b,0)/c.pcts.length),nb:c.el.size,parties:c.pcts.length})).sort((a,b)=>b.moy-a.moy);

  // détail des parties (entrées individuelles, filtrées)
  const gameName=(id)=>{ const g=GAMES.find(x=>x.id===id); return g?g.nom:id; };
  const fmtDate=(d)=>{ try{ return new Date(d).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } };
  const detail=[...fl].sort((a,b)=> (b.date||"").localeCompare(a.date||""));

  return (<div className="app">
    <header className="top prof"><div className="brand">👩‍🏫 Espace Professeur</div><button className="lo" onClick={onLogout}>Déconnexion</button></header>
    <div className="ptool">
      <div className="seg"><button className={view==="eleves"?"on":""} onClick={()=>setView("eleves")}>👤 Élèves</button>
        <button className={view==="themes"?"on":""} onClick={()=>setView("themes")}>📚 Par thème</button>
        <button className={view==="classes"?"on":""} onClick={()=>setView("classes")}>🏫 Classes</button>
        <button className={view==="detail"?"on":""} onClick={()=>setView("detail")}>📝 Détail</button>
        <button className={view==="editor"?"on":""} onClick={()=>setView("editor")}>✏️ Éditeur</button></div>
      <select value={fc} onChange={e=>setFc(e.target.value)}>{classes.map(c=><option key={c}>{c}</option>)}</select>
      <button className="rf" onClick={refresh}>↻ Actualiser</button>
      <button className="rf alt" onClick={exportScoresCSV}>⬇ Export Excel (CSV)</button>
      <button className="rf pw" onClick={()=>{setPwOpen(!pwOpen);setPwMsg("");}}>🔑 Mot de passe</button>
      <button className="rf danger" onClick={()=>{ if(confirm("Effacer TOUS les résultats enregistrés sur cet appareil ?")){ clearScores(); refresh(); } }}>🗑 Tout effacer</button>
    </div>
    {pwOpen&&(<div className="pwbox">
      <div className="pwt">🔑 Changer le mot de passe professeur</div>
      <p className="pwh">Il est enregistré sur cet appareil uniquement. Note-le bien : il n'est affiché nulle part.</p>
      <div className="pwrow">
        <input type="password" placeholder="Nouveau mot de passe" value={pw1} onChange={e=>setPw1(e.target.value)}/>
        <input type="password" placeholder="Confirmer" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&changePw()}/>
        <button className="rf alt" onClick={changePw}>Enregistrer</button>
      </div>
      {pwMsg&&<div className="pwmsg">{pwMsg}</div>}
    </div>)}
    {view!=="editor"&&scores.length===0&&<div className="empty">Aucun résultat pour l'instant. Les scores apparaîtront dès que les élèves auront joué.</div>}

    {view==="eleves"&&scores.length>0&&(<div className="twrap"><table className="pt">
      <thead><tr><th>#</th><th>Élève</th><th>Classe</th><th>Jeux validés</th><th>Moyenne</th><th>Progression (T1·T2·T3)</th></tr></thead>
      <tbody>{students.map((st,i)=>(<tr key={i}>
        <td className="rk">{i+1}</td><td className="nm">{st.prenom} {st.nom}<span className="ps">{st.pseudo}</span></td><td>{st.classe}</td>
        <td><b>{st.valid}</b>/21</td>
        <td><b className="moy" style={{color:st.moy>=PASS?"#16a34a":"#dc2626"}}>{st.moy}%</b></td>
        <td><div className="tp">{st.themeProg.map((v,ti)=><span key={ti} className="tpb"><i style={{width:(v/7*100)+"%",background:THEMES[ti].color}}/></span>)} <span className="tpn">{st.themeProg.join(" · ")}/7</span></div></td>
      </tr>))}</tbody></table></div>)}

    {view==="themes"&&scores.length>0&&(<div className="twrap"><table className="pt">
      <thead><tr><th>Élève</th>{[1,2,3].map(t=>GAMES.map(g=><th key={t+g.id} className="th-mini" title={"T"+t+" "+g.nom}>{g.icon}<small>T{t}</small></th>))}</tr></thead>
      <tbody>{students.map((st,i)=>(<tr key={i}><td className="nm">{st.prenom} {st.nom}</td>
        {[1,2,3].map(t=>GAMES.map(g=>{ const v=st.cells[t+"-"+g.id]; return <td key={t+g.id}><Cell v={v}/></td>; }))}</tr>))}</tbody>
    </table><div className="legend">Chaque colonne = un jeu pour un thème. Vert ≥ {PASS}%.</div></div>)}

    {view==="classes"&&scores.length>0&&(<div className="twrap"><table className="pt">
      <thead><tr><th>#</th><th>Classe</th><th>Élèves actifs</th><th>Parties</th><th>Moyenne classe</th></tr></thead>
      <tbody>{cstats.map((c,i)=>(<tr key={i}><td className="rk">{i+1}</td><td className="nm">{c.classe}</td><td>{c.nb}</td><td>{c.parties}</td>
        <td><div className="cbar"><div className="cfill" style={{width:c.moy+"%",background:c.moy>=PASS?"#16a34a":"#f59e0b"}}/></div><span className="cval">{c.moy}%</span></td></tr>))}</tbody>
    </table></div>)}

    {view==="detail"&&scores.length>0&&(<>
      <div className="selbar">
        <span>{selIds.length} entrée(s) sélectionnée(s)</span>
        <button className="rf danger nb-l" disabled={!selIds.length} onClick={delSel}>🗑 Supprimer la sélection</button>
      </div>
      <div className="twrap"><table className="pt">
        <thead><tr>
          <th><input type="checkbox" checked={detail.length>0&&detail.every(r=>sel[r.id])} onChange={()=>toggleAll(detail)}/></th>
          <th>Élève</th><th>Classe</th><th>Thème</th><th>Jeu</th><th>Score</th><th>Date</th>
        </tr></thead>
        <tbody>{detail.map(r=>(<tr key={r.id} className={sel[r.id]?"selrow":""}>
          <td><input type="checkbox" checked={!!sel[r.id]} onChange={()=>toggle(r.id)}/></td>
          <td className="nm">{r.prenom} {r.nom}<span className="ps">{r.pseudo}</span></td>
          <td>{r.classe}</td><td>T{r.theme}</td><td>{gameName(r.game)}</td>
          <td><Cell v={r.pct}/></td><td className="dt">{fmtDate(r.date)}</td>
        </tr>))}</tbody>
      </table></div>
    </>)}

    {view==="editor"&&<Editor/>}
    <div className="pn">Un jeu est « validé » à {PASS}%. 21 jeux au total (7 × 3 thèmes). Les résultats sont enregistrés sur CET appareil (navigateur). Utilise l'export CSV pour les conserver ou les ouvrir dans Excel.</div>
  </div>);
}
function Cell({v}){ if(v===undefined) return <span className="nc">·</span>;
  const c=v>=PASS?"#16a34a":v>0?"#f59e0b":"#dc2626";
  return <span className="sc" style={{background:c+"22",color:c,borderColor:c+"55"}}>{v}</span>; }

/* ====== ROOT ====== */
function App(){
  const [screen,setScreen]=useState("login"); const [student,setStudent]=useState(null);
  return (<>{screen==="login"&&<Login onStudent={s=>{setStudent(s);setScreen("student")}} onTeacher={()=>setScreen("teacher")}/>}
    {screen==="student"&&<Hub student={student} onLogout={()=>setScreen("login")}/>}
    {screen==="teacher"&&<Teacher onLogout={()=>setScreen("login")}/>}</>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

.form input{padding:13px 15px;border:2px solid #ece6f7;border-radius:12px;font-size:15px;background:#faf8fe}

.hint{font-size:13px;color:#8a84a0}code{background:#f0eafa;padding:2px 7px;border-radius:6px;font-weight:700;color:#db2777}
.err{background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:10px;font-size:14px;margin-top:12px;font-weight:600}
.cta{width:100%;margin-top:16px;padding:15px;border-radius:14px;background:linear-gradient(120deg,var(--c1),var(--c2));color:#fff;font-size:17px;font-weight:800;box-shadow:0 12px 24px -6px rgba(255,107,107,.5);transition:.2s}
.cta:hover{transform:translateY(-2px)}.cta.sm{max-width:260px;margin:14px auto 0}
.fnote{margin-top:20px;font-size:12px;color:#9a94aa}

/* SHELL */
.app{max-width:1120px;margin:0 auto;padding:0 16px 60px}
.top{display:flex;align-items:center;gap:14px;padding:18px 4px}
.brand{font-family:'Fraunces',serif;font-weight:800;font-size:22px}
.who{margin-left:auto;font-weight:600;color:#5a5470;font-size:14px}.who .cl{color:var(--blue);font-weight:700}
.lo{background:#f0eafa;padding:9px 16px;border-radius:10px;font-weight:700;color:#6b6485;font-size:14px}
.top.prof .lo{margin-left:auto}
.nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.nb{padding:11px 18px;border-radius:12px;background:#fff;font-weight:700;font-size:15px;color:#6b6485;box-shadow:0 4px 14px -6px rgba(80,40,120,.2)}
.nb.on{background:var(--ink);color:#fff}

/* THEME PICK */
.theme-pick{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.tpill{flex:1;min-width:160px;display:flex;flex-direction:column;gap:2px;padding:14px 16px;border-radius:16px;background:#fff;border:2px solid #eee4f5;text-align:left;transition:.2s;box-shadow:0 6px 18px -10px rgba(80,40,120,.25)}
.tpill b{font-size:13px;color:var(--c)}.tpill span{font-size:15px;font-weight:700;color:var(--ink)}
.tpill.on{border-color:var(--c);background:#fff}
.tpill.lock{opacity:.55;cursor:not-allowed}
.locked-msg{background:#fff;border-radius:16px;padding:30px;text-align:center;color:#6b6485;font-weight:600;box-shadow:0 10px 30px -16px rgba(80,40,120,.2)}
.contract{background:linear-gradient(120deg,#fff6e8,#fef0f0);border:1.5px solid #fcd9b8;border-radius:16px;padding:14px 18px;font-size:14px;line-height:1.6;margin-bottom:20px}

/* GAMES GRID */
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.gcard{background:#fff;border-radius:18px;padding:20px;box-shadow:0 16px 36px -18px rgba(80,40,120,.28);border-top:4px solid var(--c);text-align:center;transition:.22s}
.gcard:hover:not(.lock){transform:translateY(-4px)}
.gcard.lock{opacity:.55;filter:grayscale(.4)}
.gicon{font-size:38px}
.gtags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:6px 0}
.gbloom{display:inline-block;background:var(--c);color:#fff;font-size:10.5px;font-weight:700;padding:3px 11px;border-radius:20px;letter-spacing:.4px}
.gdiff{display:inline-block;color:#fff;font-size:10.5px;font-weight:700;padding:3px 11px;border-radius:20px;letter-spacing:.4px}
.gcard h3{font-family:'Fraunces',serif;font-size:18px;margin:4px 0}
.gcard p{color:#6b6485;font-size:13.5px;min-height:38px}
.gbest{font-size:12.5px;font-weight:700;color:var(--c);margin:6px 0}
.gcard button{margin-top:8px;width:100%;padding:11px;border-radius:11px;background:var(--c);color:#fff;font-weight:800;font-size:14px;transition:.2s}
.gcard button:hover:not(:disabled){filter:brightness(1.08)}
.gcard button:disabled{background:#d8d2e6;cursor:not-allowed}

/* GAME SHELL */
.game{background:#fff;border-radius:22px;padding:24px;box-shadow:0 22px 50px -22px rgba(80,40,120,.3)}
.ghead{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.back{background:#f0eafa;padding:9px 15px;border-radius:10px;font-weight:700;color:#6b6485}
.gh-t{font-family:'Fraunces',serif;font-weight:800;font-size:19px;display:flex;flex-direction:column}
.gh-s{font-family:'Outfit';font-size:12px;font-weight:700;color:#9a94aa;letter-spacing:.5px;text-transform:uppercase}
.help{color:#5a5470;margin-bottom:14px}.muted{color:#9a94aa;font-weight:500}
.qn{margin-left:auto;font-weight:800;color:#9a94aa}.qn.r{text-align:right;margin-bottom:8px}

/* TRIEUR */
.tray{display:flex;flex-wrap:wrap;gap:9px;min-height:48px;margin-bottom:18px;padding:12px;background:#faf8fe;border-radius:14px;border:1.5px dashed #e0d8ef}
.tkn{padding:10px 14px;border-radius:11px;background:#fff;border:2px solid #eee4f5;font-weight:600;font-size:13.5px;transition:.15s}
.tkn.sel{border-color:var(--blue);background:#eef4ff;transform:scale(1.04);box-shadow:0 6px 16px -6px rgba(37,99,235,.5)}
.bacs{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.bac{background:#faf8fe;border:2px solid #eee4f5;border-radius:16px;padding:12px;min-height:120px;cursor:pointer;transition:.15s}
.bac:hover{border-color:var(--c3);background:#f0fbff}
.bac-h{font-weight:800;font-size:13.5px;text-align:center;padding:8px;border-radius:10px;background:#fff;margin-bottom:8px;color:var(--ink)}
.bac-body{display:flex;flex-direction:column;gap:6px}
.chip2{font-size:12.5px;font-weight:600;padding:7px 10px;border-radius:9px}
.chip2.ok{background:#e7f7ec;color:var(--green)}.chip2.no{background:#fee2e2;color:#dc2626}

/* MEMORY */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.mcard{aspect-ratio:1;border-radius:14px;position:relative;background:linear-gradient(135deg,#48dbfb,#1dd1a1);color:#fff;font-weight:700;font-size:13px;transition:.2s;perspective:600px}
.mcard .mc-front{font-size:28px;display:flex;align-items:center;justify-content:center;height:100%}
.mcard .mc-back{display:none;padding:8px;line-height:1.3}
.mcard.up{background:#fff;border:2px solid var(--c3);color:var(--ink)}
.mcard.up .mc-front{display:none}.mcard.up .mc-back{display:flex;align-items:center;justify-content:center;height:100%}
.mcard.done{background:#e7f7ec;border-color:#bce8c9;color:var(--green)}
@media(max-width:560px){.mem-grid{grid-template-columns:repeat(3,1fr)}}

/* FLASH */
.flash-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.combo{font-weight:800;color:#ef4444;font-size:14px}
.timer{flex:1;height:10px;background:#eee4f5;border-radius:8px;overflow:hidden}
.tfill{height:100%;transition:width 1s linear}
.flash-q{font-size:19px;font-weight:700;margin-bottom:16px;text-align:center;font-family:'Fraunces',serif}

/* OPTS générique */
.opts{display:flex;flex-direction:column;gap:11px}
.opt{padding:15px 17px;border-radius:14px;background:#f7f5fb;text-align:left;font-weight:600;font-size:15px;border:2px solid transparent;transition:.15s}
.opt:hover{background:#efeaf8}.opt.big{font-size:15.5px;padding:18px}
.opt.right{background:#e7f7ec;border-color:var(--green);color:var(--green)}
.opt.bad{background:#fee2e2;border-color:#dc2626;color:#dc2626}

/* VRAI FAUX */
.vf-card{font-family:'Fraunces',serif;font-size:21px;text-align:center;padding:28px 18px;background:linear-gradient(120deg,#f0f7ff,#f7f0ff);border-radius:18px;margin-bottom:16px;line-height:1.4}
.vf-btns{display:flex;gap:14px}
.vf{flex:1;padding:20px;border-radius:16px;font-size:18px;font-weight:800;color:#fff;transition:.15s}
.vf.v{background:#16a34a}.vf.f{background:#dc2626}
.vf:disabled{opacity:.85}.vf.right{outline:4px solid #16a34a55}.vf.bad{outline:4px solid #dc262655;opacity:.6}

/* INTRUS */
.intrus-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.iel{padding:22px 16px;border-radius:14px;background:#f7f5fb;font-weight:700;font-size:16px;transition:.15s}
.iel:hover{background:#efeaf8}
.iel.right{background:#e7f7ec;border:2px solid var(--green);color:var(--green)}
.iel.bad{background:#fee2e2;border:2px solid #dc2626;color:#dc2626}

/* CAS */
.case{background:linear-gradient(120deg,#f0f7ff,#f7f0ff);border-radius:16px;padding:18px;margin-bottom:16px}
.ctag{display:inline-block;background:var(--blue);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.4px}
.ctxt{font-size:16px;line-height:1.55;margin:11px 0}.cq{font-weight:700;font-size:16px}

/* FEEDBACK */
.fb{margin-top:16px;padding:17px;border-radius:16px}
.fb.good{background:#e7f7ec}.fb.no{background:#fff3f0}
.fb p{margin:7px 0 13px;line-height:1.55}
.next{padding:11px 19px;border-radius:12px;background:var(--ink);color:#fff;font-weight:800}

/* RESULT */
.res{text-align:center;padding:14px}
.medal{font-size:58px}.res h2{font-family:'Fraunces',serif;font-size:38px}
.rpct{font-size:28px;font-weight:800}.res p{color:#6b6485;margin:10px 0 4px}

/* MISSION */
.mission-top{background:#faf8fe;border-radius:16px;padding:14px;margin-bottom:14px}
.mtitle{font-family:'Fraunces',serif;font-weight:800;font-size:17px;margin-bottom:10px}
.mgauges{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.mg{font-size:11px;font-weight:700;color:#6b6485;text-align:center}
.mbar{height:8px;background:#eee4f5;border-radius:6px;overflow:hidden;margin-top:4px}.mfill{height:100%;transition:width .5s}
.mintro{background:#fff6e8;border-radius:12px;padding:12px 14px;font-size:14px;line-height:1.5;margin-bottom:12px}
.scene{background:linear-gradient(120deg,#fdf0f7,#f7f0ff);border-radius:16px;padding:18px;margin-bottom:14px}
.stag{display:inline-block;background:#db2777;color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.scene p{font-size:16px;line-height:1.5;margin-top:10px}
.gauges{display:flex;flex-direction:column;gap:10px;max-width:340px;margin:14px auto}
.gauge{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700}
.gauge span{width:120px;text-align:left;color:#6b6485}
.gbar{flex:1;height:12px;background:#eee4f5;border-radius:8px;overflow:hidden}.gfill{height:100%}

/* CONTENT */
.content{background:#fff;border-radius:22px;padding:26px;box-shadow:0 18px 44px -22px rgba(80,40,120,.25)}
.ptitle{font-family:'Fraunces',serif;font-size:28px;margin-bottom:14px}
.theme-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.tt{padding:9px 16px;border-radius:11px;background:#f5f1fb;font-weight:700;color:#6b6485;font-size:14px;border:2px solid transparent}
.tt.on{background:#fff;border-color:var(--c);color:var(--c)}
.intro{color:#5a5470;line-height:1.6;margin-bottom:20px;font-size:15px}
.sp{background:linear-gradient(120deg,var(--c1),var(--c2));-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}
.ngrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.ncard{background:#faf8fe;border-radius:18px;padding:18px;border:1px solid #f0eafa}
.ncard h3{font-family:'Fraunces',serif;font-size:18px;margin-bottom:9px}
.alab{font-size:11.5px;font-weight:700;color:#8b5cf6;letter-spacing:.4px}
.atxt{font-size:14px;line-height:1.55;color:#3a3450;margin:5px 0 12px}

/* MAGIC */
.magic{margin-top:4px}
.mbtn{width:100%;padding:11px 13px;border-radius:12px;background:linear-gradient(120deg,#48dbfb,#1dd1a1);color:#063;font-weight:800;font-size:13px;box-shadow:0 8px 18px -8px rgba(29,209,161,.6);transition:.2s}
.mbtn:hover{transform:translateY(-1px)}.mbtn.on{background:linear-gradient(120deg,#1dd1a1,#10ac84);color:#fff}
.spk{display:inline-block;margin-right:6px;animation:tw 1.6s infinite}
@keyframes tw{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.25)}}
.mbox{margin-top:11px;background:linear-gradient(120deg,#effcf9,#f0fbff);border:1.5px dashed #7fe3cf;border-radius:14px;padding:15px;animation:pop .3s}
@keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.mlab{font-weight:800;color:#10ac84;font-size:14px;margin-bottom:5px}
.mbox p{font-size:14.5px;line-height:1.6;color:#1a4a40}
.mex{margin-top:9px;font-size:13px;color:#2a6a5a;background:#fff;padding:9px 11px;border-radius:10px;font-weight:600}

/* PROGRAMME */
.pbox{background:#faf8fe;border-radius:18px;padding:22px;border:1px solid #f0eafa}
.pref{display:inline-block;background:var(--ink);color:#fff;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px}
.pbox h3{font-family:'Fraunces',serif;font-size:22px;margin:12px 0 4px}
.pbox h4{font-size:14px;margin:18px 0 8px;color:#8b5cf6;text-transform:uppercase;letter-spacing:.5px}
.plist{list-style:none;display:flex;flex-direction:column;gap:7px}
.plist li{padding:10px 15px;background:#fff;border-radius:10px;font-size:14px;border-left:4px solid var(--c2)}
.plist.q li{border-left-color:var(--c3);font-style:italic}.plist.cap li{border-left-color:var(--c4)}

/* LEXIQUE */
.search{width:100%;padding:13px 17px;border:2px solid #ece6f7;border-radius:14px;font-size:15px;margin-bottom:18px;background:#faf8fe}
.search:focus{outline:none;border-color:var(--c3);background:#fff}
.lex{display:flex;flex-direction:column;gap:12px}
.litem{background:#faf8fe;border-radius:16px;padding:16px 18px;border:1px solid #f0eafa}
.lterm{font-family:'Fraunces',serif;font-size:18px;font-weight:700;margin-bottom:5px}
.ldef{font-size:14px;line-height:1.55;color:#3a3450;margin-bottom:11px}

/* PROF */
.ptool{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.seg{display:flex;background:#f0eafa;border-radius:12px;padding:5px}
.seg button{padding:9px 15px;border-radius:9px;background:transparent;font-weight:700;color:#6b6485;font-size:14px}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 3px 8px rgba(0,0,0,.08)}
.ptool select{padding:10px 13px;border:2px solid #ece6f7;border-radius:11px;font-weight:600;background:#fff;font-size:14px}
.rf{margin-left:auto;background:var(--ink);color:#fff;padding:10px 17px;border-radius:11px;font-weight:700;font-size:14px}
.rf.alt{margin-left:8px;background:#16a34a}

.rf.pw{margin-left:8px;background:#8b5cf6}

.rf:disabled{opacity:.45;cursor:not-allowed}
.pwbox{background:#fff;border:1.5px solid #e9d5ff;border-radius:16px;padding:16px 18px;margin-bottom:16px;box-shadow:0 10px 28px -16px rgba(139,92,246,.35)}
.pwt{font-weight:800;margin-bottom:4px}
.pwh{font-size:13px;color:#8a84a0;margin-bottom:10px}
.pwrow{display:flex;gap:10px;flex-wrap:wrap}

.pwrow input:focus{outline:none;border-color:#8b5cf6;background:#fff}
.pwrow .rf{margin-left:0}
.pwmsg{margin-top:9px;font-weight:700;font-size:14px;color:#16a34a}
.selbar{display:flex;align-items:center;gap:14px;margin-bottom:12px;font-weight:700;color:#6b6485;font-size:14px}
.selrow td{background:#fff1f2!important}
.pt input[type="checkbox"]{width:17px;height:17px;cursor:pointer;accent-color:#dc2626}
.dt{font-size:12.5px;color:#8a84a0;white-space:nowrap}
.more{margin:10px auto 4px;display:block;padding:13px 22px;border-radius:13px;background:#2563eb;color:#fff;font-weight:800;font-size:14.5px;box-shadow:0 10px 22px -10px rgba(37,99,235,.6);transition:.2s}
.more:hover{transform:translateY(-2px)}
.qmedia{margin:10px 0;text-align:center}
.qmedia img,.qmedia video{max-width:100%;max-height:280px;border-radius:12px;box-shadow:0 8px 20px -10px rgba(0,0,0,.25)}
.qmedia audio{width:100%;max-width:420px}
.qmedia iframe{width:100%;max-width:560px;aspect-ratio:16/9;border:0;border-radius:12px}
.mleg{font-size:12.5px;color:#8a84a0;margin-top:5px;font-style:italic}
.ed{background:#fff;border-radius:18px;padding:20px;box-shadow:0 14px 36px -20px rgba(80,40,120,.25)}
.edbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.edbar select{padding:10px 12px;border:2px solid #ece6f7;border-radius:11px;font-weight:600;background:#fff;font-size:14px}
.edhint{font-size:13px;color:#8a84a0;line-height:1.6;margin:8px 0 12px}
.edmsg{background:#e7f7ec;color:#16a34a;font-weight:700;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:13.5px;line-height:1.5}
.edcount{display:inline-block;background:#fff6e8;color:#b45309;font-weight:700;font-size:13px;padding:7px 13px;border-radius:9px;margin-bottom:12px}
.edcard{background:#faf8fe;border:1px solid #f0eafa;border-radius:14px;padding:14px;margin-bottom:14px}
.edhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.edlab{display:block;font-size:11.5px;font-weight:800;color:#8b5cf6;text-transform:uppercase;letter-spacing:.4px;margin:10px 0 4px}
.ed textarea,.ed input:not([type="radio"]):not([type="number"]):not([type="checkbox"]){width:100%;padding:10px 12px;border:2px solid #ece6f7;border-radius:10px;font-size:14px;background:#fff;font-family:inherit}

.edopt{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.edopt input[type="radio"]{width:19px;height:19px;accent-color:#16a34a;flex:none;cursor:pointer}
.edvf{display:flex;gap:20px;margin:8px 0;font-weight:700}
.edvf input[type="radio"]{width:18px;height:18px;accent-color:#16a34a;margin-right:6px}
.edx{background:#fee2e2;color:#dc2626;border-radius:8px;padding:7px 11px;font-weight:800;font-size:13px;flex:none}
.edadd2{background:#eef4ff;color:#2563eb;border-radius:9px;padding:8px 13px;font-weight:700;font-size:13px;margin-top:4px}
.edadd{width:100%;padding:14px;border-radius:12px;background:#2563eb;color:#fff;font-weight:800;font-size:15px;margin-top:6px}

.edeff{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

.edeff input{width:100%;padding:8px;border:2px solid #ece6f7;border-radius:8px;font-size:14px}
.med{background:#f0fbff;border:1.5px dashed #bae6fd;border-radius:10px;padding:10px;margin-top:10px;display:flex;flex-direction:column;gap:7px}

.empty,.loading{background:#fff;border-radius:18px;padding:40px;text-align:center;color:#6b6485;font-size:16px;box-shadow:0 10px 30px -16px rgba(80,40,120,.2)}
.twrap{background:#fff;border-radius:18px;padding:8px;box-shadow:0 14px 36px -20px rgba(80,40,120,.25);overflow-x:auto}
.pt{width:100%;border-collapse:collapse;min-width:560px}

.th-mini{text-align:center!important;font-size:15px!important}.th-mini small{display:block;font-size:9px;color:#b0a8c4}
.rk{font-weight:800;color:#b0a8c4}.nm{font-weight:700}.nm .ps{display:block;font-size:12px;color:#9a94aa;font-weight:500}
