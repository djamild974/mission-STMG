    "desc": "Le rituel des 15 premières minutes : contexte, questions, titres des documents, surlignage, verbes directeurs.",
    "url": "",
    "html": "<h2>Le principe : on n'écrit RIEN avant d'avoir tout compris<\/h2><p>Les points perdus en devoir viennent rarement d'un manque de connaissances : ils viennent d'une lecture trop rapide. Voici le rituel à appliquer à CHAQUE sujet, dans cet ordre.<\/p><h2>Étape 1 — Lire le contexte (2 min)<\/h2><ul><li>Qui est l'organisation ? (type, taille, activité, lieu — réflexe « caractériser »)<\/li><li>Quel est son problème ou son projet ? C'est le fil rouge du sujet : toutes les questions tournent autour.<\/li><li>Note au brouillon une phrase : <i>« [Organisation] cherche à [problème/projet] ».<\/i><\/li><\/ul><h2>Étape 2 — Lire TOUTES les questions AVANT les documents (3 min)<\/h2><ul><li>Lire les questions d'abord te dit <b>quoi chercher<\/b> dans les documents : tu liras ensuite avec un objectif.<\/li><li><b>Lis chaque question JUSQU'AU BOUT.<\/b> Beaucoup de questions ont <b>plusieurs parties<\/b> : <i>« Identifiez le style de direction <u>et<\/u> montrez ses conséquences sur la motivation »<\/i> = 2 tâches = 2 paquets de points. Numérote-les au brouillon (1a, 1b…).<\/li><li>Repère les mots qui doublent la tâche : <b>et<\/b>, <b>puis<\/b>, <b>ainsi que<\/b>, <b>en justifiant<\/b>, <b>à l'aide de…<\/b><\/li><li>Entoure le <b>verbe directeur<\/b> de chaque question (voir tableau plus bas) : il définit ce qu'on attend de toi.<\/li><\/ul><h2>Étape 3 — Lire les TITRES des documents (1 min)<\/h2><p>Le titre d'un document est un indice offert : il annonce ce qu'on y trouvera. Associe au brouillon chaque question à son ou ses documents : <i>Q2 → doc 1 (interview du dirigeant) ; Q4 → doc 3 (tableau des effectifs)<\/i>. Un document fourni sert toujours quelque part.<\/p><h2>Étape 4 — Première lecture AVEC le surligneur (8-10 min)<\/h2><ul><li>Lis chaque document en gardant les questions en tête, et surligne <b>uniquement<\/b> ce qui peut servir à répondre : chiffres clés, citations du dirigeant, mots du programme reconnus (finalité, parties prenantes, stratégie…).<\/li><li>Astuce des couleurs : une couleur par question (ou par dossier), pour retrouver instantanément tes indices au moment de rédiger.<\/li><li>Note en marge la notion de cours que le passage illustre : <i>« = avantage concurrentiel », « = style participatif »<\/i>.<\/li><\/ul><h2>Étape 5 — Les verbes directeurs : ce qu'on attend VRAIMENT<\/h2><table><tr><th>Verbe<\/th><th>Signification<\/th><th>Ce qui est attendu<\/th><\/tr><tr><td><b>Identifier / Repérer<\/b><\/td><td>Trouver et nommer<\/td><td>Donner l'élément avec le mot du cours + une courte justification tirée du document<\/td><\/tr><tr><td><b>Citer / Relever<\/b><\/td><td>Extraire du document<\/td><td>Recopier l'élément précis demandé (avec guillemets si citation)<\/td><\/tr><tr><td><b>Définir<\/b><\/td><td>Donner le sens du mot<\/td><td>La définition du cours, précise, éventuellement avec un exemple<\/td><\/tr><tr><td><b>Caractériser<\/b><\/td><td>Décrire selon des critères<\/td><td>Passer en revue les critères du cours (type, finalité, taille, ressources…) en justifiant<\/td><\/tr><tr><td><b>Distinguer<\/b><\/td><td>Montrer la différence<\/td><td>Définir les deux notions ET expliquer ce qui les sépare<\/td><\/tr><tr><td><b>Expliquer<\/b><\/td><td>Faire comprendre<\/td><td>Le mécanisme, les causes et conséquences, avec le vocabulaire du cours<\/td><\/tr><tr><td><b>Analyser / Commenter<\/b><\/td><td>Décomposer et interpréter<\/td><td>Constater (avec le document) + expliquer + conclure sur ce que cela signifie pour l'organisation<\/td><\/tr><tr><td><b>Montrer que / Démontrer<\/b><\/td><td>Prouver une affirmation<\/td><td>Arguments AEI appuyés sur les documents : la conclusion est imposée, c'est le chemin qui est noté<\/td><\/tr><tr><td><b>Justifier<\/b><\/td><td>Donner les raisons<\/td><td>Apporter les preuves (document + cours) qui fondent une affirmation ou un choix<\/td><\/tr><tr><td><b>Comparer<\/b><\/td><td>Points communs et différences<\/td><td>Mettre en regard, critère par critère — jamais deux descriptions séparées<\/td><\/tr><tr><td><b>Apprécier / Évaluer<\/b><\/td><td>Porter un jugement<\/td><td>Un avis NUANCÉ et argumenté : points forts ET limites<\/td><\/tr><tr><td><b>Proposer / Conseiller<\/b><\/td><td>Suggérer des solutions<\/td><td>Des solutions réalistes, adaptées au contexte, et justifiées<\/td><\/tr><tr><td><b>Dans quelle mesure…<\/b><\/td><td>Discuter<\/td><td>Réponse en deux temps : « oui, dans une certaine mesure… » PUIS « mais avec des limites… »<\/td><\/tr><\/table><blockquote><b>⚠️ Les 3 erreurs fatales<\/b> : répondre à la question qu'on aurait aimé avoir (et pas celle posée) · traiter la moitié d'une question double · « expliquer » quand on demandait seulement d'« identifier » (perte de temps) ou l'inverse (perte de points).<\/blockquote><h2>Check-list avant de rendre<\/h2><ul><li>Chaque question a une réponse, chaque partie de question aussi ?<\/li><li>Chaque réponse cite un document ET nomme une notion ?<\/li><li>Le verbe directeur a-t-il été respecté ?<\/li><\/ul>"

    "desc": "La compétence n°1 du programme : identifier une organisation en 7 critères, sans rien oublier.",
    "url": "",
    "html": "<h2>Pourquoi cette méthode ?<\/h2><p>« Caractériser l'organisation » est souvent la <b>première question<\/b> d'un sujet. Bien traitée, elle rapporte des points faciles et t'oblige à lire attentivement le contexte. La règle d'or : <b>chaque caractéristique doit être justifiée par un élément du texte<\/b>.<\/p><h2>Les 7 critères à passer en revue<\/h2><table><tr><th>Critère<\/th><th>Questions à se poser<\/th><th>Exemples de réponses<\/th><\/tr><tr><td><b>Type d'organisation<\/b><\/td><td>Entreprise privée ? Organisation publique ? Organisation de la société civile ?<\/td><td>Entreprise privée (Edena) ; commune de Saint-Pierre ; association sportive<\/td><\/tr><tr><td><b>Finalité / but<\/b><\/td><td>Lucrative ? Non lucrative ? Mission de service public ?<\/td><td>Réaliser un profit et pérenniser l'activité ; satisfaire l'intérêt général<\/td><\/tr><tr><td><b>Statut juridique<\/b><\/td><td>SARL, SA, SAS, association loi 1901, collectivité…<\/td><td>SARL au capital de 50 000 €<\/td><\/tr><tr><td><b>Taille<\/b><\/td><td>Effectif ? Chiffre d'affaires ? TPE, PME, ETI, grande entreprise ?<\/td><td>PME de 80 salariés, CA de 12 M€<\/td><\/tr><tr><td><b>Nature de l'activité<\/b><\/td><td>Production de biens ? De services ? Marchande ou non marchande ?<\/td><td>Production et vente de boissons (activité marchande)<\/td><\/tr><tr><td><b>Champ d'action<\/b><\/td><td>Local, régional, national, international ?<\/td><td>Régional : La Réunion ; export vers l'océan Indien<\/td><\/tr><tr><td><b>Ressources<\/b><\/td><td>Humaines, financières, matérielles, immatérielles ?<\/td><td>80 salariés, une usine au Port, une marque réputée<\/td><\/tr><\/table><h2>Comment rédiger ?<\/h2><p>Deux présentations acceptées : le <b>tableau<\/b> (critère / réponse justifiée) ou le <b>paragraphe rédigé<\/b> qui enchaîne les critères. Dans les deux cas, appuie-toi sur le document : <i>« Edena est une entreprise privée (type) dont la finalité est lucrative ; cette PME d'environ 80 salariés (taille) produit et commercialise des eaux et boissons (activité marchande) à La Réunion (champ d'action régional)… »<\/i><\/p><blockquote><b>⚠️ Pièges classiques<\/b> : confondre <i>finalité<\/i> (la raison d'être) et <i>objectif<\/i> (un résultat chiffré à atteindre) · oublier de justifier avec le texte · inventer une information absente du document.<\/blockquote><h2>Auto-vérification<\/h2><ul><li>Ai-je traité les 7 critères (ou signalé ceux que le document ne permet pas de déterminer) ?<\/li><li>Chaque caractéristique cite-t-elle un indice du document ?<\/li><li>Mon vocabulaire est-il celui du programme (finalité, but, ressources…) ?<\/li><\/ul>"

    "url": "",
    "html": "<h2>Étape 1 — Identifier le document (30 secondes)<\/h2><ul><li><b>Nature<\/b> : article de presse, interview, site web de l'entreprise, tableau de chiffres, organigramme, témoignage…<\/li><li><b>Source et date<\/b> : qui parle ? La source est-elle interne (l'entreprise parle d'elle-même) ou externe (journaliste, étude) ? Récente ?<\/li><li><b>Thème<\/b> : de quoi parle-t-il en une phrase ?<\/li><\/ul><blockquote>Une source <b>interne<\/b> valorise toujours l'organisation : garde un œil critique. Un article de presse externe est souvent plus neutre.<\/blockquote><h2>Étape 2 — Comprendre (lecture active)<\/h2><ul><li>Surligne les <b>mots du programme<\/b> que tu reconnais (finalité, parties prenantes, diagnostic, stratégie, avantage concurrentiel…).<\/li><li>Note en marge la <b>notion de cours<\/b> que chaque passage illustre : c'est le réflexe qui fait la différence.<\/li><li>Pour un tableau de chiffres : lis le titre, les unités, puis compare (dans le temps, entre lignes) avant de conclure.<\/li><\/ul><h2>Étape 3 — Relier au cours<\/h2><p>Pose-toi systématiquement : <i>« Quelle question de gestion ce document illustre-t-il ? Quelles notions du programme ? »<\/i> Un document de sujet ne tombe jamais par hasard : il a été choisi pour te faire mobiliser des notions précises.<\/p><h2>Étape 4 — Exploiter dans la réponse<\/h2><p>La formule gagnante combine toujours <b>document + cours<\/b> :<\/p><blockquote><i>« D'après le document 2, Air Austral a ouvert deux nouvelles lignes régionales (fait du document) : il s'agit d'une stratégie de développement de marché (notion de cours), qui consiste à proposer l'offre existante sur de nouveaux territoires (définition). »<\/i><\/blockquote><ul><li>❌ Recopier des phrases entières du document sans les analyser.<\/li><li>❌ Réciter le cours sans citer le document.<\/li><li>✅ Citer un élément précis (« d'après le document… ») PUIS le nommer avec le vocabulaire du cours PUIS expliquer.<\/li><\/ul>"

    "desc": "Affirmation, Explication, Illustration : la structure qui transforme tes idées en points.",
    "url": "",
    "html": "<h2>Le principe AEI<\/h2><p>Chaque argument se construit en trois temps :<\/p><table><tr><th>Temps<\/th><th>Rôle<\/th><th>Exemple<\/th><\/tr><tr><td><b>A — Affirmation<\/b><\/td><td>L'idée, en une phrase claire<\/td><td>« Améliorer les conditions de travail renforce la motivation des salariés. »<\/td><\/tr><tr><td><b>E — Explication<\/b><\/td><td>Le pourquoi, avec les notions du cours<\/td><td>« En effet, les conditions de travail influencent les comportements : un salarié qui travaille dans un environnement sain s'implique davantage et l'absentéisme recule. »<\/td><\/tr><tr><td><b>I — Illustration<\/b><\/td><td>Un exemple du document ou de l'actualité<\/td><td>« Ainsi, d'après le document 1, l'absentéisme de l'atelier a baissé de 8 % à 5 % après la rénovation des locaux. »<\/td><\/tr><\/table><h2>Construire la réponse complète<\/h2><ul><li><b>1. Analyse la consigne<\/b> : repère le verbe (montrer, justifier, expliquer, apprécier…) et souligne les mots-clés. « Montrez que… » = prouver avec arguments ; « Dans quelle mesure… » = nuancer (oui… mais…).<\/li><li><b>2. Brouillon express (3 min)<\/b> : liste 2 à 3 arguments AEI, choisis l'ordre.<\/li><li><b>3. Rédige<\/b> : une phrase d'introduction qui reformule la question, un paragraphe par argument (saute des lignes !), une phrase de conclusion qui répond directement.<\/li><\/ul><h2>Les connecteurs qui structurent<\/h2><p>Tout d'abord · Ensuite · De plus · En effet · Ainsi · Par exemple · Cependant · C'est pourquoi · En conclusion.<\/p><blockquote><b>⚠️ À bannir<\/b> : « je pense que » sans justification · les généralités (« de tout temps les entreprises… ») · le recopiage du document · les réponses en une ligne à une question en 4 points.<\/blockquote><h2>Grille de relecture<\/h2><ul><li>Ai-je répondu À LA question posée (et pas à côté) ?<\/li><li>Chaque paragraphe contient-il une notion du cours nommée explicitement ?<\/li><li>Ai-je cité au moins un élément précis des documents ?<\/li><li>Orthographe des mots du programme : <i>stratégie, concurrentiel, pérennité, hiérarchie<\/i>…<\/li><\/ul>"

    "desc": "Le rituel des 15 premières minutes en SDGN : contexte, questions, documents chiffrés, surlignage, verbes directeurs.",
    "url": "",
    "html": "<h2>Le principe : on n'écrit RIEN avant d'avoir tout compris<\/h2><p>En SDGN, les sujets mêlent textes ET documents chiffrés. La méthode de lecture est donc encore plus décisive : un chiffre mal repéré, et toute la réponse déraille.<\/p><h2>Étape 1 — Lire le contexte (2 min)<\/h2><ul><li>Qui est l'organisation ? Quelle est sa situation de gestion (lancement, difficulté de trésorerie, conflit, projet numérique…) ?<\/li><li>Réflexe QQOQCP rapide : qui, quoi, où, quand, comment, pourquoi.<\/li><li>Demande-toi : <i>« Dans quel(s) thème(s) du programme suis-je ? »<\/i> — cela t'indique les notions à mobiliser.<\/li><\/ul><h2>Étape 2 — Lire TOUTES les questions AVANT les documents (3 min)<\/h2><ul><li>Tu sauras ainsi <b>quoi chercher<\/b> : un taux ? une évolution ? une notion à reconnaître ?<\/li><li><b>Lis chaque question JUSQU'AU BOUT<\/b> : beaucoup contiennent <b>plusieurs tâches<\/b>. <i>« Calculez la valeur ajoutée <u>et<\/u> présentez sa répartition »<\/i> = un calcul + une analyse. Numérote les sous-tâches au brouillon.<\/li><li>Repère les indices de double travail : <b>et<\/b>, <b>puis<\/b>, <b>en déduire<\/b> (= un 2ᵉ calcul s'appuie sur le 1ᵉʳ !), <b>en justifiant<\/b>, <b>commentez vos résultats<\/b>.<\/li><li>Entoure le <b>verbe directeur<\/b> (tableau ci-dessous) : « calculez » et « analysez » ne rapportent pas les mêmes points.<\/li><\/ul><h2>Étape 3 — Lire les TITRES des documents (1 min)<\/h2><p>Le titre dit tout : <i>« Annexe 2 — Budget de trésorerie de janvier à mars »<\/i> annonce où tu trouveras le mois critique. Associe chaque question à ses documents (<i>Q3 → annexe 2<\/i>), et repère immédiatement pour chaque document chiffré : la <b>période<\/b> et l'<b>unité<\/b> (€, k€, %, heures…). L'erreur d'unité est l'erreur n°1 du devoir de SDGN !<\/p><h2>Étape 4 — Première lecture AVEC le surligneur (8-10 min)<\/h2><ul><li>Surligne les <b>données qui répondent aux questions<\/b> : totaux, soldes négatifs, écarts avec un objectif, pourcentages d'évolution.<\/li><li>Une couleur par question (ou par document) pour retrouver tes indices en rédigeant.<\/li><li>Note en marge la notion reconnue : <i>« = donnée → information », « = rétention d'information », « = performance sociale »<\/i>.<\/li><\/ul><h2>Étape 5 — Les verbes directeurs en SDGN<\/h2><table><tr><th>Verbe<\/th><th>Signification<\/th><th>Ce qui est attendu<\/th><\/tr><tr><td><b>Identifier / Repérer<\/b><\/td><td>Trouver et nommer<\/td><td>L'élément + le mot du cours + une justification tirée du document<\/td><\/tr><tr><td><b>Citer / Relever<\/b><\/td><td>Extraire du document<\/td><td>L'élément précis demandé, sans commentaire inutile<\/td><\/tr><tr><td><b>Définir<\/b><\/td><td>Donner le sens<\/td><td>La définition du cours, exacte et complète<\/td><\/tr><tr><td><b>Caractériser / Qualifier<\/b><\/td><td>Décrire selon les critères du cours<\/td><td>Ex. : qualifier une donnée / une information / une connaissance, en justifiant<\/td><\/tr><tr><td><b>Calculer<\/b><\/td><td>Trouver un résultat chiffré<\/td><td>Les 4 temps : formule + application + résultat AVEC unité + interprétation<\/td><\/tr><tr><td><b>En déduire<\/b><\/td><td>Utiliser le résultat précédent<\/td><td>Un nouveau calcul ou une conclusion qui s'appuie EXPLICITEMENT sur ce qui précède<\/td><\/tr><tr><td><b>Comparer<\/b><\/td><td>Mettre en regard<\/td><td>Écarts chiffrés (valeur et %), dans le temps ou par rapport à un objectif/secteur<\/td><\/tr><tr><td><b>Analyser / Commenter<\/b><\/td><td>Faire parler les chiffres<\/td><td>Constat chiffré + explication (causes) + conséquence pour l'organisation<\/td><\/tr><tr><td><b>Montrer que / Justifier<\/b><\/td><td>Prouver<\/td><td>Arguments appuyés sur les données ET les notions (AEI)<\/td><\/tr><tr><td><b>Apprécier / Évaluer<\/b><\/td><td>Juger avec nuance<\/td><td>Points forts ET points faibles, appuyés sur les indicateurs<\/td><\/tr><tr><td><b>Proposer / Conseiller<\/b><\/td><td>Suggérer des solutions<\/td><td>Des actions concrètes, réalistes, justifiées par le contexte et les chiffres<\/td><\/tr><tr><td><b>Schématiser / Représenter<\/b><\/td><td>Traduire en schéma<\/td><td>Ex. : les étapes d'un processus, avec un formalisme clair (étapes, flèches, acteurs)<\/td><\/tr><\/table><blockquote><b>⚠️ Les pièges spécifiques SDGN<\/b> : commencer un calcul sans avoir vérifié l'unité · oublier la 2ᵉ partie d'une question (« et commentez ») · donner un résultat sans phrase d'interprétation · « en déduire » traité comme une question indépendante.<\/blockquote><h2>Check-list avant de rendre<\/h2><ul><li>Toutes les questions ET toutes leurs parties sont traitées ?<\/li><li>Chaque calcul a sa formule, son unité et son interprétation ?<\/li><li>Chaque analyse cite le document et nomme une notion ?<\/li><\/ul>"

    "url": "",
    "html": "<h2>Le formulaire de 1ʳᵉ SDGN<\/h2><table><tr><th>Indicateur<\/th><th>Formule<\/th><th>Ce que ça mesure<\/th><\/tr><tr><td><b>Valeur ajoutée<\/b><\/td><td>Production − consommations intermédiaires<\/td><td>La richesse créée par l'organisation<\/td><\/tr><tr><td><b>Productivité<\/b><\/td><td>Production ÷ moyens utilisés (ex. heures travaillées)<\/td><td>L'efficacité du travail<\/td><\/tr><tr><td><b>Coût du travail<\/b><\/td><td>Salaires bruts + cotisations patronales<\/td><td>Ce que le travail coûte vraiment à l'employeur<\/td><\/tr><tr><td><b>Marge<\/b><\/td><td>Prix de vente − coût de revient<\/td><td>Le gain par produit vendu<\/td><\/tr><tr><td><b>Résultat<\/b><\/td><td>Produits − charges<\/td><td>Bénéfice (＋) ou perte (−) de l'exercice<\/td><\/tr><tr><td><b>Taux de marge sur coûts variables<\/b><\/td><td>(CA − charges variables) ÷ CA<\/td><td>La part du CA qui couvre les charges fixes<\/td><\/tr><tr><td><b>Seuil de rentabilité<\/b><\/td><td>Charges fixes ÷ taux de marge sur coûts variables<\/td><td>Le CA minimal pour ne pas perdre d'argent<\/td><\/tr><tr><td><b>Solde de trésorerie<\/b><\/td><td>Encaissements − décaissements (du mois) ; solde cumulé = cumul mois après mois<\/td><td>L'argent réellement disponible<\/td><\/tr><\/table><h2>Rédiger un calcul : la règle des 4 temps<\/h2><p>Un calcul juste mais mal rédigé perd des points. Présente TOUJOURS :<\/p><ul><li><b>1. La formule<\/b> : « Seuil de rentabilité = charges fixes ÷ taux de marge sur coûts variables »<\/li><li><b>2. L'application<\/b> : « = 30 000 ÷ 0,5 »<\/li><li><b>3. Le résultat AVEC l'unité<\/b> : « = 60 000 € »<\/li><li><b>4. L'interprétation<\/b> : « Le restaurant doit réaliser au moins 60 000 € de chiffre d'affaires pour couvrir toutes ses charges ; au-delà, il dégage un bénéfice. »<\/li><\/ul><blockquote><b>⚠️ Pièges fréquents<\/b> : oublier l'unité (€, %, unités/heure) · confondre taux de marge en % et en décimal (50 % = 0,5) · confondre production et chiffre d'affaires · additionner des données qui n'ont pas la même unité · donner un résultat sans phrase d'interprétation.<\/blockquote><h2>L'interprétation, c'est la moitié des points<\/h2><p>Après chaque calcul, demande-toi : <i>« Et alors ? Bonne ou mauvaise nouvelle pour l'organisation ? Comparé à quoi (l'an dernier, le secteur, l'objectif) ? »<\/i> Un chiffre seul ne dit rien : c'est la comparaison qui crée l'information.<\/p>"

    "html": "<h2>Temps 1 — Le tour du document (avant les chiffres !)<\/h2><ul><li><b>Titre<\/b> : de quoi s'agit-il ? (compte de résultat, budget de trésorerie, tableau de bord…)<\/li><li><b>Période<\/b> : un mois ? un trimestre ? un exercice ? Deux années à comparer ?<\/li><li><b>Unité<\/b> : €, k€ (milliers), M€ (millions), %, unités physiques ? <i>L'erreur d'unité est l'erreur n°1 !<\/i><\/li><li><b>Source<\/b> : qui a produit ce document, pour quoi faire ?<\/li><\/ul><h2>Temps 2 — Repérer la structure<\/h2><table><tr><th>Document<\/th><th>Sa logique<\/th><th>La ligne à repérer d'abord<\/th><\/tr><tr><td><b>Compte de résultat<\/b><\/td><td>Produits d'un côté, charges de l'autre<\/td><td>Le résultat (bénéfice ou perte)<\/td><\/tr><tr><td><b>Budget de trésorerie<\/b><\/td><td>Encaissements / décaissements, mois par mois<\/td><td>Le solde cumulé (le mois où il devient négatif !)<\/td><\/tr><tr><td><b>Tableau de bord<\/b><\/td><td>Des indicateurs variés avec parfois des objectifs<\/td><td>Les écarts entre réalisé et objectif<\/td><\/tr><tr><td><b>Tableau de répartition de la VA<\/b><\/td><td>Qui reçoit quoi<\/td><td>La part de chaque acteur (salariés, État, prêteurs, actionnaires, entreprise)<\/td><\/tr><\/table><h2>Temps 3 — Faire parler les chiffres<\/h2><ul><li><b>Comparer dans le temps<\/b> : ça monte, ça baisse, de combien (en valeur ET en %) ?<\/li><li><b>Comparer dans l'espace<\/b> : par rapport au secteur, à un concurrent, à l'objectif.<\/li><li><b>Repérer les contradictions<\/b> : le CA monte mais l'absentéisme explose → performances contradictoires.<\/li><\/ul><h2>Temps 4 — Conclure avec le vocabulaire du cours<\/h2><blockquote><i>« Le taux d'occupation (78 %) dépasse l'objectif (75 %) : l'hôtel est <b>efficace<\/b> sur le plan commercial. Mais l'absentéisme en hausse révèle une <b>performance sociale<\/b> dégradée : la <b>performance globale<\/b> n'est pas atteinte. »<\/i><\/blockquote><p>Chaque constat chiffré doit être <b>nommé<\/b> avec une notion : efficacité, efficience, performance commerciale / financière / sociale / environnementale, risque, seuil…<\/p>"

    "url": "",
    "html": "<h2>Étape 1 — Débroussailler avec QQOQCP<\/h2><table><tr><th>Question<\/th><th>À chercher dans le contexte<\/th><\/tr><tr><td><b>Qui ?<\/b><\/td><td>L'organisation (type, taille) et les acteurs concernés (salariés, clients, dirigeant…)<\/td><\/tr><tr><td><b>Quoi ?<\/b><\/td><td>Le problème ou la décision en jeu (lancer un produit, conflit, trésorerie…)<\/td><\/tr><tr><td><b>Où ?<\/b><\/td><td>Le contexte géographique et concurrentiel (un marché insulaire change tout !)<\/td><\/tr><tr><td><b>Quand ?<\/b><\/td><td>L'horizon (urgence ? long terme ?), la saison, la période<\/td><\/tr><tr><td><b>Comment ?<\/b><\/td><td>Les moyens, ressources et outils disponibles<\/td><\/tr><tr><td><b>Pourquoi ?<\/b><\/td><td>Les causes du problème et les objectifs poursuivis<\/td><\/tr><\/table><h2>Étape 2 — Rattacher au programme<\/h2><p>Demande-toi : <i>« Dans quel thème suis-je ? Quelle question de gestion ? »<\/i><\/p><ul><li>On parle d'un salarié, d'un groupe, de compétences, de conflit → <b>Thème 1 : De l'individu à l'acteur<\/b>.<\/li><li>On parle de données, de SI, de PGI, de RGPD, d'IA → <b>Thème 2 : Numérique et intelligence collective<\/b>.<\/li><li>On parle de valeur, de coûts, de performance, d'indicateurs → <b>Thème 3 : Création de valeur et performance<\/b>.<\/li><li>On parle de prévision, de budget, de saison, de risque → <b>Thème 4 : Temps et risque<\/b>.<\/li><\/ul><h2>Étape 3 — Mobiliser les bonnes notions<\/h2><p>Une fois le thème identifié, liste au brouillon 3 à 5 notions du glossaire qui s'appliquent. Ta réponse devra les <b>nommer explicitement<\/b> : c'est ce que le correcteur cherche.<\/p><blockquote><b>Exemple express<\/b> : « Un commercial garde pour lui le mécontentement d'un gros client. » → Thème 4 → notions : <i>asymétrie d'information, rétention, veille<\/i> → réponse : nommer la rétention d'information, expliquer ses dangers, proposer un reporting régulier.<\/blockquote><h2>Étape 4 — Conclure en répondant à la question de gestion<\/h2><p>Termine toujours en revenant à la décision : que devrait faire l'organisation, et pourquoi ? Une analyse sans recommandation est une analyse inachevée.<\/p>"

    "html": "<h2>La spécificité SDGN : argumenter AVEC les chiffres<\/h2><p>En sciences de gestion, un argument sans donnée est une opinion. La structure reste <b>AEI<\/b> (Affirmation – Explication – Illustration), mais l'illustration est presque toujours <b>chiffrée<\/b> :<\/p><blockquote><b>A<\/b> : « La situation financière de l'entreprise se fragilise. »<br/><b>E<\/b> : « En effet, le budget de trésorerie anticipe les encaissements et décaissements : un solde cumulé négatif annonce une incapacité à payer. »<br/><b>I<\/b> : « Or, d'après l'annexe 2, le solde cumulé devient négatif en février (−7 k€) : sans financement, l'entreprise ne pourra pas régler ses fournisseurs. »<\/blockquote><h2>Les verbes de consigne et ce qu'ils exigent<\/h2><table><tr><th>Consigne<\/th><th>Ce qu'on attend<\/th><\/tr><tr><td><b>Identifier / Repérer<\/b><\/td><td>Nommer, avec le vocabulaire du cours, en justifiant brièvement<\/td><\/tr><tr><td><b>Caractériser<\/b><\/td><td>Décrire selon les critères du cours (type, nature…)<\/td><\/tr><tr><td><b>Calculer<\/b><\/td><td>Formule + application + résultat avec unité + interprétation<\/td><\/tr><tr><td><b>Analyser / Commenter<\/b><\/td><td>Constater (chiffres) + expliquer (causes) + conclure (conséquences)<\/td><\/tr><tr><td><b>Montrer que / Justifier<\/b><\/td><td>Prouver avec arguments AEI appuyés sur les documents<\/td><\/tr><tr><td><b>Proposer / Conseiller<\/b><\/td><td>Des solutions réalistes ET justifiées par le contexte<\/td><\/tr><\/table><h2>Le plan en 3 mouvements<\/h2><ul><li><b>Introduction (2 lignes)<\/b> : reformule la question et annonce ta position.<\/li><li><b>Développement<\/b> : 2 ou 3 paragraphes AEI, chacun avec sa notion ET sa donnée. Saute une ligne entre chaque.<\/li><li><b>Conclusion (2 lignes)<\/b> : réponds clairement, éventuellement avec une nuance ou une recommandation.<\/li><\/ul><blockquote><b>⚠️ Les erreurs qui coûtent cher<\/b> : paraphraser les annexes · empiler des calculs sans interprétation · répondre «     "html": "<h2>Le principe : les 20 premières minutes décident de la copie<\/h2><p>Sur un sujet de 4 heures avec une dizaine de pages d'annexes, foncer tête baissée est la garantie de l'erreur. Le rituel ci-dessous s'applique à chaque devoir de l'année — pour qu'il soit automatique le jour du bac.<\/p><h2>Étape 1 — Lire le contexte de l'organisation (3-4 min)<\/h2><ul><li>Photographie l'organisation au brouillon : type, taille, activité, champ d'action, finalité (réflexe de 1ʳᵉ !).<\/li><li>Identifie son <b>problème central<\/b> : c'est le fil rouge — chaque dossier en éclaire une facette.<\/li><li>Repère son environnement : concurrence, contraintes, opportunités, territoire.<\/li><\/ul><h2>Étape 2 — Lire TOUTES les questions de TOUS les dossiers (5 min)<\/h2><ul><li>Tu sauras quoi chercher dans les annexes, et tu verras la <b>logique du sujet<\/b> (les dossiers racontent une histoire : diagnostic → décision → mise en œuvre).<\/li><li><b>Lis chaque question JUSQU'AU BOUT.<\/b> Au bac, beaucoup de questions sont <b>doubles ou triples<\/b> : <i>« Calculez le seuil de rentabilité <u>et<\/u> concluez sur l'opportunité du projet »<\/i> ; <i>« Identifiez les facteurs de motivation <u>puis<\/u> proposez des actions adaptées »<\/i>. Numérote chaque sous-tâche (3a, 3b…) : une sous-tâche oubliée, ce sont des points donnés au voisin.<\/li><li>Entoure les <b>verbes directeurs<\/b> et repère la <b>question finale développée<\/b> pour lui réserver 30-40 minutes.<\/li><\/ul><h2>Étape 3 — Lire les TITRES des annexes (2 min)<\/h2><p>La liste des annexes est une carte au trésor : <i>« Annexe 5 — Extraits du bilan fonctionnel »<\/i> te dit où se joue la question sur la trésorerie. Construis ton tableau de correspondance au brouillon : <i>Q1-Q2 → annexes 1-2 · Q3 → annexe 4…<\/i> Les questions précisent souvent elles-mêmes les annexes à mobiliser : surligne ces renvois.<\/p><h2>Étape 4 — Première lecture des annexes AVEC le surligneur (8-10 min)<\/h2><ul><li>Lis chaque annexe avec ses questions en tête. Surligne <b>uniquement<\/b> les éléments qui serviront : chiffres clés, citations, mots du programme.<\/li><li>Code couleur par dossier : au moment de rédiger, tes indices se retrouvent en un coup d'œil.<\/li><li>Note en marge la notion illustrée : <i>« = marque employeur », « = BFR trop élevé », « = risque externe »<\/i>. Ces annotations sont tes plans de réponse.<\/li><li>Pour les documents chiffrés : vérifie période et <b>unité<\/b> (k€ ! %) avant tout calcul.<\/li><\/ul><h2>Étape 5 — Les verbes directeurs du bac MSDGN<\/h2><table><tr><th>Verbe<\/th><th>Signification<\/th><th>Ce qui est attendu<\/th><\/tr><tr><td><b>Identifier / Repérer<\/b><\/td><td>Trouver et nommer<\/td><td>L'élément + le vocabulaire du programme + justification par l'annexe<\/td><\/tr><tr><td><b>Citer / Relever<\/b><\/td><td>Extraire<\/td><td>L'élément précis du document, rien de plus<\/td><\/tr><tr><td><b>Définir<\/b><\/td><td>Donner le sens<\/td><td>La définition exacte du cours (1ʳᵉ comme terminale !)<\/td><\/tr><tr><td><b>Caractériser<\/b><\/td><td>Décrire selon des critères<\/td><td>Les critères du cours passés en revue et justifiés<\/td><\/tr><tr><td><b>Distinguer<\/b><\/td><td>Différencier<\/td><td>Définir les deux notions et expliciter la différence (ex. : coût complet / coût spécifique)<\/td><\/tr><tr><td><b>Calculer<\/b><\/td><td>Résultat chiffré<\/td><td>Formule + application + résultat avec unité + interprétation<\/td><\/tr><tr><td><b>En déduire<\/b><\/td><td>Prolonger le résultat<\/td><td>Conclusion ou calcul qui s'appuie explicitement sur la question précédente<\/td><\/tr><tr><td><b>Expliquer<\/b><\/td><td>Faire comprendre<\/td><td>Mécanisme, causes, conséquences — avec les notions nommées<\/td><\/tr><tr><td><b>Analyser / Commenter<\/b><\/td><td>Décomposer et interpréter<\/td><td>Constat (annexe) + explication (cours) + portée pour l'organisation<\/td><\/tr><tr><td><b>Montrer que / Démontrer<\/b><\/td><td>Prouver une affirmation<\/td><td>Arguments AEI appuyés sur les annexes : le chemin compte autant que la conclusion<\/td><\/tr><tr><td><b>Justifier<\/b><\/td><td>Fonder par des preuves<\/td><td>Raisons appuyées sur le contexte, les annexes et le cours<\/td><\/tr><tr><td><b>Comparer<\/b><\/td><td>Mettre en regard<\/td><td>Critère par critère, avec écarts chiffrés si possible<\/td><\/tr><tr><td><b>Apprécier / Évaluer<\/b><\/td><td>Juger avec nuance<\/td><td>Avantages ET limites, appuyés sur le cas<\/td><\/tr><tr><td><b>Proposer / Conseiller / Recommander<\/b><\/td><td>Suggérer<\/td><td>Solutions réalistes, hiérarchisées, justifiées par le contexte<\/td><\/tr><tr><td><b>Dans quelle mesure… / Discuter<\/b><\/td><td>Débattre<\/td><td>Plan en deux axes (oui… / mais…), position finale claire — c'est la question développée<\/td><\/tr><\/table><blockquote><b>⚠️ Les erreurs qui coûtent le plus cher au bac<\/b> : une sous-question non vue (question lue trop vite) · une annexe jamais utilisée · « analysez » traité comme « citez » · la question développée bâclée en 10 minutes faute d'avoir géré son temps.<\/blockquote><h2>Check-list de fin d'épreuve (10 dernières minutes)<\/h2><ul><li>Compte tes réponses : autant que de questions ET de sous-questions ?<\/li><li>Unités des calculs, orthographe du vocabulaire du programme ?<\/li><li>Chaque réponse mentionne-t-elle « d'après l'annexe… » au moins une fois ?<\/li><\/ul>"

    "html": "<h2>La carte d'identité de l'épreuve<\/h2><table><tr><th>Élément<\/th><th>Détail<\/th><\/tr><tr><td><b>Durée<\/b><\/td><td>4 heures<\/td><\/tr><tr><td><b>Notation<\/b><\/td><td>Sur 20 points — <b>coefficient 16<\/b> (la plus grosse épreuve de ton bac !)<\/td><\/tr><tr><td><b>Programmes évalués<\/b><\/td><td>Management de 1ʳᵉ + Sciences de gestion et numérique de 1ʳᵉ + enseignement commun de terminale<\/td><\/tr><tr><td><b>Forme du sujet<\/b><\/td><td>Le cas d'une organisation réelle : plusieurs <b>dossiers<\/b> (souvent 3) composés de documents (annexes) et de questions (3 à 5 par dossier)<\/td><\/tr><tr><td><b>Dernière question<\/b><\/td><td>Souvent une question invitant à une <b>réponse développée et argumentée<\/b><\/td><\/tr><\/table><blockquote><b>Le message essentiel<\/b> : les programmes de PREMIÈRE comptent autant que celui de terminale. Réviser MSDGN, c'est réviser les trois matières de ce jeu !<\/blockquote><h2>Gérer ses 4 heures<\/h2><ul><li><b>0h00 – 0h20<\/b> : lecture complète du sujet. Identifie l'organisation (type, taille, activité, contexte) et survole TOUTES les annexes avant d'écrire.<\/li><li><b>0h20 – 3h20<\/b> : traite les dossiers. Environ <b>1 heure par dossier<\/b>, en gardant plus de temps pour la question développée.<\/li><li><b>3h20 – 3h50<\/b> : la réponse argumentée finale, au propre, structurée.<\/li><li><b>3h50 – 4h00<\/b> : relecture (unités des calculs, orthographe du vocabulaire, questions oubliées).<\/li><\/ul><h2>Les réflexes qui rapportent<\/h2><ul><li>Cite tes sources : <i>« d'après l'annexe 3… »<\/i> à chaque fois que tu utilises un document.<\/li><li>Nomme les notions du programme explicitement : le correcteur coche des mots-clés.<\/li><li>Réponds à TOUTES les questions, même brièvement : une question non traitée = 0 garanti.<\/li><li>Aère ta copie : titres de dossiers, paragraphes, lignes sautées.<\/li><\/ul><blockquote><b>⚠️ Important<\/b> : vérifie chaque année en classe les éventuelles évolutions du format avec ton professeur — cette fiche décrit l'épreuve telle que définie par la note de service en vigueur (session 2021 et suivantes).<\/blockquote>"

    "html": "<h2>Le principe : rien ne sort de nulle part<\/h2><p>Chaque question d'un dossier se résout en croisant <b>trois ingrédients<\/b> : le contexte de l'organisation + une ou plusieurs annexes + tes connaissances de cours. Une réponse qui n'utilise que l'un des trois est incomplète.<\/p><h2>Étape 1 — Photographier l'organisation (au brouillon)<\/h2><ul><li>Type, taille, activité, champ d'action, finalité (réflexe de 1ʳᵉ !)<\/li><li>Son problème central : que cherche-t-elle à faire ou à résoudre ?<\/li><li>Son environnement : concurrence, contraintes, opportunités.<\/li><\/ul><h2>Étape 2 — Associer chaque question à ses annexes<\/h2><p>Les questions indiquent souvent les annexes à utiliser. Sinon, repère-les toi-même et note au brouillon : <i>Q3 → annexes 2 et 4<\/i>. Puis lis l'annexe AVEC la question en tête : tu cherches une réponse, pas une lecture de loisir.<\/p><h2>Étape 3 — Le tri des annexes selon leur nature<\/h2><table><tr><th>Annexe<\/th><th>Réflexe<\/th><\/tr><tr><td><b>Texte (article, témoignage)<\/b><\/td><td>Surligner les mots du programme, identifier la source (interne ? externe ?)<\/td><\/tr><tr><td><b>Tableau de chiffres<\/b><\/td><td>Titre, période, unité, puis évolutions et écarts marquants<\/td><\/tr><tr><td><b>Compte de résultat / bilan<\/b><\/td><td>Repérer résultat, VA possible, grandes masses ; préparer les calculs demandés<\/td><\/tr><tr><td><b>Schéma / organigramme / processus<\/b><\/td><td>Lire la légende, suivre les flux, compter les étapes ou niveaux<\/td><\/tr><\/table><h2>Étape 4 — Rédiger en croisant<\/h2><blockquote><i>« L'annexe 4 montre que la note moyenne des avis en ligne baisse à 4,1/5 alors que seuls 12 % des avis reçoivent une réponse (<b>constat chiffré<\/b>). Or l'e-réputation est une composante de l'identité numérique de l'organisation (<b>notion de cours<\/b>) : l'entreprise doit organiser la réponse systématique aux avis pour restaurer la confiance (<b>application au contexte<\/b>). »<\/i><\/blockquote><h2>Les pièges du dossier documentaire<\/h2><ul><li>❌ Paraphraser l'annexe (recopier sans analyser) : zéro valeur ajoutée.<\/li><li>❌ Plaquer du cours hors contexte : la réponse doit parler DE cette organisation.<\/li><li>❌ Ignorer une annexe fournie : si elle existe, elle sert quelque part.<\/li><li>❌ Traiter les questions dans le désordre sans le signaler clairement sur la copie.<\/li><\/ul>"

    "url": "",
    "html": "<h2>Ce qu'on attend de toi<\/h2><p>La dernière question d'un sujet invite souvent à une réponse construite du type : <i>« Dans quelle mesure… ? », « L'organisation a-t-elle intérêt à… ? », « Que conseilleriez-vous… ? »<\/i>. On évalue ta capacité à <b>mobiliser plusieurs thèmes du programme<\/b> (première ET terminale), à <b>argumenter<\/b> et à <b>prendre position<\/b>.<\/p><h2>La structure attendue<\/h2><ul><li><b>Introduction (3-4 lignes)<\/b> : présente l'organisation en une phrase, reformule la question, annonce ton plan en deux axes.<\/li><li><b>Développement (2 axes, 2-3 arguments AEI chacun)<\/b> : pour une question « Dans quelle mesure… », le plan <i>« Oui, dans une certaine mesure / Mais avec des limites »<\/i> fonctionne presque toujours.<\/li><li><b>Conclusion (3 lignes)<\/b> : réponds clairement à la question, propose une recommandation ou une ouverture.<\/li><\/ul><h2>Le paragraphe AEI niveau bac<\/h2><blockquote><b>A<\/b> : « La digitalisation de la relation client constitue d'abord une opportunité commerciale. »<br/><b>E<\/b> : « Les traces numériques (avis, historiques, navigation) nourrissent la connaissance client et permettent de personnaliser l'offre, renforçant la fidélité — pilier de la performance commerciale. »<br/><b>I<\/b> : « Ainsi, l'annexe 5 indique que 61 % des clients sont identifiés via le programme de fidélité : un levier direct de personnalisation. »<\/blockquote><h2>Mobiliser les TROIS programmes<\/h2><p>Les meilleures copies relient les années : une question sur un investissement appelle le <i>financement<\/i> (terminale) ET le <i>seuil de rentabilité<\/i> (première SDGN) ET la <i>décision stratégique<\/i> (première management). Pendant tes révisions, entraîne-toi à tisser ces liens — c'est exactement ce que permettent les trois matières de ce jeu.<\/p><h2>Barème mental du correcteur<\/h2><ul><li>Structure visible (intro / axes / conclusion) ✔<\/li><li>Notions nommées et définies ✔<\/li><li>Arguments appuyés sur le cas et les annexes ✔<\/li><li>Prise de position finale claire et nuancée ✔<\/li><\/ul><blockquote><b>⚠️ Gestion du temps<\/b> : garde 30 à 40 minutes pour cette question. Bâclée en 10 minutes, elle plafonne ta note ; soignée, elle fait décoller la copie.<\/blockquote>"

    "html": "<h2>Formulaire — acquis de première<\/h2><table><tr><th>Indicateur<\/th><th>Formule<\/th><\/tr><tr><td>Valeur ajoutée<\/td><td>Production − consommations intermédiaires<\/td><\/tr><tr><td>Productivité<\/td><td>Production ÷ moyens utilisés (ex. heures)<\/td><\/tr><tr><td>Coût du travail<\/td><td>Salaires bruts + cotisations patronales<\/td><\/tr><tr><td>Résultat<\/td><td>Produits − charges<\/td><\/tr><tr><td>Marge sur coûts variables<\/td><td>CA − charges variables<\/td><\/tr><tr><td>Taux de marge sur coûts variables<\/td><td>Marge sur coûts variables ÷ CA<\/td><\/tr><tr><td>Seuil de rentabilité<\/td><td>Charges fixes ÷ taux de marge sur coûts variables<\/td><\/tr><tr><td>Solde de trésorerie<\/td><td>Encaissements − décaissements (et solde cumulé)<\/td><\/tr><\/table><h2>Formulaire — apports de terminale<\/h2><table><tr><th>Indicateur<\/th><th>Formule<\/th><th>Interprétation<\/th><\/tr><tr><td><b>FRNG<\/b><\/td><td>Ressources stables − emplois stables<\/td><td>La réserve de financement de long terme<\/td><\/tr><tr><td><b>BFR<\/b><\/td><td>(Stocks + créances clients) − dettes fournisseurs<\/td><td>L'argent immobilisé par le cycle d'exploitation<\/td><\/tr><tr><td><b>Trésorerie nette<\/b><\/td><td>FRNG − BFR<\/td><td>Positive = aisance ; négative = financement à trouver<\/td><\/tr><tr><td><b>Coût complet<\/b><\/td><td>Charges directes + charges indirectes imputées<\/td><td>Le coût « tout compris » d'un produit<\/td><\/tr><tr><td><b>Coût spécifique<\/b><\/td><td>Charges variables + charges fixes directes propres<\/td><td>Pour décider de maintenir ou d'abandonner un produit<\/td><\/tr><\/table><h2>Les 4 temps de la rédaction d'un calcul<\/h2><ul><li><b>1.<\/b> Formule écrite en toutes lettres<\/li><li><b>2.<\/b> Application numérique<\/li><li><b>3.<\/b> Résultat avec <b>unité<\/b> (€, k€, %, unités/h)<\/li><li><b>4.<\/b> Phrase d'interprétation : bonne ou mauvaise nouvelle ? comparé à quoi ? quelle décision en découle ?<\/li><\/ul><blockquote><b>Exemple complet<\/b> : « Trésorerie nette = FRNG − BFR = 120 − 150 = <b>−30 k€<\/b>. La trésorerie est négative : le fonds de roulement ne couvre pas le besoin né de l'exploitation. L'entreprise doit réduire son BFR (stocks, délais clients) ou négocier un financement court terme. »<\/blockquote><blockquote><b>⚠️ Pièges du bac<\/b> : unités mélangées (k€ et €) · taux en % non converti (40 % = 0,4) · confondre charges fixes et variables · oublier que le solde CUMULÉ de trésorerie se calcule de proche en proche · calculer sans conclure.<\/blockquote>"

    "html": "<h2>Le format officiel<\/h2><table><tr><th>Élément<\/th><th>Détail<\/th><\/tr><tr><td><b>Préparation<\/b><\/td><td>20 minutes (notes et support possibles, non évalués)<\/td><\/tr><tr><td><b>Épreuve<\/b><\/td><td>20 minutes : <b>10 min d'exposé<\/b> + <b>10 min d'entretien<\/b> avec le jury<\/td><\/tr><tr><td><b>Coefficient (voie techno)<\/b><\/td><td>14 jusqu'à la session 2026 incluse, puis 12 à compter de 2027<\/td><\/tr><tr><td><b>Les questions<\/b><\/td><td>Tu présentes 2 questions préparées dans l'année, validées par tes professeurs ; le jury en choisit UNE<\/td><\/tr><tr><td><b>En STMG<\/b><\/td><td>Les questions s'appuient sur la spécialité MSDGN (avec l'étude approfondie menée dans l'enseignement spécifique)<\/td><\/tr><\/table><h2>Choisir ses deux questions<\/h2><ul><li>Pars d'une <b>organisation réelle<\/b> que tu peux documenter — une entreprise réunionnaise rend ton oral unique et concret.<\/li><li>Formule une vraie question débattable : <i>« La digitalisation suffit-elle à fidéliser les clients de X ? »<\/i> plutôt que <i>« La digitalisation chez X »<\/i>.<\/li><li>Vérifie l'ancrage au programme : ta question doit mobiliser des notions identifiables (nomme-les dans l'exposé !).<\/li><li>Choisis deux questions assez différentes pour montrer l'étendue de tes connaissances.<\/li><\/ul><h2>Structurer les 10 minutes d'exposé<\/h2><ul><li><b>1 min<\/b> — Pourquoi cette question ? (motivation personnelle, lien avec ton parcours)<\/li><li><b>1 min<\/b> — Le contexte : l'organisation, son environnement, l'enjeu.<\/li><li><b>6-7 min<\/b> — Ta réponse argumentée en 2 axes, avec notions du programme ET données concrètes.<\/li><li><b>1 min<\/b> — Conclusion : réponse claire + ouverture (limite, perspective, lien avec ton projet).<\/li><\/ul><h2>Réussir les 10 minutes d'entretien<\/h2><ul><li>Le jury rebondit sur TON exposé : maîtrise chaque mot que tu prononces (si tu dis « PGI », sache le définir).<\/li><li>Une question difficile ? Reformule, raisonne à <script type="text/babel" data-presets="react">

}

/* ====== Stockage local (localStorage) ====== */
const LS_KEY = "pdg_scores_v1";
function loadScores(){
  try{ const raw = localStorage.getItem(LS_KEY); const arr = raw ? JSON.parse(raw) : [];
    let changed=false;
    arr.forEach((r,i)=>{ if(!r.id){ r.id = "e"+i+"_"+(r.date||"")+"_"+Math.random().toString(36).slice(2,7); changed=true; } });
    if(changed){ try{ localStorage.setItem(LS_KEY, JSON.stringify(arr)); }catch(e){} }
    return arr; }
  catch(e){ return []; }
}
function saveScore(rec){
  try{ const all = loadScores(); rec.id = "e_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
    all.push(rec); localStorage.setItem(LS_KEY, JSON.stringify(all)); }
  catch(e){}
  netPost({action:"score", rec:rec});
}
function clearScores(){ try{ localStorage.removeItem(LS_KEY); }catch(e){} }
function deleteScores(ids){
  try{ const set=new Set(ids); const all=loadScores().filter(r=>!set.has(r.id));
    localStorage.setItem(LS_KEY, JSON.stringify(all)); }catch(e){}
}
function exportScoresCSV(){
  const all = loadScores();
  if(!all.length){ alert("Aucun résultat à exporter."); return; }
  const head = ["Matiere","Nom","Prenom","Pseudo","Classe","Theme","Jeu","Score(%)","Date"];
  const lines = all.map(r=>[(r.matiere||"MGT"),r.nom,r.prenom,r.pseudo,r.classe,r.theme,r.game,r.pct,r.date].map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(";"));
  const csv = "\uFEFF"+head.join(";")+"\n"+lines.join("\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="resultats_pdg_en_mission.csv"; a.click(); URL.revokeObjectURL(url);
}

/* ====== HUB ÉLÈVE ====== */
function Hub({student,subject,onSwitch,onLogout}){
  const SD=ALL[subject]; const GAMES=gamesFor(subject); const THEMES=SUBJ[subject].themes;
  const [tab,setTab]=useState("jouer");
  const [theme,setTheme]=useState(1);
  const [progress,setProgress]=useState({}); // {"theme-game": bestPct}
  const [cloud,setCloud]=useState(false);
  const PKEY="mm_prog_"+subject+"_"+String(student.classe||"").trim().toLowerCase()+"_"+String(student.pseudo||"").trim().toLowerCase();
  const mergeMax=(a,b)=>{ const m={...a}; Object.keys(b||{}).forEach(k=>{ m[k]=Math.max(m[k]||0,+b[k]||0); }); return m; };
  useEffect(()=>{
    try{ const p=JSON.parse(localStorage.getItem(PKEY)||"{}"); if(p&&typeof p==="object") setProgress(prev=>mergeMax(prev,p)); }catch(e){}
    netGet({action:"progress",pseudo:String(student.pseudo||"").trim(),classe:String(student.classe||"").trim(),matiere:subject}).then(r=>{
      if(r&&r.ok&&Array.isArray(r.rows)){
        const p={}; r.rows.forEach(x=>{ const k=x.theme+"-"+x.game; p[k]=Math.max(p[k]||0,+x.pct||0); });
        setProgress(prev=>{ const m=mergeMax(prev,p); try{ localStorage.setItem(PKEY,JSON.stringify(m)); }catch(e){} return m; });
        setCloud(true);
      }
    });
  },[]);
  const [playing,setPlaying]=useState(null);

  const key=(t,g)=>t+"-"+g;
  const best=(t,g)=>progress[key(t,g)]||0;
  // Accès libre : tous les jeux d'un thème débloqué sont accessibles dans n'importe quel ordre.
  const unlocked=(t,gi)=> true;
  // thème débloqué si thème précédent a au moins 4 jeux validés
  const themeValidated=(t)=>GAMES.filter(g=>best(t,g.id)>=PASS).length;
  const themeUnlocked=(t)=> t===1 ? true : themeValidated(t-1)>=4;

  const finish=(t,g,pct)=>{
    setProgress(p=>{ const np={...p,[key(t,g)]:Math.max(p[key(t,g)]||0,pct)}; try{ localStorage.setItem(PKEY,JSON.stringify(np)); }catch(e){} return np; });
    saveScore({...student,matiere:subject,theme:t,game:g,pct,date:new Date().toISOString()});
    setPlaying(null);
  };

  if(playing) return <Stage student={student} subject={subject} theme={playing.theme} game={playing.game}
    onDone={(pct)=>finish(playing.theme,playing.game,pct)} onQuit={()=>setPlaying(null)} />;

  return (<div className="app">
    <header className="top">
      <div className="brand">{SUBJ[subject].icon} Mission {SUBJ[subject].short}</div>
      <div className="who">{student.pseudo} · <span className="cl">{student.classe}</span>{cloud&&<span className="cloud" title="Progression synchronisée avec le serveur">☁️</span>}</div>
      <button className="lo" onClick={onSwitch}>⇄ Matière</button>
      <button className="lo" onClick={onLogout}>Quitter</button>
    </header>
    <nav className="nav">
      <button className={tab==="jouer"?"nb on":"nb"} onClick={()=>setTab("jouer")}>🎮 Jouer</button>
      <button className={tab==="cours"?"nb on":"nb"} onClick={()=>setTab("cours")}>📘 Cours</button>
      <button className={tab==="prog"?"nb on":"nb"} onClick={()=>setTab("prog")}>📋 Programme</button>
      <button className={tab==="lex"?"nb on":"nb"} onClick={()=>setTab("lex")}>📖 Glossaire</button>
      <button className={tab==="res"?"nb on":"nb"} onClick={()=>setTab("res")}>🧰 Ressources</button>
    </nav>
    <main className="main">
      {tab==="jouer"&&(<>
        <div className="theme-pick">
          {THEMES.map(t=>{ const ok=themeUnlocked(t.n);
            return <button key={t.n} disabled={!ok} className={"tpill"+(theme===t.n?" on":"")+(ok?"":" lock")} style={{"--c":t.color}} onClick={()=>ok&&setTheme(t.n)}>
              {ok?"":"🔒 "}<b>Thème {t.n}</b><span>{t.short}</span></button>; })}
        </div>
        {!themeUnlocked(theme) ? <div className="locked-msg">🔒 Valide au moins 4 jeux du thème précédent pour débloquer ce thème.</div> :
        <>
        <div className="contract">📜 <b>Contrat de confiance</b> — Aucun piège : tout est dans le Cours et le Glossaire. Droit à l'erreur, chaque réponse s'explique. Tous les jeux du thème sont accessibles librement, dans l'ordre que tu veux. Valide 4 jeux (≥ {PASS}%) pour ouvrir le thème suivant.</div>
        <div className="games">
          {GAMES.map((g,gi)=>{ const ok = g.id==="docs" ? !!(SD.docs&&SD.docs[theme]&&SD.docs[theme].length) : unlocked(theme,gi); const b=best(theme,g.id);
            return (<div key={g.id} className={"gcard"+(ok?"":" lock")} style={{"--c":g.color}}>
              <div className="gicon">{ok?g.icon:"🔒"}</div>
              <div className="gtags">
                <span className="gbloom">{g.bloom}</span>
                <span className="gdiff" style={{background:DIFF_COLOR[g.diff]}}>{g.diff}</span>
              </div>
              <h3>{g.nom}</h3>
              <p>{g.desc}</p>
              {b>0&&<div className="gbest">{b>=PASS?"✅ ":""}Record : {b}%</div>}
              <button disabled={!ok} onClick={()=>setPlaying({theme,game:g.id})}>{ok?(b>0?"Rejouer":"Jouer"):"Verrouillé"}</button>
            </div>); })}
        </div></>}
      </>)}
      {tab==="cours"&&<Cours subject={subject}/>}
      {tab==="prog"&&<Prog subject={subject}/>}
      {tab==="lex"&&<Lex subject={subject}/>}
      {tab==="res"&&<Res subject={subject}/>}
    </main>
  </div>);
}

/* ====== STAGE : routeur de jeux ====== */
function Stage({student,subject,theme,game,onDone,onQuit}){
  const SD=ALL[subject];
  const meta=gamesFor(subject).find(g=>g.id===game)||GAMES_BASE[0];
  const head=<Ghead title={meta.nom+" — Thème "+theme} sub={meta.bloom} onQuit={onQuit}/>;
  if(game==="trieur")  return <Trieur D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="memory")  return <Memory D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="flash")   return <Flash D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="vraifaux")return <VraiFaux D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="intrus")  return <Intrus D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="cas")     return <Cas D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="mission") return <Mission D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="docs")    return <Docs D={SD} theme={theme} head={head} onDone={onDone}/>;
  return null;
}

/* ====== JEU 1 : TRIEUR ====== */
function Trieur({theme,head,onDone,D}){
  const cfg=D.trieur[theme];
  const [items]=useState(()=>[...cfg.items].map((it,i)=>({...it,_i:i})).sort(()=>Math.random()-0.5));
  const [sel,setSel]=useState(null);
  const [placed,setPlaced]=useState({}); // _i -> bac
  const [score,setScore]=useState(0); const [err,setErr]=useState(0); const [done,setDone]=useState(false);
  const remaining=items.filter(it=>placed[it._i]===undefined);

  const drop=(bac)=>{ if(sel===null) return; const it=items.find(x=>x._i===sel);
    const good=it.cat===bac;
    setPlaced(p=>({...p,[sel]:bac})); good?setScore(s=>s+1):setErr(e=>e+1); setSel(null);
    if(items.filter(x=>placed[x._i]===undefined && x._i!==sel).length===0) setTimeout(()=>setDone(true),250);
  };
  return (<div className="game">{head}
    <p className="help">{cfg.consigne} <span className="muted">Clique un élément, puis sa catégorie.</span></p>
    <div className="tray">{remaining.map(it=>(
      <button key={it._i} className={"tkn"+(sel===it._i?" sel":"")} onClick={()=>setSel(it._i)}>{it.label}</button>))}
      {remaining.length===0&&<span className="muted">Tous les éléments sont classés ✅</span>}</div>
    <div className="bacs">{cfg.bacs.map((b,bi)=>(
      <div key={bi} className="bac" onClick={()=>drop(bi)}>
        <div className="bac-h">{b}</div>
        <div className="bac-body">{items.filter(it=>placed[it._i]===bi).map(it=>(
          <span key={it._i} className={"chip2 "+(it.cat===bi?"ok":"no")}>{it.cat===bi?"✓":"✗"} {it.label}</span>))}</div>
      </div>))}</div>
    {done&&<Result score={score} total={items.length} onDone={onDone}/>}
  </div>);
}

/* ====== JEU 2 : MEMORY ====== */
function Memory({theme,head,onDone,D}){
  const pairs=D.memory[theme];
  const [cards]=useState(()=>{ let id=0; const arr=[];
    pairs.forEach((p,pi)=>{ arr.push({id:id++,pair:pi,txt:p.a}); arr.push({id:id++,pair:pi,txt:p.b}); });
    return arr.sort(()=>Math.random()-0.5); });
  const [flipped,setFlipped]=useState([]); const [matched,setMatched]=useState([]);
  const [tries,setTries]=useState(0); const [lock,setLock]=useState(false);
  const click=(c)=>{ if(lock||flipped.includes(c.id)||matched.includes(c.pair)) return;
    const nf=[...flipped,c.id]; setFlipped(nf);
    if(nf.length===2){ setLock(true); setTries(t=>t+1);
      const [a,b]=nf.map(id=>cards.find(x=>x.id===id));
      if(a.pair===b.pair){ setTimeout(()=>{setMatched(m=>[...m,a.pair]);setFlipped([]);setLock(false);},450); }
      else setTimeout(()=>{setFlipped([]);setLock(false);},800);
    } };
  const done=matched.length===pairs.length;
  return (<div className="game">{head}
    <p className="help">Retrouve les paires. Essais : <b>{tries}</b> <span className="muted">— pas de note ici, l'important c'est de tout retrouver !</span></p>
    <div className="mem-grid">{cards.map(c=>{ const show=flipped.includes(c.id)||matched.includes(c.pair);
      return <button key={c.id} className={"mcard"+(show?" up":"")+(matched.includes(c.pair)?" done":"")} onClick={()=>click(c)}>
        <span className="mc-front">?</span><span className="mc-back">{c.txt}</span></button>; })}</div>
    {done&&(<div className="res"><div className="medal">🎉</div><h2>Bravo !</h2>
      <p>Toutes les paires sont retrouvées. Le jeu suivant est débloqué.</p>
      <p className="muted">Terminé en {tries} essais — ici, peu importe le nombre d'erreurs : l'essentiel est d'avoir tout associé.</p>
      <button className="cta sm" onClick={()=>onDone(100)}>Continuer</button></div>)}
  </div>);
}

/* ====== JEU 3 : FLASH QUIZ (chrono + combo) ====== */
function Flash({theme,head,onDone,D}){
  const qs=D.flash[theme];
  const [i,setI]=useState(0); const [score,setScore]=useState(0); const [combo,setCombo]=useState(0);
  const [t,setT]=useState(10); const [picked,setPicked]=useState(null); const [done,setDone]=useState(false);
  const q=qs[i];
  useEffect(()=>{ if(done||picked!==null) return; if(t<=0){ choose(-1); return; }
    const id=setTimeout(()=>setT(x=>x-1),1000); return ()=>clearTimeout(id); },[t,picked,done]);
  const choose=(idx)=>{ if(picked!==null) return; setPicked(idx);
    const good=idx===q.c; if(good){ setScore(s=>s+1); setCombo(c=>c+1);} else setCombo(0);
    setTimeout(()=>{ if(i+1>=qs.length){setDone(true);} else {setI(i+1);setPicked(null);setT(10);} },700); };
  if(done) return <div className="game">{head}<Result score={score} total={qs.length} onDone={onDone}/></div>;
  return (<div className="game">{head}
    <div className="flash-bar"><div className="combo">🔥 Combo ×{combo}</div>

/* ====== JEU 7 : MISSION DIRIGEANT (simulation) ====== */
function Mission({theme,head,onDone,D}){
  const sim=D.mission[theme];
  const [etapes,setEtapes]=useState(()=>[...sim.etapes]);
  const [step,setStep]=useState(0);
  const [stats,setStats]=useState({treso:50,marche:50,image:50,emploi:50});
  const [fb,setFb]=useState(null); const [done,setDone]=useState(false);
  const extras=(D.missionExtra&&D.missionExtra[theme])||[];
  const [ext,setExt]=useState(false);
  const extend=()=>{ const start=etapes.length; setEtapes(es=>[...es,...extras].slice(0,10)); setExt(true); setDone(false); setStep(start); setFb(null); };
  const clamp=v=>Math.max(0,Math.min(100,v));
  const decide=(ch)=>{ if(fb) return;
    setStats(s=>({treso:clamp(s.treso+ch.eff.treso),marche:clamp(s.marche+ch.eff.marche),image:clamp(s.image+ch.eff.image),emploi:clamp(s.emploi+ch.eff.emploi)}));
    setFb(ch.fb); };
  const next=()=>{ setFb(null); if(step+1>=etapes.length) setDone(true); else setStep(step+1); };
  const total=Math.round((stats.treso+stats.marche+stats.image+stats.emploi)/4);
  const gauges=[["💰 Trésorerie","treso","#16a34a"],["📈 Part de marché","marche","#2563eb"],["🌟 Image","image","#f59e0b"],["👥 Emplois","emploi","#db2777"]];
  if(done){
    const verdict= total>=70?"Entreprise florissante ! Tes choix stratégiques ont porté leurs fruits 🏆"
      : total>=50?"Entreprise stable. Des décisions correctes, à affiner. 👍" : "Entreprise fragilisée. Reprends le cours et retente tes choix. 💪";
    return (<div className="game">{head}
      <div className="res"><div className="medal">{total>=70?"🏆":total>=50?"📊":"💪"}</div>
        <h2>Bilan : {total}/100</h2>
        <div className="gauges">{gauges.map(([lab,k,c])=>(<div key={k} className="gauge"><span>{lab}</span><div className="gbar"><div className="gfill" style={{width:stats[k]+"%",background:c}}/></div><b>{stats[k]}</b></div>))}</div>
        <p>{verdict}</p>
        {(!ext&&extras.length>0)&&(<button className="more" onClick={extend}>➕ Décisions supplémentaires (jusqu'à 10)</button>)}
        <button className="cta sm" onClick={()=>onDone(total)}>Continuer</button></div>
    </div>);
  }
  const e=etapes[step];
  return (<div className="game">{head}
    <div className="mission-top"><div className="mtitle">👑 {sim.titre}</div>
      <div className="mgauges">{gauges.map(([lab,k,c])=>(<div key={k} className="mg"><span>{lab.split(" ")[0]}</span><div className="mbar"><div className="mfill" style={{width:stats[k]+"%",background:c}}/></div></div>))}</div></div>
    {step===0&&!fb&&<p className="mintro">{sim.intro}</p>}
    <div className="scene"><div className="stag">Décision {step+1}/{etapes.length}</div><Media m={e.media}/><p>{e.scene}</p></div>
    {!fb?(<div className="opts">{e.choix.map((ch,idx)=>(<button key={idx} className="opt big" onClick={()=>decide(ch)}>{ch.txt}</button>))}</div>)
      :(<div className="fb good"><strong>Conséquences</strong><p>{fb}</p><button className="next" onClick={next}>{step+1>=etapes.length?"Voir le bilan":"Décision suivante →"}</button></div>)}
  </div>);
}

async function publishHTML(data){
  let src=null;
  try{ const r=await fetch(window.location.href); src=await r.text(); }catch(e){}
  if(!src||src.indexOf("/*__DATA_START__*/")<0){
    alert("Impossible de générer le fichier depuis cette page. Ouvre la version EN LIGNE du site (lien GitHub Pages), pas un fichier local, puis réessaie."); return;
  }
  const a0=src.indexOf("/*__DATA_START__*/"), a1=src.indexOf("/*__DATA_END__*/");
  const out=src.slice(0,a0)+"/*__DATA_START__*/\nwindow.GAME_DATA = "+JSON.stringify(data,null,1).replace(/<\//g,"<\\/")+";\n/*__DATA_END__*/"+src.slice(a1+16);
  const blob=new Blob([out],{type:"text/html;charset=utf-8"});
  const u=URL.createObjectURL(blob); const el=document.createElement("a");
  el.href=u; el.download="index.html"; el.click(); URL.revokeObjectURL(u);
}

      <button className="edadd2" onClick={()=>upd(n=>{ensure(n)[i].o.push("Nouvelle réponse");})}>+ ajouter une réponse</button>
      {type==="cas"&&(<><label className="edlab">Explication (feedback)</label>

    if(type==="vraifaux") return (<div className="edcard" key={i}>

    if(type==="intrus") return (<div className="edcard" key={i}>

      <label className="edlab">Éléments — coche l'intrus</label>
      {it.liste.map((el,li)=>(<div className="edopt" key={li}>
        <input type="radio" checked={it.intrus===li} onChange={()=>setItem(i,{intrus:li})}/>

      <label className="edlab">Explication</label>
      <textarea value={it.why} onChange={e=>setItem(i,{why:e.target.value})}/>

    return (<div className="edcard" key={i}>
      <div className="edhead"><b>Décision {i+1}</b><button className="edx" onClick={()=>del(i)}>🗑 Supprimer</button></div>
      <label className="edlab">Situation</label>
      <textarea value={it.scene} onChange={e=>setItem(i,{scene:e.target.value})}/>
      {it.choix.map((ch,ci)=>(<div className="edchoice" key={ci}>

      </select>
      <select value={theme} onChange={e=>setTheme(+e.target.value)}>
        {TH.map(t=><option key={t.n} value={t.n}>Thème {t.n} — {t.short}</option>)}
      </select>

        <option value="trieur">🗂️ Le Trieur</option><option value="memory">🃏 Memory</option>
        <option value="flash">⚡ Flash Quiz</option><option value="vraifaux">⚖️ Vrai ou Faux</option>
        <option value="intrus">🔎 L'Intrus — base</option><option value="intrusExtra">🔎 L'Intrus — supplémentaires</option>

    {msg&&<div className="edmsg">{msg}</div>}

    </div>)}
    {bank!=="config"&&<button className="edadd" disabled={!canAdd} onClick={add}>{canAdd?"➕ Ajouter un élément":"Limite de 10 atteinte (base + supplémentaires)"}</button>}
  </div>);
}

/* ====== TABLEAU DE BORD PROF ====== */
function Teacher({onLogout}){
  const [scores,setScores]=useState(null);
  const [mat,setMat]=useState("MGT");
  const [sync,setSync]=useState(null);
  const [fc,setFc]=useState("Toutes"); const [view,setView]=useState("eleves");
  const [sel,setSel]=useState({}); // id -> true
  const [pwOpen,setPwOpen]=useState(false);
  const [pw1,setPw1]=useState(""); const [pw2,setPw2]=useState(""); const [pwMsg,setPwMsg]=useState("");
  const refresh=()=>{ setSel({});
    const local=loadScores();
    if(!CFG.syncUrl){ setScores(local); setSync(null); return; }
    setScores(null);
    netGet({action:"scores"}).then(r=>{
      if(r&&r.ok&&Array.isArray(r.rows)){
        const seen=new Set(local.map(x=>x.id));
        setScores(local.concat(r.rows.filter(x=>x&&x.id&&!seen.has(x.id)))); setSync(true);
      } else { setScores(local); setSync(false); }
    });
  };
  useEffect(()=>{refresh();},[]);
  if(scores===null) return <div className="loading">Chargement des résultats…</div>;
  const GAMES=gamesFor(mat); const THEMES=SUBJ[mat].themes;
  const TN=THEMES.map(t=>t.n); const TOT=GAMES.length*THEMES.length;
  const ms=scores.filter(s=>(s.matiere||"MGT")===mat);
  const classes=["Toutes",...Array.from(new Set(ms.map(s=>s.classe)))];
  const fl= fc==="Toutes"?ms:ms.filter(s=>s.classe===fc);

  const selIds=Object.keys(sel).filter(id=>sel[id]);
  const toggle=(id)=>setSel(s=>({...s,[id]:!s[id]}));
  const toggleAll=(rows)=>{ const allSel=rows.every(r=>sel[r.id]); const n={...sel}; rows.forEach(r=>n[r.id]=!allSel); setSel(n); };
  const delSel=()=>{ if(!selIds.length) return; if(confirm("Supprimer "+selIds.length+" entrée(s) sélectionnée(s) ?")){ deleteScores(selIds); refresh(); } };
  const changePw=()=>{ if(pw1.length<4){setPwMsg("4 caractères minimum.");return;} if(pw1!==pw2){setPwMsg("Les deux saisies diffèrent.");return;}
    setTeacherPw(pw1); setPwMsg("✅ Mot de passe modifié sur cet appareil."); setPw1("");setPw2(""); setTimeout(()=>{setPwOpen(false);setPwMsg("");},1400); };

  // par élève : meilleur pct par (theme,game)
  const byS={};
  fl.forEach(s=>{ const k=s.classe+"|"+s.pseudo;
    if(!byS[k]) byS[k]={nom:s.nom,prenom:s.prenom,pseudo:s.pseudo,classe:s.classe,cells:{},parties:0};
    const ck=s.theme+"-"+s.game; byS[k].cells[ck]=Math.max(byS[k].cells[ck]||0,s.pct); byS[k].parties++; });
  const students=Object.values(byS).map(st=>{
    const valid=Object.values(st.cells).filter(v=>v>=PASS).length;
    const vals=Object.values(st.cells); const moy=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
    const themeProg=TN.map(t=>GAMES.filter(g=>(st.cells[t+"-"+g.id]||0)>=PASS).length);
    return {...st,valid,moy,themeProg};
  }).sort((a,b)=>b.valid-a.valid||b.moy-a.moy);

  // par classe
  const byC={};
  ms.forEach(s=>{ if(!byC[s.classe]) byC[s.classe]={classe:s.classe,pcts:[],el:new Set()}; byC[s.classe].pcts.push(s.pct); byC[s.classe].el.add(s.pseudo); });
  const cstats=Object.values(byC).map(c=>({classe:c.classe,moy:Math.round(c.pcts.reduce((a,b)=>a+b,0)/c.pcts.length),nb:c.el.size,parties:c.pcts.length})).sort((a,b)=>b.moy-a.moy);

  // détail des parties (entrées individuelles, filtrées)
  const gameName=(id)=>{ const g=[...GAMES_BASE,DOCS_GAME].find(x=>x.id===id); return g?g.nom:id; };
  const fmtDate=(d)=>{ try{ return new Date(d).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } };
  const detail=[...fl].sort((a,b)=> (b.date||"").localeCompare(a.date||""));

  return (<div className="app">
    <header className="top prof"><div className="brand">👩‍🏫 Espace Professeur</div><button className="lo" onClick={onLogout}>Déconnexion</button></header>
    <div className="ptool">
      <div className="seg"><button className={view==="eleves"?"on":""} onClick={()=>setView("eleves")}>👤 Élèves</button>
        <button className={view==="themes"?"on":""} onClick={()=>setView("themes")}>📚 Par thème</button>
        <button className={view==="classes"?"on":""} onClick={()=>setView("classes")}>🏫 Classes</button>
        <button className={view==="detail"?"on":""} onClick={()=>setView("detail")}>📝 Détail</button>
        <button className={view==="editor"?"on":""} onClick={()=>setView("editor")}>✏️ Éditeur</button></div>
      <span className={"syncpill"+(sync===true?" on":sync===false?" err":"")} title={sync===true?"Scores synchronisés avec le serveur":sync===false?"URL configurée mais serveur injoignable — vérifie le déploiement du script":"Mode local : configure la synchronisation dans l'Éditeur (banque ⚙️)"}>{sync===true?"☁️ Sync":sync===false?"⚠️ Sync":"💾 Local"}</span>
      <select value={mat} onChange={e=>setMat(e.target.value)}><option value="MGT">🧭 Management 1ʳᵉ</option><option value="SDG">🖥️ SDGN 1ʳᵉ</option><option value="TLE">🎓 MSDGN Tle</option></select>
      <select value={fc} onChange={e=>setFc(e.target.value)}>{classes.map(c=><option key={c}>{c}</option>)}</select>
      <button className="rf" onClick={refresh}>↻ Actualiser</button>
      <button className="rf alt" onClick={exportScoresCSV}>⬇ Export Excel (CSV)</button>
      <button className="rf pw" onClick={()=>{setPwOpen(!pwOpen);setPwMsg("");}}>🔑 Mot de passe</button>
      <button className="rf danger" onClick={()=>{ if(confirm("Effacer TOUS les résultats enregistrés sur cet appareil ?")){ clearScores(); refresh(); } }}>🗑 Tout effacer</button>
    </div>
    {pwOpen&&(<div className="pwbox">
      <div className="pwt">🔑 Changer le mot de passe professeur</div>
      <p className="pwh">Il est enregistré sur cet appareil uniquement. Note-le bien : il n'est affiché nulle part.</p>
      <div className="pwrow">
        <input type="password" placeholder="Nouveau mot de passe" value={pw1} onChange={e=>setPw1(e.target.value)}/>
        <input type="password" placeholder="Confirmer" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&changePw()}/>
        <button className="rf alt" onClick={changePw}>Enregistrer</button>
      </div>
      {pwMsg&&<div className="pwmsg">{pwMsg}</div>}
    </div>)}
    {view!=="editor"&&ms.length===0&&<div className="empty">Aucun résultat pour l'instant. Les scores apparaîtront dès que les élèves auront joué.</div>}

    {view==="eleves"&&ms.length>0&&(<div className="twrap"><table className="pt">
      <thead><tr><th>#</th><th>Élève</th><th>Classe</th><th>Jeux validés</th><th>Moyenne</th><th>Progression (T1·T2·T3)</th></tr></thead>
      <tbody>{students.map((st,i)=>(<tr key={i}>
        <td className="rk">{i+1}</td><td className="nm">{(st.prenom||st.nom)?(st.prenom+" "+st.nom).trim():st.pseudo}{(st.prenom||st.nom)?<span className="ps">{st.pseudo}</span>:null}</td><td>{st.classe}</td>
        <td><b>{st.valid}</b>/{TOT}</td>
        <td><b className="moy" style={{color:st.moy>=PASS?"#16a34a":"#dc2626"}}>{st.moy}%</b></td>
        <td><div className="tp">{st.themeProg.map((v,ti)=><span key={ti} className="tpb"><i style={{width:(v/GAMES.length*100)+"%",background:THEMES[ti].color}}/></span>)} <span className="tpn">{st.themeProg.join(" · ")}/{GAMES.length}</span></div></td>
      </tr>))}</tbody></table></div>)}

    {view==="themes"&&ms.length>0&&(<div className="twrap"><table className="pt">
      <thead><tr><th>Élève</th>{TN.map(t=>GAMES.map(g=><th key={t+g.id} className="th-mini" title={"T"+t+" "+g.nom}>{g.icon}<small>T{t}</small></th>))}</tr></thead>
      <tbody>{students.map((st,i)=>(<tr key={i}><td className="nm">{(st.prenom||st.nom)?(st.prenom+" "+st.nom).trim():st.pseudo}</td>
        {TN.map(t=>GAMES.map(g=>{ const v=st.cells[t+"-"+g.id]; return <td key={t+g.id}><Cell v={v}/></td>; }))}</tr>))}</tbody>
    </table><div className="legend">Chaque colonne = un jeu pour un thème. Vert ≥ {PASS}%.</div></div>)}

    {view==="classes"&&ms.length>0&&(<div className="twrap"><table className="pt">
      <thead><tr><th>#</th><th>Classe</th><th>Élèves actifs</th><th>Parties</th><th>Moyenne classe</th></tr></thead>
      <tbody>{cstats.map((c,i)=>(<tr key={i}><td className="rk">{i+1}</td><td className="nm">{c.classe}</td><td>{c.nb}</td><td>{c.parties}</td>
        <td><div className="cbar"><div className="cfill" style={{width:c.moy+"%",background:c.moy>=PASS?"#16a34a":"#f59e0b"}}/></div><span className="cval">{c.moy}%</span></td></tr>))}</tbody>
    </table></div>)}

    {view==="detail"&&ms.length>0&&(<>
      <div className="selbar">
        <span>{selIds.length} entrée(s) sélectionnée(s)</span>
        <button className="rf danger nb-l" disabled={!selIds.length} onClick={delSel}>🗑 Supprimer la sélection</button>
      </div>
      <div className="twrap"><table className="pt">
        <thead><tr>
          <th><input type="checkbox" checked={detail.length>0&&detail.every(r=>sel[r.id])} onChange={()=>toggleAll(detail)}/></th>
          <th>Élève</th><th>Classe</th><th>Thème</th><th>Jeu</th><th>Score</th><th>Date</th>
        </tr></thead>
        <tbody>{detail.map(r=>(<tr key={r.id} className={sel[r.id]?"selrow":""}>
          <td><input type="checkbox" checked={!!sel[r.id]} onChange={()=>toggle(r.id)}/></td>
          <td className="nm">{(r.prenom||r.nom)?(r.prenom+" "+r.nom).trim():r.pseudo}{(r.prenom||r.nom)?<span className="ps">{r.pseudo}</span>:null}</td>
          <td>{r.classe}</td><td>T{r.theme}</td><td>{gameName(r.game)}</td>
          <td><Cell v={r.pct}/></td><td className="dt">{fmtDate(r.date)}</td>
        </tr>))}</tbody>
      </table></div>
    </>)}

    {view==="editor"&&<Editor/>}
    <div className="pn">Un jeu est « validé » à {PASS}%. {TOT} jeux au total pour la matière affichée ({GAMES.length} jeux × {THEMES.length} thèmes). Les résultats sont enregistrés sur CET appareil (navigateur). Utilise l'export CSV pour les conserver ou les ouvrir dans Excel.</div>
  </div>);
}
function Cell({v}){ if(v===undefined) return <span className="nc">·</span>;
  const c=v>=PASS?"#16a34a":v>0?"#f59e0b":"#dc2626";
  return <span className="sc" style={{background:c+"22",color:c,borderColor:c+"55"}}>{v}</span>; }

/* ====== ROOT ====== */
function App(){
  const [screen,setScreen]=useState("login"); const [student,setStudent]=useState(null);
  const [subject,setSubject]=useState(null);
  return (<>{screen==="login"&&<Login onStudent={s=>{setStudent(s);setScreen("matiere")}} onTeacher={()=>setScreen("teacher")}/>}
    {screen==="matiere"&&<Matiere student={student} onPick={m=>{setSubject(m);setScreen("student")}} onLogout={()=>setScreen("login")}/>}
    {screen==="student"&&<Hub key={subject} student={student} subject={subject} onSwitch={()=>setScreen("matiere")} onLogout={()=>setScreen("login")}/>}
    {screen==="teacher"&&<Teacher onLogout={()=>setScreen("login")}/>}</>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
