async function publishHTML(data){
  let src=null;
  try{ const r=await fetch(window.location.href); src=await r.text(); }catch(e){}
  if(!src||src.indexOf("/*__DATA_START__*/")<0){
    alert("Impossible de générer le fichier depuis cette page. Ouvre la version EN LIGNE du site (lien GitHub Pages), pas un fichier local, puis réessaie."); return;
  }
  const a0=src.indexOf("/*__DATA_START__*/"), a1=src.indexOf("/*__DATA_END__*/");
  const out=src.slice(0,a0)+"/*__DATA_START__*/\nwindow.GAME_DATA = "+JSON.stringify(data,null,1).replace(/<\//g,"<\\/")+";\n/*__DATA_END__*/"+src.slice(a1+16);
  const blob=new Blob([out],{type:"text/html;charset=utf-8"});
  const u=URL.createObjectURL(blob); const el=document.createElement("a");
  el.href=u; el.download="index.html"; el.click(); URL.revokeObjectURL(u);
}

/* ====== TABLEAU DE BORD PROF ====== */
function Teacher({onLogout}){
  const [scores,setScores]=useState(null);
  const [mat,setMat]=useState("MGT");
  const [sync,setSync]=useState(null);
  const [fc,setFc]=useState("Toutes"); const [view,setView]=useState("eleves");
  const [sel,setSel]=useState({}); // id -> true
  const [pwOpen,setPwOpen]=useState(false);
  const [pw1,setPw1]=useState(""); const [pw2,setPw2]=useState(""); const [pwMsg,setPwMsg]=useState("");
  const refresh=()=>{ setSel({});
    const local=loadScores();
    if(!CFG.syncUrl){ setScores(local); setSync(null); return; }
    setScores(null);
    netGet({action:"scores"}).then(r=>{
      if(r&&r.ok&&Array.isArray(r.rows)){
        const seen=new Set(local.map(x=>x.id));
        setScores(local.concat(r.rows.filter(x=>x&&x.id&&!seen.has(x.id)))); setSync(true);
      } else { setScores(local); setSync(false); }
    });
  };
  useEffect(()=>{refresh();},[]);
  if(scores===null) return <div className="loading">Chargement des résultats…</div>;
  const GAMES=gamesFor(mat); const THEMES=SUBJ[mat].themes;
  const TN=THEMES.map(t=>t.n); const TOT=GAMES.length*THEMES.length;
  const ms=scores.filter(s=>(s.matiere||"MGT")===mat);
  const classes=["Toutes",...Array.from(new Set(ms.map(s=>s.classe)))];
  const fl= fc==="Toutes"?ms:ms.filter(s=>s.classe===fc);

  const selIds=Object.keys(sel).filter(id=>sel[id]);
  const toggle=(id)=>setSel(s=>({...s,[id]:!s[id]}));
  const toggleAll=(rows)=>{ const allSel=rows.every(r=>sel[r.id]); const n={...sel}; rows.forEach(r=>n[r.id]=!allSel); setSel(n); };
  const delSel=()=>{ if(!selIds.length) return; if(confirm("Supprimer "+selIds.length+" entrée(s) sélectionnée(s) ?")){ deleteScores(selIds); refresh(); } };
  const changePw=()=>{ if(pw1.length<4){setPwMsg("4 caractères minimum.");return;} if(pw1!==pw2){setPwMsg("Les deux saisies diffèrent.");return;}
    setTeacherPw(pw1); setPwMsg("✅ Mot de passe modifié sur cet appareil."); setPw1("");setPw2(""); setTimeout(()=>{setPwOpen(false);setPwMsg("");},1400); };

  // par élève : meilleur pct par (theme,game)
  const byS={};
  fl.forEach(s=>{ const k=s.classe+"|"+s.pseudo;
    if(!byS[k]) byS[k]={nom:s.nom,prenom:s.prenom,pseudo:s.pseudo,classe:s.classe,cells:{},parties:0};
    const ck=s.theme+"-"+s.game; byS[k].cells[ck]=Math.max(byS[k].cells[ck]||0,s.pct); byS[k].parties++; });
  const students=Object.values(byS).map(st=>{
    const valid=Object.values(st.cells).filter(v=>v>=PASS).length;
    const vals=Object.values(st.cells); const moy=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
    const themeProg=TN.map(t=>GAMES.filter(g=>(st.cells[t+"-"+g.id]||0)>=PASS).length);
    return {...st,valid,moy,themeProg};
  }).sort((a,b)=>b.valid-a.valid||b.moy-a.moy);

  // par classe
  const byC={};
  ms.forEach(s=>{ if(!byC[s.classe]) byC[s.classe]={classe:s.classe,pcts:[],el:new Set()}; byC[s.classe].pcts.push(s.pct); byC[s.classe].el.add(s.pseudo); });
  const cstats=Object.values(byC).map(c=>({classe:c.classe,moy:Math.round(c.pcts.reduce((a,b)=>a+b,0)/c.pcts.length),nb:c.el.size,parties:c.pcts.length})).sort((a,b)=>b.moy-a.moy);

  // détail des parties (entrées individuelles, filtrées)
  const gameName=(id)=>{ const g=[...GAMES_BASE,DOCS_GAME].find(x=>x.id===id); return g?g.nom:id; };
  const fmtDate=(d)=>{ try{ return new Date(d).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } };
  const detail=[...fl].sort((a,b)=> (b.date||"").localeCompare(a.date||""));

  return (<div className="app">
    <header className="top prof"><div className="brand">👩‍🏫 Espace Professeur</div><button className="lo" onClick={onLogout}>Déconnexion</button></header>
    <div className="ptool">
      <div className="seg"><button className={view==="eleves"?"on":""} onClick={()=>setView("eleves")}>👤 Élèves</button>
        <button className={view==="themes"?"on":""} onClick={()=>setView("themes")}>📚 Par thème</button>
        <button className={view==="classes"?"on":""} onClick={()=>setView("classes")}>🏫 Classes</button>
        <button className={view==="detail"?"on":""} onClick={()=>setView("detail")}>📝 Détail</button>
        <button className={view==="editor"?"on":""} onClick={()=>setView("editor")}>✏️ Éditeur</button></div>
      <span className={"syncpill"+(sync===true?" on":sync===false?" err":"")} title={sync===true?"Scores synchronisés avec le serveur":sync===false?"URL configurée mais serveur injoignable — vérifie le déploiement du script":"Mode local : configure la synchronisation dans l'Éditeur (banque ⚙️)"}>{sync===true?"☁️ Sync":sync===false?"⚠️ Sync":"💾 Local"}</span>
      <select value={mat} onChange={e=>setMat(e.target.value)}><option value="SEC">🚀 Découverte STMG (2ᵈᵉ)</option><option value="MGT">🧭 Management 1ʳᵉ</option><option value="SDG">🖥️ SDGN 1ʳᵉ</option><option value="TLE">🎓 MSDGN Tle</option><option value="DR1">⚖️ Droit 1ʳᵉ</option><option value="ECO1">📈 Économie 1ʳᵉ</option><option value="DRT">⚖️ Droit Tle</option><option value="ECOT">📈 Économie Tle</option><option value="GO">🎤 Grand oral</option></select>
      <select value={fc} onChange={e=>setFc(e.target.value)}>{classes.map(c=><option key={c}>{c}</option>)}</select>
      <button className="rf" onClick={refresh}>↻ Actualiser</button>
      <button className="rf alt" onClick={exportScoresCSV}>⬇ Export Excel (CSV)</button>
      <button className="rf pw" onClick={()=>{setPwOpen(!pwOpen);setPwMsg("");}}>🔑 Mot de passe</button>
      <button className="rf danger" onClick={()=>{ if(confirm("Effacer TOUS les résultats enregistrés sur cet appareil ?")){ clearScores(); refresh(); } }}>🗑 Tout effacer</button>
    </div>
    {pwOpen&&(<div className="pwbox">
      <div className="pwt">🔑 Changer le mot de passe professeur</div>
      <p className="pwh">Il est enregistré sur cet appareil uniquement. Note-le bien : il n'est affiché nulle part.</p>
      <div className="pwrow">
        <input type="password" placeholder="Nouveau mot de passe" value={pw1} onChange={e=>setPw1(e.target.value)}/>
        <input type="password" placeholder="Confirmer" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&changePw()}/>
        <button className="rf alt" onClick={changePw}>Enregistrer</button>
      </div>
      {pwMsg&&<div className="pwmsg">{pwMsg}</div>}
    </div>)}
    {view!=="editor"&&ms.length===0&&<div className="empty">Aucun résultat pour l'instant. Les scores apparaîtront dès que les élèves auront joué.</div>}

    {view==="eleves"&&ms.length>0&&(<div className="twrap"><table className="pt">
      <thead><tr><th>#</th><th>Élève</th><th>Classe</th><th>Jeux validés</th><th>Moyenne</th><th>Progression (T1·T2·T3)</th></tr></thead>
      <tbody>{students.map((st,i)=>(<tr key={i}>
        <td className="rk">{i+1}</td><td className="nm">{(st.prenom||st.nom)?(st.prenom+" "+st.nom).trim():st.pseudo}{(st.prenom||st.nom)?<span className="ps">{st.pseudo}</span>:null}</td><td>{st.classe}</td>
        <td><b>{st.valid}</b>/{TOT}</td>
        <td><b className="moy" style={{color:st.moy>=PASS?"#16a34a":"#dc2626"}}>{st.moy}%</b></td>
        <td><div className="tp">{st.themeProg.map((v,ti)=><span key={ti} className="tpb"><i style={{width:(v/GAMES.length*100)+"%",background:THEMES[ti].color}}/></span>)} <span className="tpn">{st.themeProg.join(" · ")}/{GAMES.length}</span></div></td>
      </tr>))}</tbody></table></div>)}

    {view==="themes"&&ms.length>0&&(<div className="twrap"><table className="pt">
      <thead><tr><th>Élève</th>{TN.map(t=>GAMES.map(g=><th key={t+g.id} className="th-mini" title={"T"+t+" "+g.nom}>{g.icon}<small>T{t}</small></th>))}</tr></thead>
      <tbody>{students.map((st,i)=>(<tr key={i}><td className="nm">{(st.prenom||st.nom)?(st.prenom+" "+st.nom).trim():st.pseudo}</td>
        {TN.map(t=>GAMES.map(g=>{ const v=st.cells[t+"-"+g.id]; return <td key={t+g.id}><Cell v={v}/></td>; }))}</tr>))}</tbody>
    </table><div className="legend">Chaque colonne = un jeu pour un thème. Vert ≥ {PASS}%.</div></div>)}

    {view==="classes"&&ms.length>0&&(<div className="twrap"><table className="pt">
      <thead><tr><th>#</th><th>Classe</th><th>Élèves actifs</th><th>Parties</th><th>Moyenne classe</th></tr></thead>
      <tbody>{cstats.map((c,i)=>(<tr key={i}><td className="rk">{i+1}</td><td className="nm">{c.classe}</td><td>{c.nb}</td><td>{c.parties}</td>
        <td><div className="cbar"><div className="cfill" style={{width:c.moy+"%",background:c.moy>=PASS?"#16a34a":"#f59e0b"}}/></div><span className="cval">{c.moy}%</span></td></tr>))}</tbody>
    </table></div>)}

    {view==="detail"&&ms.length>0&&(<>
      <div className="selbar">
        <span>{selIds.length} entrée(s) sélectionnée(s)</span>
        <button className="rf danger nb-l" disabled={!selIds.length} onClick={delSel}>🗑 Supprimer la sélection</button>
      </div>
      <div className="twrap"><table className="pt">
        <thead><tr>
          <th><input type="checkbox" checked={detail.length>0&&detail.every(r=>sel[r.id])} onChange={()=>toggleAll(detail)}/></th>
          <th>Élève</th><th>Classe</th><th>Thème</th><th>Jeu</th><th>Score</th><th>Date</th>
        </tr></thead>
        <tbody>{detail.map(r=>(<tr key={r.id} className={sel[r.id]?"selrow":""}>
          <td><input type="checkbox" checked={!!sel[r.id]} onChange={()=>toggle(r.id)}/></td>
          <td className="nm">{(r.prenom||r.nom)?(r.prenom+" "+r.nom).trim():r.pseudo}{(r.prenom||r.nom)?<span className="ps">{r.pseudo}</span>:null}</td>
          <td>{r.classe}</td><td>T{r.theme}</td><td>{gameName(r.game)}</td>
          <td><Cell v={r.pct}/></td><td className="dt">{fmtDate(r.date)}</td>
        </tr>))}</tbody>
      </table></div>
    </>)}

    {view==="editor"&&<Editor/>}
    <div className="pn">Un jeu est « validé » à {PASS}%. {TOT} jeux au total pour la matière affichée ({GAMES.length} jeux × {THEMES.length} thèmes). Les résultats sont enregistrés sur CET appareil (navigateur). Utilise l'export CSV pour les conserver ou les ouvrir dans Excel.</div>
  </div>);
}
function Cell({v}){ if(v===undefined) return <span className="nc">·</span>;
  const c=v>=PASS?"#16a34a":v>0?"#f59e0b":"#dc2626";
  return <span className="sc" style={{background:c+"22",color:c,borderColor:c+"55"}}>{v}</span>; }

/* ====== ROOT ====== */
function App(){
  const [screen,setScreen]=useState("login"); const [student,setStudent]=useState(null);
  const [subject,setSubject]=useState(null);
  return (<>{screen==="login"&&<Login onStudent={s=>{setStudent(s);setScreen("matiere")}} onTeacher={()=>setScreen("teacher")}/>}
    {screen==="matiere"&&<Matiere student={student} onPick={m=>{setSubject(m);setScreen("student")}} onLogout={()=>setScreen("login")}/>}
    {screen==="student"&&<Hub key={subject} student={student} subject={subject} onSwitch={()=>setScreen("matiere")} onLogout={()=>setScreen("login")}/>}
    {screen==="teacher"&&<Teacher onLogout={()=>setScreen("login")}/>}</>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
