  3:[ {cas:"Cilaos choisit de rester concentrée sur l'eau de source, son unique métier.", q:"Quelle stratégie globale reconnaît-on ?", o:["Diversification","Spécialisation","Intégration"], c:1, why:"Concentrer ses ressources sur un seul domaine d'activité, c'est la spécialisation."},

      {cas:"Une sucrerie achète des champs de canne pour maîtriser son approvisionnement.", q:"Quelle stratégie reconnaît-on ?", o:["Externalisation","Intégration (vers l'amont)","Différenciation"], c:1, why:"Internaliser un maillon situé avant son activité dans la filière, c'est l'intégration vers l'amont (diversification verticale)."},

      {cas:"La Région finance un réseau de bus à tarif réduit, accessible à tous les habitants.", q:"Quelle logique stratégique guide ce choix ?", o:["Le profit","L'intérêt général (organisation publique)","La part de marché"], c:1, why:"Les options stratégiques des organisations publiques sont guidées par l'intérêt général."},

/* ============================================================
   SDGN — Sciences de gestion et numérique 1ère STMG
   BO spécial n°1 du 22 janvier 2019 (annexe 3)
   4 thèmes / 10 questions de gestion / 8 mécaniques de jeu
   Contextualisation Réunion (974)
============================================================ */
notions: [
  { id:"sdg-action-collective", theme:1, terme:"Action collective organisée",
    aca:"Action menée par un groupe structuré (l'organisation) qui coordonne des individus, des ressources et des règles pour atteindre des buts communs durables.",
    simple:"Quand plusieurs personnes s'organisent ensemble, avec des règles et des moyens, pour atteindre un même but.",
    ex:"Chez Air Austral, pilotes, hôtesses, mécaniciens et agents au sol coordonnent leur travail pour faire décoller chaque vol à l'heure." },
  { id:"sdg-gouvernement", theme:1, terme:"Gouvernement de l'organisation",
    aca:"Manière dont l'organisation est dirigée et contrôlée : structure de propriété (qui la possède), buts poursuivis et mode de contrôle des dirigeants.",
    simple:"Qui possède l'organisation, qui commande, et qui surveille ceux qui commandent.",
    ex:"Dans une entreprise familiale comme Isautier, la famille actionnaire choisit les dirigeants et contrôle leurs décisions." },
  { id:"sdg-individu", theme:1, terme:"Individu : personnalité, perception, attitude",
    aca:"Chaque individu possède des caractéristiques propres — personnalité, émotions, perception des situations, attitudes — qui influencent son comportement au travail.",
    simple:"Chacun arrive au travail avec son caractère, ses émotions et sa façon de voir les choses, et cela influence sa manière d'agir.",
    ex:"Face à un client pressé, un vendeur calme et un vendeur stressé d'un magasin Ravate ne réagiront pas de la même façon." },
  { id:"sdg-competence-qualification", theme:1, terme:"Compétence et qualification",
    aca:"La qualification est reconnue par un diplôme, un titre ou l'expérience validée ; la compétence est la capacité à agir efficacement en situation de travail (savoir, savoir-faire, savoir-être).",
    simple:"La qualification, c'est ce qui est écrit sur le diplôme. La compétence, c'est ce qu'on sait vraiment faire sur le terrain.",
    ex:"Un BTS tourisme est une qualification ; savoir calmer un passager mécontent à l'aéroport de Gillot est une compétence." },
  { id:"sdg-identite-numerique", theme:1, terme:"Identité numérique",
    aca:"Ensemble des traces qu'un individu laisse en ligne (profils, publications, photos, commentaires) qui construisent son image numérique, avec des enjeux de réputation et de bonnes pratiques.",
    simple:"Tout ce qu'on trouve sur toi quand on tape ton nom sur Internet.",
    ex:"Avant un entretien de stage, un recruteur réunionnais peut consulter tes réseaux sociaux : tes publications parlent pour toi." },
  { id:"sdg-communication", theme:1, terme:"Communication interpersonnelle",
    aca:"Échange entre individus mettant en jeu des composantes (émetteur, récepteur, message, canal, contexte) et des phénomènes relationnels (écoute, argumentation, influence).",
    simple:"La façon dont deux personnes échangent : qui parle, à qui, comment, où, et tout ce qui peut déformer le message.",
    ex:"Un chef d'équipe d'Edena qui explique une consigne à l'atelier choisit ses mots, son ton et le bon moment." },
  { id:"sdg-groupe", theme:1, terme:"Interactions individu / groupe",
    aca:"Au sein d'un groupe, l'individu acquiert une identité et un statut ; il s'inscrit dans des groupes d'appartenance et se compare à des groupes de référence, ce qui influence ses comportements.",
    simple:"Dans un groupe, chacun a une place et un rôle, et le groupe influence notre façon d'être.",
    ex:"Être élu délégué du personnel donne un statut particulier dans l'équipe d'une usine de Saint-Pierre." },
  { id:"sdg-culture", theme:1, terme:"Culture, normes, codes et rituels",
    aca:"Ensemble des valeurs, règles implicites, codes (langage, tenue) et rituels partagés qui caractérisent une organisation et orientent les comportements de ses membres.",
    simple:"Les habitudes, les valeurs et les « manières de faire » propres à chaque organisation.",
    ex:"Le café d'équipe du lundi matin et le tutoiement général font partie de la culture d'une PME réunionnaise." },
  { id:"sdg-leadership", theme:1, terme:"Relation d'autorité et leadership",
    aca:"L'autorité découle de la position hiérarchique (pouvoir légitime) ; le leadership est la capacité d'influencer et d'entraîner les autres, indépendamment du statut. Motivations et incitations soutiennent l'engagement.",
    simple:"L'autorité, c'est le pouvoir donné par le poste ; le leadership, c'est entraîner les autres parce qu'ils ont envie de te suivre.",
    ex:"Dans une équipe des Brasseries de Bourbon, un ouvrier expérimenté sans galon peut être le vrai leader du groupe." },
  { id:"sdg-conditions-travail", theme:1, terme:"Conditions de travail",
    aca:"Environnement physique (bruit, chaleur, sécurité), organisationnel (horaires, rythme) et relationnel du travail. Elles influencent la santé, la motivation et la performance des salariés.",
    simple:"Tout ce qui entoure le travail : le confort, la sécurité, les horaires, l'ambiance.",
    ex:"Climatiser un atelier de conditionnement à Saint-Pierre améliore le confort et réduit l'absentéisme." },
  { id:"sdg-cout-travail", theme:1, terme:"Rémunération et coût du travail",
    aca:"Le coût du travail comprend la rémunération brute (salaire, primes) et les cotisations sociales patronales. Il s'arbitre avec la valeur créée par le travail.",
    simple:"Ce que le salarié coûte vraiment à l'entreprise : son salaire + les cotisations payées en plus par l'employeur.",
    ex:"Un salaire brut de 2 000 € avec 800 € de cotisations patronales représente un coût du travail de 2 800 €." },
  { id:"sdg-productivite", theme:1, terme:"Indicateurs d'activité et de productivité",
    aca:"Données chiffrées issues de tableaux de bord mesurant l'activité (quantités produites, heures travaillées) et la productivité (production rapportée aux moyens utilisés).",
    simple:"Des chiffres pour mesurer combien on produit, et combien on produit par heure de travail.",
    ex:"12 000 barquettes produites en 600 heures = une productivité de 20 barquettes par heure." },
  { id:"sdg-conflit-consensus", theme:1, terme:"Conflits et consensus",
    aca:"Les relations de travail peuvent être conflictuelles (désaccords d'intérêts) ou consensuelles. La négociation et le dialogue social permettent de dépasser les conflits et de construire un accord.",
    simple:"Au travail, il y a parfois des désaccords : on peut les régler en discutant pour trouver un accord qui convient à tous.",
    ex:"Après une grève sur les plannings, la direction d'un transporteur réunionnais négocie un accord avec les salariés." },
  { id:"sdg-donnee-info", theme:2, terme:"Donnée, information, connaissance",
    aca:"La donnée est un élément brut, sans contexte ; l'information est une donnée mise en contexte qui prend du sens ; la connaissance résulte de l'interprétation et de l'expérience permettant d'agir.",
    simple:"Donnée = chiffre brut. Information = chiffre qui veut dire quelque chose. Connaissance = savoir s'en servir.",
    ex:"« 350 » est une donnée ; « 350 bouteilles Cilaos vendues samedi » est une information ; savoir réapprovisionner avant le week-end est une connaissance." },
  { id:"sdg-donnees-perso", theme:2, terme:"Données à caractère personnel",
    aca:"Toute information se rapportant à une personne identifiable. Leur utilisation est encadrée par le RGPD, sous le contrôle de la CNIL : consentement, sécurité, durée de conservation, droits d'accès et de suppression.",
    simple:"Les informations qui permettent de t'identifier. La loi (RGPD) oblige à demander ton accord et à les protéger.",
    ex:"Un magasin du Port doit obtenir ton consentement avant de t'envoyer des SMS publicitaires." },
  { id:"sdg-bigdata", theme:2, terme:"Big data et open data",
    aca:"Le big data désigne des volumes massifs de données, variés et produits à grande vitesse. L'open data désigne des données publiques librement accessibles et réutilisables.",
    simple:"Big data = des montagnes de données à analyser. Open data = des données publiques que tout le monde peut réutiliser.",
    ex:"Une start-up péi peut créer une appli d'horaires de bus à partir des données ouvertes de la Région Réunion." },
  { id:"sdg-valeur-info", theme:2, terme:"Valeur de l'information",
    aca:"L'information est une ressource stratégique : sa valeur dépend de sa fiabilité, de son actualité, de sa pertinence et de son accessibilité pour les bons acteurs au bon moment.",
    simple:"Une information a de la valeur si elle est juste, fraîche, utile et disponible quand on en a besoin.",
    ex:"Connaître avant ses concurrents la hausse du tourisme à La Réunion permet d'adapter son offre en premier." },
  { id:"sdg-si", theme:2, terme:"Système d'information (SI)",
    aca:"Ensemble organisé de ressources (humains, matériels, logiciels, données, procédures) qui collecte, stocke, traite et diffuse l'information nécessaire au fonctionnement de l'organisation.",
    simple:"Tout ce qui permet à l'organisation de récolter, ranger, traiter et faire circuler l'information.",
    ex:"Chez Royal Bourbon, le SI relie les commandes, les stocks, la production et la comptabilité." },
  { id:"sdg-ecommunication", theme:2, terme:"E-communication et collaboration",

    simple:"Tous les outils en ligne qui permettent de communiquer et de travailler ensemble, même à distance.",
    ex:"Les équipes de Saint-Denis et de Saint-Pierre co-rédigent le même document partagé au lieu de s'envoyer dix versions par e-mail." },
  { id:"sdg-intelligence-collective", theme:2, terme:"Intelligence collective",
    aca:"Capacité d'un groupe à produire, grâce au partage de l'information et à la collaboration, des connaissances et des solutions supérieures à la somme des contributions individuelles.",
    simple:"À plusieurs, en partageant ce qu'on sait, on devient plus intelligents qu'une seule personne.",
    ex:"Un wiki interne où chaque technicien note ses astuces de réparation fait progresser toute l'entreprise." },
  { id:"sdg-ia", theme:2, terme:"Intelligence artificielle et automatisation",
    aca:"Technologies capables d'automatiser des tâches organisationnelles (réponses aux clients, tri de données, prévisions), transformant la répartition du travail entre humains et machines.",
    simple:"Des programmes qui font automatiquement certaines tâches à la place des humains.",
    ex:"Un chatbot répond aux questions simples des clients d'une enseigne réunionnaise ; les conseillers gardent les cas compliqués." },
  { id:"sdg-processus", theme:2, terme:"Processus de gestion",
    aca:"Enchaînement d'activités coordonnées qui transforme des éléments d'entrée en résultat pour un bénéficiaire. Il peut être représenté par un schéma.",
    simple:"La suite d'étapes qu'on suit toujours pour faire quelque chose, du début à la fin.",
    ex:"Commande sur le site → paiement → préparation en entrepôt → livraison : c'est le processus de vente en ligne." },
  { id:"sdg-pgi", theme:2, terme:"Progiciel de gestion intégré (PGI)",
    aca:"Logiciel unique reposant sur une base de données commune qui intègre les processus de l'organisation (ventes, stocks, comptabilité, RH) : une information saisie une fois est partagée par tous.",
    simple:"Un grand logiciel unique où tous les services travaillent sur les mêmes informations.",
    ex:"Avec un PGI, quand un commercial enregistre une vente, le stock et la comptabilité sont mis à jour automatiquement." },
  { id:"sdg-cloud", theme:2, terme:"Cloud et travail à distance",
    aca:"Stockage et applications accessibles via Internet, qui favorisent la mobilité et le télétravail, sources d'agilité organisationnelle mais aussi de dépendance et d'enjeux de sécurité.",
    simple:"Tes fichiers et logiciels sont sur Internet : tu peux travailler de n'importe où.",
    ex:"Pendant une alerte cyclonique, les équipes administratives continuent de travailler depuis chez elles grâce au cloud." },
  { id:"sdg-agilite", theme:2, terme:"Agilité ou rigidité organisationnelle",
    aca:"Le numérique peut rendre l'organisation plus agile (réactivité, travail à distance, automatisation) ou plus rigide (procédures imposées par les logiciels, dépendance technique).",
    simple:"Le numérique peut rendre l'organisation plus souple… ou l'enfermer dans des procédures trop strictes.",
    ex:"Un logiciel de caisse qui impose dix étapes pour un simple échange d'article ralentit les vendeurs : c'est de la rigidité." },
  { id:"sdg-va", theme:3, terme:"Valeur ajoutée : création et répartition",
    aca:"Richesse créée par l'organisation : production − consommations intermédiaires. Elle est répartie entre les salariés (salaires), l'État (impôts), les prêteurs (intérêts), les actionnaires (dividendes) et l'organisation elle-même (autofinancement).",
    simple:"La richesse vraiment créée par l'entreprise, qu'on partage ensuite entre tous ceux qui y ont contribué.",
    ex:"Edena vend pour 100, achète pour 40 de matières et services : la valeur ajoutée est de 60, à répartir." },
  { id:"sdg-valeur-financiere", theme:3, terme:"Valeur financière et actionnariale",
    aca:"Valeur mesurée par les documents comptables : le compte de résultat (produits − charges = résultat) et le bilan (patrimoine). La valeur actionnariale et boursière reflète l'enrichissement des actionnaires.",
    simple:"La valeur en argent : le bénéfice réalisé et ce que vaut l'entreprise pour ses propriétaires.",
    ex:"Un bénéfice de 110 k€ au compte de résultat d'une PME de Saint-Pierre mesure sa valeur financière de l'année." },
  { id:"sdg-valeur-percue", theme:3, terme:"Valeur perçue",
    aca:"Valeur attribuée par les clients : image de marque, notoriété, satisfaction, qualité perçue, e-réputation (avis, notes, recommandations sur les médias sociaux).",
    simple:"Ce que le produit ou la marque « vaut » dans la tête des clients.",
    ex:"Les rhums Isautier, notés 4,8/5 et réputés dans toute l'île, bénéficient d'une forte valeur perçue." },
  { id:"sdg-valeur-partenariale", theme:3, terme:"Valeur partenariale",
    aca:"Valeur créée par et pour l'ensemble des partenaires de l'organisation (salariés, fournisseurs, clients, collectivités…), au-delà des seuls actionnaires.",
    simple:"La valeur créée pour tous ceux qui travaillent avec l'organisation, pas seulement pour ses propriétaires.",
    ex:"Une enseigne qui donne ses invendus alimentaires à une association réunionnaise crée de la valeur partenariale." },
  { id:"sdg-prix-cout-marge", theme:3, terme:"Prix, coût, marge, charges",
    aca:"Le coût regroupe les charges consommées pour produire ; la marge est la différence entre le prix de vente et le coût ; la relation prix / coût / qualité guide les décisions de gestion.",
    simple:"Coût = ce que ça coûte à faire. Prix = ce que paie le client. Marge = la différence entre les deux.",
    ex:"Un sorbet péi vendu 4 € avec un coût de revient de 2,50 € dégage une marge de 1,50 €." },
  { id:"sdg-efficacite-efficience", theme:3, terme:"Efficacité et efficience",
    aca:"L'efficacité est l'atteinte des objectifs fixés ; l'efficience est l'atteinte des objectifs en minimisant les ressources consommées (performance des processus).",
    simple:"Efficace = atteindre son but. Efficient = atteindre son but sans gaspiller de moyens.",
    ex:"Deux boutiques atteignent 100 ventes ; celle qui a dépensé deux fois moins de publicité est la plus efficiente." },
  { id:"sdg-perf-commerciale", theme:3, terme:"Performance commerciale",
    aca:"Capacité à conquérir et fidéliser les clients, mesurée par le chiffre d'affaires, la part de marché et la fidélité de la clientèle.",
    simple:"Est-ce que l'organisation vend bien et garde ses clients ?",
    ex:"La part de marché des Brasseries de Bourbon sur les boissons à La Réunion mesure sa performance commerciale." },
  { id:"sdg-perf-financiere", theme:3, terme:"Performance financière",
    aca:"Capacité à créer de la valeur financière : profitabilité (résultat/CA), rentabilité (résultat/moyens engagés), dividendes versés et autofinancement dégagé.",
    simple:"Est-ce que l'organisation gagne de l'argent par rapport à ce qu'elle a investi ?",
    ex:"Une rentabilité en hausse permet à une PME du Port d'autofinancer une nouvelle machine sans emprunter." },
  { id:"sdg-perf-sociale-env", theme:3, terme:"Performance sociale et environnementale",
    aca:"La performance sociale s'apprécie via le bilan social (absentéisme, accidents, formation, climat) ; la performance environnementale via l'impact écologique (énergie, déchets, émissions).",
    simple:"Est-ce que l'organisation traite bien ses salariés et respecte l'environnement ?",
    ex:"Réduire de 20 % la consommation d'eau d'une usine d'embouteillage améliore sa performance environnementale." },
  { id:"sdg-perf-globale", theme:3, terme:"Performance globale",
    aca:"Équilibre entre les dimensions organisationnelle, commerciale, financière, sociale et environnementale de la performance. Améliorer l'une peut dégrader une autre : elles peuvent être contradictoires.",
    simple:"La vraie performance, c'est d'être bon partout à la fois : ventes, finances, salariés, environnement.",
    ex:"Baisser les coûts en dégradant les conditions de travail améliore le financier mais détruit le social." },
  { id:"sdg-tdb", theme:3, terme:"Tableau de bord et indicateurs",
    aca:"Document regroupant des indicateurs quantitatifs et qualitatifs pertinents, permettant de mesurer et comparer les performances dans le temps et dans l'espace pour piloter l'organisation.",
    simple:"Le « tableau de bord » de l'organisation : des chiffres clés pour savoir où elle en est et corriger le cap.",
    ex:"Un hôtel de Saint-Gilles suit chaque mois : taux d'occupation, satisfaction client, consommation d'eau, absentéisme." },
  { id:"sdg-horizon", theme:4, terme:"Horizon et période",
    aca:"L'horizon ordonne les décisions en court, moyen et long terme ; la période découpe le temps de gestion selon des contraintes institutionnelles, sectorielles ou technologiques.",
    simple:"L'horizon, c'est jusqu'où on regarde (court ou long terme) ; la période, c'est comment on découpe le temps.",
    ex:"Recruter un saisonnier pour décembre (court terme) ou construire une usine (long terme) ; la haute saison touristique rythme l'année d'un hôtel de l'Ouest." },
  { id:"sdg-veille", theme:4, terme:"Veille informationnelle",
    aca:"Surveillance continue et organisée de l'environnement (marchés, concurrents, technologies, réglementation) pour disposer d'une information actualisée et anticiper les évolutions.",
    simple:"Garder un œil en permanence sur ce qui se passe autour, pour ne pas être pris par surprise.",
    ex:"Un gérant de vidéoclub qui aurait surveillé l'essor du streaming aurait pu transformer son activité à temps." },
  { id:"sdg-asymetrie", theme:4, terme:"Asymétrie et rétention d'information",
    aca:"Situation où certains acteurs détiennent plus d'informations que d'autres ; la rétention consiste à garder une information pour soi, ce qui nuit à la qualité des décisions collectives.",
    simple:"Quand quelqu'un en sait plus que les autres et garde l'info pour lui.",
    ex:"Un commercial qui ne signale pas le mécontentement d'un gros client prive sa direction d'une information cruciale." },
  { id:"sdg-prospective", theme:4, terme:"Prospective : enquête et prévision",
    aca:"Démarches qui réduisent l'incertitude liée au temps : enquêtes (intentions des clients), prévisions d'activité, simulations, calendriers prévisionnels et outils de planification.",
    simple:"Essayer de prévoir l'avenir avec des enquêtes, des calculs et des plannings, pour décider moins à l'aveugle.",
    ex:"Avant de lancer une gamme « zéro plastique », une PME péi sonde ses clients : 64 % se disent prêts à l'acheter." },
  { id:"sdg-budget", theme:4, terme:"Budget et budget de trésorerie",
    aca:"Traduction chiffrée et prévisionnelle de l'activité. Le budget de trésorerie prévoit mois par mois les encaissements et décaissements pour anticiper les soldes et les besoins de financement.",
    simple:"Un tableau qui prévoit l'argent qui va entrer et sortir chaque mois, pour éviter la panne de trésorerie.",
    ex:"Le budget d'une PME de l'Ouest révèle un solde négatif en février : elle négocie un découvert avec sa banque avant le creux." },
  { id:"sdg-seuil", theme:4, terme:"Seuil de rentabilité",
    aca:"Chiffre d'affaires pour lequel l'organisation ne réalise ni bénéfice ni perte (résultat = 0). Il se calcule en divisant les charges fixes par le taux de marge sur coûts variables.",
    simple:"Le chiffre d'affaires minimum à atteindre pour ne pas perdre d'argent.",
    ex:"30 000 € de charges fixes et une marge sur coûts variables de 50 % : il faut vendre pour 60 000 € avant de gagner le premier euro." },
  { id:"sdg-temps-valeur", theme:4, terme:"Lien entre temps et valeur financière",
    aca:"La valeur de l'argent dépend du temps : une somme disponible aujourd'hui vaut plus que la même somme dans le futur (incertitude, possibilité de placement).",
    simple:"100 € tout de suite valent plus que 100 € dans cinq ans.",
    ex:"Entre 1 000 € maintenant et 1 000 € dans trois ans, un gestionnaire préfère maintenant : il peut les placer ou les investir." },
  { id:"sdg-risque", theme:4, terme:"Risques externes",
    aca:"Événements défavorables venant de l'environnement : évolution de la demande, cycle de vie et obsolescence, rupture technologique, dépendance énergétique ou technologique, approvisionnement, empreinte environnementale.",
    simple:"Les dangers qui viennent de l'extérieur de l'organisation : clients, technologies, fournisseurs, climat…",
    ex:"Un cyclone qui bloque le port de la Pointe des Galets perturbe l'approvisionnement de toute l'île." },
  { id:"sdg-risque-interne", theme:4, terme:"Risques internes",
    aca:"Risques générés par les décisions de l'organisation elle-même : investissement hasardeux, lancement sans étude, mauvais recrutement, endettement excessif, négligence des conséquences écologiques.",
    simple:"Les dangers que l'organisation crée elle-même par ses propres choix.",
    ex:"Ouvrir un second magasin sans calculer son seuil de rentabilité est un risque interne." },
  { id:"sdg-obsolescence", theme:4, terme:"Cycle de vie, obsolescence, rupture technologique",
    aca:"Tout produit suit un cycle de vie (lancement, croissance, maturité, déclin) ; une rupture technologique peut rendre une offre obsolète et bouleverser un secteur entier.",
    simple:"Les produits vieillissent ; parfois une nouvelle technologie les rend complètement dépassés.",
    ex:"Le streaming a rendu obsolètes les vidéoclubs de location de DVD, à La Réunion comme ailleurs." },
  { id:"sdg-empreinte", theme:4, terme:"Empreinte environnementale",
    aca:"Impact écologique de l'activité (énergie, eau, déchets, émissions). La recherche de performance peut générer des risques pour l'environnement, qui doivent être mesurés et limités.",
    simple:"La trace que l'activité de l'organisation laisse sur la planète.",
    ex:"Produire plus de barquettes augmente les déchets plastiques : l'usine doit mesurer et réduire cet impact." }
],

cas: {
  1:[ {cas:"Chez Air Austral, une hôtesse garde le sourire et adapte son ton face à un passager stressé par un retard.", q:"Quelle notion reconnaît-on ?", o:["Une qualification","Une compétence (contrôle de soi)","Un rituel d'entreprise"], c:1, why:"Gérer ses émotions et s'adapter en situation de travail relève des compétences de l'individu, pas du diplôme."},
      {cas:"Dans un magasin Ravate, l'équipe partage chaque matin un café avant l'ouverture, et chaque nouveau y est présenté.", q:"Que révèle cette habitude ?", o:["Un conflit","Un rituel, élément de la culture de l'organisation","Un indicateur de productivité"], c:1, why:"Les rituels (café d'équipe, présentation des nouveaux) expriment la culture et les valeurs de l'organisation."},
      {cas:"Un lycéen poste des photos polémiques en ligne. Deux ans plus tard, un recruteur réunionnais tape son nom sur Internet.", q:"Quelle notion est en jeu ?", o:["L'identité numérique","Le seuil de rentabilité","L'open data"], c:0, why:"Les traces laissées en ligne construisent l'identité numérique : elle peut servir… ou desservir."},
      {cas:"Une usine agroalimentaire de Saint-Pierre produit 12 000 barquettes en 600 heures de travail.", q:"Quel indicateur peut-elle calculer ?", o:["La productivité : 20 barquettes par heure","Le coût du travail","La part de marché"], c:0, why:"Productivité = production ÷ heures travaillées = 12 000 ÷ 600 = 20 barquettes/heure."} ],
  2:[ {cas:"En caisse, chaque passage enregistre « article, prix, heure ». Le siège en tire : « les ventes de glaces doublent le samedi ».", q:"Comment qualifier ces deux éléments ?", o:["Deux données","Une donnée brute, puis une information","Deux connaissances"], c:1, why:"Les enregistrements bruts sont des données ; mises en contexte et porteuses de sens, elles deviennent une information."},
      {cas:"Une enseigne réunionnaise veut envoyer des SMS publicitaires à partir de numéros récupérés sans le consentement des clients.", q:"Que risque-t-elle ?", o:["Rien, les numéros circulent librement","Une sanction : le RGPD protège les données personnelles","Une simple remarque de la mairie"], c:1, why:"Les données personnelles ne s'utilisent qu'avec consentement : le RGPD prévoit des sanctions (contrôle de la CNIL)."},
      {cas:"Royal Bourbon installe un PGI : commandes, stocks et comptabilité partagent désormais la même base de données.", q:"Quel est l'intérêt principal ?", o:["Une information unique, saisie une fois et partagée par tous","Supprimer le papier des bureaux","Réduire le nombre de clients"], c:0, why:"Le PGI intègre les processus autour d'une base unique : fin des doubles saisies et des informations contradictoires."},
      {cas:"Pendant une alerte cyclonique, les équipes administratives d'une entreprise dionysienne travaillent depuis chez elles grâce au cloud.", q:"Qu'illustre ce cas ?", o:["L'agilité permise par le numérique (travail à distance)","La rigidité organisationnelle","L'obsolescence"], c:0, why:"Cloud + télétravail = continuité de l'activité malgré l'imprévu : le numérique rend l'organisation agile."} ],
  3:[ {cas:"Edena vend pour 100 de production et a consommé 40 de matières et services achetés à ses fournisseurs.", q:"Quelle est sa valeur ajoutée ?", o:["140","60","40"], c:1, why:"VA = production − consommations intermédiaires = 100 − 40 = 60."},
      {cas:"Avec sa valeur ajoutée, une PME de Saint-Pierre paie les salaires, les impôts, les intérêts à la banque, des dividendes, et garde le reste pour investir.", q:"Que décrit ce cas ?", o:["La répartition de la valeur ajoutée entre les acteurs","Le seuil de rentabilité","L'identité numérique"], c:0, why:"La VA est partagée entre salariés, État, prêteurs, actionnaires et l'entreprise elle-même (autofinancement)."},
      {cas:"Une boutique du Port atteint son objectif de 100 ventes, mais en doublant son budget publicitaire par rapport au prévu.", q:"Comment qualifier sa performance ?", o:["Efficace mais pas efficiente","Efficiente mais pas efficace","Ni efficace ni efficiente"], c:0, why:"L'objectif est atteint (efficacité) mais en surconsommant des ressources : l'efficience n'y est pas."},
      {cas:"Les rhums Isautier affichent 4,8/5 sur les avis en ligne et une forte notoriété dans toute l'île.", q:"Quelle forme de valeur ces éléments nourrissent-ils ?", o:["La valeur perçue","La valeur boursière","La valeur ajoutée"], c:0, why:"Notoriété, satisfaction, e-réputation : autant d'éléments de la valeur perçue par les clients."} ],
  4:[ {cas:"Un glacier de Saint-Gilles réalise l'essentiel de ses ventes pendant l'été austral et les vacances scolaires.", q:"Quelle contrainte temporelle reconnaît-on ?", o:["La saisonnalité (fluctuations périodiques)","L'asymétrie d'information","Le leadership"], c:0, why:"L'activité est rythmée par des périodes sectorielles : la saisonnalité contraint la gestion (stocks, embauches, trésorerie)."},
      {cas:"Charges fixes : 30 000 €. Marge sur coûts variables : 50 % du CA. Un restaurateur veut savoir quel chiffre d'affaires atteindre pour ne pas perdre d'argent.", q:"Quel CA minimal doit-il viser ?", o:["15 000 €","60 000 €","30 000 €"], c:1, why:"Seuil de rentabilité = charges fixes ÷ taux de marge = 30 000 ÷ 0,5 = 60 000 €."},
      {cas:"Une PME de l'Ouest prévoit ses encaissements et décaissements mois par mois et repère un solde négatif en février.", q:"Quel outil utilise-t-elle ?", o:["Le budget de trésorerie","Le bilan social","Le tableau de répartition de la VA"], c:0, why:"Le budget de trésorerie anticipe les difficultés de paiement : la PME peut négocier un financement AVANT le creux."},
      {cas:"Un loueur de DVD réunionnais a vu sa clientèle disparaître avec l'arrivée du streaming.", q:"Quel risque externe illustre ce cas ?", o:["Une rupture technologique rendant l'offre obsolète","Un conflit interne","Une asymétrie d'information"], c:0, why:"La rupture technologique (streaming) a rendu l'activité obsolète : un risque externe typique lié au cycle de vie."} ]
},
vraifaux: {
  1:[ {p:"La qualification se prouve par un diplôme, un titre ou une expérience reconnue.", v:true, why:"Vrai : la qualification est la reconnaissance officielle (diplôme, titre, validation des acquis)."},
      {p:"Une compétence ne s'observe que sur le diplôme.", v:false, why:"Faux : la compétence s'observe en situation de travail (savoir agir efficacement)."},
      {p:"Le coût du travail comprend le salaire ET les cotisations sociales.", v:true, why:"Vrai : coût du travail = rémunération brute + cotisations patronales."},
      {p:"Les relations informelles n'existent pas dans les organisations.", v:false, why:"Faux : à côté de l'organigramme officiel, les affinités et discussions de couloir créent des relations informelles bien réelles."},
      {p:"De bonnes conditions de travail peuvent améliorer la motivation et la productivité.", v:true, why:"Vrai : conditions de travail et comportements des salariés sont liés."} ],
  2:[ {p:"Une donnée brute devient une information quand elle prend du sens dans un contexte.", v:true, why:"Vrai : donnée + contexte + sens = information."},
      {p:"On peut collecter et diffuser librement les données personnelles des clients.", v:false, why:"Faux : le RGPD impose consentement, sécurité et durée de conservation limitée."},
      {p:"Le big data désigne des volumes massifs de données, variés et produits à grande vitesse.", v:true, why:"Vrai : volume, variété, vitesse — les « 3 V » des mégadonnées."},
      {p:"Avec un PGI, chaque service doit ressaisir les mêmes données.", v:false, why:"Faux : c'est l'inverse. La base unique du PGI évite les doubles saisies."},
      {p:"Le numérique peut créer de la rigidité si le logiciel impose des procédures trop strictes.", v:true, why:"Vrai : un outil mal adapté enferme les acteurs dans des étapes imposées — c'est la rigidité organisationnelle."} ],
  3:[ {p:"La valeur ajoutée est partagée entre salariés, État, prêteurs, actionnaires et l'entreprise elle-même.", v:true, why:"Vrai : c'est la répartition de la VA (salaires, impôts, intérêts, dividendes, autofinancement)."},
      {p:"Être efficient, c'est atteindre son objectif quel qu'en soit le coût.", v:false, why:"Faux : ça, c'est l'efficacité seule. L'efficience ajoute l'économie de moyens."},
      {p:"Le chiffre d'affaires suffit à mesurer toute la performance d'une organisation.", v:false, why:"Faux : la performance est globale — commerciale, financière, sociale ET environnementale."},
      {p:"La performance environnementale fait partie de la performance globale.", v:true, why:"Vrai : l'impact écologique est une dimension à part entière de la performance."},
      {p:"Améliorer une performance peut en dégrader une autre.", v:true, why:"Vrai : baisser les coûts en dégradant les conditions de travail améliore le financier mais détruit le social."} ],
  4:[ {p:"Plus l'horizon est lointain, plus l'information disponible est incertaine.", v:true, why:"Vrai : le temps est source d'incertitude ; à long terme, l'information perd en fiabilité."},
      {p:"Le seuil de rentabilité indique le bénéfice maximal possible.", v:false, why:"Faux : c'est le CA pour lequel le résultat est NUL — ni perte ni bénéfice."},
      {p:"Le budget de trésorerie permet d'anticiper les difficultés de paiement.", v:true, why:"Vrai : en prévoyant encaissements et décaissements, on repère les creux avant qu'ils n'arrivent."},
      {p:"Tous les risques viennent de l'extérieur de l'organisation.", v:false, why:"Faux : les décisions de l'organisation créent aussi des risques internes (mauvais investissement, lancement sans étude…)."},
      {p:"100 € disponibles aujourd'hui valent plus que 100 € dans cinq ans.", v:true, why:"Vrai : c'est le lien entre temps et valeur financière (incertitude, possibilité de placement)."} ]
},

mission: {
  1:{ titre:"DRH d'une entreprise du Port",
    intro:"Tu diriges les ressources humaines d'une entreprise réunionnaise de 80 salariés. Les individus, avec leurs personnalités et leurs compétences, deviennent des acteurs de l'organisation : à toi de les recruter, de les motiver et de gérer les tensions. Indicateurs : Trésorerie 💰, Part de marché 📈, Image 🌟, Emplois 👥.",
    etapes:[
      {scene:"Deux candidats pour un poste de vendeur : l'un a le meilleur diplôme, l'autre a brillamment géré un client difficile lors de la mise en situation.", choix:[
        {txt:"Évaluer la qualification ET les compétences en situation", eff:{treso:0,marche:10,image:5,emploi:5}, fb:"Bonne approche : le diplôme (qualification) ne dit pas tout. La compétence s'observe en situation de travail."},
        {txt:"Choisir uniquement sur le diplôme", eff:{treso:0,marche:-5,image:0,emploi:0}, fb:"Risqué : tu confonds qualification et compétence. Un diplômé peut être démuni face à un client mécontent."} ]},
      {scene:"Un conflit éclate sur les nouveaux plannings : une partie de l'équipe menace de débrayer.", choix:[
        {txt:"Ouvrir une négociation pour construire un consensus", eff:{treso:-5,marche:5,image:10,emploi:5}, fb:"Le dialogue social transforme le conflit en accord accepté par tous : l'organisation en sort renforcée."},
        {txt:"Imposer les plannings sans discussion", eff:{treso:5,marche:-10,image:-15,emploi:-5}, fb:"Le conflit s'envenime : démotivation, absentéisme, mauvaise ambiance. L'autorité seule ne suffit pas."} ]},
      {scene:"L'atelier est bruyant et mal ventilé ; l'absentéisme y atteint 8 % contre 4 % ailleurs.", choix:[
        {txt:"Investir dans les conditions de travail", eff:{treso:-15,marche:5,image:10,emploi:10}, fb:"Conditions de travail et comportements sont liés : moins d'absences, plus de motivation, meilleure productivité."},
        {txt:"Ne rien changer pour économiser", eff:{treso:5,marche:-5,image:-10,emploi:-5}, fb:"L'économie est illusoire : l'absentéisme et le turn-over coûtent cher à l'organisation."} ]},
      {scene:"Un salarié a publié des propos déplacés sur un réseau social en citant l'entreprise.", choix:[
        {txt:"Former toute l'équipe aux bonnes pratiques de l'identité numérique", eff:{treso:-5,marche:0,image:15,emploi:0}, fb:"L'identité numérique de chacun rejaillit sur l'organisation : former aux bonnes pratiques protège tout le monde."},
        {txt:"Ignorer : ce qui se passe en ligne ne compte pas", eff:{treso:0,marche:-5,image:-15,emploi:0}, fb:"Erreur : les traces en ligne sont publiques et durables. L'image de l'entreprise en souffre."} ]},
      {scene:"Tu veux récompenser l'équipe de vente qui a dépassé ses objectifs.", choix:[
        {txt:"Verser une prime liée à des indicateurs clairs et connus de tous", eff:{treso:-10,marche:10,image:10,emploi:5}, fb:"Les incitations soutiennent la motivation quand elles s'appuient sur des indicateurs transparents (tableau de bord)."},
        {txt:"Ne rien faire : c'est leur travail après tout", eff:{treso:5,marche:-5,image:-10,emploi:-5}, fb:"Sans reconnaissance ni rétribution, la motivation s'effrite et les meilleurs partent à la concurrence."} ]} ]},
  2:{ titre:"Responsable numérique chez Royal Bourbon",
    intro:"Tu pilotes la transformation numérique d'une entreprise agroalimentaire réunionnaise. L'information est une ressource stratégique : à toi d'en organiser la collecte, le partage et la protection. Indicateurs : Trésorerie 💰, Part de marché 📈, Image 🌟, Emplois 👥.",
    etapes:[
      {scene:"Le service marketing veut constituer un fichier clients pour des offres par SMS.", choix:[
        {txt:"Collecter les numéros avec le consentement des clients (RGPD)", eff:{treso:-5,marche:10,image:10,emploi:0}, fb:"Les données personnelles ne s'utilisent qu'avec consentement : tu respectes le RGPD et la confiance des clients."},
        {txt:"Acheter un fichier de numéros d'origine douteuse", eff:{treso:5,marche:5,image:-20,emploi:0}, fb:"Sanction de la CNIL et bad buzz garantis : les données personnelles sont protégées par la loi."} ]},
      {scene:"Tu déploies un PGI qui reliera ventes, stocks et comptabilité.", choix:[
        {txt:"Former les équipes et accompagner le changement", eff:{treso:-15,marche:15,image:5,emploi:5}, fb:"Une information saisie une fois, partagée par tous : le PGI crée de l'agilité… à condition que chacun sache l'utiliser."},
        {txt:"Installer le logiciel sans formation", eff:{treso:-5,marche:-10,image:-5,emploi:0}, fb:"Procédures mal maîtrisées, erreurs de saisie, rejet de l'outil : le numérique devient une source de rigidité."} ]},
      {scene:"Chaque technicien garde ses astuces de maintenance dans son carnet personnel.", choix:[
        {txt:"Créer un wiki interne où chacun documente ses solutions", eff:{treso:-5,marche:10,image:5,emploi:5}, fb:"Le partage de l'information fait émerger une intelligence collective : le savoir de chacun profite à tous."},
        {txt:"Laisser chacun garder son savoir pour soi", eff:{treso:0,marche:-10,image:0,emploi:0}, fb:"Quand un technicien part, son savoir part avec lui : la rétention d'information appauvrit l'organisation."} ]},
      {scene:"Le service client est débordé par des questions simples et répétitives.", choix:[
        {txt:"Installer un chatbot pour les questions simples, garder l'humain pour les cas complexes", eff:{treso:-10,marche:10,image:10,emploi:0}, fb:"L'IA automatise les tâches répétitives et libère du temps pour les demandes à forte valeur : bonne répartition humain/machine."},
        {txt:"Tout automatiser et réduire l'équipe au minimum", eff:{treso:10,marche:-5,image:-15,emploi:-15}, fb:"Les clients se heurtent à un robot pour leurs vrais problèmes : l'automatisation totale dégrade la relation et l'emploi."} ]},
      {scene:"La saison cyclonique approche. Tes données sont stockées sur un seul ordinateur au bureau.", choix:[
        {txt:"Migrer vers le cloud avec sauvegardes et accès à distance", eff:{treso:-10,marche:10,image:5,emploi:0}, fb:"Cloud + télétravail = continuité d'activité même en cas d'alerte : le numérique rend l'organisation agile."},
        {txt:"Ne rien changer", eff:{treso:5,marche:-15,image:-5,emploi:0}, fb:"Un dégât des eaux ou une coupure et tout s'arrête : l'information, ressource stratégique, n'était pas protégée."} ]} ]},
  3:{ titre:"À la tête de « Saveurs Péi »",
    intro:"Tu diriges une PME agroalimentaire réunionnaise qui crée de la valeur. À toi de la mesurer, de la répartir et de viser une performance globale : commerciale, financière, sociale et environnementale. Indicateurs : Trésorerie 💰, Part de marché 📈, Image 🌟, Emplois 👥.",
    etapes:[
      {scene:"L'année est excellente : la valeur ajoutée a bondi. Les actionnaires réclament le maximum de dividendes.", choix:[
        {txt:"Répartir : primes aux salariés, dividendes raisonnables, autofinancement pour investir", eff:{treso:5,marche:5,image:10,emploi:5}, fb:"La VA se partage entre tous les acteurs qui l'ont créée — et l'autofinancement prépare l'avenir."},
        {txt:"Tout verser en dividendes", eff:{treso:-15,marche:0,image:-10,emploi:-5}, fb:"Salariés démotivés, aucun investissement : privilégier un seul acteur fragilise la création de valeur future."} ]},
      {scene:"Pour augmenter la marge, ton directeur propose de remplacer la vanille Bourbon par un arôme artificiel.", choix:[
        {txt:"Garder la qualité qui fonde la valeur perçue", eff:{treso:-5,marche:10,image:15,emploi:0}, fb:"Les clients paient pour la qualité péi : rogner dessus détruirait la valeur perçue et la fidélité."},
        {txt:"Passer à l'arôme artificiel", eff:{treso:10,marche:-15,image:-15,emploi:0}, fb:"La marge unitaire monte… mais avis négatifs et clients perdus : la relation prix/coût/qualité est rompue."} ]},
      {scene:"Pour piloter l'entreprise, que mets-tu en place ?", choix:[
        {txt:"Un tableau de bord : CA, marge, satisfaction, absentéisme, déchets", eff:{treso:0,marche:10,image:5,emploi:5}, fb:"Des indicateurs variés mesurent la performance dans toutes ses dimensions et permettent de comparer et corriger."},
        {txt:"Suivre uniquement le chiffre d'affaires", eff:{treso:0,marche:5,image:-5,emploi:-5}, fb:"Le CA monte… mais tu ne vois ni l'absentéisme qui explose ni les coûts qui dérapent : pilotage borgne."} ]},
      {scene:"Le bilan social révèle un absentéisme de 9 %, bien au-dessus du secteur.", choix:[
        {txt:"Analyser les causes et améliorer les conditions de travail", eff:{treso:-10,marche:5,image:10,emploi:10}, fb:"La performance sociale est une dimension de la performance globale : la soigner profite à toutes les autres."},
        {txt:"Sanctionner les absents", eff:{treso:0,marche:-5,image:-10,emploi:-5}, fb:"Tu traites le symptôme, pas la cause : le climat se dégrade encore et la performance sociale s'effondre."} ]},
      {scene:"Ta facture d'électricité explose. Un installateur propose des panneaux solaires sur le toit de l'usine.", choix:[
        {txt:"Investir dans le solaire", eff:{treso:-15,marche:5,image:15,emploi:0}, fb:"Performance environnementale ET économies à long terme : sous le soleil réunionnais, l'investissement a du sens."},
        {txt:"Refuser l'investissement", eff:{treso:5,marche:0,image:-5,emploi:0}, fb:"Choix prudent à court terme, mais la facture continue de grimper et l'image écologique reste terne."} ]} ]},
  4:{ titre:"Dirigeant face au temps et aux risques",
    intro:"Tu diriges une entreprise réunionnaise dans un environnement incertain : saisons, cyclones, technologies, fournisseurs… Gérer, c'est prévoir et prendre des risques calculés. Indicateurs : Trésorerie 💰, Part de marché 📈, Image 🌟, Emplois 👥.",
    etapes:[

docs: {
  1:[ {titre:"Extrait de fiche de poste — Vendeur(se) polyvalent(e)",
       source:"Magasin de bricolage, Saint-Pierre (974)",
       texte:"Intitulé : Vendeur(se) polyvalent(e) — rayon outillage.\nRattachement hiérarchique : responsable de rayon.\nQualification requise : Bac professionnel Commerce ou expérience équivalente validée.\nCompétences attendues : accueillir et conseiller les clients, gérer les réclamations avec calme, travailler en équipe, tenir le rayon (réassort, étiquetage).\nHoraires : du mardi au samedi, 35 h hebdomadaires.",
       questions:[
         {q:"Quelle est la qualification exigée pour ce poste ?", o:["Savoir gérer les réclamations","Le Bac professionnel Commerce (ou expérience validée)","Travailler le samedi"], c:1, why:"La qualification est la reconnaissance officielle : diplôme, titre ou expérience validée. Ici, le Bac pro Commerce."},
         {q:"« Gérer les réclamations avec calme » est…", o:["une qualification","une compétence","un rituel"], c:1, why:"C'est un savoir-agir en situation de travail : une compétence (qui mobilise aussi le contrôle de soi)."},
         {q:"Le rattachement au responsable de rayon traduit…", o:["la relation d'autorité hiérarchique","une relation informelle","l'identité numérique"], c:0, why:"La fiche de poste inscrit le salarié dans la hiérarchie : c'est la relation d'autorité formelle de l'organisation."}]},
      {titre:"Tableau de bord social — Atelier de conditionnement (extrait mensuel)",
       source:"Entreprise agroalimentaire, zone industrielle de Saint-Pierre",
       texte:"Production du mois : 24 000 unités.\nHeures travaillées : 1 200 heures.\nSalaires bruts versés : 36 000 €.\nCotisations sociales patronales : 14 400 €.\nTaux d'absentéisme : 8 % (moyenne du secteur : 4 %).",
       questions:[
         {q:"Quelle est la productivité du travail de l'atelier ?", o:["20 unités par heure","2 unités par heure","1 200 unités par heure"], c:0, why:"Productivité = production ÷ heures = 24 000 ÷ 1 200 = 20 unités/heure."},
         {q:"Quel est le coût du travail total du mois ?", o:["36 000 €","14 400 €","50 400 €"], c:2, why:"Coût du travail = salaires bruts + cotisations patronales = 36 000 + 14 400 = 50 400 €."},
         {q:"Que suggère le taux d'absentéisme de 8 % ?", o:["Tout va bien : c'est la moyenne","Il faut interroger les conditions de travail","Il faut baisser les salaires"], c:1, why:"Deux fois la moyenne du secteur : un signal d'alerte qui invite à examiner les conditions de travail et le climat social."}]} ],
  2:[ {titre:"Charte d'utilisation des données clients (extrait)",
       source:"Enseigne de distribution réunionnaise — document interne",
       texte:"Art. 1 — Les données clients (nom, e-mail, téléphone, historique d'achats) ne sont collectées qu'avec le consentement explicite de la personne.\nArt. 2 — Elles sont conservées au maximum trois ans après le dernier achat, puis supprimées.\nArt. 3 — Tout client peut demander l'accès à ses données, leur rectification ou leur suppression.\nArt. 4 — Le responsable du fichier répond de leur sécurité devant la CNIL.",
       questions:[
         {q:"Quelle réglementation cette charte applique-t-elle ?", o:["Le RGPD (protection des données personnelles)","Le Code de la route","La loi sur l'open data"], c:0, why:"Consentement, durée de conservation, droits d'accès et de suppression, contrôle de la CNIL : c'est le RGPD."},
         {q:"Pourquoi le consentement est-il exigé (art. 1) ?", o:["Pour faire joli dans la charte","Parce que ces données identifient une personne : ce sont des données à caractère personnel","Parce que les données coûtent cher"], c:1, why:"Toute donnée se rapportant à une personne identifiable est protégée : son utilisation exige le consentement."},
         {q:"L'article 3 garantit au client…", o:["un droit d'accès, de rectification et de suppression","une remise de 10 %","l'anonymat sur les réseaux sociaux"], c:0, why:"Le RGPD donne à chacun la maîtrise de ses données : y accéder, les corriger, les faire effacer."}]},
      {titre:"Description du processus de commande en ligne",
       source:"Site e-commerce d'une entreprise du Port",
       texte:"Étape 1 — Le client passe commande sur le site.\nÉtape 2 — Le paiement est validé par la plateforme sécurisée.\nÉtape 3 — Le PGI transmet la commande à l'entrepôt, met à jour le stock et la comptabilité.\nÉtape 4 — Un SMS automatique informe le client de l'expédition.\nÉtape 5 — Le transporteur livre le colis.",
       questions:[
         {q:"Combien d'étapes ce processus enchaîne-t-il ?", o:["Trois","Cinq","Dix"], c:1, why:"Un processus est un enchaînement ordonné d'activités : ici, cinq étapes, de la commande à la livraison."},
         {q:"Quel outil partage la même information entre entrepôt, stock et comptabilité (étape 3) ?", o:["Le PGI, grâce à sa base de données unique","Le SMS","Le transporteur"], c:0, why:"Le progiciel de gestion intégré relie les services autour d'une information saisie une seule fois."},
         {q:"Le SMS envoyé sans intervention humaine (étape 4) illustre…", o:["la rétention d'information","l'automatisation d'une tâche","l'open data"], c:1, why:"Une tâche répétitive prise en charge par le système : c'est l'automatisation permise par le numérique."}]} ],
  3:[ {titre:"Compte de résultat simplifié — « Saveurs Péi » SARL (en k€)",
       source:"Exercice clos au 31 décembre — Saint-Pierre (974)",
       texte:"PRODUITS — Ventes de produits finis : 820.\nCHARGES — Achats de matières consommées : 310 ; Services extérieurs (transport, énergie) : 90 ; Salaires et cotisations : 260 ; Impôts : 40 ; Intérêts versés à la banque : 10.\nRÉSULTAT DE L'EXERCICE (bénéfice) : 110.",
       questions:[
         {q:"Quelle est la valeur ajoutée de l'entreprise ?", o:["820 k€","420 k€","110 k€"], c:1, why:"VA = production − consommations intermédiaires = 820 − (310 + 90) = 420 k€."},
         {q:"Quel acteur reçoit la plus grande part de cette valeur ajoutée ?", o:["L'État (40)","Les salariés (260)","La banque (10)"], c:1, why:"Avec 260 k€ de salaires et cotisations, les salariés sont les premiers bénéficiaires de la répartition de la VA."},
         {q:"Le bénéfice de 110 k€ mesure…", o:["la valeur perçue","la valeur financière créée sur l'exercice","l'identité numérique"], c:1, why:"Le résultat du compte de résultat (produits − charges) mesure la valeur financière produite par l'organisation."}]},
      {titre:"Tableau de bord trimestriel — Hôtel des Lataniers",
       source:"Direction de l'hôtel, Saint-Gilles-les-Bains",
       texte:"Taux d'occupation : 78 % (objectif : 75 %).\nNote de satisfaction client : 4,6 / 5.\nChiffre d'affaires : + 6 % par rapport au même trimestre l'an dernier.\nTaux d'absentéisme du personnel : 9 % (en hausse de 3 points).\nConsommation d'eau : + 12 %.",
       questions:[
         {q:"L'objectif commercial (75 % d'occupation) est dépassé : l'hôtel est…", o:["efficace sur cet objectif","forcément efficient sur tous les plans","en difficulté commerciale"], c:0, why:"L'objectif est atteint et dépassé : il y a efficacité. L'efficience exigerait d'examiner les moyens consommés."},
         {q:"Quels indicateurs signalent un problème ?", o:["Le taux d'occupation et la satisfaction","L'absentéisme et la consommation d'eau","Le chiffre d'affaires"], c:1, why:"Absentéisme en hausse (performance sociale) et eau +12 % (performance environnementale) se dégradent."},
         {q:"Que conclure sur la performance de l'hôtel ?", o:["Elle est globale : tout va bien","Bonne performance commerciale, mais performance globale fragilisée par le social et l'environnemental","Il faut fermer l'hôtel"], c:1, why:"Les dimensions de la performance peuvent être contradictoires : le commercial progresse pendant que le social et l'environnemental se dégradent."}]} ],
  4:[ {titre:"Budget de trésorerie — Janvier à mars (en k€)",
       source:"« Atelier Vanille Bleue », artisan transformateur — Saint-Philippe",
       texte:"JANVIER — Encaissements : 40 ; Décaissements : 38 ; Solde du mois : +2 ; Solde cumulé : +2.\nFÉVRIER — Encaissements : 22 ; Décaissements : 31 ; Solde du mois : −9 ; Solde cumulé : −7.\nMARS — Encaissements : 35 ; Décaissements : 30 ; Solde du mois : +5 ; Solde cumulé : −2.",
       questions:[
         {q:"Quel est le mois critique pour la trésorerie ?", o:["Janvier","Février","Mars"], c:1, why:"En février, le solde du mois est de −9 et le solde cumulé passe à −7 : la caisse est à découvert."},
         {q:"Que permet ce budget de trésorerie ?", o:["D'anticiper la difficulté et de négocier un financement AVANT février","De connaître la valeur perçue","De calculer la productivité"], c:0, why:"La démarche budgétaire sert à prévoir : l'entreprise peut négocier un découvert ou décaler un décaissement à temps."},
         {q:"Fin mars, le solde cumulé est de −2. Qu'en déduire ?", o:["Tout est rentré dans l'ordre","La situation s'améliore mais la trésorerie reste négative","L'entreprise a fait faillite"], c:1, why:"Le solde mensuel redevient positif (+5) mais le cumul reste négatif (−2) : la vigilance s'impose encore."}]},
      {titre:"Note interne — Projet de gamme « zéro plastique »",
       source:"Direction d'une PME de boissons, Saint-Denis",
       texte:"Enquête réalisée auprès de 400 clients : 64 % se déclarent prêts à acheter la nouvelle gamme.\nCharges fixes supplémentaires liées au projet : 18 000 € par an.\nMarge sur coûts variables prévue : 40 % du chiffre d'affaires.\nRisques identifiés : fournisseur unique d'emballages situé en métropole ; hausse possible du prix du fret maritime.",
       questions:[
         {q:"Quel chiffre d'affaires la gamme doit-elle atteindre pour ne pas perdre d'argent ?", o:["18 000 €","45 000 €","7 200 €"], c:1, why:"Seuil de rentabilité = charges fixes ÷ taux de marge = 18 000 ÷ 0,40 = 45 000 €."},
         {q:"L'enquête auprès des 400 clients est…", o:["un outil de prospective qui réduit l'incertitude","une donnée personnelle","un risque interne"], c:0, why:"L'enquête prévisionnelle éclaire la décision en estimant la demande future : c'est de la prospective."},
         {q:"Le fournisseur unique en métropole constitue…", o:["un risque externe de dépendance d'approvisionnement","une opportunité sans danger","un outil de planification"], c:0, why:"Dépendre d'un seul fournisseur lointain expose à la rupture d'approvisionnement : un risque externe majeur sur une île."}]} ]

casExtra: {
  1:[ {cas:"L'annonce de Royal Bourbon exige un BTS ; lors de l'entretien, on demande au candidat de gérer un imprévu simulé.", q:"Quelles approches l'entreprise combine-t-elle ?", o:["Qualification (diplôme) ET compétence (mise en situation)","Deux fois la qualification","Deux fois la compétence"], c:0, why:"Le diplôme atteste la qualification ; la mise en situation révèle la compétence : les deux approches se complètent."},
      {cas:"Chez un transporteur réunionnais, salariés et direction, en désaccord sur les plannings, signent finalement un accord après négociation.", q:"Comment décrire cette évolution ?", o:["Du conflit au consensus grâce à la négociation","Une rétention d'information","Une externalisation"], c:0, why:"Le dialogue social a transformé une relation conflictuelle en accord accepté : c'est le consensus."},
      {cas:"À l'embouteillage d'Edena, un chef d'équipe obtient l'adhésion de tous sans jamais hausser le ton ; on le suit naturellement.", q:"Quelle notion reconnaît-on ?", o:["Le leadership","L'autorité disciplinaire","La rigidité organisationnelle"], c:0, why:"Entraîner les autres par l'influence et la confiance, indépendamment des sanctions : c'est le leadership."},
      {cas:"Sur une fiche de paie : salaire brut 2 000 €, cotisations patronales 800 €.", q:"Quel est le coût du travail pour l'employeur ?", o:["2 000 €","2 800 €","800 €"], c:1, why:"Coût du travail = rémunération brute + cotisations patronales = 2 000 + 800 = 2 800 €."},
      {cas:"Une entreprise de Sainte-Marie installe la climatisation et de nouveaux sièges dans son atelier ; six mois après, l'absentéisme recule.", q:"Quel lien ce cas illustre-t-il ?", o:["Conditions de travail → comportements des salariés","Open data → information","Prix → marge"], c:0, why:"Améliorer les conditions de travail agit sur la motivation, la santé et la présence : le lien est direct."},
      {cas:"Un nouveau salarié observe que tout le monde se tutoie, mange ensemble le vendredi et porte le polo de l'entreprise.", q:"Que découvre-t-il ?", o:["La culture, les codes et les rituels de l'organisation","Le seuil de rentabilité","Le bilan comptable"], c:0, why:"Tutoiement, repas partagé, tenue commune : autant de codes et rituels qui révèlent la culture de l'organisation."} ],
  2:[ {cas:"Une start-up de Saint-Denis croise les données publiques de la Région sur les bus avec la météo pour créer une appli d'horaires intelligente.", q:"Quelle ressource exploite-t-elle ?", o:["L'open data (données ouvertes)","Des données personnelles volées","Le bilan social"], c:0, why:"Les données publiques librement réutilisables (open data) deviennent, retraitées, une information à forte valeur."},
      {cas:"Dans le SI d'une entreprise, le stagiaire ne peut pas consulter les salaires, mais le DRH oui.", q:"Que montre cette différence ?", o:["Chacun a des rôles et des droits définis dans l'environnement numérique","Le SI est en panne","Une rétention d'information illégale"], c:0, why:"Se situer dans un environnement numérique, c'est connaître ses rôles, ses droits et ses responsabilités d'accès."},
      {cas:"Le logiciel de caisse d'une boutique impose dix écrans de validation pour un simple échange d'article ; les files s'allongent.", q:"Qu'illustre ce cas ?", o:["La rigidité organisationnelle créée par l'outil numérique","L'intelligence collective","L'open data"], c:0, why:"Quand le logiciel impose des procédures inadaptées, le numérique contraint au lieu de servir : c'est la rigidité."},
      {cas:"Une marque péi anime une communauté en ligne où les clients partagent recettes et astuces autour de ses produits.", q:"Quel usage du numérique reconnaît-on ?", o:["Les communautés en ligne et réseaux sociaux","Le budget de trésorerie","La pointeuse"], c:0, why:"La marque s'appuie sur l'e-communication et sa communauté : partage d'information et fidélisation."},
      {cas:"Avant transformation : « 17 ; 23 ; 31 ». Après : « les ventes augmentent chaque mois du trimestre ».", q:"Quelle étape s'est produite ?", o:["Des données ont été transformées en information","Une connaissance a été supprimée","Un processus a été externalisé"], c:0, why:"Les nombres bruts (données), mis en contexte et interprétés, prennent du sens : ils deviennent une information."},
      {cas:"Une PME sauvegarde automatiquement chaque soir ses fichiers sur des serveurs distants accessibles par Internet.", q:"Quelle solution utilise-t-elle ?", o:["L'informatique en nuage (cloud)","Le big data","La fiche de poste"], c:0, why:"Stockage distant accessible via Internet : c'est le cloud, qui sécurise l'information et permet la mobilité."} ],

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
/* Données : si l'éditeur prof a enregistré des modifications locales, elles priment (aperçu). */
const OV_KEY="mm_data_overrides_v2";
function loadData(){

}
const ALL = loadData();

/* ====== Catalogue des jeux (Bloom croissant) ====== */
const GAMES_BASE = [
  { id:"trieur",  nom:"Le Trieur",        icon:"🗂️", bloom:"Reconnaître",  diff:"Facile",   desc:"Classe les éléments dans les bonnes catégories.", color:"#0ea5e9" },

  { id:"vraifaux",nom:"Vrai ou Faux",     icon:"⚖️", bloom:"Comprendre",   diff:"Facile",   desc:"Tranche vite : vrai ou faux ?",                   color:"#8b5cf6" },
  { id:"intrus",  nom:"L'Intrus",         icon:"🔎", bloom:"Analyser",     diff:"Difficile",desc:"Trouve l'élément qui ne va pas avec les autres.",  color:"#14b8a6" },
  { id:"cas",     nom:"Cas d'entreprise", icon:"📂", bloom:"Appliquer",    diff:"Moyen",    desc:"Étudie un cas réunionnais et décide.",            color:"#2563eb" },
  { id:"mission", nom:"Mission Dirigeant",icon:"👑", bloom:"Décider",      diff:"Difficile",desc:"Dirige une entreprise, vis les conséquences.",    color:"#db2777" }

/* ====== Matières ====== */
const SUBJ = {
  MGT:{ code:"MGT", icon:"\ud83e\udded", nom:"Management", short:"Management",
    themes:[
      { n:1, nom:"À la rencontre des organisations", short:"Les organisations", color:"#0ea5e9" },

    themes:[

      { n:2, nom:"Numérique et intelligence collective", short:"Le numérique",         color:"#0ea5e9" },

};
function gamesFor(code){
  const d=ALL[code]||{}; const hasDocs=d.docs&&Object.keys(d.docs).some(k=>(d.docs[k]||[]).length>0);
  return hasDocs?[...GAMES_BASE,DOCS_GAME]:[...GAMES_BASE];
}
const DEFAULT_TEACHER_CODE = "PROF2024";
const PASS = 60; // % de réussite pour valider

/* ====== Mot de passe professeur (modifiable, stocké sur l'appareil) ====== */
const PW_KEY = "pdg_teacher_pw_v1";
function getTeacherPw(){ try{ return localStorage.getItem(PW_KEY) || DEFAULT_TEACHER_CODE; }catch(e){ return DEFAULT_TEACHER_CODE; } }
function setTeacherPw(pw){ try{ localStorage.setItem(PW_KEY, pw); }catch(e){} }

/* ====== Stockage local (localStorage) ====== */
const LS_KEY = "pdg_scores_v1";
function loadScores(){
  try{ const raw = localStorage.getItem(LS_KEY); const arr = raw ? JSON.parse(raw) : [];
    let changed=false;
    arr.forEach((r,i)=>{ if(!r.id){ r.id = "e"+i+"_"+(r.date||"")+"_"+Math.random().toString(36).slice(2,7); changed=true; } });
    if(changed){ try{ localStorage.setItem(LS_KEY, JSON.stringify(arr)); }catch(e){} }
    return arr; }
  catch(e){ return []; }
}
function saveScore(rec){
  try{ const all = loadScores(); rec.id = "e_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
    all.push(rec); localStorage.setItem(LS_KEY, JSON.stringify(all)); }
  catch(e){}
}
function clearScores(){ try{ localStorage.removeItem(LS_KEY); }catch(e){} }
function deleteScores(ids){
  try{ const set=new Set(ids); const all=loadScores().filter(r=>!set.has(r.id));
    localStorage.setItem(LS_KEY, JSON.stringify(all)); }catch(e){}
}
function exportScoresCSV(){
  const all = loadScores();
  if(!all.length){ alert("Aucun résultat à exporter."); return; }
  const head = ["Matiere","Nom","Prenom","Pseudo","Classe","Theme","Jeu","Score(%)","Date"];
  const lines = all.map(r=>[(r.matiere||"MGT"),r.nom,r.prenom,r.pseudo,r.classe,r.theme,r.game,r.pct,r.date].map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(";"));
  const csv = "\uFEFF"+head.join(";")+"\n"+lines.join("\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="resultats_pdg_en_mission.csv"; a.click(); URL.revokeObjectURL(url);
}

/* ====== Média de question (image / audio / vidéo / YouTube) ======

/* ====== HUB ÉLÈVE ====== */
function Hub({student,subject,onSwitch,onLogout}){
  const SD=ALL[subject]; const GAMES=gamesFor(subject); const THEMES=SUBJ[subject].themes;
  const [tab,setTab]=useState("jouer");
  const [theme,setTheme]=useState(1);
  const [progress,setProgress]=useState({}); // {"theme-game": bestPct}
  const [playing,setPlaying]=useState(null);

  const key=(t,g)=>t+"-"+g;
  const best=(t,g)=>progress[key(t,g)]||0;
  // Accès libre : tous les jeux d'un thème débloqué sont accessibles dans n'importe quel ordre.
  const unlocked=(t,gi)=> true;
  // thème débloqué si thème précédent a au moins 4 jeux validés
  const themeValidated=(t)=>GAMES.filter(g=>best(t,g.id)>=PASS).length;
  const themeUnlocked=(t)=> t===1 ? true : themeValidated(t-1)>=4;

  const finish=(t,g,pct)=>{
    setProgress(p=>({...p,[key(t,g)]:Math.max(p[key(t,g)]||0,pct)}));
    saveScore({...student,matiere:subject,theme:t,game:g,pct,date:new Date().toISOString()});
    setPlaying(null);
  };

  if(playing) return <Stage student={student} subject={subject} theme={playing.theme} game={playing.game}
    onDone={(pct)=>finish(playing.theme,playing.game,pct)} onQuit={()=>setPlaying(null)} />;

  return (<div className="app">
    <header className="top">
      <div className="brand">{SUBJ[subject].icon} Mission {SUBJ[subject].short}</div>
      <div className="who">{student.pseudo} · <span className="cl">{student.classe}</span></div>
      <button className="lo" onClick={onSwitch}>⇄ Matière</button>
      <button className="lo" onClick={onLogout}>Quitter</button>
    </header>
    <nav className="nav">
      <button className={tab==="jouer"?"nb on":"nb"} onClick={()=>setTab("jouer")}>🎮 Jouer</button>
      <button className={tab==="cours"?"nb on":"nb"} onClick={()=>setTab("cours")}>📘 Cours</button>
      <button className={tab==="prog"?"nb on":"nb"} onClick={()=>setTab("prog")}>📋 Programme</button>
      <button className={tab==="lex"?"nb on":"nb"} onClick={()=>setTab("lex")}>📖 Glossaire</button>
      <button className={tab==="res"?"nb on":"nb"} onClick={()=>setTab("res")}>🧰 Ressources</button>
    </nav>
    <main className="main">
      {tab==="jouer"&&(<>
        <div className="theme-pick">
          {THEMES.map(t=>{ const ok=themeUnlocked(t.n);
            return <button key={t.n} disabled={!ok} className={"tpill"+(theme===t.n?" on":"")+(ok?"":" lock")} style={{"--c":t.color}} onClick={()=>ok&&setTheme(t.n)}>
              {ok?"":"🔒 "}<b>Thème {t.n}</b><span>{t.short}</span></button>; })}
        </div>
        {!themeUnlocked(theme) ? <div className="locked-msg">🔒 Valide au moins 4 jeux du thème précédent pour débloquer ce thème.</div> :
        <>
        <div className="contract">📜 <b>Contrat de confiance</b> — Aucun piège : tout est dans le Cours et le Glossaire. Droit à l'erreur, chaque réponse s'explique. Tous les jeux du thème sont accessibles librement, dans l'ordre que tu veux. Valide 4 jeux (≥ {PASS}%) pour ouvrir le thème suivant.</div>
        <div className="games">
          {GAMES.map((g,gi)=>{ const ok = g.id==="docs" ? !!(SD.docs&&SD.docs[theme]&&SD.docs[theme].length) : unlocked(theme,gi); const b=best(theme,g.id);
            return (<div key={g.id} className={"gcard"+(ok?"":" lock")} style={{"--c":g.color}}>
              <div className="gicon">{ok?g.icon:"🔒"}</div>
              <div className="gtags">
                <span className="gbloom">{g.bloom}</span>
                <span className="gdiff" style={{background:DIFF_COLOR[g.diff]}}>{g.diff}</span>
              </div>
              <h3>{g.nom}</h3>
              <p>{g.desc}</p>
              {b>0&&<div className="gbest">{b>=PASS?"✅ ":""}Record : {b}%</div>}
              <button disabled={!ok} onClick={()=>setPlaying({theme,game:g.id})}>{ok?(b>0?"Rejouer":"Jouer"):"Verrouillé"}</button>
            </div>); })}
        </div></>}
      </>)}
      {tab==="cours"&&<Cours subject={subject}/>}
      {tab==="prog"&&<Prog subject={subject}/>}
      {tab==="lex"&&<Lex subject={subject}/>}
      {tab==="res"&&<Res subject={subject}/>}
    </main>
  </div>);
}

/* ====== STAGE : routeur de jeux ====== */
function Stage({student,subject,theme,game,onDone,onQuit}){
  const SD=ALL[subject];
  const meta=gamesFor(subject).find(g=>g.id===game)||GAMES_BASE[0];
  const head=<Ghead title={meta.nom+" — Thème "+theme} sub={meta.bloom} onQuit={onQuit}/>;
  if(game==="trieur")  return <Trieur D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="memory")  return <Memory D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="flash")   return <Flash D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="vraifaux")return <VraiFaux D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="intrus")  return <Intrus D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="cas")     return <Cas D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="mission") return <Mission D={SD} theme={theme} head={head} onDone={onDone}/>;
  if(game==="docs")    return <Docs D={SD} theme={theme} head={head} onDone={onDone}/>;
  return null;
}

function Ghead({title,sub,onQuit}){
  return (<div className="ghead"><button className="back" onClick={onQuit}>← Jeux</button>
    <div className="gh-t">{title}<span className="gh-s">{sub}</span></div></div>);
}
function Result({score,total,onDone,extra}){
  const pct=Math.round(score/total*100); const ok=pct>=PASS;
  return (<div className="res"><div className="medal">{pct>=90?"🏆":ok?"🎉":"💪"}</div>
    <h2>{score} / {total}</h2><div className="rpct" style={{color:ok?"#16a34a":"#dc2626"}}>{pct}%</div>
    {extra}<p>{ok?"Bravo, jeu validé ! Le suivant est débloqué.":"Presque ! Relis le cours et retente, tu vas y arriver."}</p>
    <button className="cta sm" onClick={()=>onDone(pct)}>Continuer</button></div>);
}

/* ====== JEU 1 : TRIEUR ====== */
function Trieur({theme,head,onDone,D}){
  const cfg=D.trieur[theme];
  const [items]=useState(()=>[...cfg.items].map((it,i)=>({...it,_i:i})).sort(()=>Math.random()-0.5));
  const [sel,setSel]=useState(null);
  const [placed,setPlaced]=useState({}); // _i -> bac
  const [score,setScore]=useState(0); const [err,setErr]=useState(0); const [done,setDone]=useState(false);
  const remaining=items.filter(it=>placed[it._i]===undefined);

  const drop=(bac)=>{ if(sel===null) return; const it=items.find(x=>x._i===sel);
    const good=it.cat===bac;
    setPlaced(p=>({...p,[sel]:bac})); good?setScore(s=>s+1):setErr(e=>e+1); setSel(null);
    if(items.filter(x=>placed[x._i]===undefined && x._i!==sel).length===0) setTimeout(()=>setDone(true),250);
  };
  return (<div className="game">{head}
    <p className="help">{cfg.consigne} <span className="muted">Clique un élément, puis sa catégorie.</span></p>
    <div className="tray">{remaining.map(it=>(
      <button key={it._i} className={"tkn"+(sel===it._i?" sel":"")} onClick={()=>setSel(it._i)}>{it.label}</button>))}
      {remaining.length===0&&<span className="muted">Tous les éléments sont classés ✅</span>}</div>
    <div className="bacs">{cfg.bacs.map((b,bi)=>(
      <div key={bi} className="bac" onClick={()=>drop(bi)}>
        <div className="bac-h">{b}</div>
        <div className="bac-body">{items.filter(it=>placed[it._i]===bi).map(it=>(
          <span key={it._i} className={"chip2 "+(it.cat===bi?"ok":"no")}>{it.cat===bi?"✓":"✗"} {it.label}</span>))}</div>
      </div>))}</div>
    {done&&<Result score={score} total={items.length} onDone={onDone}/>}
  </div>);
}

/* ====== JEU 2 : MEMORY ====== */
function Memory({theme,head,onDone,D}){
  const pairs=D.memory[theme];
  const [cards]=useState(()=>{ let id=0; const arr=[];
    pairs.forEach((p,pi)=>{ arr.push({id:id++,pair:pi,txt:p.a}); arr.push({id:id++,pair:pi,txt:p.b}); });
    return arr.sort(()=>Math.random()-0.5); });
  const [flipped,setFlipped]=useState([]); const [matched,setMatched]=useState([]);
  const [tries,setTries]=useState(0); const [lock,setLock]=useState(false);
  const click=(c)=>{ if(lock||flipped.includes(c.id)||matched.includes(c.pair)) return;
    const nf=[...flipped,c.id]; setFlipped(nf);
    if(nf.length===2){ setLock(true); setTries(t=>t+1);
      const [a,b]=nf.map(id=>cards.find(x=>x.id===id));
      if(a.pair===b.pair){ setTimeout(()=>{setMatched(m=>[...m,a.pair]);setFlipped([]);setLock(false);},450); }
      else setTimeout(()=>{setFlipped([]);setLock(false);},800);
    } };
  const done=matched.length===pairs.length;
  return (<div className="game">{head}
    <p className="help">Retrouve les paires. Essais : <b>{tries}</b> <span className="muted">— pas de note ici, l'important c'est de tout retrouver !</span></p>
    <div className="mem-grid">{cards.map(c=>{ const show=flipped.includes(c.id)||matched.includes(c.pair);
      return <button key={c.id} className={"mcard"+(show?" up":"")+(matched.includes(c.pair)?" done":"")} onClick={()=>click(c)}>
        <span className="mc-front">?</span><span className="mc-back">{c.txt}</span></button>; })}</div>
    {done&&(<div className="res"><div className="medal">🎉</div><h2>Bravo !</h2>
      <p>Toutes les paires sont retrouvées. Le jeu suivant est débloqué.</p>
      <p className="muted">Terminé en {tries} essais — ici, peu importe le nombre d'erreurs : l'essentiel est d'avoir tout associé.</p>
      <button className="cta sm" onClick={()=>onDone(100)}>Continuer</button></div>)}
  </div>);
}

/* ====== JEU 3 : FLASH QUIZ (chrono + combo) ====== */
function Flash({theme,head,onDone,D}){
  const qs=D.flash[theme];
  const [i,setI]=useState(0); const [score,setScore]=useState(0); const [combo,setCombo]=useState(0);
  const [t,setT]=useState(10); const [picked,setPicked]=useState(null); const [done,setDone]=useState(false);
  const q=qs[i];
  useEffect(()=>{ if(done||picked!==null) return; if(t<=0){ choose(-1); return; }
    const id=setTimeout(()=>setT(x=>x-1),1000); return ()=>clearTimeout(id); },[t,picked,done]);
  const choose=(idx)=>{ if(picked!==null) return; setPicked(idx);
    const good=idx===q.c; if(good){ setScore(s=>s+1); setCombo(c=>c+1);} else setCombo(0);
    setTimeout(()=>{ if(i+1>=qs.length){setDone(true);} else {setI(i+1);setPicked(null);setT(10);} },700); };
  if(done) return <div className="game">{head}<Result score={score} total={qs.length} onDone={onDone}/></div>;
  return (<div className="game">{head}
    <div className="flash-bar"><div className="combo">🔥 Combo ×{combo}</div>
      <div className="timer"><div className="tfill" style={{width:(t/10*100)+"%",background:t<=3?"#ef4444":"#f59e0b"}}/></div>
      <div className="qn">{i+1}/{qs.length}</div></div>
    <div className="flash-q">{q.q}</div>
    <Media m={q.media}/>
    <div className="opts">{q.o.map((o,idx)=>{ let c="opt";
      if(picked!==null){ if(idx===q.c)c+=" right"; else if(idx===picked)c+=" bad"; }
      return <button key={idx} className={c} onClick={()=>choose(idx)}>{o}</button>; })}</div>
  </div>);
}

/* ====== JEU 4 : VRAI / FAUX ====== */
function VraiFaux({theme,head,onDone,D}){
  const qs=D.vraifaux[theme];
  const [i,setI]=useState(0); const [score,setScore]=useState(0); const [picked,setPicked]=useState(null); const [done,setDone]=useState(false);
  const q=qs[i];
  const ans=(v)=>{ if(picked!==null) return; setPicked(v); if(v===q.v) setScore(s=>s+1); };
  const next=()=>{ if(i+1>=qs.length) setDone(true); else {setI(i+1);setPicked(null);} };
  if(done) return <div className="game">{head}<Result score={score} total={qs.length} onDone={onDone}/></div>;
  return (<div className="game">{head}
    <div className="qn r">{i+1}/{qs.length}</div>
    <div className="vf-card">« {q.p} »</div>
    <Media m={q.media}/>
    <div className="vf-btns">
      <button className={"vf v"+(picked!==null&&q.v===true?" right":"")+(picked===true&&q.v!==true?" bad":"")} onClick={()=>ans(true)} disabled={picked!==null}>✓ VRAI</button>
      <button className={"vf f"+(picked!==null&&q.v===false?" right":"")+(picked===false&&q.v!==false?" bad":"")} onClick={()=>ans(false)} disabled={picked!==null}>✗ FAUX</button>
    </div>
    {picked!==null&&(<div className={"fb "+(picked===q.v?"good":"no")}><strong>{picked===q.v?"✅ Exact !":"❌ Raté."}</strong><p>{q.why}</p>
      <button className="next" onClick={next}>{i+1>=qs.length?"Voir mon score":"Suivant →"}</button></div>)}
  </div>);
}

/* ====== JEU 5 : L'INTRUS ====== */
function Intrus({theme,head,onDone,D}){
  const [qs,setQs]=useState(()=>[...D.intrus[theme]]);
  const [i,setI]=useState(0); const [score,setScore]=useState(0); const [picked,setPicked]=useState(null); const [done,setDone]=useState(false);
  const extras=(D.intrusExtra&&D.intrusExtra[theme])||[];
  const [ext,setExt]=useState(false);

  const q=qs[i];
  const pick=(idx)=>{ if(picked!==null) return; setPicked(idx); if(idx===q.intrus) setScore(s=>s+1); };

  if(done) return <div className="game">{head}<Result score={score} total={qs.length} onDone={onDone}
    extra={(!ext&&extras.length>0)&&(<button className="more" onClick={extend}>➕ Questions supplémentaires (jusqu'à 10)</button>)}/></div>;

      <button className="next" onClick={next}>{i+1>=qs.length?"Voir mon score":"Suivant →"}</button></div>)}
