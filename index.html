ressources: [
{ cat:"methodo", type:"page", titre:"Méthode — Aborder le sujet (devoir et bac), pas à pas", desc:"Le rituel des 20 premières minutes sur un sujet type bac : contexte, questions, annexes, surlignage, verbes directeurs.", url:"",
  html:"<h2>Le principe : les 20 premières minutes décident de la copie</h2><p>Sur un sujet de 4 heures avec une dizaine de pages d'annexes, foncer tête baissée est la garantie de l'erreur. Le rituel ci-dessous s'applique à chaque devoir de l'année — pour qu'il soit automatique le jour du bac.</p><h2>Étape 1 — Lire le contexte de l'organisation (3-4 min)</h2><ul><li>Photographie l'organisation au brouillon : type, taille, activité, champ d'action, finalité (réflexe de 1ʳᵉ !).</li><li>Identifie son <b>problème central</b> : c'est le fil rouge — chaque dossier en éclaire une facette.</li><li>Repère son environnement : concurrence, contraintes, opportunités, territoire.</li></ul><h2>Étape 2 — Lire TOUTES les questions de TOUS les dossiers (5 min)</h2><ul><li>Tu sauras quoi chercher dans les annexes, et tu verras la <b>logique du sujet</b> (les dossiers racontent une histoire : diagnostic → décision → mise en œuvre).</li><li><b>Lis chaque question JUSQU'AU BOUT.</b> Au bac, beaucoup de questions sont <b>doubles ou triples</b> : <i>« Calculez le seuil de rentabilité <u>et</u> concluez sur l'opportunité du projet »</i> ; <i>« Identifiez les facteurs de motivation <u>puis</u> proposez des actions adaptées »</i>. Numérote chaque sous-tâche (3a, 3b…) : une sous-tâche oubliée, ce sont des points donnés au voisin.</li><li>Entoure les <b>verbes directeurs</b> et repère la <b>question finale développée</b> pour lui réserver 30-40 minutes.</li></ul><h2>Étape 3 — Lire les TITRES des annexes (2 min)</h2><p>La liste des annexes est une carte au trésor : <i>« Annexe 5 — Extraits du bilan fonctionnel »</i> te dit où se joue la question sur la trésorerie. Construis ton tableau de correspondance au brouillon : <i>Q1-Q2 → annexes 1-2 · Q3 → annexe 4…</i> Les questions précisent souvent elles-mêmes les annexes à mobiliser : surligne ces renvois.</p><h2>Étape 4 — Première lecture des annexes AVEC le surligneur (8-10 min)</h2><ul><li>Lis chaque annexe avec ses questions en tête. Surligne <b>uniquement</b> les éléments qui serviront : chiffres clés, citations, mots du programme.</li><li>Code couleur par dossier : au moment de rédiger, tes indices se retrouvent en un coup d'œil.</li><li>Note en marge la notion illustrée : <i>« = marque employeur », « = BFR trop élevé », « = risque externe »</i>. Ces annotations sont tes plans de réponse.</li><li>Pour les documents chiffrés : vérifie période et <b>unité</b> (k€ ! %) avant tout calcul.</li></ul><h2>Étape 5 — Les verbes directeurs du bac MSDGN</h2><table><tr><th>Verbe</th><th>Signification</th><th>Ce qui est attendu</th></tr><tr><td><b>Identifier / Repérer</b></td><td>Trouver et nommer</td><td>L'élément + le vocabulaire du programme + justification par l'annexe</td></tr><tr><td><b>Citer / Relever</b></td><td>Extraire</td><td>L'élément précis du document, rien de plus</td></tr><tr><td><b>Définir</b></td><td>Donner le sens</td><td>La définition exacte du cours (1ʳᵉ comme terminale !)</td></tr><tr><td><b>Caractériser</b></td><td>Décrire selon des critères</td><td>Les critères du cours passés en revue et justifiés</td></tr><tr><td><b>Distinguer</b></td><td>Différencier</td><td>Définir les deux notions et expliciter la différence (ex. : coût complet / coût spécifique)</td></tr><tr><td><b>Calculer</b></td><td>Résultat chiffré</td><td>Formule + application + résultat avec unité + interprétation</td></tr><tr><td><b>En déduire</b></td><td>Prolonger le résultat</td><td>Conclusion ou calcul qui s'appuie explicitement sur la question précédente</td></tr><tr><td><b>Expliquer</b></td><td>Faire comprendre</td><td>Mécanisme, causes, conséquences — avec les notions nommées</td></tr><tr><td><b>Analyser / Commenter</b></td><td>Décomposer et interpréter</td><td>Constat (annexe) + explication (cours) + portée pour l'organisation</td></tr><tr><td><b>Montrer que / Démontrer</b></td><td>Prouver une affirmation</td><td>Arguments AEI appuyés sur les annexes : le chemin compte autant que la conclusion</td></tr><tr><td><b>Justifier</b></td><td>Fonder par des preuves</td><td>Raisons appuyées sur le contexte, les annexes et le cours</td></tr><tr><td><b>Comparer</b></td><td>Mettre en regard</td><td>Critère par critère, avec écarts chiffrés si possible</td></tr><tr><td><b>Apprécier / Évaluer</b></td><td>Juger avec nuance</td><td>Avantages ET limites, appuyés sur le cas</td></tr><tr><td><b>Proposer / Conseiller / Recommander</b></td><td>Suggérer</td><td>Solutions réalistes, hiérarchisées, justifiées par le contexte</td></tr><tr><td><b>Dans quelle mesure… / Discuter</b></td><td>Débattre</td><td>Plan en deux axes (oui… / mais…), position finale claire — c'est la question développée</td></tr></table><blockquote><b>⚠️ Les erreurs qui coûtent le plus cher au bac</b> : une sous-question non vue (question lue trop vite) · une annexe jamais utilisée · « analysez » traité comme « citez » · la question développée bâclée en 10 minutes faute d'avoir géré son temps.</blockquote><h2>Check-list de fin d'épreuve (10 dernières minutes)</h2><ul><li>Compte tes réponses : autant que de questions ET de sous-questions ?</li><li>Unités des calculs, orthographe du vocabulaire du programme ?</li><li>Chaque réponse mentionne-t-elle « d'après l'annexe… » au moins une fois ?</li></ul>" },

{ cat:"methodo", type:"page", titre:"L'épreuve écrite du bac MSDGN — mode d'emploi", desc:"Format officiel, barème, gestion du temps : tout ce qu'il faut savoir avant le jour J.", url:"",
  html:"<h2>La carte d'identité de l'épreuve</h2><table><tr><th>Élément</th><th>Détail</th></tr><tr><td><b>Durée</b></td><td>4 heures</td></tr><tr><td><b>Notation</b></td><td>Sur 20 points — <b>coefficient 16</b> (la plus grosse épreuve de ton bac !)</td></tr><tr><td><b>Programmes évalués</b></td><td>Management de 1ʳᵉ + Sciences de gestion et numérique de 1ʳᵉ + enseignement commun de terminale</td></tr><tr><td><b>Forme du sujet</b></td><td>Le cas d'une organisation réelle : plusieurs <b>dossiers</b> (souvent 3) composés de documents (annexes) et de questions (3 à 5 par dossier)</td></tr><tr><td><b>Dernière question</b></td><td>Souvent une question invitant à une <b>réponse développée et argumentée</b></td></tr></table><blockquote><b>Le message essentiel</b> : les programmes de PREMIÈRE comptent autant que celui de terminale. Réviser MSDGN, c'est réviser les trois matières de ce jeu !</blockquote><h2>Gérer ses 4 heures</h2><ul><li><b>0h00 – 0h20</b> : lecture complète du sujet. Identifie l'organisation (type, taille, activité, contexte) et survole TOUTES les annexes avant d'écrire.</li><li><b>0h20 – 3h20</b> : traite les dossiers. Environ <b>1 heure par dossier</b>, en gardant plus de temps pour la question développée.</li><li><b>3h20 – 3h50</b> : la réponse argumentée finale, au propre, structurée.</li><li><b>3h50 – 4h00</b> : relecture (unités des calculs, orthographe du vocabulaire, questions oubliées).</li></ul><h2>Les réflexes qui rapportent</h2><ul><li>Cite tes sources : <i>« d'après l'annexe 3… »</i> à chaque fois que tu utilises un document.</li><li>Nomme les notions du programme explicitement : le correcteur coche des mots-clés.</li><li>Réponds à TOUTES les questions, même brièvement : une question non traitée = 0 garanti.</li><li>Aère ta copie : titres de dossiers, paragraphes, lignes sautées.</li></ul><blockquote><b>⚠️ Important</b> : vérifie chaque année en classe les éventuelles évolutions du format avec ton professeur — cette fiche décrit l'épreuve telle que définie par la note de service en vigueur (session 2021 et suivantes).</blockquote>" },
{ cat:"methodo", type:"page", titre:"Méthode — Exploiter le contexte et les annexes (dossiers du bac)", desc:"La majorité des points se gagne dans les documents : voici comment les faire parler.", url:"",
  html:"<h2>Le principe : rien ne sort de nulle part</h2><p>Chaque question d'un dossier se résout en croisant <b>trois ingrédients</b> : le contexte de l'organisation + une ou plusieurs annexes + tes connaissances de cours. Une réponse qui n'utilise que l'un des trois est incomplète.</p><h2>Étape 1 — Photographier l'organisation (au brouillon)</h2><ul><li>Type, taille, activité, champ d'action, finalité (réflexe de 1ʳᵉ !)</li><li>Son problème central : que cherche-t-elle à faire ou à résoudre ?</li><li>Son environnement : concurrence, contraintes, opportunités.</li></ul><h2>Étape 2 — Associer chaque question à ses annexes</h2><p>Les questions indiquent souvent les annexes à utiliser. Sinon, repère-les toi-même et note au brouillon : <i>Q3 → annexes 2 et 4</i>. Puis lis l'annexe AVEC la question en tête : tu cherches une réponse, pas une lecture de loisir.</p><h2>Étape 3 — Le tri des annexes selon leur nature</h2><table><tr><th>Annexe</th><th>Réflexe</th></tr><tr><td><b>Texte (article, témoignage)</b></td><td>Surligner les mots du programme, identifier la source (interne ? externe ?)</td></tr><tr><td><b>Tableau de chiffres</b></td><td>Titre, période, unité, puis évolutions et écarts marquants</td></tr><tr><td><b>Compte de résultat / bilan</b></td><td>Repérer résultat, VA possible, grandes masses ; préparer les calculs demandés</td></tr><tr><td><b>Schéma / organigramme / processus</b></td><td>Lire la légende, suivre les flux, compter les étapes ou niveaux</td></tr></table><h2>Étape 4 — Rédiger en croisant</h2><blockquote><i>« L'annexe 4 montre que la note moyenne des avis en ligne baisse à 4,1/5 alors que seuls 12 % des avis reçoivent une réponse (<b>constat chiffré</b>). Or l'e-réputation est une composante de l'identité numérique de l'organisation (<b>notion de cours</b>) : l'entreprise doit organiser la réponse systématique aux avis pour restaurer la confiance (<b>application au contexte</b>). »</i></blockquote><h2>Les pièges du dossier documentaire</h2><ul><li>❌ Paraphraser l'annexe (recopier sans analyser) : zéro valeur ajoutée.</li><li>❌ Plaquer du cours hors contexte : la réponse doit parler DE cette organisation.</li><li>❌ Ignorer une annexe fournie : si elle existe, elle sert quelque part.</li><li>❌ Traiter les questions dans le désordre sans le signaler clairement sur la copie.</li></ul>" },
{ cat:"methodo", type:"page", titre:"Méthode — La réponse développée et argumentée du bac", desc:"La question finale qui départage les copies : structure, exigences et modèle commenté.", url:"",
  html:"<h2>Ce qu'on attend de toi</h2><p>La dernière question d'un sujet invite souvent à une réponse construite du type : <i>« Dans quelle mesure… ? », « L'organisation a-t-elle intérêt à… ? », « Que conseilleriez-vous… ? »</i>. On évalue ta capacité à <b>mobiliser plusieurs thèmes du programme</b> (première ET terminale), à <b>argumenter</b> et à <b>prendre position</b>.</p><h2>La structure attendue</h2><ul><li><b>Introduction (3-4 lignes)</b> : présente l'organisation en une phrase, reformule la question, annonce ton plan en deux axes.</li><li><b>Développement (2 axes, 2-3 arguments AEI chacun)</b> : pour une question « Dans quelle mesure… », le plan <i>« Oui, dans une certaine mesure / Mais avec des limites »</i> fonctionne presque toujours.</li><li><b>Conclusion (3 lignes)</b> : réponds clairement à la question, propose une recommandation ou une ouverture.</li></ul><h2>Le paragraphe AEI niveau bac</h2><blockquote><b>A</b> : « La digitalisation de la relation client constitue d'abord une opportunité commerciale. »<br/><b>E</b> : « Les traces numériques (avis, historiques, navigation) nourrissent la connaissance client et permettent de personnaliser l'offre, renforçant la fidélité — pilier de la performance commerciale. »<br/><b>I</b> : « Ainsi, l'annexe 5 indique que 61 % des clients sont identifiés via le programme de fidélité : un levier direct de personnalisation. »</blockquote><h2>Mobiliser les TROIS programmes</h2><p>Les meilleures copies relient les années : une question sur un investissement appelle le <i>financement</i> (terminale) ET le <i>seuil de rentabilité</i> (première SDGN) ET la <i>décision stratégique</i> (première management). Pendant tes révisions, entraîne-toi à tisser ces liens — c'est exactement ce que permettent les trois matières de ce jeu.</p><h2>Barème mental du correcteur</h2><ul><li>Structure visible (intro / axes / conclusion) ✔</li><li>Notions nommées et définies ✔</li><li>Arguments appuyés sur le cas et les annexes ✔</li><li>Prise de position finale claire et nuancée ✔</li></ul><blockquote><b>⚠️ Gestion du temps</b> : garde 30 à 40 minutes pour cette question. Bâclée en 10 minutes, elle plafonne ta note ; soignée, elle fait décoller la copie.</blockquote>" },
{ cat:"methodo", type:"page", titre:"Les calculs incontournables du bac MSDGN", desc:"Première + terminale : le formulaire complet avec les réflexes de rédaction.", url:"",
  html:"<h2>Formulaire — acquis de première</h2><table><tr><th>Indicateur</th><th>Formule</th></tr><tr><td>Valeur ajoutée</td><td>Production − consommations intermédiaires</td></tr><tr><td>Productivité</td><td>Production ÷ moyens utilisés (ex. heures)</td></tr><tr><td>Coût du travail</td><td>Salaires bruts + cotisations patronales</td></tr><tr><td>Résultat</td><td>Produits − charges</td></tr><tr><td>Marge sur coûts variables</td><td>CA − charges variables</td></tr><tr><td>Taux de marge sur coûts variables</td><td>Marge sur coûts variables ÷ CA</td></tr><tr><td>Seuil de rentabilité</td><td>Charges fixes ÷ taux de marge sur coûts variables</td></tr><tr><td>Solde de trésorerie</td><td>Encaissements − décaissements (et solde cumulé)</td></tr></table><h2>Formulaire — apports de terminale</h2><table><tr><th>Indicateur</th><th>Formule</th><th>Interprétation</th></tr><tr><td><b>FRNG</b></td><td>Ressources stables − emplois stables</td><td>La réserve de financement de long terme</td></tr><tr><td><b>BFR</b></td><td>(Stocks + créances clients) − dettes fournisseurs</td><td>L'argent immobilisé par le cycle d'exploitation</td></tr><tr><td><b>Trésorerie nette</b></td><td>FRNG − BFR</td><td>Positive = aisance ; négative = financement à trouver</td></tr><tr><td><b>Coût complet</b></td><td>Charges directes + charges indirectes imputées</td><td>Le coût « tout compris » d'un produit</td></tr><tr><td><b>Coût spécifique</b></td><td>Charges variables + charges fixes directes propres</td><td>Pour décider de maintenir ou d'abandonner un produit</td></tr></table><h2>Les 4 temps de la rédaction d'un calcul</h2><ul><li><b>1.</b> Formule écrite en toutes lettres</li><li><b>2.</b> Application numérique</li><li><b>3.</b> Résultat avec <b>unité</b> (€, k€, %, unités/h)</li><li><b>4.</b> Phrase d'interprétation : bonne ou mauvaise nouvelle ? comparé à quoi ? quelle décision en découle ?</li></ul><blockquote><b>Exemple complet</b> : « Trésorerie nette = FRNG − BFR = 120 − 150 = <b>−30 k€</b>. La trésorerie est négative : le fonds de roulement ne couvre pas le besoin né de l'exploitation. L'entreprise doit réduire son BFR (stocks, délais clients) ou négocier un financement court terme. »</blockquote><blockquote><b>⚠️ Pièges du bac</b> : unités mélangées (k€ et €) · taux en % non converti (40 % = 0,4) · confondre charges fixes et variables · oublier que le solde CUMULÉ de trésorerie se calcule de proche en proche · calculer sans conclure.</blockquote>" },
{ cat:"methodo", type:"page", titre:"Le Grand oral adossé à MSDGN", desc:"Format officiel, choix des questions, structure de l'exposé et entraînement.", url:"",
  html:"<h2>Le format officiel</h2><table><tr><th>Élément</th><th>Détail</th></tr><tr><td><b>Préparation</b></td><td>20 minutes (notes et support possibles, non évalués)</td></tr><tr><td><b>Épreuve</b></td><td>20 minutes : <b>10 min d'exposé</b> + <b>10 min d'entretien</b> avec le jury</td></tr><tr><td><b>Coefficient (voie techno)</b></td><td>14 jusqu'à la session 2026 incluse, puis 12 à compter de 2027</td></tr><tr><td><b>Les questions</b></td><td>Tu présentes 2 questions préparées dans l'année, validées par tes professeurs ; le jury en choisit UNE</td></tr><tr><td><b>En STMG</b></td><td>Les questions s'appuient sur la spécialité MSDGN (avec l'étude approfondie menée dans l'enseignement spécifique)</td></tr></table><h2>Choisir ses deux questions</h2><ul><li>Pars d'une <b>organisation réelle</b> que tu peux documenter — une entreprise réunionnaise rend ton oral unique et concret.</li><li>Formule une vraie question débattable : <i>« La digitalisation suffit-elle à fidéliser les clients de X ? »</i> plutôt que <i>« La digitalisation chez X »</i>.</li><li>Vérifie l'ancrage au programme : ta question doit mobiliser des notions identifiables (nomme-les dans l'exposé !).</li><li>Choisis deux questions assez différentes pour montrer l'étendue de tes connaissances.</li></ul><h2>Structurer les 10 minutes d'exposé</h2><ul><li><b>1 min</b> — Pourquoi cette question ? (motivation personnelle, lien avec ton parcours)</li><li><b>1 min</b> — Le contexte : l'organisation, son environnement, l'enjeu.</li><li><b>6-7 min</b> — Ta réponse argumentée en 2 axes, avec notions du programme ET données concrètes.</li><li><b>1 min</b> — Conclusion : réponse claire + ouverture (limite, perspective, lien avec ton projet).</li></ul><h2>Réussir les 10 minutes d'entretien</h2><ul><li>Le jury rebondit sur TON exposé : maîtrise chaque mot que tu prononces (si tu dis « PGI », sache le définir).</li><li>Une question difficile ? Reformule, raisonne à voix haute, relie à ce que tu sais : on évalue ta démarche autant que la réponse.</li><li>Tu as le droit de dire « je ne sais pas, mais je peux faire l'hypothèse que… » — c'est mieux qu'inventer.</li></ul><h2>S'entraîner (vraiment)</h2><ul><li>Chronomètre-toi : 10 minutes, pas 8, pas 12.</li><li>Enregistre-toi (audio ou vidéo) et réécoute : débit, tics de langage, regard.</li><li>Entraîne-toi <b>debout</b>, sans lire tes notes : un coup d'œil de temps en temps suffit.</li><li>Fais-toi poser des questions pièges par un camarade — ou par ta classe, en utilisant ce jeu comme base de révision des notions.</li></ul>" },

/* ============================================================
   DROIT — Première STMG (enseignement de spécialité Droit & Économie)

============================================================ */
notions: [
  { id:"dr1-etat-droit", theme:1, terme:"État de droit et fonctions du droit",
    aca:"Dans un État de droit, le pouvoir lui-même est soumis au droit. Le droit organise la société et pacifie les relations sociales au nom de valeurs : liberté, égalité, solidarité, laïcité.",
    simple:"Le droit, ce sont les règles qui font tenir la société ensemble — et même l'État doit les respecter.",
    ex:"Quand deux voisins règlent leur différend devant un juge plutôt que par la violence, le droit joue son rôle de pacification." },
  { id:"dr1-droit-morale", theme:1, terme:"Distinction droit et morale ; ordre public",
    aca:"La morale relève de la conscience individuelle ; le droit est imposé par l'autorité publique et sanctionné. L'ordre public regroupe les règles auxquelles on ne peut déroger.",
    simple:"La morale dit ce qui est « bien » ; le droit dit ce qui est « obligatoire » et prévoit une sanction.",
    ex:"Mentir à un ami est immoral mais pas illégal ; ne pas porter secours à une personne en danger est, lui, sanctionné par le droit." },
  { id:"dr1-regle-droit", theme:1, terme:"Caractères de la règle de droit",
    aca:"La règle de droit est générale (elle vise toutes les personnes dans une même situation), obligatoire (assortie d'une sanction) et légitime (émane d'une autorité compétente).",
    simple:"Une vraie règle de droit s'applique à tout le monde pareil, elle est obligatoire et vient d'une autorité reconnue.",
    ex:"« Tout employeur doit verser au moins le SMIC » : générale, obligatoire, posée par la loi — c'est une règle de droit." },
  { id:"dr1-qualification", theme:1, terme:"Qualification juridique",
    aca:"Opération qui consiste à rattacher une situation de fait à une catégorie juridique (contrat, salarié, victime…) afin de déterminer la règle applicable.",
    simple:"Mettre la bonne étiquette juridique sur une situation pour savoir quelle règle s'applique.",
    ex:"Une personne qui livre des repas pour une plateforme : est-elle un salarié ou un indépendant ? Qualifier la situation décide des règles applicables." },
  { id:"dr1-sources", theme:1, terme:"Sources du droit et hiérarchie des normes",
    aca:"Les règles émanent de sources écrites (Constitution, traités, lois, règlements, conventions collectives) organisées de façon hiérarchique : une norme inférieure doit respecter les normes supérieures.",
    simple:"Les règles sont empilées comme une pyramide : chaque étage doit respecter celui du dessus.",
    ex:"Un règlement intérieur d'entreprise ne peut pas contredire le Code du travail, qui lui-même respecte la Constitution." },
  { id:"dr1-constitution", theme:1, terme:"Constitution et contrôle de constitutionnalité (QPC)",
    aca:"La Constitution est la norme suprême en droit interne. La question prioritaire de constitutionnalité (QPC) permet de contester une loi déjà en vigueur jugée contraire aux droits garantis par la Constitution.",
    simple:"La Constitution est tout en haut de la pyramide. La QPC permet de faire annuler une loi qui ne la respecte pas.",
    ex:"Un justiciable peut soulever une QPC pour faire vérifier qu'une loi appliquée à son procès respecte bien la Constitution." },
  { id:"dr1-loi-reglement", theme:1, terme:"Loi et règlement",
    aca:"La loi est votée par le Parlement (Assemblée nationale et Sénat). Le règlement (décret, arrêté) émane du pouvoir exécutif (gouvernement) pour appliquer ou compléter la loi.",
    simple:"La loi est faite par le Parlement ; le règlement est pris par le gouvernement pour l'appliquer.",
    ex:"Le Parlement vote une loi sur le télétravail ; un décret du gouvernement en précise ensuite les modalités." },
  { id:"dr1-droit-ue", theme:1, terme:"Droit de l'Union européenne",
    aca:"Le droit de l'UE comprend les traités et le droit dérivé : le règlement (directement applicable) et la directive (à transposer). Il est produit par la Commission, le Conseil de l'UE et le Parlement européen.",
    simple:"L'Europe produit aussi du droit : le règlement s'applique directement, la directive doit être transposée par chaque pays.",
    ex:"Le RGPD est un règlement européen : il s'applique directement à toutes les entreprises de l'Union, dont celles de La Réunion." },
  { id:"dr1-jurisprudence", theme:1, terme:"Jurisprudence et Cour de cassation",
    aca:"La jurisprudence est l'ensemble des décisions de justice. La Cour de cassation, juridiction suprême de l'ordre judiciaire, unifie l'interprétation du droit sur tout le territoire.",
    simple:"Quand les juges tranchent, ils créent la jurisprudence ; la Cour de cassation veille à ce que le droit soit interprété pareil partout.",
    ex:"Un arrêt de la Cour de cassation sur le lien de subordination s'impose comme référence à tous les tribunaux." },
  { id:"dr1-conventions", theme:1, terme:"Conventions et accords collectifs",
    aca:"Négociés entre partenaires sociaux (syndicats et représentants des employeurs), ils complètent la loi pour une branche ou une entreprise et constituent une source du droit du travail.",
    simple:"Patrons et syndicats négocient des règles propres à un secteur ou à une entreprise : ce sont les conventions collectives.",
    ex:"La convention collective de l'hôtellerie fixe des primes et des grilles de salaires que les hôtels de Saint-Gilles doivent appliquer." },
  { id:"dr1-organisation-judiciaire", theme:1, terme:"Organisation judiciaire",
    aca:"La justice se divise en deux ordres : judiciaire (litiges entre personnes et infractions) et administratif (litiges avec l'administration), avec une séparation des pouvoirs garantissant l'indépendance des juges.",
    simple:"La justice est organisée en branches, avec des juges indépendants du pouvoir politique.",
    ex:"Un litige entre deux entreprises relève de l'ordre judiciaire ; un litige contre la mairie relève de l'ordre administratif." },
  { id:"dr1-litige", theme:2, terme:"Le litige",
    aca:"Désaccord juridique opposant un demandeur (qui réclame) à un défendeur (à qui l'on réclame). Il se caractérise par des faits, des parties et des prétentions, et peut se résoudre à l'amiable ou devant un juge.",
    simple:"Un litige, c'est un conflit où chacun (demandeur et défendeur) défend ce qu'il réclame.",
    ex:"Un client n'a pas été livré : il devient demandeur contre le vendeur (défendeur) et réclame le remboursement." },
  { id:"dr1-acte-fait", theme:2, terme:"Acte juridique et fait juridique",
    aca:"L'acte juridique est une manifestation de volonté destinée à produire des effets de droit (contrat). Le fait juridique est un événement qui produit des effets de droit indépendamment de la volonté (accident).",
    simple:"L'acte juridique est voulu (signer un contrat) ; le fait juridique arrive sans qu'on le veuille (un accident).",
    ex:"Acheter un téléphone = acte juridique. Renverser un piéton = fait juridique. Le mode de preuve diffère selon le cas." },
  { id:"dr1-preuve", theme:2, terme:"Charge et modes de preuve",
    aca:"Celui qui réclame doit prouver (charge de la preuve). Les modes de preuve varient : acte authentique, acte sous signature privée, témoignage, aveu, preuve électronique, présomption. Leur admissibilité dépend de l'objet à prouver.",
    simple:"Pour gagner, il faut prouver ce qu'on avance — et toutes les preuves n'ont pas la même valeur.",
    ex:"Un contrat écrit et signé prouve mieux qu'un simple SMS ; un acte notarié (authentique) a une force probante très élevée." },
  { id:"dr1-recours-juge", theme:2, terme:"Recours au juge et principes du procès",
    aca:"Le recours au juge obéit à des principes : droit au procès équitable, double degré de juridiction, droits de la défense, présomption d'innocence. La compétence d'attribution détermine quel tribunal est compétent.",
    simple:"Aller en justice, c'est garanti par des principes : être jugé équitablement, pouvoir faire appel, se défendre, être présumé innocent.",
    ex:"Une personne poursuivie est présumée innocente tant qu'un jugement définitif n'a pas établi sa culpabilité." },
  { id:"dr1-phases-proces", theme:2, terme:"Les phases du procès",
    aca:"Le procès se déroule par étapes : introduction de l'instance (assignation) ou dépôt de plainte, saisine du tribunal, instruction ou mise en état, audience, clôture des débats, puis jugement ou arrêt après délibéré.",
    simple:"Un procès suit des étapes ordonnées, de la demande de départ jusqu'à la décision finale.",
    ex:"Au civil, tout commence par une assignation ; au pénal, par une plainte qui peut conduire à une mise en examen." },
  { id:"dr1-civil-penal", theme:2, terme:"Procès civil et procès pénal",
    aca:"Le procès civil tranche un litige entre particuliers et vise la réparation. Le procès pénal sanctionne une infraction (contravention, délit, crime) au nom de la société. La victime peut se constituer partie civile pour être indemnisée.",
    simple:"Le civil règle les conflits entre personnes (réparer) ; le pénal punit les infractions (sanctionner).",
    ex:"Un vol donne lieu à un procès pénal (punir le voleur) ; la victime se constitue partie civile pour obtenir réparation." },
  { id:"dr1-voies-recours", theme:2, terme:"Voies de recours : appel et pourvoi en cassation",
    aca:"L'appel permet de faire rejuger l'affaire en fait et en droit par une cour d'appel. Le pourvoi en cassation ne porte que sur le respect du droit, devant la Cour de cassation.",
    simple:"Pas d'accord avec un jugement ? L'appel rejuge tout ; le pourvoi en cassation vérifie seulement que le droit a été bien appliqué.",
    ex:"Après un jugement défavorable, une entreprise fait appel ; déboutée à nouveau, elle se pourvoit en cassation." },
  { id:"dr1-personnalite", theme:3, terme:"Personnalité juridique",
    aca:"Aptitude à être titulaire de droits et d'obligations. Elle fait des personnes physiques et de certaines personnes morales des sujets de droit.",
    simple:"Avoir la personnalité juridique, c'est exister pour le droit : pouvoir avoir des droits et des devoirs.",
    ex:"Dès sa naissance, un enfant a la personnalité juridique ; une société l'acquiert par son immatriculation." },
  { id:"dr1-personne-physique", theme:3, terme:"Personne physique",
    aca:"Tout être humain est une personne physique, individualisée par des éléments d'identification : nom, domicile, genre. L'animal, malgré des évolutions, n'est pas une personne en droit.",
    simple:"Chaque être humain est une personne physique, reconnaissable par son nom, son domicile, etc.",
    ex:"Un client identifié par son nom et son adresse signe un contrat en tant que personne physique." },
  { id:"dr1-personne-morale", theme:3, terme:"Personne morale",
    aca:"Groupement (société, association, collectivité) doté de la personnalité juridique, individualisé par une dénomination et un siège, distinct des personnes qui le composent.",
    simple:"Une entreprise ou une association est une « personne » au sens du droit, avec un nom et une adresse, séparée de ses membres.",
    ex:"La société Edena, personne morale, possède un patrimoine distinct de celui de ses dirigeants." },
  { id:"dr1-capacite", theme:3, terme:"Capacité et incapacité juridiques",
    aca:"La capacité juridique est l'aptitude à être titulaire de droits (capacité de jouissance) et à les exercer soi-même (capacité d'exercice). Certaines personnes (mineurs, majeurs protégés) sont frappées d'incapacité d'exercice et agissent par représentation.",
    simple:"Avoir des droits est une chose ; pouvoir les exercer seul en est une autre — d'où la protection des mineurs et des majeurs vulnérables.",
    ex:"Un mineur a le droit de posséder un bien, mais ses parents le représentent pour vendre ce bien." },
  { id:"dr1-representation", theme:3, terme:"Représentation ; actes d'administration et de disposition",
    aca:"La représentation permet d'agir au nom d'une personne incapable. On distingue l'acte d'administration (gestion courante) de l'acte de disposition (qui engage durablement le patrimoine).",
    simple:"Un représentant agit pour quelqu'un qui ne peut pas le faire seul — et certains actes importants sont plus encadrés.",
    ex:"Encaisser un loyer = acte d'administration ; vendre l'appartement d'un mineur = acte de disposition, strictement contrôlé." },
  { id:"dr1-patrimoine", theme:3, terme:"Le patrimoine",
    aca:"Ensemble des droits et obligations d'une personne évaluables en argent : un actif (biens, créances) et un passif (dettes). Toute personne a un patrimoine, distinct de celui des autres.",
    simple:"Le patrimoine, c'est tout ce qu'on possède (actif) moins tout ce qu'on doit (passif).",

  { id:"dr1-droits-subjectifs", theme:4, terme:"Droits subjectifs : patrimoniaux et extrapatrimoniaux",

vraifaux: {
  1:[ {p:"Dans un État de droit, l'État lui-même doit respecter le droit.", v:true, why:"Vrai : c'est le principe même de l'État de droit — le pouvoir est soumis aux règles."},
      {p:"Le droit et la morale recouvrent exactement les mêmes règles.", v:false, why:"Faux : la morale relève de la conscience ; le droit est imposé et sanctionné par l'autorité publique."},

      {p:"L'appel permet de faire rejuger l'affaire en fait et en droit.", v:true, why:"Vrai : contrairement au pourvoi en cassation, qui ne contrôle que le droit."},
      {p:"La présomption d'innocence s'applique au procès pénal.", v:true, why:"Vrai : toute personne poursuivie est présumée innocente jusqu'au jugement définitif."} ],

      {liste:["Présomption d'innocence","Droits de la défense","Procès équitable","Fructus"], intrus:3, why:"Le fructus relève du droit de propriété ; les trois autres sont des garanties du procès."},
      {liste:["Contrat signé","Bail","Promesse de vente","Accident"], intrus:3, why:"L'accident est un fait juridique ; les trois autres sont des actes juridiques (volonté)."},
      {liste:["Partie civile","Victime","Indemnisation","Directive"], intrus:3, why:"La directive est une source du droit ; les trois autres concernent la réparation au pénal."} ],
  3:[ {liste:["SARL","SA","Association déclarée","Salarié"], intrus:3, why:"Le salarié est une personne physique ; les trois autres sont des personnes morales."},
      {liste:["Actif","Passif","Patrimoine","Constitution"], intrus:3, why:"La Constitution est une source du droit ; les trois autres composent le patrimoine."},
      {liste:["Encaisser un loyer","Gérer le courant","Entretenir un bien","Vendre un immeuble"], intrus:3, why:"Vendre un immeuble est un acte de disposition ; les trois autres sont des actes d'administration."},
      {liste:["Mineur","Majeur protégé","Incapacité d'exercice","Cour d'appel"], intrus:3, why:"La cour d'appel est une juridiction ; les trois autres concernent l'incapacité."},
      {liste:["Dénomination","Siège social","Personne morale","Genre"], intrus:3, why:"Le genre identifie une personne physique ; les trois autres caractérisent une personne morale."},
      {liste:["Naissance","Personnalité juridique","Sujet de droit","Contrefaçon"], intrus:3, why:"La contrefaçon relève de la propriété intellectuelle ; les trois autres concernent l'existence juridique."} ],
  4:[ {liste:["Absolu","Exclusif","Perpétuel","Temporaire"], intrus:3, why:"Le droit de propriété est perpétuel, donc « temporaire » est l'intrus."},
      {liste:["Maison","Véhicule","Stock","Marque commerciale"], intrus:3, why:"La marque est un bien incorporel ; les trois autres sont des biens corporels."},
      {liste:["Brevet","Logiciel","Droit d'auteur","Camion"], intrus:3, why:"Le camion est un bien corporel ; les trois autres sont des biens incorporels."},
      {liste:["Contrefaçon","Copie illicite","Action en contrefaçon","Mécénat"], intrus:3, why:"Le mécénat est un acte généreux ; les trois autres concernent l'atteinte à la propriété intellectuelle."},
      {liste:["RGPD","Consentement","Données personnelles","Usus"], intrus:3, why:"L'usus est un attribut de la propriété ; les trois autres relèvent de la protection des données."},
      {liste:["Inaliénable","Insaisissable","Imprescriptible","Cessible"], intrus:3, why:"« Cessible » contredit les droits extrapatrimoniaux, qui sont inaliénables."} ]

casExtra: {
  1:[ {cas:"Le Parlement vote un texte ; quelques mois plus tard, le gouvernement prend un décret pour en préciser l'application.", q:"Comment qualifier ces deux textes ?", o:["Une loi puis un règlement d'application","Deux lois","Deux règlements européens"], c:0, why:"La loi est votée par le Parlement ; le décret (règlement) est pris par le gouvernement pour l'appliquer."},
      {cas:"Le règlement intérieur d'une entreprise prévoit une sanction interdite par le Code du travail.", q:"Quelle est la conséquence ?", o:["La clause est invalide (hiérarchie des normes)","Le Code du travail doit s'adapter","Rien"], c:0, why:"Une norme inférieure ne peut contredire une norme supérieure."},
      {cas:"La Cour de cassation rend un arrêt qui clarifie l'interprétation d'une règle pour tous les tribunaux.", q:"Quel est le rôle de cet arrêt ?", o:["Unifier l'interprétation du droit (jurisprudence)","Voter une nouvelle loi","Modifier la Constitution"], c:0, why:"La Cour de cassation unifie l'interprétation du droit via sa jurisprudence."},
      {cas:"Un commerçant respecte une promesse faite à un ami par honnêteté, sans y être juridiquement contraint.", q:"De quoi relève cette obligation ?", o:["De la morale, pas du droit","D'une règle de droit obligatoire","D'un règlement européen"], c:0, why:"Le droit se distingue de la morale : seul le droit est imposé et sanctionné par l'autorité publique."},
      {cas:"Une directive européenne fixe des objectifs ; la France adopte une loi pour la mettre en œuvre.", q:"Comment s'appelle cette opération ?", o:["La transposition","L'application directe","La cassation"], c:0, why:"La directive doit être transposée en droit national, contrairement au règlement."},
      {cas:"Un justiciable veut faire écarter une loi qu'il juge contraire à un droit constitutionnel pendant son procès.", q:"Quel outil mobilise-t-il ?", o:["La QPC","Un appel","Une convention collective"], c:0, why:"La QPC permet de contester une loi en vigueur contraire à la Constitution."} ],
  2:[ {cas:"Avant tout procès, deux entreprises trouvent un terrain d'entente et signent un protocole.", q:"Comment qualifier cette issue ?", o:["Un accord amiable","Un pourvoi en cassation","Une mise en examen"], c:0, why:"Le droit privilégie la résolution amiable du litige quand elle est possible."},
      {cas:"Une personne veut prouver l'existence d'un prêt d'argent qu'elle a consenti.", q:"Que doit-elle privilégier ?", o:["Un écrit (acte juridique)","Aucune preuve","Un témoignage anonyme"], c:0, why:"Le prêt est un acte juridique : l'écrit est le mode de preuve adapté."},
      {cas:"Après une décision de première instance, une partie demande à la cour d'appel de réexaminer les faits et le droit.", q:"Quelle voie utilise-t-elle ?", o:["L'appel","Le pourvoi en cassation","La QPC"], c:0, why:"L'appel permet un réexamen complet, en fait et en droit."},
      {cas:"Une victime de vol veut, en plus de la sanction du voleur, être indemnisée de son préjudice.", q:"Que doit-elle faire au procès pénal ?", o:["Se constituer partie civile","Faire appel immédiatement","Déposer une marque"], c:0, why:"La constitution de partie civile permet à la victime de demander réparation au pénal."},
      {cas:"Un litige porte sur un dommage causé par une chute accidentelle dans un magasin.", q:"L'origine du dommage est :", o:["Un fait juridique","Un acte juridique","Une directive"], c:0, why:"La chute accidentelle est un événement subi : un fait juridique."},
      {cas:"Une infraction grave, punie de prison, est jugée par le tribunal compétent.", q:"Cette infraction est probablement :", o:["Un délit ou un crime","Une simple contravention","Un litige civil"], c:0, why:"Les infractions punies de prison sont des délits ou des crimes, jugées au pénal."} ],
  3:[ {cas:"Une cliente, identifiée par son nom et son domicile, signe un contrat d'abonnement.", q:"Elle agit en tant que :", o:["Personne physique","Personne morale","Bien incorporel"], c:0, why:"Un être humain identifié est une personne physique, sujet de droit."},
      {cas:"Une association déclarée ouvre un compte bancaire et embauche un salarié.", q:"Comment peut-elle le faire ?", o:["Elle a la personnalité morale","Son président agit à titre personnel","C'est impossible"], c:0, why:"Déclarée, l'association est une personne morale capable d'avoir des droits et des obligations."},
      {cas:"Un entrepreneur individuel ne sépare pas ses biens personnels de ceux de son activité.", q:"Quel risque court-il ?", o:["Ses biens personnels peuvent payer les dettes professionnelles","Aucun risque","Il devient une personne morale"], c:0, why:"L'unicité du patrimoine expose les biens personnels aux créanciers de l'activité."},
      {cas:"Les parents d'un enfant de 10 ans gèrent l'argent reçu en héritage par celui-ci.", q:"Que font-ils ?", o:["Ils le représentent (incapacité d'exercice)","Ils volent l'enfant","L'enfant gère seul"], c:0, why:"Le mineur agit par représentation : ses parents administrent ses biens."},
      {cas:"Une SARL est immatriculée au registre du commerce.", q:"Quand acquiert-elle la personnalité juridique ?", o:["À son immatriculation","À la naissance de son gérant","Jamais"], c:0, why:"La personne morale acquiert la personnalité juridique par son immatriculation."},
      {cas:"Le tuteur d'un majeur protégé veut vendre l'appartement de ce dernier.", q:"Cet acte est :", o:["Un acte de disposition strictement encadré","Un acte d'administration courant","Sans effet"], c:0, why:"La vente engage durablement le patrimoine : c'est un acte de disposition, particulièrement contrôlé pour un majeur protégé."} ],
  4:[ {cas:"Une entreprise publie sur son site la photo d'un salarié sans lui demander.", q:"Quel droit est en cause ?", o:["Le droit à l'image","Le droit de propriété sur le local","L'usus"], c:0, why:"Le droit à l'image protège chacun contre une diffusion non consentie."},
      {cas:"Une start-up dépose un brevet sur un procédé de fabrication innovant.", q:"De quel type de bien s'agit-il ?", o:["Un bien incorporel","Un bien corporel","Un droit extrapatrimonial"], c:0, why:"Le brevet, sans existence matérielle, est un bien incorporel (propriété industrielle)."},
      {cas:"Une personne demande à un site de supprimer toutes les données la concernant.", q:"Sur quoi se fonde-t-elle ?", o:["Le droit à l'effacement (RGPD)","Le droit d'auteur","L'abusus"], c:0, why:"Le RGPD garantit l'accès, la rectification et l'effacement des données personnelles."},
      {cas:"Un musicien réunionnais compose une chanson originale.", q:"De quelle protection bénéficie-t-il dès la création ?", o:["Le droit d'auteur","Une marque commerciale","Un trouble du voisinage"], c:0, why:"Le droit d'auteur protège les œuvres de l'esprit dès leur création, sans formalité."},
      {cas:"Un propriétaire conserve sa maison toute sa vie et la transmet à ses enfants sans qu'elle ne se « périme ».", q:"Quel caractère du droit de propriété est illustré ?", o:["Le caractère perpétuel","Le caractère temporaire","Le caractère facultatif"], c:0, why:"Le droit de propriété est perpétuel : il ne s'éteint pas par le non-usage."},
      {cas:"Un concurrent copie le logo et le nom d'une entreprise péi pour vendre ses propres produits.", q:"Quelle action l'entreprise peut-elle engager ?", o:["Une action en contrefaçon","Une QPC","Une demande de mise en examen civile"], c:0, why:"L'imitation d'une marque déposée constitue une contrefaçon, sanctionnée en justice."} ]

ressources: [
{ cat:"methodo", type:"page", titre:"Méthode — Aborder un sujet de droit, pas à pas", desc:"Le rituel avant d'écrire : faits, parties, problème de droit, règle applicable, verbes directeurs.", url:"",
  html:"<h2>Le principe : pas de droit sans faits bien lus</h2><p>En droit, on ne récite pas le cours : on l'applique à une situation. Avant d'écrire, on prend le temps de comprendre la situation et ce qui est demandé.</p><h2>Étape 1 — Lire les faits et identifier les parties</h2><ul><li>Qui est en présence ? (le demandeur, le défendeur, un salarié, un consommateur, une entreprise…)</li><li>Que s'est-il passé, dans quel ordre ?</li><li>Quel est le problème entre les parties ?</li></ul><h2>Étape 2 — Repérer les verbes directeurs de la consigne</h2><table><tr><th>Verbe</th><th>Ce qu'il attend de toi</th></tr><tr><td>Qualifier</td><td>Donner la catégorie juridique exacte (contrat, faute, personne morale…)</td></tr><tr><td>Identifier</td><td>Repérer un élément (la source, la juridiction, la règle…)</td></tr><tr><td>Distinguer</td><td>Opposer deux notions et dire ce qui les sépare</td></tr><tr><td>Apprécier / Vérifier</td><td>Confronter les faits aux conditions d'une règle</td></tr><tr><td>Justifier / Expliquer</td><td>Donner la raison juridique, en citant la règle</td></tr></table><h2>Étape 3 — Mobiliser la bonne règle puis conclure</h2><p>On identifie la règle de droit applicable, on l'applique aux faits, puis on répond clairement à la question posée. C'est le raisonnement du cas pratique (voir la fiche dédiée).</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Le cas pratique juridique (le syllogisme)", desc:"Majeure, mineure, conclusion : la structure de raisonnement qui rapporte tous les points en droit.", url:"",
  html:"<h2>Le raisonnement en trois temps</h2><p>Le cas pratique se résout par un syllogisme juridique : on part de la règle générale, on la confronte aux faits, on en tire une conclusion.</p><table><tr><th>Temps</th><th>Rôle</th></tr><tr><td>Majeure</td><td>Énoncer la règle de droit applicable (le principe)</td></tr><tr><td>Mineure</td><td>Qualifier les faits de l'espèce au regard de cette règle</td></tr><tr><td>Conclusion</td><td>Appliquer la règle aux faits et répondre à la question</td></tr></table><h2>Exemple rédigé</h2><p><b>Problème :</b> un client a-t-il droit à la rétractation après un achat en ligne ?</p><ul><li><b>Majeure :</b> en principe, pour les contrats conclus à distance, le consommateur dispose d'un droit de rétractation pendant un délai légal, sans avoir à se justifier.</li><li><b>Mineure :</b> en l'espèce, le client est un consommateur qui a acheté sur un site internet (contrat à distance) et agit dans le délai.</li><li><b>Conclusion :</b> il peut donc exercer son droit de rétractation et obtenir le remboursement.</li></ul><h2>Le réflexe</h2><p>On rédige toujours dans cet ordre. La majeure cite la règle, jamais l'inverse : on ne part pas des faits pour inventer une règle.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Qualifier juridiquement les faits", desc:"L'opération clé du juriste : mettre la bonne étiquette juridique sur une situation concrète.", url:"",
  html:"<h2>Qu'est-ce que qualifier ?</h2><p>Qualifier, c'est rattacher une situation de fait à une catégorie juridique pour savoir quelle règle s'applique. C'est la compétence la plus évaluée en droit.</p><h2>La démarche</h2><ul><li>Décrire le fait en langage courant.</li><li>Chercher la catégorie juridique correspondante (acte ou fait juridique ? personne physique ou morale ? contrat de travail ou d'entreprise ? responsabilité civile ou pénale ?).</li><li>Vérifier que les éléments de la définition sont réunis.</li></ul><h2>Exemples</h2><table><tr><th>Situation</th><th>Qualification</th></tr><tr><td>Un livreur reçoit ordres, horaires et sanctions</td><td>Lien de subordination, donc contrat de travail</td></tr><tr><td>Un accident de scooter cause un dommage</td><td>Fait juridique (événement subi)</td></tr><tr><td>Une société possède une usine</td><td>Personne morale, patrimoine propre</td></tr></table><p>Une bonne qualification s'appuie toujours sur un indice tiré des faits.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Analyser une décision de justice", desc:"Lire un arrêt sans se perdre : faits, procédure, prétentions, problème de droit, solution.", url:"",
  html:"<h2>Lire un arrêt en 5 questions</h2><ol><li><b>Les faits :</b> que s'est-il passé concrètement ?</li><li><b>La procédure :</b> qui a saisi quelle juridiction, et avec quel résultat jusqu'ici ?</li><li><b>Les prétentions :</b> que demande chaque partie ?</li><li><b>Le problème de droit :</b> la question juridique que le juge doit trancher.</li><li><b>La solution :</b> ce que décide la juridiction, et pourquoi.</li></ol><h2>Repères utiles</h2><ul><li>Le <b>demandeur</b> réclame ; le <b>défendeur</b> se défend.</li><li>L'<b>appel</b> fait rejuger toute l'affaire ; le <b>pourvoi en cassation</b> ne contrôle que l'application du droit.</li><li>Un arrêt de la Cour de cassation a une portée qui dépasse l'affaire : il unifie l'interprétation du droit.</li></ul><h2>Le piège à éviter</h2><p>Ne pas confondre les faits (ce qui s'est passé) et la solution (ce que décide le juge). On garde les deux bien séparés.</p>" },

    ex:"Avec un budget limité, un étudiant réunionnais choisit entre payer le bus ou s'acheter à manger." },
  { id:"ec1-cout-opportunite", theme:1, terme:"Coût d'opportunité",
    aca:"Valeur de la meilleure option à laquelle on renonce en faisant un choix. Tout choix économique a un coût d'opportunité.",
    simple:"Le coût d'opportunité, c'est ce qu'on abandonne en choisissant autre chose.",
    ex:"Travailler le samedi rapporte de l'argent, mais le coût d'opportunité est le temps de loisir perdu." },
  { id:"ec1-rationalite", theme:1, terme:"Rationalité et utilité marginale",
    aca:"L'agent rationnel cherche à maximiser sa satisfaction (utilité) sous contrainte. L'utilité marginale est la satisfaction apportée par la dernière unité consommée ; elle décroît généralement.",
    simple:"On essaie d'avoir le maximum de satisfaction ; mais plus on consomme un bien, moins la dernière unité nous procure de plaisir.",
    ex:"Le premier verre d'eau après le sport est délicieux ; le quatrième apporte beaucoup moins de satisfaction." },
  { id:"ec1-marginal", theme:1, terme:"Raisonnement à la marge",
    aca:"Le producteur compare la recette marginale (gain d'une unité supplémentaire vendue) et le coût marginal (coût d'une unité supplémentaire produite) ; il produit jusqu'à leur égalité.",
    simple:"Pour décider de produire une unité de plus, on compare ce qu'elle rapporte et ce qu'elle coûte.",
    ex:"Une boulangerie produit un pain de plus tant qu'il rapporte plus qu'il ne coûte à fabriquer." },
  { id:"ec1-monnaie", theme:1, terme:"Fonctions de la monnaie",
    aca:"La monnaie remplit trois fonctions : intermédiaire des échanges, unité de compte (mesure de la valeur) et réserve de valeur (épargne).",
    simple:"La monnaie sert à payer, à mesurer les prix, et à mettre de côté.",
    ex:"Avec un billet, je paie (échange), je compare des prix (compte) et j'épargne (réserve)." },
  { id:"ec1-circuit", theme:1, terme:"Circuit économique et échanges",
    aca:"La spécialisation entraîne des échanges. Le circuit économique représente les flux réels (biens, services, travail) et les flux monétaires entre agents.",
    simple:"Tout circule : les biens et le travail d'un côté, l'argent qui les paie de l'autre.",
    ex:"Un salarié fournit son travail (flux réel) et reçoit un salaire (flux monétaire) qu'il dépense ensuite." },
  { id:"ec1-facteurs", theme:2, terme:"Facteurs de production",
    aca:"La production combine des facteurs : le travail, le capital (machines, équipements) et les ressources naturelles, auxquels s'ajoute l'information. Ils peuvent être complémentaires ou substituables.",
    simple:"Pour produire, il faut du travail, des machines (capital) et des ressources — qu'on combine différemment.",
    ex:"Une usine d'embouteillage péi combine des salariés (travail) et des lignes automatisées (capital)." },
  { id:"ec1-capital-humain", theme:2, terme:"Capital humain",
    aca:"Ensemble des connaissances, compétences et qualifications accumulées par les travailleurs (formation, expérience), qui accroît leur productivité.",
    simple:"Le capital humain, c'est tout ce que les salariés savent faire : plus ils sont formés, plus ils sont efficaces.",
    ex:"En formant ses mécaniciens, Air Austral augmente son capital humain et sa productivité." },
  { id:"ec1-productivite", theme:2, terme:"Productivité et gains de productivité",
    aca:"La productivité mesure l'efficacité de la production (production rapportée aux facteurs utilisés). Les gains de productivité proviennent de l'investissement, du progrès technique et de l'organisation.",
    simple:"La productivité, c'est produire plus avec autant de moyens ; on y gagne grâce aux machines et à une meilleure organisation.",
    ex:"Une nouvelle ligne automatisée permet de produire plus de bouteilles avec le même nombre de salariés." },
  { id:"ec1-va", theme:2, terme:"Valeur ajoutée",
    aca:"Richesse réellement créée par un agent : différence entre la valeur de la production et celle des consommations intermédiaires.",
    simple:"La valeur ajoutée, c'est la richesse qu'on crée : ce qu'on vend moins ce qu'on a dû acheter pour produire.",
    ex:"Une confiturerie vend 100 de confiture en utilisant 40 de fruits et de pots : sa valeur ajoutée est de 60." },
  { id:"ec1-pib", theme:2, terme:"PIB et indicateurs complémentaires",
    aca:"Le produit intérieur brut (PIB) mesure la richesse créée sur un territoire (somme des valeurs ajoutées). Il est complété par d'autres indicateurs comme l'IDH (indice de développement humain).",
    simple:"Le PIB additionne toute la richesse créée dans un pays ; l'IDH ajoute la santé et l'éducation pour mieux mesurer le développement.",
    ex:"Le PIB par habitant compare la richesse des pays ; l'IDH montre que richesse et bien-être ne vont pas toujours ensemble." },
  { id:"ec1-repartition", theme:2, terme:"Répartition de la valeur ajoutée et des revenus",
    aca:"La valeur ajoutée se partage entre les acteurs : revenus du travail (salaires), revenus du capital (intérêts, dividendes), revenus mixtes, et prélèvements de l'État. La redistribution corrige ensuite la répartition primaire.",
    simple:"La richesse créée se partage entre les salariés, les propriétaires du capital et l'État, qui redistribue ensuite.",
    ex:"La valeur ajoutée d'une entreprise paie les salaires, les dividendes des associés et les impôts." },
  { id:"ec1-prelevements", theme:2, terme:"Prélèvements obligatoires et redistribution",
    aca:"Impôts et cotisations sociales prélevés par les administrations publiques pour financer les dépenses publiques et redistribuer les revenus afin de réduire les inégalités.",
    simple:"L'État prend une part des revenus (impôts, cotisations) pour financer les services publics et aider les plus modestes.",
    ex:"Une partie des impôts finance les aides sociales versées aux ménages réunionnais à faibles revenus." },
  { id:"ec1-conso-epargne", theme:3, terme:"Consommation et épargne",
    aca:"Le revenu disponible des ménages se partage entre consommation (dépenses) et épargne (part non consommée). Cet arbitrage dépend de variables économiques, sociales et démographiques.",
    simple:"Avec leur revenu, les ménages choisissent ce qu'ils dépensent et ce qu'ils mettent de côté.",
    ex:"Une famille consacre 80 % de son revenu à la consommation et épargne les 20 % restants." },
  { id:"ec1-propension", theme:3, terme:"Propension à consommer et à épargner",
    aca:"La propension moyenne à consommer est la part du revenu consommée ; la propension marginale est la part d'un revenu supplémentaire qui est consommée (le reste étant épargné).",
    simple:"C'est la part du revenu qu'on dépense ; et, quand on gagne un peu plus, la part de ce surplus qu'on dépense.",
    ex:"Si un ménage dépense 90 € d'une prime de 100 €, sa propension marginale à consommer est de 0,9." },
  { id:"ec1-pouvoir-achat", theme:3, terme:"Pouvoir d'achat et indice des prix",
    aca:"Le pouvoir d'achat mesure la quantité de biens et services qu'un revenu permet d'acheter. Il augmente si le revenu progresse plus vite que les prix (mesurés par l'indice des prix à la consommation, IPC).",
    simple:"Le pouvoir d'achat, c'est ce que ton argent permet vraiment d'acheter ; il monte si ton revenu augmente plus vite que les prix.",
    ex:"À La Réunion, où certains prix sont élevés, le pouvoir d'achat dépend fortement de l'écart entre revenus et prix." },
  { id:"ec1-coeff-budgetaires", theme:3, terme:"Structure de consommation et coefficients budgétaires",
    aca:"Le coefficient budgétaire est la part d'un poste de dépense dans le budget. La structure de consommation évolue : la part de l'alimentation baisse, celle du logement, des transports et des services augmente.",
    simple:"C'est la part de chaque dépense dans le budget ; avec le temps, on dépense moins en nourriture et plus en logement et loisirs.",
    ex:"Le coefficient budgétaire du logement a fortement augmenté dans le budget des ménages depuis 50 ans." },
  { id:"ec1-financement-situation", theme:4, terme:"Besoin et capacité de financement",
    aca:"Un agent est en besoin de financement quand ses dépenses dépassent ses ressources ; en capacité de financement dans le cas inverse. Le financement met en relation ces deux situations.",
    simple:"Certains manquent d'argent pour leurs projets (besoin), d'autres en ont en trop (capacité) : la finance les met en relation.",
    ex:"Une entreprise qui investit a un besoin de financement ; un ménage qui épargne a une capacité de financement." },
  { id:"ec1-autofinancement", theme:4, terme:"Autofinancement et financement externe",
    aca:"L'agent peut se financer en interne (autofinancement, sur ses propres ressources) ou en externe (emprunt, marchés financiers, banques).",
    simple:"On finance un projet soit avec son propre argent (autofinancement), soit avec celui des autres (emprunt, marché).",
    ex:"Une PME finance une machine moitié sur ses bénéfices (autofinancement), moitié par un emprunt (externe)." },
  { id:"ec1-financement-direct", theme:4, terme:"Financement direct et marché financier",
    aca:"Dans le financement direct, les agents à besoin de financement se procurent des fonds directement auprès des agents à capacité, sur le marché financier, en émettant des titres (actions, obligations).",
    simple:"Sur le marché financier, ceux qui ont besoin d'argent en empruntent directement à ceux qui en ont, en émettant des titres.",
    ex:"Une grande entreprise émet des actions en Bourse pour financer son développement : c'est du financement direct." },
  { id:"ec1-financement-indirect", theme:4, terme:"Financement indirect et rôle des banques",
    aca:"Dans le financement indirect, les banques s'interposent : elles collectent l'épargne et accordent des crédits, prenant en charge le risque. En octroyant des crédits, elles participent à la création monétaire.",
    simple:"Les banques font l'intermédiaire : elles récupèrent l'épargne et prêtent aux autres, en assumant le risque.",
    ex:"Une banque réunionnaise accorde un crédit à un artisan : c'est du financement indirect." },
  { id:"ec1-offre-demande", theme:5, terme:"Offre, demande et prix d'équilibre",
    aca:"Sur un marché, l'offre (des vendeurs) et la demande (des acheteurs) se confrontent. Le prix d'équilibre est celui qui égalise les quantités offertes et demandées.",
    simple:"Le prix se fixe à la rencontre de ce que les vendeurs proposent et de ce que les acheteurs veulent.",
    ex:"Si beaucoup de letchis sont mis en vente mais peu demandés, le prix baisse jusqu'à trouver preneurs." },
  { id:"ec1-elasticite", theme:5, terme:"Élasticité prix de la demande",
    aca:"L'élasticité prix de la demande mesure la sensibilité de la demande à une variation du prix. Une demande élastique réagit fortement au prix ; une demande inélastique y est peu sensible.",
    simple:"C'est de combien la demande change quand le prix change : très sensible (élastique) ou peu sensible (inélastique).",
    ex:"La demande de produits de luxe est élastique ; celle de produits de première nécessité l'est peu." },
  { id:"ec1-concurrence", theme:5, terme:"Degré de concurrence : concurrence, oligopole, monopole",
    aca:"Le degré de concurrence dépend du nombre d'entreprises et des barrières à l'entrée. On distingue la concurrence (nombreux offreurs), l'oligopole (quelques offreurs) et le monopole (un seul offreur).",
    simple:"Beaucoup de vendeurs = concurrence ; quelques-uns = oligopole ; un seul = monopole.",
    ex:"Sur un marché insulaire comme La Réunion, certains secteurs comptent peu d'acteurs : on est proche de l'oligopole." },
  { id:"ec1-barrieres", theme:5, terme:"Barrières à l'entrée et produits substituables",
    aca:"Les barrières à l'entrée (coûts élevés, réglementation, technologie) limitent l'arrivée de nouveaux concurrents. Les produits substituables peuvent se remplacer mutuellement, ce qui intensifie la concurrence.",
    simple:"Des obstacles empêchent de nouveaux concurrents d'entrer ; et plus les produits se remplacent, plus la concurrence est forte.",
    ex:"Le coût d'une usine d'embouteillage est une barrière à l'entrée ; eau plate et eau gazeuse sont en partie substituables." },
  { id:"ec1-innovation", theme:5, terme:"Innovation et différenciation des produits",
    aca:"Pour échapper à la concurrence par les prix, les entreprises innovent et différencient leurs produits (qualité, image). L'innovation finit, à long terme, par abaisser les prix relatifs des produits.",
    simple:"Pour se démarquer, les entreprises créent des produits nouveaux ou différents plutôt que de baisser les prix.",
    ex:"Une distillerie péi différencie son rhum par une cuvée haut de gamme plutôt que de s'aligner sur les prix bas." }
],

vraifaux: {
  1:[ {p:"Tout choix économique a un coût d'opportunité.", v:true, why:"Vrai : choisir une option, c'est renoncer à la meilleure autre option."},
      {p:"L'utilité marginale augmente à mesure que l'on consomme un bien.", v:false, why:"Faux : elle décroît généralement — la dernière unité procure moins de satisfaction."},
      {p:"Un service rendu gratuitement par l'État est un service non marchand.", v:true, why:"Vrai : les services non marchands sont fournis gratuitement ou quasi gratuitement."},
      {p:"La monnaie ne sert qu'à payer des achats.", v:false, why:"Faux : elle est aussi unité de compte et réserve de valeur."},
      {p:"La rareté oblige les agents à faire des choix sous contrainte.", v:true, why:"Vrai : ressources limitées + besoins quasi illimités = nécessité de choisir."} ],
  2:[ {p:"La valeur ajoutée est égale à la production moins les consommations intermédiaires.", v:true, why:"Vrai : c'est la richesse réellement créée par l'agent."},
      {p:"Le PIB additionne les chiffres d'affaires de toutes les entreprises.", v:false, why:"Faux : il additionne les valeurs ajoutées (pour éviter les doubles comptes)."},
      {p:"Les gains de productivité proviennent notamment de l'investissement et du progrès technique.", v:true, why:"Vrai : ainsi que d'une meilleure organisation et du capital humain."},
      {p:"Un dividende est un revenu du travail.", v:false, why:"Faux : le dividende rémunère le capital ; le salaire rémunère le travail."},
      {p:"L'IDH complète le PIB en intégrant la santé et l'éducation.", v:true, why:"Vrai : l'IDH offre une mesure plus large du développement."} ],
  3:[ {p:"Le revenu disponible se partage entre consommation et épargne.", v:true, why:"Vrai : c'est l'arbitrage central des ménages."},
      {p:"Le pouvoir d'achat baisse toujours quand les prix augmentent.", v:false, why:"Faux : il dépend de l'écart entre l'évolution des prix ET celle du revenu."},
      {p:"La part de l'alimentation dans le budget des ménages a augmenté depuis 50 ans.", v:false, why:"Faux : elle a baissé, au profit du logement, des transports et des services."},
      {p:"Une propension marginale à consommer de 0,8 signifie que 80 % d'un revenu supplémentaire est consommé.", v:true, why:"Vrai : les 20 % restants sont épargnés."},
      {p:"L'indice des prix à la consommation mesure l'évolution des prix d'un panier de biens.", v:true, why:"Vrai : l'IPC suit le prix d'un panier représentatif."} ],
  4:[ {p:"Un agent dont les dépenses dépassent les ressources est en besoin de financement.", v:true, why:"Vrai : il doit trouver des fonds à l'extérieur."},
      {p:"L'autofinancement est un mode de financement externe.", v:false, why:"Faux : il est interne — l'agent utilise ses propres ressources."},
      {p:"Le financement direct passe obligatoirement par une banque.", v:false, why:"Faux : c'est le financement indirect qui passe par la banque ; le direct se fait sur le marché financier."},
      {p:"En accordant des crédits, les banques participent à la création monétaire.", v:true, why:"Vrai : « les crédits font les dépôts »."},
      {p:"Les actions et les obligations sont des titres financiers.", v:true, why:"Vrai : ils s'échangent sur le marché financier."} ],
  5:[ {p:"Le prix d'équilibre égalise les quantités offertes et demandées.", v:true, why:"Vrai : c'est sa définition."},
      {p:"Sur un monopole, il existe de nombreux offreurs.", v:false, why:"Faux : le monopole, c'est un seul offreur ; plusieurs = oligopole ou concurrence."},
      {p:"Une demande inélastique réagit fortement à une variation de prix.", v:false, why:"Faux : inélastique = peu sensible au prix ; c'est l'élastique qui réagit fortement."},
      {p:"Les barrières à l'entrée limitent l'arrivée de nouveaux concurrents.", v:true, why:"Vrai : coûts, réglementation ou technologie protègent les acteurs en place."},
      {p:"La différenciation permet d'échapper à la seule concurrence par les prix.", v:true, why:"Vrai : se démarquer par la qualité ou l'image évite la guerre des prix."} ]
},

docs: {
  1:[ {titre:"Le circuit économique (schéma simplifié)", source:"Économie 1ʳᵉ STMG — fiche notionnelle",
       texte:"Les ménages fournissent du travail aux entreprises (flux réel) et reçoivent des salaires (flux monétaire).\nLes entreprises produisent des biens et services (flux réel) vendus aux ménages, qui les paient (flux monétaire).\nLes administrations prélèvent des impôts et versent des prestations.",
       questions:[
         {q:"Le travail fourni par les ménages est :", o:["un flux réel","un flux monétaire","un impôt"], c:0, why:"Le travail et les biens sont des flux réels ; les salaires et paiements sont des flux monétaires."},
         {q:"Les salaires versés aux ménages sont :", o:["un flux monétaire","un flux réel","une consommation intermédiaire"], c:0, why:"L'argent qui circule en contrepartie des flux réels est un flux monétaire."},
         {q:"Que représente ce schéma ?", o:["Le circuit économique entre agents","Le calcul du PIB","L'élasticité de la demande"], c:0, why:"Il montre les flux réels et monétaires reliant les agents économiques."}]},
      {titre:"Biens et services (tableau)", source:"Économie 1ʳᵉ STMG — fiche notionnelle",
       texte:"Un pain acheté en boulangerie : bien marchand.\nUne coupe de cheveux payée chez le coiffeur : service marchand.\nUn cours dans un lycée public : service non marchand.\nL'éclairage public d'une commune : service non marchand.",
       questions:[
         {q:"Le cours au lycée public est :", o:["un service non marchand","un bien marchand","un facteur de production"], c:0, why:"Fourni gratuitement ou quasi gratuitement, c'est un service non marchand."},
         {q:"La coupe de cheveux payée est :", o:["un service marchand","un bien marchand","un service non marchand"], c:0, why:"Immatérielle et vendue sur un marché : c'est un service marchand."},
         {q:"Qu'est-ce qui distingue marchand et non marchand ?", o:["Le fait d'être vendu ou non sur un marché","La taille de l'entreprise","Le nombre d'agents"], c:0, why:"Le caractère marchand dépend de la vente (ou non) sur un marché à un prix significatif."}]} ],
  2:[ {titre:"Calcul de la valeur ajoutée", source:"Confiturerie péi — données pédagogiques (en €)",
       texte:"Production vendue : 100 000.\nConsommations intermédiaires (fruits, sucre, emballages, énergie) : 40 000.\nLa valeur ajoutée sert ensuite à rémunérer les salariés, les associés et l'État.",
       questions:[
         {q:"Quelle est la valeur ajoutée ?", o:["60 000 €","100 000 €","140 000 €"], c:0, why:"VA = production − consommations intermédiaires = 100 000 − 40 000 = 60 000 €."},
         {q:"La valeur ajoutée mesure :", o:["la richesse réellement créée","le chiffre d'affaires brut","le bénéfice net uniquement"], c:0, why:"C'est la richesse créée, une fois retranchées les consommations intermédiaires."},
         {q:"Entre quels acteurs la valeur ajoutée se partage-t-elle ?", o:["Salariés, associés et État","Uniquement les clients","Uniquement les fournisseurs"], c:0, why:"Salaires (travail), dividendes/intérêts (capital) et prélèvements (État)."}]},
      {titre:"Évolution de la productivité", source:"Usine d'embouteillage — données pédagogiques",
       texte:"Avant : 1 000 bouteilles par salarié et par jour.\nAprès l'installation d'une ligne automatisée et la formation des équipes : 1 300 bouteilles par salarié et par jour, à effectif constant.",
       questions:[
         {q:"Quel est le gain de productivité par salarié ?", o:["+30 %","+13 %","−30 %"], c:0, why:"(1 300 − 1 000) ÷ 1 000 = 0,30, soit +30 %."},
         {q:"D'où vient ce gain de productivité ?", o:["Investissement et capital humain","Hausse des prix","Baisse de la demande"], c:0, why:"L'investissement (machine) et la formation (capital humain) expliquent les gains de productivité."},
         {q:"Produire plus avec le même effectif traduit :", o:["une hausse de la productivité","une baisse de la valeur ajoutée","une inflation"], c:0, why:"La productivité mesure l'efficacité des facteurs : ici, elle augmente."}]} ],
  3:[ {titre:"Budget d'un ménage (par mois)", source:"Ménage réunionnais — données pédagogiques (en €)",
       texte:"Revenu disponible : 2 000.\nConsommation totale : 1 600 (dont logement 700, alimentation 350, transport 250, loisirs 300).\nÉpargne : 400.",
       questions:[
         {q:"Quelle est la propension moyenne à consommer ?", o:["0,8","0,4","1,6"], c:0, why:"Consommation ÷ revenu = 1 600 ÷ 2 000 = 0,8."},
         {q:"Quel est le coefficient budgétaire du logement ?", o:["35 % de la consommation","20 %","50 %"], c:0, why:"700 ÷ 2 000 = 0,35, soit 35 % du revenu (ou 700 ÷ 1 600 ≈ 44 % de la consommation)."},
         {q:"Le taux d'épargne de ce ménage est de :", o:["20 %","40 %","80 %"], c:0, why:"Épargne ÷ revenu = 400 ÷ 2 000 = 0,20, soit 20 %."}]},
      {titre:"Pouvoir d'achat : revenus et prix", source:"Données pédagogiques — évolution annuelle",
       texte:"Évolution du revenu disponible : +2 %.\nÉvolution de l'indice des prix à la consommation (IPC) : +4 %.",
       questions:[
         {q:"Qu'arrive-t-il au pouvoir d'achat ?", o:["Il baisse","Il augmente","Il est stable"], c:0, why:"Les prix progressent plus vite que le revenu : le pouvoir d'achat diminue."},
         {q:"Que mesure l'IPC ?", o:["L'évolution des prix d'un panier de biens","La richesse nationale","Le taux d'épargne"], c:0, why:"L'indice des prix à la consommation suit le prix d'un panier représentatif."},
         {q:"Le pouvoir d'achat augmenterait si :", o:["le revenu progressait plus vite que les prix","les prix montaient plus vite","l'épargne baissait"], c:0, why:"Le pouvoir d'achat dépend de l'écart entre évolution des revenus et des prix."}]} ],
  4:[ {titre:"Situations de financement (tableau)", source:"Économie 1ʳᵉ STMG — fiche notionnelle",
       texte:"Une entreprise qui investit plus qu'elle n'a de ressources : besoin de financement.\nUn ménage qui épargne une partie de son revenu : capacité de financement.\nLe système financier met en relation les deux.",
       questions:[
         {q:"L'entreprise qui investit beaucoup est en :", o:["besoin de financement","capacité de financement","autofinancement total"], c:0, why:"Ses dépenses dépassent ses ressources : elle a un besoin de financement."},
         {q:"Le ménage qui épargne est en :", o:["capacité de financement","besoin de financement","faillite"], c:0, why:"Ses ressources dépassent ses dépenses : il a une capacité de financement."},
         {q:"Quel est le rôle du système financier ?", o:["Mettre en relation besoins et capacités de financement","Fixer les prix des biens","Calculer le PIB"], c:0, why:"Il oriente l'épargne des uns vers les besoins des autres."}]},
      {titre:"Financement direct ou indirect ?", source:"Économie 1ʳᵉ STMG — fiche notionnelle",
       texte:"Cas A : une grande entreprise émet des obligations achetées par des épargnants.\nCas B : un artisan obtient un crédit auprès de sa banque, qui a collecté l'épargne de ses clients.",
       questions:[
         {q:"Le cas A est un financement :", o:["direct (marché financier)","indirect","par autofinancement"], c:0, why:"Les épargnants financent directement l'entreprise via des titres : financement direct."},
         {q:"Le cas B est un financement :", o:["indirect (par la banque)","direct","par émission d'actions"], c:0, why:"La banque s'interpose entre épargnants et emprunteur : financement indirect."},
         {q:"En accordant ce crédit, la banque :", o:["participe à la création monétaire","détruit de la monnaie","émet des actions"], c:0, why:"L'octroi de crédits crée de la monnaie (« les crédits font les dépôts »)."}]} ],
  5:[ {titre:"Offre, demande et prix d'équilibre", source:"Économie 1ʳᵉ STMG — données pédagogiques",
       texte:"À 2 € le kg, les producteurs offrent 800 kg de letchis mais les consommateurs n'en demandent que 400 kg.\nÀ 1 € le kg, l'offre tombe à 500 kg et la demande monte à 500 kg.",
       questions:[
         {q:"Quel est le prix d'équilibre ?", o:["1 € le kg","2 € le kg","3 € le kg"], c:0, why:"À 1 €, offre = demande = 500 kg : c'est le prix d'équilibre."},
         {q:"À 2 € le kg, le marché présente :", o:["une offre excédentaire","une pénurie","un équilibre"], c:0, why:"L'offre (800) dépasse la demande (400) : il y a un excédent qui pousse le prix à la baisse."},
         {q:"Que fait le prix lorsque l'offre dépasse la demande ?", o:["Il baisse vers l'équilibre","Il augmente","Il reste figé"], c:0, why:"L'excédent d'offre pousse le prix à la baisse jusqu'à l'équilibre."}]},
      {titre:"Les structures de marché", source:"Économie 1ʳᵉ STMG — fiche notionnelle",
       texte:"Marché A : des centaines de petits producteurs proposent un produit identique.\nMarché B : trois grandes entreprises se partagent l'essentiel des ventes.\nMarché C : une seule entreprise dispose d'un réseau que personne ne peut dupliquer.",
       questions:[
         {q:"Le marché B correspond à :", o:["un oligopole","un monopole","une concurrence pure"], c:0, why:"Quelques offreurs dominants : c'est un oligopole."},
         {q:"Le marché C correspond à :", o:["un monopole","un oligopole","une concurrence pure"], c:0, why:"Un seul offreur sans concurrent possible : c'est un monopole."},
         {q:"Qu'est-ce qui protège l'entreprise du marché C ?", o:["Une barrière à l'entrée","Une forte élasticité","L'absence de demande"], c:0, why:"Un réseau impossible à dupliquer constitue une barrière à l'entrée."}]} ]
},

      {cas:"Anticipant une possible perte d'emploi, un ménage augmente son épargne.", q:"Quel type d'épargne renforce-t-il ?", o:["L'épargne de précaution","L'épargne forcée","La consommation"], c:0, why:"L'incertitude motive l'épargne de précaution."},

ressources: [
{ cat:"methodo", type:"page", titre:"Méthode — Aborder un sujet d'économie, pas à pas", desc:"Lire le sujet et les documents, repérer les verbes directeurs, mobiliser les bonnes notions.", url:"",
  html:"<h2>Le principe : relier les documents au cours</h2><p>En économie, la plupart des points se gagnent en exploitant les documents (statistiques, graphiques, textes) et en les reliant aux notions du programme.</p><h2>Étape 1 — Lire le sujet et les documents</h2><ul><li>De quel thème relève la question ? (marché, richesse, État, emploi, commerce…)</li><li>Quels documents accompagnent le sujet et que montrent-ils ?</li><li>Quelle est la consigne précise ?</li></ul><h2>Étape 2 — Repérer les verbes directeurs</h2><table><tr><th>Verbe</th><th>Ce qu'il attend</th></tr><tr><td>Identifier / Relever</td><td>Extraire une information d'un document</td></tr><tr><td>Calculer</td><td>Effectuer un calcul (valeur ajoutée, taux, propension, élasticité)</td></tr><tr><td>Interpréter / Analyser</td><td>Donner le sens des données, les expliquer avec une notion</td></tr><tr><td>Distinguer</td><td>Opposer deux notions économiques</td></tr><tr><td>Montrer / Argumenter</td><td>Construire un raisonnement appuyé sur des connaissances</td></tr></table><h2>Étape 3 — Mobiliser les notions et rédiger</h2><p>On relie chaque réponse à une notion du programme et, si possible, à une donnée chiffrée du document. On rédige des phrases complètes.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Lire et interpréter un document statistique", desc:"Graphiques, tableaux, indices : la lecture en 4 temps qui évite les contresens.", url:"",
  html:"<h2>Avant de commenter : identifier le document</h2><ul><li><b>Source et date :</b> qui publie ? (INSEE, Banque de France…) De quand datent les données ?</li><li><b>Unité :</b> des euros ? des pourcentages ? un indice (base 100) ?</li><li><b>Champ :</b> quel pays, quelle population, quelle période ?</li></ul><h2>Lire les chiffres correctement</h2><table><tr><th>Type</th><th>Ce qu'il faut dire</th></tr><tr><td>Une valeur</td><td>Lire avec son unité : « En 2023, le PIB est de… »</td></tr><tr><td>Une évolution</td><td>Calculer un taux de variation : (arrivée − départ) / départ x 100</td></tr><tr><td>Un indice base 100</td><td>Un indice de 110 signifie +10 % par rapport à l'année de base</td></tr></table><h2>Interpréter, pas seulement décrire</h2><p>Après avoir décrit la tendance (hausse, baisse, stabilité), on l'explique avec une notion du cours. Décrire sans expliquer ne rapporte que la moitié des points.</p><h2>Le piège classique</h2><p>Ne pas confondre <b>valeur</b> et <b>variation</b>, ni <b>points</b> et <b>pourcentage</b> : passer de 8 % à 10 %, c'est +2 points, mais +25 %.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Réaliser et rédiger un calcul économique", desc:"Le formulaire essentiel (valeur ajoutée, taux, propension, élasticité) et la façon de rédiger.", url:"",
  html:"<h2>Les formules incontournables</h2><table><tr><th>Notion</th><th>Formule</th></tr><tr><td>Valeur ajoutée</td><td>Production − consommations intermédiaires</td></tr><tr><td>Taux de variation</td><td>(valeur d'arrivée − valeur de départ) / valeur de départ x 100</td></tr><tr><td>Taux de chômage</td><td>nombre de chômeurs / population active x 100</td></tr><tr><td>Taux d'emploi</td><td>actifs occupés / population en âge de travailler x 100</td></tr><tr><td>Propension à consommer</td><td>consommation / revenu disponible</td></tr><tr><td>Taux d'épargne</td><td>épargne / revenu disponible x 100</td></tr><tr><td>Élasticité prix de la demande</td><td>variation en % de la demande / variation en % du prix</td></tr></table><h2>Rédiger un calcul pour avoir tous les points</h2><ol><li>Écrire la formule.</li><li>Remplacer par les valeurs de l'énoncé.</li><li>Donner le résultat avec son unité.</li><li>Interpréter en une phrase.</li></ol><p><b>Exemple :</b> VA = 100 000 − 40 000 = 60 000 €. L'entreprise a créé 60 000 € de richesse.</p>" },
{ cat:"methodo", type:"page", titre:"Méthode — Construire une argumentation économique (AEI)", desc:"Affirmation, Explication, Illustration : structurer un raisonnement appuyé sur des données.", url:"",
  html:"<h2>Le principe AEI adapté à l'économie</h2><p>Chaque argument se construit en trois temps, en s'appuyant sur une notion et, si possible, sur une donnée chiffrée.</p><table><tr><th>Temps</th><th>Rôle</th></tr><tr><td>A — Affirmation</td><td>L'idée, en une phrase claire</td></tr><tr><td>E — Explication</td><td>Le mécanisme économique, avec la notion du cours</td></tr><tr><td>I — Illustration</td><td>Un exemple ou une donnée du document</td></tr></table><h2>Exemple rédigé</h2><p><b>A :</b> une hausse du pouvoir d'achat soutient la consommation des ménages. <b>E :</b> le pouvoir d'achat mesure ce que le revenu permet d'acheter ; s'il augmente, les ménages peuvent consommer davantage. <b>I :</b> dans le document, la hausse du revenu supérieure à celle des prix se traduit par une progression des dépenses.</p><h2>Pour une réponse complète</h2><p>On enchaîne plusieurs arguments AEI et, sur un sujet qui le demande, on présente aussi des points de vue opposés avant de conclure.</p>" },
